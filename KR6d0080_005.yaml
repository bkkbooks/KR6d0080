body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋安樂品髻珠喻第十四頌云法將神兵勢方強魔軍棄甲盡銷亡髻珠一顆親收得苦處都成快樂場由前八十萬億那由他菩薩發願持經不惜身命忍諸難事然加刀杖罵詈而能忍未必安見恐怖畏懼而能忍未必樂今使有刀杖罵詈而不能加有恐怖畏懼而不能入是則終日在刀山劍樹上行氷凌火聚中住皆是安樂道場然非深達無生法忍者不能也故又以無生法忍進之永嘉云觀惡言是功德此則成吾善知識不因訕謗起冤親何表無生法忍力是也爾時文殊師利法王子菩薩摩訶薩白佛言世尊是諸菩薩甚為難有敬順佛故發大誓願於後惡世護持讀説是法華經世尊菩薩摩訶薩於後惡世云何能説是經佛告文殊師利若菩薩摩訶薩於後惡世欲説是經當安住四法一者安住菩薩行處親近處能為衆生演説是經文殊師利云何名菩薩摩訶薩行處若菩薩摩訶薩住忍辱地柔和善順而不卒暴心亦不驚又復於法無所行而觀諸法如實相亦不行不分別是名菩薩摩訶薩行處初文殊請問敬順下言如來以目視即能敬順佛意發大願而入惡世持經故知甚為希有第惡世衆生剛強粗獷恐畏實多即有堅忍之力或恐不能持久然不知云何用心行何等行然後堪説是經也佛告下説四安樂法門也一者安住菩薩行處親近處者言日用所行處與所親近處渾身安住平等法性不分高下然後説法方得安樂云何下先解菩薩行處有二一事行二理行先明事行事行者忍於外也忍於外者不起煩惱障住忍辱地者言菩薩應世先當忍人之辱莫以人辱我而心有動也柔和善順者言彼以剛來我以柔應彼以瞋來我以和應彼以惡來我以善應彼以逆來我以順應如此不獨刀杖罵詈不能加即使有夜叉殺害之心亦且革為菩薩慈悲之面矣所謂觀德人之容使人意消也而不卒暴心亦不驚者卒暴者急遽之狀驚者恐怖之狀由柔和故不卒暴由善順故不驚永嘉所謂縱遇鋒刀常坦坦假饒毒藥也間間是也若一卒暴一著驚為彼所動落彼綣繢則刀杖可加罵詈可入矣此道人處世之良方亦是持經之祕訣也前所謂著忍辱衣者如此涅槃經中有聞讚佛為大福德相怒者曰生經七日母便命終豈謂大福德相讚者曰年志俱盛而不卒暴打之不嗔罵之不報是故我言大福德相怒者聞而心服又復下釋理行理行者忍於內也忍於內者則不起理障於法無所行者行謂分別不見有法當情故心無分別也而觀諸法如實相者若見世間實有善惡二相未免為彼所轉便有好善惡惡之心不能住忍辱地故觀察一切善惡諸法無有高下總是平等一相故心無所行也亦不行不分別者不見無法當情故即無分別者亦不分別也不作有見不作無見垢淨兩忘心境如一世出世法打成一片方名平等觀法思益云於法無所分別亦不行非法是名歸依法此即菩薩即世法而行出世法也是名菩薩行處者言常觀察法相如是是即行菩薩道也云何名菩薩摩訶薩親近處菩薩摩訶薩不親近國王王子大臣官長不親近諸外道梵志尼犍子等及造世俗文筆讚咏外書及路伽耶陀逆路伽耶陀者亦不親近諸有凶戲相扠叉相撲卜及那羅等種種變現之戲又不親近旃陀羅及畜豬朱羊雞狗畋田獵烈漁捕諸惡律儀如是人等或時來者則為説法無所希望又不親近求聲聞比丘比丘尼優婆塞優婆夷亦不問訊若於房中若經行處若在講堂中不共住止或時來者隨宜説法無所希求文殊師利又菩薩摩訶薩不應於女人身取能生欲想相而為説法亦不樂見若入他家不與小女處女寡女等共語亦復不近五種不男之人以為親厚不獨入他家若有因緣須獨入時但一心念佛若為女人説法不露齒笑不現胸臆臆音亦乃至為法猶不親厚況復餘事不樂畜年少弟子沙彌小兒亦不樂與同師常好坐禪在於間處修攝其心文殊師利是名初親近處復次菩薩摩訶薩觀一切法空如實相不顛倒不動不退不轉如虗空無所有性一切語言道斷不生不出不起無名無相實無所有無量無邊無礙無障但以因緣有從顛倒生故説常樂觀如是法相是名菩薩摩訶薩第二親近處此釋親近處也亦有事有理先釋事親近一不親近豪貴者經云比丘親近國王有十非法一陰謀王命二王誅大臣三典藏亡寶四宮人懷妊五王身中毒六大臣諍競七二國交兵八王吝不施九聚斂民物十多諸疾疫一切人民謂是比丘所作作此以謗比丘即是謗佛謗法故佛不令親近國王等也二不親近邪師言外道者不即心以為道心遊道外故梵志者其先志慕梵天修梵天行故尼犍子者即常見外道此人言罪福定受非行道能斷等者等取其餘五師也一富蘭迦葉其人起邪見言一切法皆斷滅二末伽梨俱舍梨其人計衆生苦樂不因行得皆是自然三正勝其人計久經生死歷多劫苦際自盡四欽婆羅其人非因計因以熏鼻拔髮為道今併受苦後世常樂五迦栴延此人言諸法有相無相連上一師即六師也不許親近者恐入邪種故世俗文筆讚咏外書者即八索九丘三墳五典諸子百家也不許親近者多岐亡羊故梵語路伽耶此云惡議論是順世外道計順世情故梵語逆路伽耶此云惡問難以所計不順世間故不親近者恐墮惡種故三不近凶戲那羅延者此云上伎戲謂綵畫其身作變異戲如少林神拳神棍之類不許親近者恐起鬪心故四不近惡律儀習惡則惡故如是下言此等人我雖不去親近於彼彼或悔心始萌肯來親我應當隨機説法導其良心令彼捨舊圖新不應希望供養也五不近小乘者小乘不解隨宜説法恐起諍論故不問訊亦不共住也六不近女人者防微杜漸故不近小女不知節義者處女未嫁者寡女既嫁而稱未亡人者七不近不男即生劇妬變半也不獨入者防嫌疑之口也一心念佛者作尊重之想也不露齒笑不現胸臆者無褻狎之儀也即使為法來者亦不應親厚況以他事因緣而親近哉八不近年少沙彌如上所説皆能妨禪定亂心想故宜當遠離也在於間處修攝其心者言在水邊林下空間之處攝心正念所謂上不為仁義之操下不為淫僻之行唯默默調心此非納衣在空間之比也是名初親近處者言不與世俗親近然後與道親近也洪覺範問金華志禪師居山有何趣味答云山中住獨掩柴門無別趣三個柴頭品字煨不用援毫文彩露又曰萬機俱罷付癡憨蹤迹常容野鹿參不脫麻衣拳作枕幾生夢在緑蘿庵此所謂間處攝心者前來住忍辱地心亦不驚是因外境干我而我以坦然之度應之此言不親近世間等者是教人莫向世間討不如意也自處則氷清玉潔處物則光風霽月如此則身心自然安樂矣問世出世法本無有二何必分疆立界答初心入道熟處太熟生處太生故不親近世法然後與出世法相應世味淡薄道心自然濃厚所謂轉生成熟轉熟成生之機正在乎此若夫同乎汙世合乎流俗朱門懸薄無不奔走酒肆淫房一例遊戲此是破弊凡夫非佛弟子若盡分別善善惡惡不以理融攝是小乘人非菩薩器故在事觀則歷歷分明絲毫不濫一入理觀則法法混融善惡平等所謂非凡夫行非聲聞行是名菩薩行也復次下釋理親近觀一切法空者觀是觀察一切法者即三科七大生死涅槃種種法也由觀諸法俱不可得故曰空也如實相者以一切法皆是真如實相無二相故不顛倒者以一切法遠離顛倒夢想故不動者以一切法本自不動故不退者在衆生分上未嘗退故不轉者在諸聖分上不曾轉故喻如虗空者圓同大虗無欠無餘故無所有性者無自性他性賢愚性聖凡性是無性之性名佛性故一切語言道斷者不落唇吻故過去不生現在不出未來不起不墮諸數故無名無相者四辨莫能談五目莫能覩故實無所有者本來無一物故無量者無形量故無邊者無方所故無礙者無壁落故無障者無葑蔀故所以謂之空也應立量云一切法是有法空為宗因云如實故或是不顛倒故同喻如虗空以虗空為喻者以虗空無鎖閉無形段無心眼如是觀察一切諸法本無一物皆由一念不覺轉為無明由無明因緣展轉相生是則一切諸法皆從一念顛倒妄想生起既有妄想遂起言説應知一切諸法但有言説都無實義常樂觀察法相如是是名親近法也所謂處法空座如此爾時世尊欲重宣此義而説偈言若有菩薩於後惡世無怖畏心欲説是經應入行處及親近處常離國王及國王子大臣官長凶險戲者及旃陀羅外道梵志亦不親近增上慢人貪著小乘三藏學者破戒比丘名字羅漢及比丘尼好戲笑者深著五欲求現滅度諸優婆夷皆勿親近若是人等以好心來到菩薩所為聞佛道菩薩則以無所畏心不懷希望而為説法寡女處女及諸不男皆勿親近以為親厚亦莫親近屠兒魁膾快畋田獵烈漁捕為利殺害販肉自活衒現賣女邑如是之人皆勿親近凶險相撲種種嬉戲諸淫女等盡勿親近莫獨屏丙處為女説法若説法時無得戲笑入里乞食將一比丘若無比丘一心念佛是則名為行處近處以此二處能安樂説又復不行上中下法有為無為實不實法亦不分別是男是女不得諸法不知不見是則名為菩薩行處一切諸法空無所有無有常住亦無起滅是名智者所親近處顛倒分別諸法有無是實非實是生非生在於間處修攝其心安住不動如須彌山觀一切法皆無所有猶如虗空無有堅固不生不出不動不退常住一相是名近處若有比丘於我滅後入是行處及親近處説斯經時無有弱弱菩薩有時入於靜空以正憶念隨義觀法從禪定起為諸國王王子臣民婆羅門等開化演暢説斯經典其心安隱無有怯弱文殊師利是名菩薩安住初法能於後世説法華經若有下六句總頌二處常離下別頌事親近處三藏學者佛在彼羅奈最初與五人説修多羅藏佛在羅閲祇最初與須那提説毗尼藏佛在毗舍離獼猴池最初為跋耆子説阿毗曇藏故經律論總名藏教學三藏者名三藏學者破戒比丘者即前於戒有缺漏是也名字羅漢者即前名為解脫其實未得者也好戲笑者非是離諸戲笑親近智者之人也著五欲而求滅度者是緣木求魚淘灰索金之人也若是下言此等人雖不著意要親近他若彼以好樂之心欲聞大法或來親近應以喜心接之為彼説法勿以畏而拒之也又復下頌理行不行者謂不當以心行分別實有諸法差別以法法皆同一法故上中下法者三乘法也有為法者生滅法也無為法者不生滅法也實法者實相法也不實法者虗妄五蘊法也言不唯不當分別法亦復不當分別此人是男是女是人不得法不見法以智愚賢不肖者皆可知皆可見皆可得故問前云女人不應親近此云亦不分別是男是女得無犯自語相違耶答前以相言此以性言事雖行布理實圓融故一切下頌理親近無有常住亦無起滅者喚作常住是常見喚作起滅是斷見隨緣故非常不變故非斷不斷不常果生因滅如是觀法則造次顛沛常在一處未嘗暫離古德所謂夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止智者親近如斯而已何以故以一切法本非斷常有無等相但以顛倒妄想分別計度是有是無是實非實是生非生竟不知不有不無非實非虗無生無滅究竟平等本不可以妄想推求也故在間處修攝其心置之一處不使落路落草安住不動猶如須彌觀一切法皆無所有猶如虗空常住一相是名初心親近佛法處也若有下言末世菩薩能處法空之座則懦者立弱者強膽充神王肆口而説不生怖怯矣菩薩下第二説法之方如欲説法必先入定觀法觀機也以正憶念者以用也正憶念者不起一念名正憶念用此正念不用第二念也隨義觀法者但隨於義不著言説所謂依義不依文也從禪下從定起而發言言必真當故亦無怯弱也文殊下結顯處法空座者然後能説法也又文殊師利如來滅後於末法中欲説是經應住安樂行若口宣説若讀經時不樂説人及經典過亦不輕慢諸餘法師不説他人好惡長短於聲聞人亦不稱名説其過惡亦不稱名讚歎其美又亦不生怨嫌之心善修如是安樂心故諸有聽者不逆其意有所難問不以小乘法答但以大乘而為解説令得一切種智爾時世尊欲重宣此義而説偈言菩薩常樂安隱説法於清淨地而施牀座以油塗身澡早浴塵穢著新淨衣內外俱淨安處法座隨問為説若有比丘及比丘尼諸優婆塞及優婆夷國王王子群臣士民以微妙義和顏為説若有難問隨義而答因緣譬喻敷演分別以是方便皆使發心漸漸增益入於佛道除懶惰意及懈怠想離諸憂惱慈心説法晝夜常説無上道教以諸因緣無量譬喻開示衆生咸令歡喜衣服臥具飲食醫藥而於其中無所希望但一心念説法因緣願成佛道令衆亦爾是則大利安樂供養我滅度後若有比丘能演説斯妙法華經心無嫉恚諸惱障礙亦無憂愁及罵詈利者又無怖畏加刀杖等亦無擯聘出安住忍故智者如是善修其心能住安樂如我上説其人功德千萬億劫算數譬喻説不能盡第二安樂行是不宜過惡口業清淨也若宣此經或讀此經不得樂説他人不宣讀此經宣讀餘經之過亦不輕慢諸餘法師者如倚圓頓而輕漸修依實相而慢權説之類不説他人好惡長短者或執小難大或以大破小或禪律相非或宗教互詆各開戶牖互立門庭總是卜杓虗聲孰非孰是故不必臧否之也不毀讚聲聞而心亦不嫌者毀則增其傲慢而不信讚則安於卑小而不進嫌則終於棄厭而不度故也不逆其意者謂彼小乘有所難問就其心之明透處而引導之令入大乘更不當導以小乘法所謂達之而入於無疵也偈中若有難問下頌有所難問不逆其意應以善巧方便引誘皆使發大乘心令彼日就月將入於佛道若於小乘心有怨嫌則生憂惱懶惰懈怠之心故宜併除當起慈心而為説法令彼翻小成大咸生歡喜然亦不得希望他人四事供養但當一心自念藉此説法因緣自願成佛聞我法者亦願彼得成佛是則名為受大利益受大安樂受大供養也安住忍故者忍於言也由能忍於心故能忍於言由忍於言故怖畏等不加所謂外無臭穢蠅自不來也又文殊師利菩薩摩訶薩於後末世法欲滅時受持讀誦斯經典者無懷嫉妬諂誑之心亦勿輕罵學佛道者求其長短若比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求菩薩道者無得惱之令其疑悔語其人言汝等去道甚遠終不能得一切種智所以者何汝是放逸之人於道懈怠故又亦不應戲論諸法有所諍競當於一切衆生起大悲想於諸如來起慈父想於諸菩薩起大師想於十方諸大菩薩常應深心恭敬禮拜於一切衆生平等説法以順法故不多不少乃至深愛法者亦不為多説文殊師利是菩薩摩訶薩於彼末世法欲滅時有成就是第三安樂行者説是法時無能惱亂得好同學共讀誦是經亦得大衆而來聽受聽已能持持已能誦誦已能説説已能書若使人書供養經卷恭敬尊重讚歎爾時世尊欲重宣此義而説偈言若欲説是經當捨嫉恚慢諂誑邪偽心常修質直行不輕懱於人亦不戲論法不令他疑悔云汝不得佛是佛子説法常柔和能忍慈悲於一切不生懈怠心十方大菩薩愍衆故行道應生恭敬心是則我大師於諸佛世尊生無上父想破於憍慢心説法無障礙第三法如是智者應守護一心安樂行無量衆所敬第三安樂行不起惡心是意業清淨也無懷無輕罵無得惱三無字皆禁止之辭嫉者徇自名利不耐他榮妬忌為性諂者為罔他故矯設形儀險曲為性誑者為獲利養矯現有德詭詐為性小隨之三也昔山谷禪師云觀人之壽夭必視其用心夫動入欺誑者豈長世之人乎寒山云語直無背面心真無罪福大溈真禪師一生誨門弟子作事要實頭雲蓋智禪師凡有所示必曰但莫瞞心心自靈聖故學道人先從不諂誑始輕者心生眇忽罵者口加惡言也求其長短者吹毛求疵也語其下出惱亂之語言汝等不肯向己躬下覔佛却在他人口角邊覔豈非甚遠縱經千劫下稍終是食泥食土由汝等向外馳求不肯制心一處故由汝摘葉尋枝不向己躬著力故此語雖是直捷於小機人方底圓蓋若對上機不妨妙藥昔慧朗禪師初參石頭問如何是佛頭曰汝無佛性師曰蠢動含靈作麼生頭曰皆有佛性曰慧朗為甚麼無頭曰為汝不肯承當師於言下悟入此所謂上機也不應戲論諸法有諍競者言不得執語言文字大小諸乘互相是非總是如來方便説故大悲想者以衆生皆依恃我故憐之如子慈父想者以諸佛能生我故尊之如父大師想者以菩薩能成我故事之如師平等説法者既衆生皆是我子當以等心説平等法也以順法性不多不少者言法性本來無欠無餘故為人説亦當順法性不以人愛法而多説不以人不愛而少説以諸衆生具有如來智慧德相故文殊下結行成得益得好同學等者言既能平等説法自有同心同德之人輻輳禪階風趨理窟傾心側耳信受奉行彼且恭敬讚歎之不暇安有惱亂者哉偈中先頌無懷嫉妬諂誑心慢者恃己於他高舉為性如云生天當在靈運前成佛當在靈運後之類邪謂偏邪偽謂虗偽質者實也治諂誑之藥直者治邪偽之藥不輕懱者治我慢之藥也亦不戲論法一句頌不應戲論諸法有所諍競不令二句頌汝等去道甚遠等慈悲下頌於諸衆生起憐愍想言當憐愍衆生於上中下平等説法誘掖獎勸去來坐立終莫疲厭也十方下頌於諸菩薩起大師想於諸下頌於諸如來生慈父想憍慢心者自高而卑人自滿而忽人也又文殊師利菩薩摩訶薩於後末世法欲滅時有持是法華經者於在家出家人中生大慈心於非菩薩人中生大悲心應作是念如是之人則為大失如來方便隨宜説法不聞不知不覺不問不信不解其人雖不問不信不解是經我得阿耨多羅三藐三菩提時隨在何地以神通力智慧力引之令得住是法中文殊師利是菩薩摩訶薩於如來滅後有成就此第四法者説是法時無有過失常為比丘比丘尼優婆塞優婆夷國王王子大臣人民婆羅門居士等供養恭敬尊重讚歎虗空諸天為聽法故亦當隨侍若在聚落城邑空間林中有人來欲難問者諸天晝夜常為法故而衛護之能令聽者皆得歡喜所以者何此經是一切過去未來現在諸佛神力所護故第四安樂行生大慈悲也生大慈者憐三界人以若為樂欲拔其苦也生大慈者愍小乘人志樂小樂欲與其大樂也則為大失者以不解如來平等佛慧故有如來寶藏而不能得有廣大威神而不能用也應作下愍彼不解如來方便説法也由不聞故不知由不知故不覺由不覺故不問不問故不信不信故不解也其人下正出慈悲心言彼雖無意求法隨彼衆生在何國土當以如來自在神力及甚深無量智慧力引之令得住是法中所謂大慈悲為室也文殊下結行成得益若具前三行能令行人三業清淨具第四行能令行人精進不怠常為下四衆尊敬虗空下諸天隨侍諸佛神力所護故曰佛所護念佛所護念者而人天有不衛護者哉文殊師利是法華經於無量國中乃至名字不可得聞何況得見受持讀誦文殊師利譬如強力轉輪聖王欲以威勢降伏諸國而諸小王不順其命時轉輪王起種種兵而往討伐王見兵衆戰有功者即大歡喜隨功賞賜或與田宅聚落城邑或與衣服嚴身之具或與種種珍寶金銀琉璃硨磲碼瑙珊瑚琥珀象馬車乘奴婢人民唯髻中明珠不以與之所以者何獨王頂上有此一珠若以與之王諸眷屬必大驚怪文殊師利如來亦復如是以禪定智慧力得法國土王於三界而諸魔王不肯順伏如來賢聖諸將與之共戰其有功者心亦歡喜於四衆中為説諸經令其心悅賜以禪定解脫無漏根力諸法之財又復賜與涅槃之城言得滅度引導其心令皆歡喜而不為説是法華經文殊師利如轉輪王見諸兵衆有大功者心甚歡喜以此難信之珠久在髻計中不妄與人而今與之如來亦復如是於三界中為大法王以法教化一切衆生見賢聖軍與五陰魔煩惱魔死魔共戰有大功勳滅三毒出三界破魔網爾時如來亦大歡喜此法華經能令衆生至一切智一切世間多怨難信先所未説而今説之文殊師利此法華經是諸如來第一之説於諸説中最為甚深末後賜與如彼強力之王久護明珠今乃與之文殊師利此法華經諸佛如來祕密之藏於諸經中最在其上長夜守護不妄宣説始於今日乃與汝等而敷演之名字不可得聞正顯此經諸佛守護不妄宣説也轉輪王喻如來諸國小王不順命喻諸魔擾亂起種種兵喻三乘人兵戰有功喻三乘人斷見思惑各出三界隨功賞賜者功小者賞與田宅聚落次功者賞與嚴身之具功大者賞與七寶象馬人民喻三乘法髻中明珠喻最上一乘獨王下言此明珠唯輪王頂上有此一珠所以為輪王者由此珠耳今若以此珠與人人必驚異如來下法合得法國土以法界為國合輪王魔王不順合諸國不順如來賢聖諸將合種種兵為説諸經即三乘法合隨功賞賜賜以禪定大乘法財合種種珍寶賜涅槃城合田宅聚落城邑法華經合髻珠文殊下喻有大功者方賜髻珠如來下法合菩薩法將與五陰魔戰二乘法將與煩惱魔死魔戰皆有大功故如來歡喜説法華經湖南祇林和尚每叱文殊普賢皆為精魅手持木劍自謂降魔才見僧來參便曰魔來也以劍亂揮歸方丈如是十二年置劒無言僧問十二年前為甚麼降魔師曰賊不打貧兒家曰十二年後為甚麼不降魔師曰賊不打貧兒家若祇林和尚是降魔有大功者末後賜與者禪宗謂之末後句故在末後賜與如彼下以喻合法文殊下以法合喻爾時世尊欲重宣此義而説偈言常行忍辱哀愍一切乃能演説佛所讚經後末世時持此經者於家出家及非菩薩應生慈悲斯等不聞不信是經則為大失我得佛道以諸方便為説此法令住其中譬如強力轉輪之王兵戰有功賞賜諸物象馬車乘嚴身之具及諸田宅聚落城邑或與衣服種種珍寶奴婢財物歡喜賜與如有勇健能為難事王解髻中明珠賜之如來亦爾為諸法王忍辱大力智慧寶藏以大慈悲如法化世見一切人受諸苦惱欲求解脫與諸魔戰為是衆生説種種法以大方便説此諸經既知衆生得其力已末後乃為説是法華如王解髻明珠與之此經為尊衆經中上我常守護不妄開示今正是時為汝等説我滅度後求佛道者欲得安隱演説斯經應當親近如是四法讀是經者常無憂惱又無病痛顏色鮮先白不生貧窮卑賤醜陋衆生樂見如慕賢聖天諸童子以為給使刀杖不加毒不能害若人惡罵口則閉塞遊行無畏如師子王智慧光明如日之照若於夢中但見妙事見諸如來坐師子座諸比丘衆圍繞説法又見龍神阿修羅等數如恆沙恭敬合掌自見其身而為説法又見諸佛身相金色放無量光照於一切以梵音聲演説諸法佛為四衆説無上法見身處中合掌讚佛聞法歡喜而為供養得陀羅尼證不退智佛知其心深入佛道即為授記成最正覺汝善男子當於來世得無量智佛之大道國土嚴淨廣大無比亦有四衆合掌聽法又見自身在山林中修習善法證諸實相深入禪定見十方佛諸佛身金色百福相莊嚴聞法為人説常有是好夢又夢作國王捨宮殿眷屬及上妙五欲行詣於道場在菩樹提下而處師子座求道過七日得諸佛之智成無上道已起而轉法輪為四衆説法經千萬億劫説無漏妙法度無量衆生後當入涅槃如煙盡燈滅若後惡世中説是第一法是人得大利如上之功德忍辱哀愍頌初四二安樂行譬如下輪王隨功賞賜如有勇健下賜髻珠如來下障機説法合隨功賜與既知下説法華經合賜髻珠如王下以喻合法此經下以法合喻我滅下結勸四行讀是下顯讀經果報常無憂惱者現世刀杖不加罵詈不至故身心安樂無有憂惱又無病痛者療治衆病故顏色鮮白者內含德本故不生貧窮者具足法財周給一切故不卑賤者生如來家處處稱尊故不醜陋者慈悲具足相好莊嚴故衆生樂見如慕賢聖者行如來事故天諸童子以為給使者諸天守護故刀杖不加毒不能害者兕無所投其角兵無所措其刃故若人惡罵口則閉塞者無處可著還著本人故遊行無畏如師子王者威德具足故智慧光明如日之照者四智圓明故若於下上言晝得安隱下言夜得安隱也夢中但見妙事者謂與如來氣分交接精神感召即夢中所見者皆妙事也見諸下先見如來説法大衆圍繞次見自身為衆説法如仰山夢入彌勒內院堂中諸位皆足惟空第二位師就座有一尊者白槌云合當第二座説法師起白槌云摩訶衍法離四句絶百非諦聽諦聽衆皆散去及覺舉似溈山山曰子已入聖位又見下夢中見佛説法佛為下又見自身讚佛供佛證智授記也汝善下即夢中授記語又見下夢入禪定見諸佛聞法為人説一句點出夢中所見妙事皆由為人説經故開眼合眼眠裏夢裏無非皆是佛境界也又夢下捨國王而得法王捨樂場而入道場捨帝座而處佛座捨金輪而轉法輪若後下結勝言具此四行而説經遂有如上諸功德亦何驚怖之有從地湧出品第十五頌云寒巖背日得春遲雪凍梅華萬萬枝一著東風齊放白無人不起故園思自寶塔地涌如來雲集分身諸佛遍十方界已見如來所證之深故召告菩薩發願持經然有發願在此方持經者有發願在異國持經者有發願在十方國土持經者會中尚有六萬菩薩不發願持經者此皆畏難苟安不愜如來本意故如來宣説四安樂行授以持經之法於是在娑婆八方之外異國菩薩其數有八恆河沙發願持經如來不許如來召告下方六萬恆河沙等諸大菩薩從地涌出發願持經以見如來所度之廣如來為一大事因緣出現於世至此方得明暢矣前示如來之所證故寶塔地涌此示如來之所度故菩薩亦從地涌正顯如是因如是緣皆不離當地也爾時它方國土諸來菩薩摩訶薩過八恆河沙數於大衆中起合掌作禮而白佛言世尊若聽我等於佛滅後在此娑婆世界勤加精進護持讀誦書寫供養是經典者當於此土而廣説之爾時佛告諸菩薩摩訶薩衆止善男子不須汝等護持此經所以者何我娑婆世界自有六萬恆河沙等菩薩摩訶薩一一菩薩各有六萬恆河沙眷屬是諸人等能於我滅後護持讀誦廣説此經佛説是時婆婆世界三千大千國土地皆振裂而於其中有無量千萬億菩薩摩訶薩同時涌出是諸菩薩身皆金色三十二相無量光明先盡在此娑婆世界之下此界虗空中住是諸菩薩聞釋迦牟尼佛所説音聲從下發來一一菩薩皆是大衆唱導之首各將六萬恆河沙眷屬況將五萬四萬三萬二萬一萬恆河沙等眷屬者況復乃至一恆河沙半恆河沙四分之一乃至千萬億那由它分之一況復千萬億那由它眷屬況復億萬眷屬況復千萬百萬乃至一萬況復一千一百乃至一十況復將五四三二一弟子者況復單己紀樂遠離行如是等比無量無邊算數譬喻所不能知是諸菩薩從地出已各詣虗空七寶妙塔多寶如來釋迦牟尼佛所到已向二世尊頭面禮足及至諸寶樹下師子座上佛所亦皆作禮右繞三匝合掌恭敬以諸菩薩種種讚法而以讚歎住在一面欣樂瞻仰於二世尊是諸菩薩摩訶薩從初涌出以諸菩薩種種讚法而讚於佛如是時間經五十小劫是時釋迦牟尼佛默然而坐及諸四衆亦皆默然五十小劫佛神力故令諸大衆謂如半日爾時四衆亦以佛神力故見諸菩薩遍滿無量百千萬億國土虗空是菩薩衆中有四導師一名上行二名無邊行三名淨行四名安立行是四菩薩於其衆中最為上首唱導之師在大衆前各共合掌觀釋迦牟尼佛而問訊言世尊少病少惱安樂行不所應度者受教易不不令世尊生疲勞耶爾時四大菩薩而説偈言世尊安樂少病少惱教化衆生得無疲倦又諸衆生受化易不不令世尊生疲勞耶爾時世尊於菩薩大衆中而作是言如是如是諸善男子如來安樂少病少惱諸衆生等易可化度無有疲勞所以者何是諸衆生世世已來常受我化亦於過去諸佛恭敬尊重種諸善根此諸衆生始見我身聞我所説即皆信受入如來慧除先修習學小乘者如是之人我今亦令得聞是經入於佛慧爾時諸大菩薩而説偈言善哉善哉大雄世尊諸衆生等易可化度能問諸佛甚深智慧聞已信行我等隨喜於時世尊讚歎上首諸大菩薩善哉善哉善男子汝等能於如來發隨喜心他方菩薩發願此方持經也它方國土即是娑婆之外者其數有八恆河沙之多也爾時下如來不許者欲顯如來本迹故佛説下菩薩地涌振者搖撼也裂者開拆也世尊才説時下方菩薩即從地涌者啐啄之機也先盡下明其住處是諸下出其來意所説音聲或是聞誰能於此娑婆世界廣説此經之語或是聞娑婆世界自有六萬恆河沙等語故從下方涌出也見得雖是上方下方宛若對面一一下顯其眷屬言唱導者謂此唱而彼和此導而彼隨也各將下言一一唱導菩薩又各有六萬恆河沙菩薩為眷屬也況有菩薩所將眷屬其數有五萬四萬乃至一萬恆河沙者乃至漸減至於單己無眷屬者其數又無量無邊也是諸下敘一時相見之儀先禮全身次禮分身禮也是諸下敘讚佛之儀問釋迦在娑婆世界自始至終秪有七十餘載而靈山一會菩薩讚佛五十小劫如來默然亦五十小劫令諸大衆謂如平日者得無太荒唐乎答此佛不思議境界一念即無量劫無量劫即一念所謂延促自在念劫圓融不可以心量測其長短也如大經云過去無量劫安置未來今未來無量劫安置過去世又云處夢謂經年覺乃須臾頃故時雖無量攝在一剎那是也爾時下四衆見諸菩薩遍滿虗空者始見分身諸佛充滿國土今見菩薩復遍虗空主伴圓融是何境象且分身諸佛是釋迦之所證而地涌菩薩又是釋迦之所化本末因緣無窮無極一佛如是諸佛皆然諸佛如此衆生皆然由衆生有如此大事因緣而不知不見此如來所以出現於世也是菩薩下導師問安四導師皆名行者皆得四安樂行故住法忍地得不退轉名上行不逆衆生所化則多名無邊行平等説法心無愛憎名淨行以慈悲心安立一切名安立行具此四行又為六萬恆河沙唱導師之上首故曰最為上首唱導之師也而問下問安之辭世尊在堪忍界度生與衆同事若衆生病如來亦病衆生惱如來亦惱故問如來現身三界少病少惱安樂行否所度衆生易受化否不令世尊倦津梁乎此等菩薩將欲發願持經故先密探如來口吻以驗度生之難易爾時下如來答訊如是如是者言汝所問愜當我心也如來下答衆生易度所以下釋易度之意言利根者過去為沙彌時已曾受我教化今一見我身一聞我法即入佛慧若過去世不信佛慧學小乘者四十年中徐徐引誘今聞妙法亦入佛慧矣此如來密知菩薩發願持經故密以度生之法授之也爾時下説偈讚佛言如來如是度生真是世出世間大英雄漢此界衆生狠戾剛強難調難伏難化難度今日世尊能化難化能度難度豈非大雄乎諸佛智慧甚深無量無能發問即有問者人不願聞即有聞者又不能信即有信者又不能行而今乃有肯問肯聞而肯信信而肯行者是真希有不但諸佛生歡喜心即我等樂寂靜而不樂在衆者亦生隨喜此見菩薩已萌發願持經之心而生歡喜也於時下讚其隨喜者所以玉成發願持經之意爾時彌勒菩薩及八千恆河沙諸菩薩衆皆作是念我等從昔已來不見不聞如是大菩薩摩訶薩衆從地涌出住世尊前合掌供養問訊如來時彌勒菩薩摩訶薩知八千恆河沙諸菩薩等心之所念并欲自決所疑合掌向佛以偈問曰無量千萬億大衆諸菩薩昔所未曾見願兩足尊説是從何所來以何因緣集巨身大神通智慧叵頗思議其志念堅固有大忍辱力衆生所樂見為從何所來一一諸菩薩所將諸眷屬其數無有量如恆河沙等或有大菩薩將六萬恆沙如是諸大衆一心求佛道是諸大師等六萬恆河沙俱來供養佛及護持是經將五萬恆沙其數過於是四萬及三萬二萬至一萬一千一百等乃至一恆沙半及三四分億萬分之一千萬那由它萬億諸弟子乃至於半億其數復過上百萬至一萬一千及一百五十與一十乃至三二一單己紀無眷屬樂於獨處者俱來至佛所其數轉過上如是諸大衆若人行籌數過於恆沙劫猶不能盡知是諸大威德精進菩薩衆誰為其説法教化而成就從誰初發心稱揚何佛法受持行誰經修習何佛道如是諸菩薩神通大智力四方地振裂皆從中涌出世尊我昔來未曾見是事願説其所從國土之名號我常遊諸國未曾見是衆我於此衆中乃不識一人忽然從地出願説其因緣今此之大會無量百千億是諸菩薩等皆欲知此事是諸菩薩衆本末之因緣無量德世尊惟願決衆疑此彌勒騰疑也若欲知其來處即涌出菩薩自己亦不能知從何所來豈彌勒可知又豈八千恆沙菩薩可知宜乎有請決之問也偈中昔所未曾見者言我常在佛所從未曾見正顯如來祕密神通力也是從何所來問其所來之處以何因緣集問其所來之故巨身下讚其德也一一下讚其眷屬之多也是諸下問其所從之師所謂師唱誰家曲宗風嗣阿誰稱揚者出乎口也受持者存乎心也修習者現乎事也世尊下重問所來之處也我常下重問所來之故今此下正請決疑本末因緣者言從始至終一段因緣當為我等一決之也爾時釋迦牟尼分身諸佛從無量千萬億它方國土來者在於八方諸寶樹下師子座上結加趺坐其佛侍者各各見是菩薩大衆於三千大千世界四方從地涌出住於虗空各白其佛言世尊此諸無量無邊阿僧祇菩薩大衆從何所來爾時諸佛各告侍者諸善男子且待須臾有菩薩摩訶薩名曰彌勒釋迦牟尼佛之所授記次後作佛已問斯事佛今答之汝等自當因是得聞爾時釋迦牟尼佛告彌勒菩薩善哉善哉阿逸多乃能問佛如是大事汝等當共一心被精進鎧楷發堅固意如來今欲顯發宣示諸佛智慧諸佛自在神通之力諸佛師子奮迅之力諸佛威猛大勢之力爾時世尊欲重宣此義而説偈言當精進一心我欲説此事勿得有疑悔佛智叵思議汝今出信力住於忍善中昔所未聞法今皆當得聞我今安慰汝勿得懷疑懼佛無不實語智慧不可量所得第一法甚深叵分別如是今當説汝等一心聽分身侍者生疑者即八方分身諸佛各將一大菩薩也爾時下分身慰諭已問斯事等者言彌勒已問此事本末因緣佛今將答汝等因如來答彌勒之問而得聞也爾時下勸信被精進鎧勉其努力度生勿懈怠也發堅固意勉其努力求法勿退墮也諸佛智慧甚深無量人不能知今欲借此地涌菩薩以顯如來甚深智慧故如來住靈鷲山廣作佛事人所盡知如來不動道場遍一切處人所不知今地涌菩薩皆是佛化則知如來自在神力矣如來于四十年中説三乘法人所盡知如來以一味法雨平等普沾如為一人衆多亦然正如師子奮迅皆用全力人不能知今地涌菩薩及諸眷屬皆是如來全力所化則知如來奮迅力矣如來著弊垢衣執除糞器無勢無威化諸窮子人所盡知如來著珍御服化諸菩薩人則不知今地涌一出則知如來威猛大勢之力矣所謂見雨猛而知龍大見華盛而知池深也偈中出信力住忍善者言我今日欲説此事皆是諸佛度生説法祕密權巧之事汝等當出信力忍之於心勿得忘也爾時世尊説此偈已告彌勒菩薩我今於此大衆宣告汝等阿逸多是諸大菩薩摩訶薩無量無數阿僧祇從地涌出汝等昔所未見者我於是娑婆世界得阿耨多羅三藐三菩提已教化示導是諸菩薩調伏其心令發道意此諸菩薩皆於是娑婆世界之下此界虗空中住於諸經典讀誦通利思惟分別正憶念阿逸多是諸善男子等不樂在衆多有所説常樂靜處勤行精進未曾休息亦不依止人天而住常樂深智無有障礙亦常樂於諸佛之法一心精進求無上慧爾時世尊欲重宣此義而説偈言阿逸汝當知是諸大菩薩從無數劫來修習佛智慧悉是我所化令發大道心此等是我子依止是世界常行頭陀事志樂於靜處捨大衆憒快閙不樂多所説如是諸子等學習我道法晝夜常精進為求佛道故在娑婆世界下方空中住志念力堅固常勤求智慧説種種妙法其心無所畏我於伽耶城菩提樹下坐得成最正覺轉無上法輪爾乃教化之令初發道心今皆住不退悉當得成佛我今説實語汝等一心信我從久遠來教化是等衆是諸下答第一問由前問云是誰教化從誰發心故答云是我教化從我發心此諸下答第二問由前問云從何所來住於何地答云在下方空中住從下方空中來於諸下答第三問由前問云受持行誰經故云於諸經典等言諸者謂大乘小乘皆讀誦也通利者依義不依文無礙滯也思惟分別者解其義也正憶念者默默提撕親行斯事也阿逸下出住下方空中之意不樂在衆多有所説者言彼好於間處攝心不樂衆中多言多語也常樂靜處勤行精進者非若小乘身唯善寂意玩清虗不肯進求也是不起滅定現諸威儀不捨道法行凡夫事者也亦不依止人天而住者不樂人天心不在世也常樂深智無有障礙者雖不樂在人天而潛心於本來無物甚深智慧也亦常樂於諸佛法者言不止一佛二佛三四佛所種善根皆於諸佛邊得四安樂行者故能荷擔此事也偈中阿逸下答所從之師也捨大衆憒閙即是不親近國王大臣乃至沙彌等不樂多所説者即不習外道經書等如是諸子雖好靜處似乎小乘然又精勤修習佛道晝夜不怠為求下三句頌所住之處志念下四句頌上求下化我於下頌能化之人我從久遠來一句正顯此等菩薩亦是作十六沙彌時以至於今所度也化城品中已廣明如來化小乘本末因緣特未曾顯發化菩薩本末因緣故於此中發之爾時彌勒菩薩摩訶薩及無數諸菩薩等心生疑惑怪未曾有而作是念云何世尊於少時間教化如是無量無邊阿僧祇諸大菩薩令住阿耨多羅三藐三菩提即白佛言世尊如來為太子時出於釋宮去伽耶城不遠坐於道場得成阿耨多羅三藐三菩提從是已來始過四十餘年世尊云何於此少時大作佛事以佛勢力以佛功德教化如是無量大菩薩衆當成阿耨多羅三藐三菩提世尊此大菩薩衆假使有人於千萬億劫數不能盡不得其邊斯等久遠已來於無量無邊諸佛所植諸善根成就菩薩道常修梵行世尊如此之事世所難信譬如有人色美髮黑年二十五指百歲人言是我子其百歲人亦指年少言是我父生育我等是事難信佛亦如是得道已來其實未久而此大衆諸菩薩等已於無量千萬億劫為佛道故勤行精進善入出住無量百千萬億三昧得大神通久修梵行善能次第習諸善法巧於問答人中之寶一切世間甚為希有今日世尊方云得佛道時初令發心教化示導令向阿耨多羅三藐三菩提世尊得佛未久乃能作此大功德事我等雖復信佛隨宜所説佛所出言未曾虗妄佛所知者皆悉通達然諸新發意菩薩於佛滅後若聞是語或不信受而起破法罪業因緣唯然世尊願為解説除我等疑及未來世諸善男子聞此事已亦不生疑爾時彌勒菩薩欲重宣此義而説偈言佛昔從釋種出家近伽耶坐於菩提樹爾來尚未久此諸佛子等其數不可量久已行佛道住於神通力善學菩薩道不染世間法如蓮華在水從地而涌出皆起恭敬心住於世尊前是事難思議云何而可信佛得道甚近所成就甚多願為除衆疑如是分別説譬如少壯人年始二十五示人百歲子髮白而面皺皺是等我所生子亦説是父父少而子老舉世所不信世尊亦如是得道來甚近是諸菩薩等志固無怯弱從無量劫來而行菩薩道巧於難問答其心無所畏忍辱心決定端正有威德十方佛所讚善能分別説不樂在人衆常好在禪定為求佛道故於下空中住我等從佛聞於此事無疑願佛為未來演説令開解若有於此經生疑不信者即當墮惡道願今為解説是無量菩薩云何於少時教化令發心而住不退地心生疑惑者疑上添疑也而作是念下言如來成佛之時甚少所化之衆甚多原始要終故執末而疑本也即白下陳疑也以佛勢力者領諸佛威猛大勢力也以佛功德者領諸佛自在神通及師子奮迅之力也世尊下迷遠本而疑近迹也言此等菩薩其數既多又在久遠劫中歷事諸佛植諸善根其時亦久云何如來成佛未久説法不多於此少時廣度諸衆如此之事世所難信故前文云汝今出信力者蓋為此也譬如下設喻以明難信言少時成佛而化久遠植德之菩薩正如少年指百歲老人為子老人亦指少年為父也佛亦下法合入出住者地上菩薩從地入地皆有入心住心出心今此言入定住定出定也百千三昧者如方網海印等得大神通者如菩薩遊戲神通等次第修習善法者如初地布施二地持戒等言所學深廣也巧於問答者謂應對如流善説法也此等菩薩植德既久而云世尊得佛道時初令發心令向菩提是以少年為父而以百歲老人為子也我等下正陳請意言我固自信佛不虗然恐末世初發心人不信是語故陳疑問偈中佛昔四句頌如來得道未久此諸下頌菩薩植德已深善學菩薩道不染世間法者正言靜處修攝其心而又勤行精進故名善學而又曰不染世間如蓮在水也譬如下頌難信世尊下法合可知我等下正陳請意壽量品醫師喻第十六頌云如來直是大醫王壽量何須較短長有病即來無病去去來的為竇三郎藥王不愛合金丹收得那迦藥一丸無限中風狂走漢略沾些子病俱安此品來意有二一謂此經自最初説無量經入無量定放無量光以顯如來事事無量故在方便品譬喻品顯如來善巧無量藥草品見如來法雨無量化城品顯如來劫數無量知見無量所化聲聞弟子無量寶塔品見如來分身無量地涌品見如來所化菩薩無量雖然如是悉是如來應化門頭事然未極顯法身慧命平等無量也故此品專言如來壽命無量以顯如來之本已在塵點劫先成道已竟豈在今日故名壽量品由此一品然後知釋迦從無量劫現無量身入無量土演無量法化無量衆皆是方便豈止為十六沙彌時出家成道轉法輪度衆生入涅槃為方便又豈止在伽耶城中出家成道轉法輪度衆生入涅槃為方便乎至此方顯如來本末究竟平等法身本無生滅也所以云報化非真佛亦非説法者昔唐順宗問佛光滿禪師云佛從何處來滅向何方去既言常在世佛今在何處師曰佛從無為來滅向無為去法身等虗空常住無心處來為衆生來去為衆生去清淨真如海湛然體常住又問佛向王宮生滅向雙林滅住世四十九又言無法説山河與大地天地及日月時至皆歸盡誰言不生滅師答曰生滅本無為迷情妄分別法身等虗空未曾有生滅有緣佛出世無緣佛入滅處處化衆生猶如水中月非常亦非斷非生亦非滅生亦未常生滅亦未常滅了見無心處自然無法説皇情大悅益重禪宗此可作一品注解第二義者謂前寶塔品後云如來不久當入涅槃恐人認以為實墮斷滅見不生敬仰故將醫師一喻發明如來入滅亦是方便則知如來本無生滅其壽命寧有數量哉爾時佛告諸菩薩及一切大衆諸善男子汝等當信解如來誠諦之語復告大衆汝等當信解如來誠諦之語又復告諸大衆汝等當信解如來誠諦之語是時菩薩大衆彌勒為首合掌白佛言世尊惟願説之我等當信受佛語如是三白已復言惟願説之我等當信受佛語爾時世尊知諸菩薩三請不止而告之言汝等諦聽如來祕密神通之力一切世間天人及阿修羅皆謂今釋迦牟尼佛出釋氏宮去伽耶城不遠坐於道場得阿耨多羅三藐三菩提然善男子我實成佛已來無量無邊百千萬億那由他劫譬如五百千萬億那由他阿僧祇三千大千世界假使有人抹為微塵過於東方五百千萬億那由他阿僧祇國乃下一塵如是東行盡是微塵諸善男子於意云何是諸世界可得思惟校計知其數不彌勒菩薩等俱白佛言世尊是諸世界無量無邊非算數所知亦非心力所及一切聲聞辟支佛以無漏智不能思惟知其限數我等住阿惟越致地於是事中亦所不達世尊如是諸世界無量無邊爾時佛告大菩薩衆諸善男子今當分明宣語汝等是諸世界若著微塵及不著者盡以為塵一塵一劫我成佛已來復過於此百千萬億那由他阿僧祇劫自從是來我常在此娑婆世界説法教化亦於餘處百千萬億那由他阿僧祇國導利衆生爾時下先勸信是時下請説爾時下正答祕密神通者言此事天人不知聲聞不知菩薩不知唯如來自知豈非祕密一切下牒其所疑然善下正出其本言天人等執我近時應化之迹而生疑然我據實而論實在無量劫先成佛已久不當執近迹而疑遠本也譬如下設喻以明化城以一三千大千世界塵點為喻此以五百千萬億那由他阿僧祇三千大千世界微塵劫為喻則知釋迦在大通智勝時出家成道等事皆應化之迹也非算下言五百千萬億那由他阿僧祇三千大千世界已不可知況將如此世界抹為微塵盡是微塵被點之界如此世界而可知乎正顯如來壽量非數量可知非心思可測也一切下言辟支利智亦不能知我等下即不退菩薩亦不能知爾時下言不但以五百萬億那由他阿僧祇三千大千世界抹為微塵為多即將微塵被點之界若著不著者復為微塵以此一塵以為一劫我從成佛已來復過如此微塵劫數從是已來常住娑婆世界教化衆生使利根者先得授記其鈍根者今得授記其不信者未來授記也亦於餘處者言不但娑婆一土導利衆生又在十方無量國土中導利衆生又不但如來身從無量劫在娑婆界化度衆生亦於無量劫中分身十方國土化導衆生也諸善男子於是中間我説然燈佛等又復言其入於涅槃如是皆以方便分別諸善男子若有衆生來至我所我以佛眼觀其信等諸根利鈍隨所應度處處自説名字不同年紀大小亦復現言當入涅槃又以種種方便説微妙法能令衆生發歡喜心此通難也難云如來既從塵點劫先久遠成佛常在娑婆説法教化何故又説在然燈佛所授記作佛授記之後便入涅槃答云此等皆是如來方便為世間立法王法師標榜轉相授受令如來道統相繼不斷耳殊不知即然燈授記成佛時亦是釋迦化現之迹也所以化現者由我往昔劫中亦以佛眼觀一切衆生信等五根各有利鈍不堪説實不得已而隨類現身各立名字各現壽量名現涅槃又各隨機説法其所説法有權有實有頓有漸無非誘人發歡喜心令入佛慧若以實論無一物非如來身無一名非來如號無一剎那非如來出現之時無一芥子非如來寂滅之地塵塵爾剎剎爾念念爾物物爾豈以一身一名一時一地可限量哉此顯在過去時以祕密神通之力無生現生無滅現滅如此諸善男子如來見諸衆生樂於小法德薄垢重者為是人説我少出家得阿耨多羅三藐三菩提然我實成佛已來久遠若斯但以方便教化衆生令入佛道作如是説諸善男子如來所演經典皆為度脫衆生或説己身或説他身或示己身或示他身或示己事或示他事諸所言説皆實不虗所以者何如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界見於三界如斯之事如來明見無有錯謬以諸衆生有種種性種種欲種種行種種憶想分別故欲令生諸善根以若干因緣譬喻言辭種種説法所作佛事未曾暫廢如是我成佛已來甚大久遠壽命無量阿僧祇劫常住不滅諸善男子我本行菩薩道所成壽命今猶未盡復倍上數然今非實滅度而便唱言當取滅度如來以是方便教化衆生下顯現在亦以祕密神通之力非生現生非滅現滅如此如來又以佛眼觀見一切衆生貧窮無福志量狹小功德淺薄罪垢深重不堪授與大乘法藥亦不堪説如來智慧如來壽量為是樂小法人忍於斯事以方便力現生此界十九出家六年苦行得證菩提然我實成佛已來已過無量阿僧祇劫但為誘引下劣衆生令入佛慧作如是説此見如來出家成道是方便也諸善下顯四十年中轉法輪亦是方便或説己身者如説過去第十六王子是我身過去國王是我身過去常不輕是我身等或説他身者如過去阿私陀仙是提婆達多過去聞法衆生是現在聲聞弟子過去喜見菩薩是藥王等或示己身他身者或示現在分身諸佛是我所證或示現在地涌菩薩是我所化等或示己事他事者或示自己成佛事或示弟子成佛事或示自己本事或示他人本事等言我作如是説皆是實語毫無虗辭以我從無量劫來成佛已久經歷已多故能如實知見三界之相本無生死不見有一衆生退入三界者亦不見有一衆生超出三界者亦不見有如來三界出現亦不見有如來三界滅度一乘未嘗實三乘未嘗虗一真未嘗如三世未嘗異不同三界衆生所見三界之相實有生死實有涅槃實有一乘三乘實有真如三世何以故由我明見生死涅槃猶如昨夢一乘三乘無非方便真如三世總是虗名故能觀彼久遠如今日觀衆生如己身觀三界如指掌無有絲毫錯謬故説己身他身己事他事無非引入佛慧而已問若爾何不直以佛慧告之而必説己身他身己事他事者何故答以諸衆生過去種性不同現在好樂不同種種行業不同種種所念不同欲令種種衆生生種種善故説若干因緣若干譬喻或説自己身上事或説他人身上事左説右説橫説竪説從昔至今未曾有頃刻間歇如是則知我成佛久遠常住不滅明矣豈真有生滅哉此顯四十年中種種説法皆是方便也問既曰常住不滅何故如來在大衆中言我今不久當入涅槃耶諸善下答即唱滅亦是方便也言我宿昔行菩薩道所成慧命尚倍超塵劫無有窮盡況已證金剛不壞之身而有盡乎然本無滅而唱滅者亦是方便度生以唱滅有益故所以者何若佛久住於世薄德之人不種善根貧窮下賤貪著五欲入於憶想妄見網中若見如來常在不滅便起憍恣而懷厭怠不能生難遭之想恭敬之心是故如來以方便説比丘當知諸佛出世難可值遇所以者何諸薄德人過無量百千萬億劫或有見佛或不見者以此事故我作是言諸比丘如來難可得見斯衆生等聞如是語必當生於難遭之想心懷戀慕渴仰於佛便種善根是故如來雖不實滅而言滅度又善男子諸佛如來法皆如是為度衆生皆實不虗所以下徵釋唱滅有益以作喻本言若不唱滅而久住于世則薄德衆生恃佛憍憐不種善根既感貧窮下賤之果又不回頭思念好事眠裡夢裏唯是憶想五欲入於妄見網中不肯求出三界如來若不唱滅常在于世便將如來視作尋常沒要緊人不唯不生難遭恭敬之想亦且更生憍慢放肆之心復懷憎厭懈怠之志是故如來復方便説如來出世難可值遇正如優曇鉢華經過多時才得一現何以故以諸德薄福淺之人或有從無量劫中得一見者或有過無量劫尚不得一見者是故我説諸佛難遇況又不久將入涅槃斯等衆生一聞此語不唯不起憍恣厭怠之心復生戀慕渴仰之想不貪五欲便種善根有此利益是故如來雖不滅度而以方便唱言滅度耳下總結云如上所説出家成道轉法輪乃至唱滅如此方便不但一佛如此説即三世諸佛皆如是説無非為度生故於無生説生不滅唱滅此皆諸佛誠諦之語非妄説也譬如良醫智慧聰達明練方藥善治衆病其人多諸子息若十二十乃至百數以有事緣遠至餘國諸子於後飲他毒藥藥發悶亂宛轉於他是時其父還來歸家諸子飲毒或失本心或不失者遙見其父皆大歡喜拜跪問訊善安隱歸我等愚癡誤服毒藥願見救療更賜壽命父見子等苦惱如是依諸經方求好藥草色香美味皆悉具足搗倒篩和合與子令服而作是言此大良藥色香美味皆悉具足汝等可服速除苦惱無復衆患其諸子中不失心者見此良藥色香俱好即便服之病盡除愈餘失心者見其父來雖亦歡喜問訊求索治病然與其樂而不肯服所以者何毒氣深入失本心故於此好色香藥而謂不美父作是念此子可慜為毒所中心皆顛倒雖見我喜求索救療如是好藥而不肯服我今當設方便令服此藥即作是言汝等當知我今衰老死時已至是好良藥今留在此汝可取服勿憂不差作是教已復至他國遣使還告汝父已死是時諸子聞父背喪心大憂惱而作是念若父在者慈慜閔我等能見救護今者捨我遠喪他國自惟孤露無復恃怙常懷悲感心遂醒悟乃知此藥色香美味即取服之毒病皆愈其父聞子悉已得差尋便來歸咸使見之諸善男子於意云何頗有人能説此良醫虗妄罪不不也世尊佛言我亦如是成佛已來無量無邊百千萬億那由他阿僧祇劫為衆生故以方便力言當滅度亦無有能如法説我虗妄過者此設喻以明唱滅之益良醫智慧聰達喻如來具權實二智知法知機故能廣化衆生也明練方藥者喻如來能知法藥也其人多諸子息等者喻如來以十類衆生為子也以有事緣遠至餘國者喻如來應化他方不在娑婆也諸子誤服毒藥者因無佛化衆生誤中三毒復墮邪見輪轉三界也是時下喻如來現示三界八相成道也諸子下喻三界人天請轉法輪也或失本心者喻中毒深也不失本心者喻中毒淺也見父歡喜者言初見佛時歡喜尊重恭敬讚歎也我等愚癡等者喻請轉法輪也見子苦惱者喻如來愍衆生為三毒業火燒煮也依諸經方求好藥草者依諸佛儀式而為説三乘法也色香美味皆悉具足者謂衆善莊嚴之色五分法身之香無上醍醐之味無不具足也搗篩和合與子令服者和衆色為一色合衆味為一味搗衆香為一香喻將十善諦緣和以一相一味之法令人修習也而作下勸令服藥言但肯沾唇皆得愈疾也正喻大乘法藥具足萬行但辦肯心皆得脫苦也其諸子等不失心而服藥除病者正喻三乘中有利根者煩惱淺薄昔宿曾經化導有一隙之明者一點便悟努力進修便出三界也餘失心而不肯服藥者正喻鈍根之人雖亦見佛聞法不信自心作佛不肯進修何以故以彼煩惱深厚嗜欲滋多失本心故父作下喻如來思設方便也由諸衆生心皆顛倒以苦為樂雖三乘出苦之道不肯進修也即作下喻説法華之後即便唱滅也是好下喻留經教使人受持讀誦皆得利益也作是下喻此土化緣已畢此方滅而復往他土也遣使下喻如來所使滅度之後弘經法師告之也若佛滅後無弘經法師則此法者絶滅無遺矣是時下喻聞佛滅而依法精修遂得道果也意謂若父在世慈愍於我即有病苦能見救護今父已喪自思孤身露處又無所恃之人悲辛感慨遂服藥而療病也其父下喻得見佛也知見未聞即有佛在對面千里知見既開乃知佛未嘗滅也故知唱滅亦為衆生入滅亦為衆生留藥亦為衆生也此方自如來滅度之後佛法遍天下皆是如來留藥之功亦是弘經法師説藥之力也問何故亦有服藥而病不愈者答云有故昔靈源云道人保養如人病須服藥藥之靈驗易見要須忌口乃可不然服藥何益生死是大病佛祖言教是良藥染汙心是雜毒不能忌之生死之病無時而損也諸善下辨核虗實言良醫不死而言死得無犯妄語過否不也世尊者言非是妄語以此方便誘引衆生服藥故佛言下法合爾時世尊欲重宣此義而説偈言自我得佛來所經諸劫數無量百千萬億載阿僧祇常説法教化無數億衆生令入於佛道爾來無量劫度為衆生故方便現涅槃而實不滅度常住此説法我常住於此以諸神通力令顛倒衆生雖近而不見衆見我滅度廣供養舍利咸皆懷戀慕而生渴仰心衆生既信伏質直意柔軟一心欲見佛不自惜身命時我及衆僧俱出靈鷲山我時語衆生常在此不滅以方便力故現有滅不滅餘國有衆生恭敬信樂者我復於彼中為説無上法汝等不聞此但為我滅度我見諸衆生沒在於苦惱故不為現身令其生渴仰因其心戀慕乃出為説法神通力如是於阿僧祇劫常在靈鷲山及餘諸住處衆生見劫盡大火所燒時我此土安隱天人當充滿園林諸堂閣種種寶莊嚴寶樹多華果衆生所遊樂諸天擊天鼓常作衆伎樂雨曼陀羅華散佛及大衆我淨土不毀而衆見燒盡憂怖諸苦惱如是悉充滿是諸罪衆生以惡業因緣過阿僧祇劫不聞三寶名諸有修功德柔和質直者則皆見我身在此而説法或時為此衆説佛壽無量久乃見佛者為説佛難值我智力如是慧光照無量壽命無數劫久修業所得汝等有智者勿於此生疑當斷令永盡佛語實不虗如醫善方便為治狂子故實在而言死無能説虗妄我亦為世父救諸苦患者為凡夫顛倒實在而言滅以常見我故而生憍恣心放逸著五欲墮於惡道中我常知衆生行道不行道隨所應可度為説種種法每自作是意以何令衆生得入無上慧速成就佛身首七句是頌成道轉法輪是方便為度下四句頌涅槃亦是方便實未嘗離此娑婆界也我常下問如來既常住世界説法度生云何衆生不得見佛答我雖常住此界但以祕密神通之力令彼一切顛倒衆生終日對面如隔千里令彼不見反謂滅度問既不見佛有何利益答衆見滅度造塔起廟供養舍利如子慕慈父渴思甘露專心至志咸懷戀慕必欲見佛至於不惜身命猶如藥王時我令彼親見靈山一會儼然未散若彼既見我身即以實語告云我常在此娑婆説法度生實未曾滅也且我見其顛倒則示滅見其信伏則現身者皆是以方便力令其入佛慧耳餘國下言不但此娑婆一土現生現滅即十方國分身諸佛亦復如是見其信樂則現生見其沒苦則現滅因其戀慕則説法也神通四句結上言我祕密神通之力如此故雖此界他界從無量劫現生現滅殊不知如來無時無處不周遍也故衆生見有劫盡又見大火燒壞世界豈知劫火洞然大千俱壞而此世界安隱如故天人亦滿乃至遊戲之地併其受用之物不曾動著一絲毫皆由衆生業力所感遂見燒盡不見如來耳憂怖下正明不見因緣以衆生造諸惡業沒在憂惱但見三途憂惱之事不見如來安樂之處但聞三途苦惱之聲不聞三寶尊勝之名如恆河水鬼見為火魚見為宅人見為水諸天見為琉璃各隨業力所見不同所謂心穢土穢心淨土淨耳諸有下明得見因緣若有肯修十善四諦等法志意柔和而不卒暴心行質直而無虗偽則見我身常在説法又彼衆生根器各異所見不同故我説法亦隨機器或時説佛壽命常住在世或時説佛久遠一出如優曇華此我方便智力又如此然而慧光無量壽命無數亦非一朝一夕一生一劫得來皆從無量劫中久修淨業所得非妄語也汝等下勸其生信如醫下舉喻我亦下法合言良醫治狂子之疾故實在而言死正合如來治顛倒凡夫之病亦實在而唱滅也所以實在而唱滅者以彼常見如來心生憍恣貪著五欲造諸惡業墮三惡道由我知此衆生有見佛而即行道者亦有見佛反生憍恣而不行道者我亦隨機説種種法故雖常在於世而以方便説生説滅也所以在世而現生現滅者無有他意無非欲令一切衆生得入平等佛慧成就佛身耳分別功德品第十七頌云不盡煙波帶遠沙輕舟短棹宿蘆華詰朝趁得東風便揚起蒲帆直到家前壽量品雖為唱滅而言其實包羅出家成道轉輪度生始終本末等事故諸大衆隨機得益各有淺深一一分別故品名分別功德爾時大會聞佛説壽命劫數長遠如是無量無邊阿僧祇衆生得大饒益於時世尊告彌勒菩薩摩訶薩阿逸多我説是如來壽命長遠時六百八十萬億那由它恆河沙衆生得無生法忍復有千倍菩薩摩訶薩得聞持陀羅尼門復有一世界微塵數菩薩摩訶薩得樂説無礙辨才復有一世界微塵數菩薩摩訶薩得百千萬億無量旋陀羅尼復有三千大千世界微塵數菩薩摩訶薩能轉不退法輪復有二千中國土微塵數菩薩摩訶薩能轉清淨法輪復有小千國土微塵數菩薩摩訶薩八生當得阿耨多羅三藐三菩提復有四四天下微塵數菩薩摩訶薩四生當得阿耨多羅三藐三菩提復有三四天下微塵數菩薩摩訶薩三生當得阿耨多羅三藐三菩提復有二四天下微塵數菩薩摩訶薩二生當得阿耨多羅三藐三菩提復有一四天下微塵數菩薩摩訶薩一生當得阿耨多羅三藐三菩提心復有八世界微塵數衆生皆發阿耨多羅三藐三菩提心佛説是諸菩薩摩訶薩得大法利時於虗空中雨曼陀羅華摩訶曼陀羅華以散無量百千萬億寶樹下師子座上諸佛并散七寶塔中師子座上釋迦牟尼佛及久滅度多寶如來亦散一切諸大菩薩及四部衆又雨細末旃檀沉水香等於虗空中天鼓自鳴妙聲深遠又雨千種天衣垂諸瓔珞真珠瓔珞摩尼珠瓔珞如意珠瓔珞遍於九方衆寶香爐燒無價香自然周至供養大會一一佛上有諸菩薩執持幡蓋次第而上至於梵天是諸菩薩以妙音聲歌無量頌讚歎諸佛爾時彌勒菩薩從座而起偏袒右肩合掌向佛而説偈言佛説希有法昔所未曾聞世尊有大力壽命不可量無數諸佛子聞世尊分別説得法利者歡喜充遍身或住不退地或得陀羅尼或無礙樂説萬億旋總持或有大千界微塵數菩薩各各皆能轉不退之法輪復有中千界微塵數菩薩各各皆能轉清淨之法輪復有小千界微塵數菩薩餘各八生在當得成佛道復有四三二如此四天下微塵諸菩薩隨數生成佛或一四天下微塵諸菩薩餘有一生在當成一切智如是等衆生聞佛壽長遠得無量無漏清淨之果報復有八世界微塵數衆生聞佛説壽命皆發無上心世尊説無量不可思議法多有所饒益如虗空無邊雨天曼陀羅摩訶曼陀羅釋梵如恆沙無數佛土來雨旃檀沉水繽紛而亂墜如鳥飛空下供養於諸佛天鼓虗空中自然出妙聲天衣千萬種旋轉而來下衆寶妙香爐燒無價之香自然悉周遍供養諸世尊其大菩薩衆執七寶幡蓋高妙萬億種次第至梵天一一諸佛前寶幢懸勝幡亦以千萬偈歌詠諸如來如是種種事昔所未曾有聞佛壽無量一切皆歡喜佛名聞十方廣饒益衆生一切具善根以助無上心先總明聞經得益此益亦惟如來知故為説也於時下別明有頓有漸先明頓悟自心有頓獲無生法忍者大經所謂知一切法即心自性成就慧身不由他悟是也聞持陀羅尼者梵語陀羅尼此云總持謂一聞此法即能持而不失故曰聞持而又曰總持所謂從緣入者永無退失是也無礙辨才者即四無礙之一是善慧地也無量旋陀羅尼者旋者轉也所謂心悟轉法華也轉不退輪者一超直入故曰不退即不退地也轉清淨輪者修證不無染不汙得故曰清淨也已上皆明頓入聖位也復有下明漸得菩提也八生當得者言此一生不得當過八生即得菩提果乃至四生三生二生一生得菩提者復有聞此發菩提心者即信位菩薩也一聞法而證入各不同者所謂一音演法隨類各證也佛説下諸天供養先雨華者欲得如來大因也次雨香者欲得如來法身香也擊天鼓者欲擊如來大法鼓也雨衣者欲得如來衣之所覆也垂瓔珞遍九方者欲使九界衆生皆得如來萬德莊嚴也寶爐燒香者欲以五分法身之香遍及大衆也菩薩執幡上梵天者表聞法而增進也又以妙音讚佛者感佛德而發于言也佛説下先頌聞法得益也或住下別明頓得也復有小千下明漸得也復有八世下頌發心也雨天下頌諸天雨華雨香等也其大下頌菩薩執幡讚德也如是下大衆歡喜爾時佛告彌勒菩薩摩訶薩阿逸多其有衆生聞佛壽命長遠如是乃至能生一念信解所德功德無有限量若有善男子善女人為阿耨多羅三藐三菩提故於八十萬億那由它劫行五波羅蜜檀波羅蜜尸羅波羅蜜羼提波羅蜜毗黎耶波羅蜜禪波羅蜜除般若波羅蜜以是功德比前功德百分千分百千萬億分不及其一乃至算數譬喻所不能知若善男子善女人有如是功德於阿耨多羅三藐三菩提退者無有是處爾時世尊欲重宣此義而説偈言若人求佛慧於八十萬億那由他劫數行五波羅蜜於是諸劫中布施供養佛及緣覺弟子并諸菩薩衆珍異之飲食上服與臥具旃檀立精舍以園林莊嚴如是等布施種種皆微妙盡此諸劫數以回向佛道若復持禁戒清淨無缺漏求於無上道諸佛之所歎若復行忍辱住於調柔地設衆惡來加其心不傾動諸有得法者懷於增上慢為此所輕惱如是亦能忍若復勤精進志念常堅固於無量億劫一心不懈息又於無數劫住於空間處若坐若經行除睡常攝心以是因緣故能生諸禪定八十億萬劫安住心不亂持此一心福願求無上道我得一切智盡諸禪定際是人於百千萬億劫數中行此諸功德如上之所説有善男女等聞我説壽命乃至一念信其福過於彼若人悉無有一切諸疑悔深心須臾信其福為如此其有諸菩薩無量劫行道聞我説壽命是則能信受如是諸人等頂受此經典願我於未來長壽度衆生如今日世尊諸釋中之王道場師子吼説法無所畏我等未來世一切所尊敬坐於道場時説壽亦如是若有深心者清淨而質直多聞能總持隨義解佛語如是之人等於此無有疑一念信解功德無量者信謂不疑解謂明了謂隨所聞處豁然開明單刀直入更無疑惑是名一念信解古德云見則直下便見擬心則差是也若有下較量功德言八十萬億那由他劫行五波羅蜜者俱不及一念信解功德唯得般若者功德相等以一念信解決定不退菩提故若人下四句是總頌於是下別頌布施若復下頌持戒若復行下頌忍辱衆惡者即刀林瓦石及毀罵也諸有得法者即假名阿練若自謂行真道也懷於增上慢者未得謂得也若復勤下頌精進又於下頌禪定除睡攝心者即經行林中未嘗睡眠攝心一處也盡諸禪定際者所謂深入無際也有善下校量福德然雖如是行五波羅蜜過無量劫若聞説壽量一念生信不生疑惑者其福過於彼也其有下正顯一念信解功德無量者以此人曾於無量劫中行菩薩道故今一聞此法即能信受頂戴奉行又能發願度生故所獲功德無有量也如今下八句正陳願辭若有下六句正顯唯深心清淨多聞總持隨義了達之人方得無疑一念信解也又阿逸多若有聞佛壽命長遠解其言趣是人所得功德無有限量能起如來無上之慧何況廣聞是經若教人聞若自持若教人持若自書若教人書若以華香瓔珞幢幡繒蓋香油蘇燈供養經卷是人功德無量無邊能生一切種智阿逸多若善男子善女人聞我説壽命長遠深心信解則為見佛常在耆闍崛山共大菩薩諸聲聞衆圍繞説法又見此娑婆世界其地琉璃坦然平正閻浮檀金以界八道寶樹行列諸臺樓觀皆悉寶成其菩薩衆咸處其中若有能如是觀者當知是為深心解相解其言趣功德無量者謂聞經之後能以單詞隻句解説此品所説義趣如云此等壽量皆與衆生平等無二是佛誠言若人解了便能起發平等佛慧故功德無量何況下又以聞持書寫供養校福也聞者入之於耳持者存之於心書者行之於手前云發者萌其芽也此云生者有其根也言深心信解者既解而廣修善法者名深心又不止一念信解也則為見佛等者此人即能親見靈山一會儼然未嘗滅也又親見娑婆即是淨土未嘗穢也若能作如是觀即是深心信解之相也已上皆是校量現在聞佛説而生信解之功德也又復如來滅後若聞是經而不毀訾起隨喜心當知已為深心解相何況讀誦受持之者斯人則為頂戴如來阿逸多是善男子善女人不須為我復起塔寺及造僧坊以四事供養衆僧所以者何是善男子善女人受持讀誦是經典者為已起塔造立僧坊供養衆僧則為以佛舍利起七寶塔高廣漸小至於梵天懸諸幡蓋及衆寶鈴香華瓔珞末香塗香燒香衆鼓伎樂簫笛箜篌種種舞戲以妙音聲歌唄讚頌則為於無量千萬億劫作是供養已阿逸多若我滅後聞是經典有能受持若自書若教人書則為起立僧坊以赤旃檀作諸殿堂三十有二高八多羅樹高廣嚴好百千比丘於其中止園林浴池經行禪窟衣服飲食牀褥湯藥一切樂具充滿其中如是僧房堂閣若干百千萬億其數無量以此現前供養於我及比丘僧是故我説如來滅後若有受持讀誦為他人説若自書若教人書供養經卷不須復起塔寺及造僧坊供養衆僧況復有人能持是經兼行布施持戒忍辱精進一心智慧其德最勝無量無邊譬如虗空東西南北四維上下無量無邊是人功德亦復如是無量無邊疾至一切種智若人讀誦受持是經為他人説若自書若教人書復能起塔及造僧坊供養讚歎聲聞衆僧亦以百千萬億讚歎之法讚歎菩薩功德又為他人種種因緣隨義解説此法華經復能清淨持戒與柔和者而共同止忍辱無瞋志念堅固常貴坐禪得諸深定精進勇猛攝諸善法利根智慧善答問難阿逸多若我滅後諸善男子善女人受持讀誦是經典者復有如是諸善功德當知是人已趣道場近阿耨多羅三藐三菩提坐道樹下阿逸多是善男子善女人若坐若立若行處此中便應起塔一切天人皆應供養如佛之塔此下又校量五種法師功德與前法師品同前説末世有人作五種法師者當敬視如佛當以如來供養而供養之應持天寶而以散之此中校量五種法師功德故曰不須造塔造僧坊供養衆僧則為已造塔已造僧房已供養衆僧功德無異也問前品已説云何此中復説答前品為會中菩薩説此中為地涌菩薩説也言佛滅度後在法師邊聞經不毀但起一念隨喜心即與佛在世時深信解相者功德無異何況滅度之後既能受持而兼讀誦者如是之人則為以法供養於佛如來亦常在彼頂𩕳不必更起塔寺僧坊及四事供養衆僧也以受持處即是塔寺讀誦處即是建立僧坊供養衆僧故此是第一重校量也第二校量若有受持而兼書寫者則為造立僧坊供養衆僧是故下結五種法師功德況復下第三重校量是持經而兼行六度其功德無量與虗空等又勝於兼讀誦書寫者若人下第四重校量五事皆作六度俱修者此人已趣道場得近菩提又勝於受持而兼行六度者志念堅固者言千呼萬誘其志不能奪也攝諸善法者衆善奉行也善答問難者巧於問答也阿逸多下正結五事俱作六度俱修之人若坐處立處行處皆當起塔供養如佛之塔無異也爾時世尊欲重宣此義而説偈言若我滅度後能奉持此經斯人福無量如上之所説是則為具足一切諸供養以舍利起塔七寶而莊嚴表剎甚高廣漸小至梵天寶鈴千萬億風動出妙音又於無量劫而供養此塔華香諸瓔珞天衣衆伎樂嶽然香油蘇燈周匝常照明惡世法末時能持是經者則為已如上具足諸供養若能持此經則如佛現在以牛頭旃檀起僧坊供養堂有三十二高八多羅樹上饌妙衣服牀臥皆具足百千衆住處園林諸浴池經行及禪窟哭種種皆嚴好若有信解心受持讀誦書若復教人書及供養經卷散華香末香以須曼薝蔔阿提目多伽熏油常然之如是供養者得無量功德如虗空無邊其福亦如是況復持此經兼布施持戒忍辱樂禪定不瞋不惡口恭敬於塔廟謙下諸比丘遠離自高心常思惟智慧有問難不瞋隨順為解説若能行是行功德不可量若見此法師成就如是德應以天華散天衣覆其身頭面接足禮生心如佛想又應作是念不久詣道樹得無漏無為廣利諸人天其所住止處經行若坐臥乃至説一偈是中應起塔莊嚴令妙好種種以供養佛子住此地則是佛受用常在於其中經行及坐臥偈中若我下頌受持而兼讀誦功德也結能下頌受持而兼書寫功德也若有下頌五事俱作六度皆修功德也須曼此云善適意薝蔔此云黃華小而香者阿提目多此云善思惟若見下頌最後法師當禮敬如佛也
