body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋弟子授記品繫珠喻第八頌云舉世皆爛醉醉深貧益深豈知敝襦裡親友暗藏琛有寶不能用所需安稱心從人覔衣食寒苦到于今弟子者學在師後故曰弟解從師生故曰子此品授記千二百羅漢而以五百標名者以五百得記名同自陳領解故由前一品見如來本末由此一品見弟子始終爾時富樓那彌多羅尼子從佛聞是智慧方便隨宜說法又聞授諸大弟子阿耨多羅三藐三菩提記復聞宿世因緣之事復聞諸佛有大自在神通之力得未曾有心淨踴躍即從座起到於佛前頭面禮足却住一面瞻仰尊顏目不暫捨而作是念世尊甚奇特所為希有隨順世間若干種性以方便知見而為說法拔出衆生處處貪著我等於佛功德言不能宣唯佛世尊能知我等深心本願初經家敘悟從佛下領前方便譬喻二品意又聞下領授記品意復聞下二句領化城品意諸佛有大自在神通力者即指十六王子自作沙彌以至成佛各各教化無量百千萬億恆河沙等衆生不卒不暴循循漸誘直至於今未曾休廢猶如一日豈非大自在乎又以一心通達無量百千萬億恆河沙等衆生之心隨機逗法令彼各各漸入佛道豈非大神通乎心淨踴躍者亦如諸弟子得悟歡喜也而作下默請授記隨順下領前稱機說法也言如來具足方便知見二波羅蜜又能深入衆生之性故能隨病授藥如凡夫著有引入於空二乘著空引入於中菩薩著中引入佛慧等如來有如此無量阿僧祇功德不能盡知故我等於無量劫中亦不能盡說也我等下劣雖於如來真實功德不能盡知但我等生生劫劫不離如來常在一處如來豈不知我等身心本願原是為佛成度生耶此語正欲借如來口吻說明自己出世本懷也爾時佛告諸比丘汝等見是富樓那彌多羅尼子不我常稱其於說法人中最為第一亦常嘆其種種功德精勤護持助宣我法能於四衆示教利喜具足解釋佛之正法而大饒益同梵行者自捨如來無能盡其言論之辨汝等勿謂富樓那但能護持助宣我法亦於過去九十億諸佛所護持助宣佛之正法於彼說法人中亦最第一又於諸佛所說空法明了通達得四無礙智常能審諦清淨說法無有疑惑具足菩薩神通之力隨其壽命常修梵行彼佛世人咸皆謂之實是聲聞而富樓那以斯方便饒益無量百千衆生又化無量阿僧祇人令立阿耨多羅三藐三菩提為淨佛土故常作佛事教化衆生諸比丘富樓那亦於七佛說法人中而得第一今於我所說法人中亦為第一於賢劫中當來諸佛說法人中亦復第一而皆護持助宣佛法亦於未來護持助宣無量無邊諸佛之法教化饒益無量衆生令立阿耨多羅三藐三菩提為淨佛土故常勤精進教化衆生此下正說弟子出世本願也汝等見是富樓那否者問大衆所以警醒大衆也言汝等日日與富樓那相見但見其形不知其心今為汝等說其本末故先警之曰汝等見是富樓那否也我等下先讚說法辨才不可及不雜曰精不怠曰勤不傷曰護不失曰持輔弼曰助敷演曰宣具足者有諸己也解釋者施諸人也佛之正法者正法眼藏也饒益同行者謂以正法眼藏饒益同修清白梵行之伴侶也正言其混入衆中隨機說法助佛揚化也言我常稱常嘆者顯非訶斥之流也自捨下極讚辨才超軼絶倫也汝等下出其深心也言不但在我會中助宣佛法稱第一人即在過去諸佛會中助宣佛法亦是第一如此則知如來為沙彌說經時便在會中助宣法化矣奚翅今日又於下出其本願也所說空法者即一相一味寂滅法也明了通達者精見之謂明透徹之謂了無礙之謂通深造之謂達言其見法精透造道深入也四無礙智者即法辭義樂說也見其得菩薩大慧非二乘小慧也常能下言得法而不得智是有體而無用不能說法今見法親切又得四無礙智故能隨宜說法辨若懸河無有疑滯也若使內無德本外豈能談乎具足下顯其菩薩遊戲神通淨佛國土悉皆具足也隨其壽命者顯其隨類化身與衆同波亦如菩薩也常修梵行者顯其具足菩薩清白梵行之相也世人咸謂實是聲聞者見其粗而不知其精見其跡而不知其本也而富下見其說小法為度小根衆生也又化下見其說大法為度大根衆生也為淨下見其因祕外現非實不生一念好樂之心也諸比丘下見三世諸佛說法滿慈助揚佛化皆為第一也七佛過去佛也我現在佛也賢劫未來佛也令立者即三十而立之立謂使之卓然自竪不傾不倒如銀山鐵壁也漸漸具足菩薩之道過無量阿僧祇劫當於此土得阿耨多羅三藐三菩提號曰法明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其佛以恆河沙等三千大千世界為一佛土七寶為地地平如掌無有山陵溪㵎溝壑七寶臺觀充滿其中諸天宮殿近處虗空人天交接兩得相見無諸惡道亦無女人一切衆生皆以化生無有淫欲得大神通身出光明飛行自在志念堅固精進智慧普皆金色三十二相而自莊嚴其國衆生常以二食一者法喜食二者禪悅食有無量阿僧祇千萬億那由它諸菩薩衆得大神通四無礙智善能教化衆生之類其聲聞衆算數校計所不能知皆得具足六通三明及八解脫其佛國土有如是等無量功德莊嚴成就劫名寶明國名善淨其佛壽命無量阿僧祇劫法住甚久佛滅度後起七寶塔遍滿其國此授記也佛號法明者明了諸佛所說空法故是知迅辨如雷談鋒似箭者也須具足菩薩之行方得菩提也其佛下見教化之廣大不止一三千大千世界為一國土華藏世界是其都也地平如掌者海底有石名掌無有一微塵許不平當如海掌賢劫經云猶如佛掌非人掌也人掌不平故由說平等心地法故地亦如之七寶樓觀充滿其中者由以種種法寶莊嚴故諸天下見人之未始非天天之未始非人天人一體故由天人一體故曰近處而又曰兩得相見也無諸下顯此土是淨土故衆生化生者無淫欲故得大神通者得心無礙故身出光明者得法光明故飛行自在者無所繫著故普皆金色者佛與衆生同一相故法喜禪悅為食者以禪法為飲食不慕人天滋味故有無下所化菩薩也其聲下所化二乘也劫名寶明者有法寶光明故國名善淨者無三惡道故佛滅度後國中塔遍滿者法化無盡故爾時世尊欲重宣此義而說偈言諸比丘諦聽佛子所行道善學方便故不可得思議知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺以無數方便化諸衆生類自說是聲聞去佛道甚遠度脫無量衆皆悉得成就雖小欲懈怠漸當令作佛內祕菩薩行外現是聲聞少欲厭生死實自淨佛土示衆有三毒又現邪見相我弟子如是方便度衆生我若具足說種種現化事衆生聞是者心則懷疑惑今此富樓那於昔千億佛勤修所行道宣護諸佛法為求無上慧而於諸佛所現居弟子上多聞有智慧所說無所畏能令衆歡喜未曾有疲倦而以助佛事已度大神通具四無礙智知諸根利鈍常說清淨法演暢如是義教諸千億衆令住大乘法而自淨佛土未來亦供養無量無數佛護助宣正法亦自淨佛土常以諸方便說法無所畏度不可計衆成就一切智供養諸如來護持法寶藏其後得成佛號名曰法明其國名善淨七寶所合成劫名為寶明菩薩衆甚多其數無量億皆度大神通威德力具足充滿其國土聲聞亦無數三明八解脫得四無礙智以是等為僧其國諸衆生淫欲皆已斷純一變化生具相莊嚴身法喜禪悅食更無餘食想無有諸女人亦無諸惡道富樓那比丘功德悉成滿當得斯淨土聖賢衆甚多如是無量事我今但略說諸比下四句先總讚滿慈言不但如來方便法門不可思議即滿慈所學方便法明亦不可思議也混群類而不知入塵勞而不染故曰善學知衆下出其本願樂小畏大者即如菩薩急追窮子稱冤大喚故隱勝現劣為聲聞緣覺作同事攝故如來不言是其親菩薩不言是其友潛通密化誘諸衆生令入佛慧耳自說下如大迦葉聞說菩薩不可思議大解脫法門時謂舍利弗譬如有人於盲者前現其色像非彼所見一切聲聞聞是不可思議解脫法門不能解了為若此也智者聞是其誰不發阿耨多羅三藐三菩提心我等何為永斷其根於此大乘已如敗種一切聲聞聞是不可思議大解脫法門皆應號泣聲震三千大千世界等又云我等今日不復堪任發菩提心乃至五無間罪猶能發意生於佛法而今我等永不能發如是聲聞諸結斷者於佛法中無所復益永不志願是故凡夫於佛法有反復而聲聞無也此皆菩薩化作小乘混入同列旁通曲暢大乘之法即有衆生好樂小法身體疲懈不肯進求而有如是同列之人藥石之語切磋鍛鍊䇿勤精進終不至於半途而廢終能令彼成就大志漸入佛乘是故內祕菩薩大行不露神通遊戲之事外現二乘小智好樂貧所樂法而行知足頭陀等行厭生死苦求涅槃樂作聲聞事然而實自淨佛國土也又如身子示瞋調達示癡難陀示貪薄蹉示慢迦葉等示邪見習學外道此皆方便化度衆生之大槩耳若我盡說其相或魔或冤或殺或盜等事無所不為若淺根衆生一聞此說皆懷疑惑故我亦不盡說其相也至此才與諸大弟子一洗昔日之冤令彼揚眉吐氣要知諸大弟子得記也是與人作榜樣原與釋迦同是菩提場中粧生扮丑人也今此下頌過去佛中說法第一而於下頌現在佛中說法第一已度下顯其實也未來下頌未來佛中說法第一其後下頌成佛劫國莊嚴事菩薩下頌所化菩薩衆聲聞下頌所化聲聞衆其國下頌國中人民富那下結顯所得是淨土爾時千二百阿羅漢心自在者作是念我等歡喜得未曾有若世尊各見授記如餘大弟子者不亦快乎佛知此等心之所念告摩訶迦葉是千二百阿羅漢我今當現前次第與授阿耨多羅三藐三菩提記於此衆中我大弟子憍陳如比丘當供養六萬二千億佛然後得成為佛號曰普明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其五百阿羅漢優樓頻螺迦葉伽耶迦葉那提迦葉迦留陀夷優陀夷阿㝹樓䭾離婆多劫賓那薄拘羅周陀莎伽陀等皆當得阿耨多羅三藐三菩提盡同一號名曰普明爾時世尊欲重宣此義而說偈言憍陳如比丘當見無量佛過阿僧祇劫乃成等正覺常放大光明具足諸神通名聞遍十方一切之所敬常說無上道故號為普明其國土清淨菩薩皆勇猛咸外妙樓閣遊諸十方國以無上供具奉獻於諸佛作是供養已心懷大歡喜須臾還本國有如是神力佛壽六萬劫正法住倍壽像法復倍是法滅天人憂其五百比丘次第當作佛同號曰普明轉次而授記我滅度之後某甲當作佛其所化世間亦如我今日國土之嚴淨及諸神通力菩薩聲聞衆正法及像法壽命劫多少皆如上所說迦葉汝已知五百自在者餘諸聲聞衆亦當復如是其不在此會汝當為宣說先弟子請記作念下言我等都與富那同行共事世尊豈不知我深心本願而獨授記滿慈乎若使各見授記寧不快心諸大弟子始從放光讚德之後各各有個疑團在心如今個個皆抱著一尊古佛在懷裡佛知下與記古德云你若無心我也休你若有心念及此事我亦與汝授記所謂待伊心肯處是我運通時也同名普明者所證同是普光明智故頌中須臾還本國者亦如極樂國中各以衣裓盛衆妙華供養他方十萬億佛即以食時還到本國之類轉次授記者如日月燈明遞遞相承也餘諸聲聞衆者兼千二百也其不二句謂有應供他方者不聞此事汝當亦以此記授之也爾時五百阿羅漢於佛前得受記已歡喜踊躍即從座起到於佛前頭面禮足悔過自責世尊我等常作是念自謂已得究竟滅度今乃知之如無智者所以者何我等應得如來智慧而便自以小智為足世尊譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去其人醉臥都不覺知起已遊行到於它國為衣食故勤力求索甚大艱難若少有所得便以為足於後親友會遇見之而作是言咄哉丈夫何為衣食乃至如是我昔欲令汝得安樂五欲自恣於某年日月以無價寶珠繫汝衣裏今故現在而汝不知勤苦憂惱以求自活甚為癡也汝今可以此寶貿易所須常可如意無所乏短爾時下得記歡喜也悔過自責者悟而後悔悔而自責也世尊下喻本也自謂已得究竟滅度與前弟子中病皆同故不考自招前云諸有智者以譬喻得解我等今日聞此譬喻乃知都是一等癡人相似言我等本是如來親生之子應得如來智慧寶藏今得涅槃一日工價心滿意足棄捨大寶豈非大癡人乎世尊宿昔為十六王子時與我等說法華經我等不知今日世尊與我說破正如親友繫珠也有人至親友家者如來為同體之親菩薩是不請之友喻十六菩薩說經及成佛時我等曾在法會也醉酒而臥者喻聞法時尚在醉生夢死之鄉未有醒覺也是時親友官事當行者言此一大事是大家有分的事故曰官事也當行者喻如來為此大事而應化它方也以無價寶珠繫衣而去者謂親友臨行之時將一顆圓明無價寶珠暗繫醉人衣裏其人實不知衣裏有珠也正喻十六沙彌說法華經時其人都在醉夢之鄉及成正覺應化他方不俟其醒而醉中即與授記而醉人實不知也起已下言醉人忽醒到於他國求衣索食甚大艱難略有殘羮飯便足過日不知衣裏自有明珠枉受貧窮正喻尋常在唇皮口角邊尋行數墨處零星所得者以為至足不信自己五蘊衣中有照天照地無價圓明大寶珠也於後下親友示珠也咄哉丈夫警醒之辭言堂堂丈夫當有濟人利物之分何為自己衣不蔽形食不充口乃至如此言我往昔要令汝等安隱快樂曾以寶珠繫汝衣裏至今現在曾未遺失而汝不知懷寶迷勤求自活甘為下劣枉受勤劬不亦癡乎汝今將此無價寶珠或售與人或與人交易則日用所須皆得如意無所缺少正喻今日靈山會上點破此珠時也言有道而不能行謂之窮子今汝衣中既有神珠何不將此神物轉相授受自利利人生生不斷即與三世諸佛富貴受用略無差別不曾缺少一絲毫也佛亦如是為菩薩時教化我等令發一切智心而尋廢忘不知不覺既得阿羅漢道自謂滅度資生艱難得少為足一切智願猶在不失今者世尊覺悟我等作如是言諸比丘汝等所得非究竟滅我久令汝等種佛善根以方便故示涅槃相而汝謂為實得滅度世尊我今乃知實是菩薩得受阿耨多羅三藐三菩提記以是因緣甚大歡喜得未曾有合親友繫珠也如來為菩薩沙彌時教化我等發菩提心正如親友以珠繫醉人時也而尋廢忘不覺不知者正如醉人不知時也既得羅漢得少為足者正合起已游行索衣求食少有得而自足也一切下合親友示珠也智願不失者合無價寶珠今故現在也今者世尊覺悟我等而作是言等者合咄哉丈夫何為衣食乃至如是也我久下言我為沙彌時便令汝等種佛善根但汝不能容受故以方便示汝涅槃而汝自謂實得滅度此與索衣食而少有所得便以為足而不知神珠之在衣裏豈非甚為癡也世尊下合貧子得珠歡喜也悟得衣內元有明珠不從他得故歡喜也爾時阿若憍陳如等欲重宣此義而說偈言我等聞無上安隱授記聲歡喜未曾有禮無量智佛今於世尊前自悔諸過咎於無量佛寶得少涅槃分如無智愚人便自以為足譬如貧窮人往至親友家其家甚大富具設諸殽膳以無價寶珠繫著內衣裏默與而捨去時臥不覺知是人既已起遊行詣它國求衣食自濟資生甚艱難得少便為足更不願好者不覺內衣裏有無價寶珠與珠之親友後見此貧人苦切責之已示以所繫珠貧人見此珠其心大歡喜富有諸財物五欲而自恣我等亦如是世尊於長夜常愍見教化令種無上願我等無智故不覺亦不知得少涅槃分自足不求餘今佛覺悟我言非實滅度得佛無上慧爾乃為真滅我今從佛聞授記莊嚴事及轉次授決身心遍歡喜我等下頌得珠歡喜譬如下頌親友繫珠是人下頌窮子不知與珠下頌親友示珠貧人下頌貧人得珠我等下合親友繫珠我等下合貧子不知今佛下合親友示珠我今下合貧人得珠授學無學記品第九頌云多聞與密行二老各稱長更進竿頭步居頭見大荒富非因寶玉名不藉文章自是心空者優游選佛場未證阿羅漢凡在三果四向者皆有學也先授無學次授有學此顯知來至公平等又見法無疏親也此與最後燈明不授八王子記而先授記德藏之意同爾時阿難羅睺羅而作是念我等每自思惟設得授記不亦快乎即從座起到於佛前頭面禮足俱白佛言世尊我等於此亦應有分唯有如來我等所歸又我等為一切世間天人阿修羅所見知識阿難常為侍者護持法藏羅睺羅是佛之子若佛見授阿耨多羅三藐三菩提記者我願既滿衆望亦足爾時學無學聲聞弟子二千人皆從座起偏袒右肩到於佛前一心合掌瞻仰世尊如阿難羅睺羅所願住立一面爾時佛告阿難汝於來世當得作佛號山海慧自在通王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊當供養六十二億諸佛護持法藏然後得阿耨多羅三藐三菩提教化二十千萬億恆河沙諸菩薩等令成阿耨多羅三藐三菩提國名常立勝幡其土清淨琉璃為地劫名妙音遍滿其佛壽命無量千萬億阿僧祇劫若人於千萬億無量阿僧祇劫中算數校計不能得知正法住世倍於壽命像法住世復倍正法阿難是山海慧自在通王佛為十方無量千萬億恆河沙等諸佛如來所共讚歎稱其功德爾時世尊欲重宣此義而說偈言我今僧中說阿難持法者當供養諸佛然後成正覺號曰山海慧自在通王佛其國土清淨名常立勝幡教化諸菩薩其數如恆沙佛有大威德名聞滿十方壽命無有量以愍衆生故正法倍壽命像法復倍是如恆河沙等無數諸衆生於此佛法中種佛道因緣先有學請記阿難是如來之弟羅睺是如來之子不私與記必待作念而後授記者所謂肯來兩手相分付也我等於此亦應有分者言無學有學雖階級不同若依我本願則此法者我等亦應有分且諸弟子亦有初依外道後出家者今皆得記況我等發心出家即歸如來更無異師日聞正法又無邪種安得無分而不得記何待要請此是全身擔荷之語但我等是人天眼目並知並識一是如來之弟一是如來之子故大衆傾心注望若不得記使大衆失望故得見授記既滿我願亦滿衆人之望也爾時下大衆請記爾時佛告下如來與記佛號山海慧自在通王者山表不動實智海表應世權智突然不動故曰自在吞吐衆流故曰通也當供下行法師事也要知記持十二部經如瓶受水無遺一滴者也須供養六十二億諸佛方得菩提也教化下所度之衆也國名勝幡者多聞智慧勝一切故劫名妙音者法音普遍國土故佛壽無量者慧命無窮故爾時會中新發意菩薩八千人咸作是念我等尚不聞諸大菩薩得如是記有何因緣而諸聲聞得如是決爾時世尊知諸菩薩心之所念而告之曰諸善男子我與阿難等於空王佛所同時發阿耨多羅三藐三菩提心阿難常樂多聞我常勤精進是故我已得成阿耨多羅三藐三菩提而阿難護持我法亦護將來諸佛法藏教化成就諸菩薩衆其本願如是故獲斯記阿難面於佛前自聞授記及國土莊嚴所願具足心大歡喜得未曾有即時憶念過去無量千萬億諸佛法藏通達無礙如今所聞亦識本願爾時阿難而說偈言世尊甚希有令我念過去無量諸佛法如今日所聞我今無復疑安住於佛道方便為侍者護持諸佛法此菩薩騰疑也新發意即三賢位中菩薩也咸作念者言我等有學菩薩廣行六度尚不得記何故有學聲聞思惑尚在以何因緣便得是決得非疏其疏而親其親乎此以私意窺如來也爾時下示其本末言我與阿難同時發心故世世生常為兄弟但發心同而願力不同故所證有異其實與我同一鼻孔出氣故今得授記非有私也阿難下得記歡喜即時下得宿命通又見阿難護持過去法藏不獨護持現在未來諸佛法藏也此又與富那同房共舍頌中方便為侍者正是阿難本願爾時佛告羅睺羅汝於來世當得作佛號蹈七寶華如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊當供養十世界微塵等數諸佛如來常為諸佛而作長子猶如今也是蹈七寶華佛國土莊嚴壽命劫數所化弟子正法像法亦如山海慧自在通王如來無異亦為此佛而作長子過是已後當得阿耨多羅三藐三菩提爾時世尊欲重宣此義而說偈言我為太子時羅睺為長子我今成佛道受法為法子於未來世中見無量億佛皆為其長子一心求佛道羅睺羅密行唯我能知之現為我長子以示諸衆生無量千萬億功德不可數安住於佛法以求無上道佛號蹈七寶華者舉足下足皆蹈寶華此密行之果也當供下即使有鬼神測不破之密機密行也須供養十世界微塵數諸佛當得菩提也常為諸佛之子亦如今日之為我子無異也國劫莊嚴皆同山海慧者知不異行行不異知知行並進故此又與阿難把臂入林偈中現為長子以示衆生示現二字見得也是夥裏人爾時世尊見學無學二千人其意柔軟寂然清淨一心觀佛佛告阿難汝見是學無學二千人不唯然已見阿難是諸人等當供養五十世界微塵數諸佛如來恭敬尊重護持法藏末後同時於十方國各得成佛皆同一號名曰寶相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊壽命一劫國土莊嚴聲聞菩薩正法像法皆悉同等爾時世尊欲重宣此義而說偈言是二千聲聞今於我前住悉皆與授記未來當成佛所供養諸佛如上說塵數護持其法藏後當成正覺各於十方國悉同一名號俱時坐道場以證無上慧皆名為寶相國土及弟子正法與像法悉等無有異咸以諸神通度十方衆生名聞普周遍漸入於涅槃爾時學無學二千人聞佛授記歡喜踊躍而說偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌此授有學二千人記也其意柔軟者無剛強難化之心寂然清淨者無卒暴不平之氣一心觀佛者亦欲證知本願也佛告下與記也同號寶相者皆能護持法藏故偈中俱時坐道場者言一時成道不似千二百人轉次受決也爾時下得記歡喜讚佛也由是尊慧燈明朗照我長夜又能照我本願故授我記我得聞授記之音恰如甘露灌注肺腑頓應清涼矣法師品鑿井喻第十頌云靈泉原有竅壅塞未曾開略借鍬鋤力津津水自來色從甌面寫味向舌根回獨惜瓶羸日傍人見亦猜法謂道法師謂師表以道法而為人師表使人取則故曰法師由前授記已定法王然法王之位未有不由法師而證入者故授記之後而即次之法師品夫法王為道統之總持法師為道統之流派總持如海流派如川不有大海則川流無歸不有川流則大海可竭故法王法師之位定而釋迦之道統繩繩不斷矣然前授記正謂現在弟子不信自己作佛故如來於方便品中危言激勵之是諸比丘比丘尼自謂已得阿羅漢住最後身究竟涅槃不復志求無上菩提此非佛弟子非阿羅漢非辟支佛謂之增上慢人故舍利弗一聞生信則曰吾今乃知真是佛子故佛與授記四大弟子聞譬喻而生信則曰我等自謂究竟涅槃不復志求無上菩提猶如窮子我今乃知真是聲聞故如來授記五百弟子聞化城之後則曰我等自謂已得滅度今乃知之如無智人故如來亦與授記至於有學六千未證無學故無自謂究竟涅槃之語但曰亦應有分及憂色視佛而已此諸弟子今日靈山得授記者皆如來一激之力也至於此品正為如來滅度之後現前無佛如來正法不絶如線要藉諸大菩薩及大弟子作六種法師流通此經一以續諸佛之慧命一以成自己之法王故以此品為發端極讚法師功德使人欣艷而樂為耳至寶塔品過去現在十方諸佛各各將此一卷全經分明呈示大衆然後以大音聲普告四衆誰能於此娑婆世界廣宣此經佛欲以此妙法華經付囑有在然五濁世中作法師者魔事甚多若無大願不能持久故又云此為難事當發大願故持品中有二萬菩薩發願此土持經五百弟子及八千有學皆悉發願異國持經八十萬億那由他菩薩發願十方世界往反持經皆不愜如來本意至乎地涌千世界微塵菩薩發願於佛滅後世尊分身所在之國廣說此經然後師資契合付囑流通此皆如來大音普告一勸之力也才完結方便品中佛滅度後如是等經受持讀誦解義者是人難得等語我故曰此經定法王法師之位為釋迦道統之傳而已更無他事爾時世尊因藥王菩薩告八萬大士藥王汝見是大衆中無量諸天龍王夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人及比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求佛道者如是等類咸於佛前聞妙法華經一偈一句乃至一念隨喜者我皆與授記當得阿耨多羅三藐三菩提佛告藥王又如來滅度之後若有人聞妙法華經乃至一偈一句一念隨喜者我亦與授阿耨多羅三藐三菩提記授廣記乃因藥王而告八萬大士者法師之行在慈悲忍辱法空而已而藥王具有此三故因藥王而告大士正欲大士作法師而效藥王也藥王下此廣記現在聽法衆也無論同類異類世間出世間但在佛前得聞一句一偈乃至一念隨喜者皆得授記佛告下授未來記也即如來滅後於法師邊得聞一句一偈一念隨喜者皆得授記何以故已具成佛正因應以是法漸入佛道故如人食少金剛終竟不壞故如問塗毒鼓如觸藥匕首如飲鴆毒酒觸之皆死故如得返魂香如得不死藥如得九轉丹觸之皆活故故知此物亦能殺人亦能活人授現前記如與醒人繫珠授滅後記如與醉人繫珠此正與十六沙彌說經授記時一板脫出故知今日現在弟子之得珠皆由過去沙彌繫珠也今日之繫珠又為未來弟子得珠之地也若復有人受持讀誦解說書寫妙法華經乃至一偈於此經卷敬視如佛種種供養華香纓絡末香塗香燒香繒蓋幢幡衣服技樂乃至合掌恭敬藥王當知是諸人等已曾供養十萬億佛於諸佛所成就大願愍衆生故生此人間藥王若有人問何等衆生於未來世當得作佛應示是諸人等於未來世必得作佛何以故若善男子善女人於法華經乃至一句受持讀誦解說書寫種種供養經卷華香纓絡末香塗香燒香繒蓋幢幡衣服技樂合掌恭敬是人一切世間所應瞻奉應以如來供養而供養之當知此人是大菩薩成就阿耨多羅三藐三菩提哀愍衆生願生此間廣演分別妙法華經何況盡能授持種種供養者藥王當知是人自捨清淨業報於我滅度後愍衆生故生於惡世廣演此經若是善男子善女人我滅度後能竊為一人說法華經乃至一句當知是人則如來使如來所遣行如來事何況於大衆中廣為人說此又出從法師邊聞經而作五種法師者皆得授記也受持者默默提撕守而不失如般若多羅之類讀誦者頻頻諷習六時不廢若言法華之類解說者解通所說之義使受持者知有歸趣書寫者流傳梵策之文使讀誦者知有向慕供養者即不能受持讀誦解說書寫但能志心精誠供養者亦終得此大寶也於此下出供養之心華香下出所供之物西域貴人用名香為末令青衣摩身名塗身香纓絡衣服身莊嚴也繒蓋幢幡身外莊嚴也技樂者舞技音樂也合掌恭敬者上以物供養此以心供養也藥王下出其大願也言末世若有此五等人皆是受佛告敕乘大願力愍衆生故應化人間助宣佛化者非徒然也藥王下言此五種法師皆是行菩薩道於未來世必得大果也何以下徵釋所以得果者以此法最殊勝故先以一句顯全經之勝言五種法師即使受持乃至供養此經一句是人即為成就菩提一切世間皆當視之如佛以知平等佛性故名為菩薩已能具足萬行故此等就是乘大願力現生人中廣演分別此經典者且受持乃至供養此經一句者已當敬之如佛視之若菩薩何況受持乃至供養此經一偈及全經者耶藥王下又顯受持乃至供養全經功德當知此輩皆是逆流菩薩愍衆生故捨清淨報土而生濁世廣演此經者若是下又以演說一句顯全經之勝言不但廣演此經者是菩薩現身我滅度後但將此經一句私自為一人演說是人亦曾親受法王告敕亦是代法王行事矣何況登師子座為大衆廣說又非竊為一人之比者乎藥王若有惡人以不善心於一劫中現於佛前常毀罵佛其罪尚輕若人以一惡言毀訾在家出家讀誦法華經者其罪甚重藥王其有讀誦法華經者當知是人以佛莊嚴而自莊嚴則為如來肩所荷擔其所至方應隨向禮一心合掌恭敬供養尊重讚歎華香纓絡末香塗香燒香繒蓋幢幡衣服殽饌作諸技樂人中上供而供養之應持天寶而以散之天上寶聚應以奉獻所以者何是人歡喜說法須臾聞之即得究竟阿耨多羅三藐三菩提故上顯五種法師功德下顯謗毀法師之報一劫毀佛其罪尚輕一言毀謗五種法師其罪更重者何故以佛具大慈悲縱加罵詈如子罵父亦得成緣故輕若詆毀法師即使斷佛種性以五種法師皆是續佛慧命故重此已在二卷末詳明藥王下明五種法師應當供養以佛莊嚴而自莊嚴者所謂三身四智體中圓也如來肩所荷擔者由彼荷擔如來大法故如來亦擔荷之也此五等人無論近遠凡是足跡所向之地當以人中上供而供養之當持天寶散之又當以寶聚獻之言寶聚者寶不止一種故曰聚也所以下釋所以當敬者何故若我能以至心供養是人或享其誠心生歡喜說此經典冀得耳根暫時聞法若一句染神即得法王無上大寶豈世寶可能並哉故常捨其所寶而易其所以寶也故達磨云此是世寶未足為上於諸寶中法寶為上吁法師如此安得自輕以負如來金口讚嘆哉爾時世尊欲重宣此義而說偈言若欲住佛道成就自然智常當勤供養受持法華者其有欲得一切種智慧當受持是經并供養持者若有能受持妙法華經者當知佛所使愍念諸衆生諸有能受持妙法華經者捨於清淨土愍衆故生此當知如是人自在所欲生能於此惡世廣說無上法應以天華香及天寶衣服天上妙寶聚供養說法者吾滅後惡世能持是經者當合掌禮敬如供養世尊上饌衆甘美及種種衣服供養是佛子冀得須臾聞若能於後世受持是經者我遣在人中行於如來事若於一劫中常懷不善心作色而罵佛獲無量重罪其有讀誦持是法華經者須臾加惡言其罪復過彼有人求佛道而於一劫中合掌在我前以無數偈讚由是讚佛故得無量功德歎美持經者其福復過彼於八十億劫以最妙色聲及與香味觸供養持經者如是供養已若得須臾聞則應自欣慶我今獲大利藥王今告汝我所說諸經而於此經中法華最第一初八句頌應供法師若欲住佛道成就無修無證無缺無餘之平等慧先當親近供養五種法師也疾得佛慧者如善財童子廣額屠兒娑竭龍女皆是一生圓曠劫果故曰疾得也若有下讚法師德也當知佛所使即上文如來所遣也捨於清淨土即自捨清淨業報也自在所欲生者言非淫欲生乘大悲願力生也應以下即應持天寶而以散之等是也如供養世尊者應以如來供養而供養之也上饌衆甘美即人中供也若於下八句言謗法師罪甚於謗佛也有人下八句言讚法師福勝於讚佛也於八下言供養甚多得法甚少亦應欣慶得益勿謂尋常也藥王下四句結前起後爾時佛復告藥王菩薩摩訶薩我所說經典無量千萬億已說今說當說而於其中此法華經最為難信難解藥王此經是諸佛祕要之藏不可分布妄授與人諸佛世尊之所守護從昔已來未曾顯說而此經者如來現在猶多怨嫉況滅度後藥王當知如來滅後其能書持讀誦供養為它人說者如來則為以衣覆之又為它方現在諸佛之所護念是人有大信力及志願力諸善根力當知是人與如來共宿則為如來手摩其頭藥王在在處處若說若讀若誦若書若經卷所住處皆應起七寶塔極令高廣嚴飾不須復安舍利所以者何此中已有如來全身此塔應以一切華香瓔珞繒蓋幢幡技樂歌頌供養恭敬尊重讚歎若有人得見此塔禮拜供養當知是等皆近阿耨多羅三藐三菩提此顯經之殊勝也已說者謂十六沙彌時今說者靈山法會時當說者餘國作佛時最為難信難解者擔子重大不肯承當故藥王下付囑流通藥王為法師之首故付囑之亦與付囑鶖子同意祕要之藏者言有許多緊要受用之物人所不知者都在此中藏也不可分布妄授與人者令擇機授與也得其人則為時中之大聖失其人為無忌憚之狂夫故須擇授也諸佛守護未嘗顯說者此經是實相印如來常佩未嘗離身亦不與人顯說在某處只是曲暢旁通令人知有此物而已正如朝廷傳國之璽又如國家之利器不妄示人也而此下正出不顯說之故如來現在說此經典尚有怨憎嫉妬之人如退席者流況如來滅度之後而有不怨嫉者哉藥王下讚五種法師衣之所覆者在如來覆庇之下佛所護念者在如來心想之間如來共宿者不離衾枕也手摩其頭者不離左右也較前所使更親密矣藥王下應當尊敬也重其法兼重其人故應起塔供養不須復安舍利以有此經即有如來全身又勝於舍利故此塔下敬其人兼敬其塔也若有下供養塔者亦復近菩提者謂造塔本為供養法師今供塔者皆近菩提況五種法師乎前云求經當如求舍利此云有經處又勝於舍利皆欲令人生希有心生尊重想何以故不因漁父不見波濤故藥王多有人在家出家行菩薩道若不能得見聞讀誦書持供養是法華經者當知是人未善行菩薩道若有得聞是經典者乃能善行菩薩之道其有衆生求佛道者若見若聞是法華經聞巴信解受持者當知是人得近阿耨多羅三藐三菩提藥王譬如有人渴乏須水於彼高原穿鑿求之猶見乾土知水尚遠施功不已轉見濕土遂漸至泥其心決定知水必近菩薩亦復如是若未聞未解未能修習是法華經當知是人去阿耨多羅三藐三菩提尚遠若得聞解思惟修習必知得近阿耨多羅三藐三菩提所以者何一切菩薩阿耨多羅三藐三菩提皆屬此經此經開方便門示真實相是法華經藏深固幽遠無人能到今佛教化成就菩薩而為開示藥王若有菩薩聞是法華經驚疑怖畏當知是為新發意菩薩若聲聞人聞是經驚疑怖畏當知是為增上慢者此喻本也行菩薩道而不聞此經不名菩薩以此經是教菩薩法故求佛道而不聞此經是向外馳求不名求佛以此經是佛所護念故故求佛道者必須聞此經由此而入何以故衆生與佛雖相去甚遠然一聞此法當知是人得近菩提以心佛衆生無差別故譬如大海潛流四天下有穿鑿者無不得水若索水於高原雖用力穿鑿猶見乾土知水尚遠若半途而廢終不得水若由此施功不已轉見濕土爛泥知水必近此法華經是發明衆生平常日用一件大事但人視以為平常不肯向日用處尋求思察却向巍巍逈逈高遠難行處求雖多費功力止在半途正如高原索水而見乾土時也若由此而施功不已轉向平常日用中聞日用中思日用中修當知是人必近菩提如索水得見濕土爛泥時也此與忠恕違道不遠剛毅木訥近仁之意同所以下徵釋所以必欲聞此經者以一切阿耨菩提盡屬平常日用一卷大經故即如來開種種方便門亦由此即如來示種種真實相亦由此以離此經外無方便可得亦無真實可得故故知此經是如來祕密藏也深固幽遠無人能到者無性不能測其底故曰深聲聞不能入其門故曰固辟支不能覩其輝故曰幽等覺不能窮其際故曰遠總知非思量分別之所能解故曰無人能到如來唯以此經成就信力堅固之人而為開示故曰教菩薩法若有下激其堅信也若有菩薩聲聞聞此經而驚疑怖畏者皆是高原索水見乾土人未是見濕土爛泥之人也若見濕土爛泥者知水必近決不驚疑生怖畏矣藥王若有善男子善女人如來滅後欲為四衆說是法華經者云何應說是善男子善女人入如來室著如來衣坐如來座爾乃應為四衆廣說斯經如來室者一切衆生中大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是安住是中然後以不懈怠心為諸菩薩及四衆廣說是法華經藥王我於餘國遣化人為其集聽法衆亦遣化比丘比丘尼優婆塞優婆夷聽其說法是諸化人聞法信受隨順不逆若說法者在空閒處我時廣遣天龍鬼神乾闥婆阿修羅等聽其說法我雖在異國時時令說法者得見我身若於此經忘失句逗我還為說令得具足此授法師說法之方也告藥王者所以告大衆謂之旁通由小乘以空寂為舍不肯度生無慈悲心故教其入如來室室者常寢處故小乘著離垢衣超出三界不能忍苦故教其著忍辱衣衣者常被服故小乘坐人空座不達法空故教其坐法空座座者常休息故此三皆藥王所證故告大衆持經之法當效藥王也雖安住三法又當以精進䇿勤努力前驅為衆廣說方盡末世度生軌範藥王下諸佛護持也果能如是說經即我不在娑婆而在餘國作佛亦遣化菩薩集聽法衆又遣化四衆齊來聽法若說法不在闤闠或在山間林下空間寂寞之濵無人聽法我廣遣天龍八部作聽法衆我又現身示說法人令得利益也爾時世尊欲重宣此義而說偈言欲捨諸懈怠應當聽此經是經難得聞信受者亦難如人渴須水穿鑿於高原猶見乾燥土知去水尚遠漸見濕土泥決定知近水藥王汝當知如是諸人等不聞法華經去佛智甚遠若聞是深經決了聲聞法是諸經之王聞已諦思惟當知此人等近於佛智慧若人說此經應入如來室著於如來衣而坐如來座處衆無所畏廣為分別說大慈悲為室柔和忍辱衣諸法空為座處此為說法若說此經時有人惡口罵加刀杖瓦石念佛故應忍我千萬億土現淨堅固身於無量億劫為衆生說法若我滅度後能說此經者我遣化四衆比丘比丘尼及清淨士女供養於法師引導諸衆生集之令聽法若人欲加惡刀杖及瓦石則遣變化人為之作衛護若說法之人獨在空閒處寂寞無人聲讀誦此經典我爾時為現清淨光明身若妄失章句為說令通利若人具是德或為四衆說空處讀誦經皆得見我身若人在空間我遣天龍王夜叉鬼神等為作聽法衆是人樂說法分別無罣卦礙愛諸佛護念故能令大衆喜若親近法師速得菩薩道隨順是師學得見恆沙佛欲捨下四句喻本也如人下舉喻藥王下法合若人下說經之方念佛故應忍有三義一當念如來現身千萬億土畢竟為何人說法無量億劫畢竟說何事不過為一大事因緣出世不過欲以此法度衆生如來既為衆生忍於斯事我等寧不倣效之乎二或念他是佛我當忍辱如云我不敢輕於汝等汝等皆當作佛是也三惑念己是佛故當忍辱柔和哀愍一切不可惱人也若我下遣化人聽法若人下遣化人護法若說下現身使獲益若人下遣八部聽法若親下四句結法師之益親近者不離左右如影隨形也親近而不受教無益也既親近而肯受教是人速得菩薩道亦得見恆沙佛以諸佛菩薩之道不離此一法故寶塔品第十一頌云巍峨一座塔從地湧虗空塔主名多寶全身住此中風烟八面出星月六窗通斫額遙相望高高近日宮梵語塔婆此翻靈廟謂此塔婆從地涌出人人皆得親見故名見寶塔品自上開方便譬喻因緣三門令三根人皆得領悟各得授記為法王子紹龍聖位以完開悟二字亦完其智慧門難解難入一科既悟之後欲其發願持經行法師事故先說法師品廣讚法師功德又恐不肯受持故假多寶親呈塔樣十方諸佛各將一卷大經作證覿面呈示令彼親見一回方肯發願受持然後得入以了示入二字亦完諸佛智慧甚深無量一科故此一品前半示佛知佛見而後半令其發願受持所謂一滴水墨兩處成龍也昔南陽忠國師將示化辭代宗宗曰師滅度後弟子將何所施師曰告檀越造取一所無縫塔帝曰就師請塔樣師良久曰會麼宗曰不會師曰貧道去後弟子應真却知此事宗後問應真真良久曰聖上會麼弟曰不會真述偈曰湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識南陽父子各呈塔樣却是代宗難解難入又一僧為疏山造壽塔畢白師師曰將多少錢與匠人曰一切在和尚師曰為將三文錢與匠人為將兩文錢與匠人為將一文錢與匠人若道得與我親造塔來僧無語僧後舉似羅山山曰還有人道得麼僧曰未有山曰汝歸與疏山道若將三文錢與匠人和尚此生決定不得塔若將兩文錢與匠人和尚與匠人共出一隻手若將一文錢與匠人帶纍匠人鬚眉墮落僧如教而說師具威儀望大嶺遙拜曰將謂無人大嶺有佛古放光射到此間此塔在國師會下喚作無縫塔疏山會下喚作壽塔靈山會上喚作願塔慈恩報恩不在其例爾時佛前有七寶塔高五百由旬縱廣二百五十由旬從地涌出住在空中種種寶物而莊校之五千欄楯龕室千萬無數幢幡以為嚴飾垂寶瓔珞寶鈴萬億而懸其上四面皆出多摩羅跋旃檀之香充遍世界其諸幡蓋以金銀琉璃硨磲碼瑙真珠玫瑰七寶合成高至四天王宮三十三天雨天曼陀羅華供養寶塔餘諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等千萬億衆以一切華香瓔珞幡蓋技樂供養寶塔恭敬尊重讚歎爾時寶塔中出大音聲歎言善哉善哉釋迦牟尼世尊能以平等大慧教菩薩法佛所護念妙法華經為大衆說如是如是釋迦牟尼世尊如所說者皆是真實爾時四衆見大寶塔住在空中又聞塔中所出音聲皆得法喜怪未曾有從座而起恭敬合掌却住一面從地涌出者地謂心地以此塔非人間有乃從自己胸中流出故住在虗空者本無處所住無所住故種種莊校者萬德莊嚴也五千欄楯者顯總持之多龕室無數者見慈悲之廣垂寶瓔珞者萬行具足也寶鈴懸上者四辨宏宣也四面出香者渾身是法身香也七寶合成幡蓋者謂以種種法寶接引衆生也高至四天者高出萬物上也天龍興供者心有向慕也爾時下塔中出大音讚善哉者從無聲三昧流出音聲也如是如是者言釋迦所說平等大慧只這便是菩薩游戲神通法只這便是佛所護念經亦只這便是意謂總不出此一座無縫塔也如所說者皆是真實者如釋迦所說者即是此物更非他物皆是真實更無虗妄已上皆證明之語釋迦牟尼將此卷經左說右說却不如多寶說得親切有味爾時下四衆得法且喜且怪也爾時有菩薩摩訶薩名大樂說知一切世間天人阿修羅等心之所疑而白佛言世尊以何因緣有此寶塔從地涌出又於其中發是音聲爾時佛告大樂說菩薩此寶塔中有如來全身乃往過去東方無量千萬億阿僧祇世界國名寶淨彼中有佛號曰多寶其佛行菩薩道時作大誓願若我成佛滅度之後於十方國土有說法華經處我之塔廟為聽是經故涌現其前為作證明讚言善哉彼佛成道已臨滅度時於天人大衆中告諸比丘我滅度後欲供養我全身者應起一大塔其佛以神通願力十方世界在在處處若有說法華經者彼之寶塔皆涌出其前全身在於塔中讚言善哉善哉大樂說今多寶如來塔聞說法華經故從地涌出讚言善哉善哉是時大樂說菩薩以如來神力故白佛言世尊我等願欲見此佛身佛告大樂說菩薩摩訶薩是多寶佛有深重願若我寶塔為聽法華經故出於諸佛前時其有欲以我身示四衆者彼佛分身諸佛在於十方世界說法盡還集一處然後我身乃出現耳大樂說我分身諸佛在於十方世界說法者今應當集大樂說白佛言世尊我等亦願欲見世尊分身諸佛禮拜供養此樂說呈疑也樂說者四辨之一有其實故有其名由彼不知寶塔出處又不知音聲下落故興二問爾時下答第一問此寶塔中有如來全身者言多寶佛之全身在裏許也若論此塔不特一多寶全身在裏許即一切諸佛全身皆在裏許只是衆人不知故煩多寶覿面親呈與人作樣子耳乃往下說塔因緣國名寶淨者衆寶清淨故佛號多寶者法寶充足故彼佛因中有大願力若我成佛滅度之後凡有說法華處我塔涌現在前故知多寶佛塔非人間七寶所造是從大願心中涌出也為作證明者言我所現者與汝所說者等無異也讚言善哉者謂神理契合故從無言處出言讚歎也釋迦有願說法多寶有願證法故我說此法彼亦涌此塔也既是證明為復寶塔是法華經為是出大音聲是法華經試參詳看彼佛下勸人造塔以有願即有塔有塔即有如來全身故欲供養如來全身者先當發願造此塔也由如來因中造此願塔故滅度後有說經處即涌現其前也大樂下答第二問言多寶聞說妙法即涌塔證明讚歎者所謂山鳴而谷應也是時下大樂欲見多寶佛身也隔壁傳言不故覿面故佛告下出其大願分身盡集一處然後我身乃出現者謂欲見多寶全身須分身諸佛盡集一處然後彼佛方現全身以多寶佛全身在塔必全身方見全身也大樂下既欲見全身又欲見分身者欲彰一多無礙普遍圓融境界也爾時佛放白毫一光即見東方五百萬億那由它恆河沙等國土諸佛彼諸國土皆以玻瓈為地寶樹寶衣以為莊嚴無數千萬億菩薩充滿其中遍張寶幔寶網羅上彼國諸佛以大妙音而說諸法及見無量千萬億菩薩遍滿諸國為衆說法南西北方四維上下白毫相光所照之處亦復如是爾時十方諸佛各告衆菩薩言善男子我今應往娑婆世界釋迦牟尼佛所并供養多寶如來寶塔時娑婆世界即變清淨琉璃為地寶樹莊嚴黃金為繩以界八道無諸聚落村營城邑大海江河山川林藪叟燒大寶香曼陀羅華遍布其地以寶網幔羅覆其上懸諸寶鈴唯留此會衆移諸天人置於它土是時諸佛各將一大菩薩以為侍者至娑婆世界各到寶樹下一一寶樹高五百由旬枝葉華果次第莊嚴諸寶樹下皆有師子之座高五由旬亦以大寶而校飾之爾時諸佛各於此座結加趺坐如是展轉遍滿三千大千世界而於釋迦牟尼佛一方所分之身猶故未盡時釋迦牟尼佛欲容受所分身諸佛故八方各更變二百萬億那由它國皆令清淨無有地獄餓鬼畜生及阿修羅又移諸天人置於它土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第嚴飾樹下皆有寶師子座高五由旬種種諸寶以為莊校亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔遍覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地釋迦牟尼佛為諸佛當來坐故復於八方各更變二百萬億那由它國皆令清淨無有地獄餓鬼畜生及阿修羅又移諸天人置於它土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第莊嚴樹下皆有寶師子座高五由旬亦以大寶而校飾之亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔遍覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地此以光照分身也一光照十方五百萬億那由它恆河沙等國土諸佛與前一光照見萬八千土大相懸絶爾時下分身告赴時娑下釋迦變土謂將娑婆穢濁變為清淨高下不平變為琉璃寶地荊棘叢林變為寶樹聚落村營變為金繩界道又有寶香薰天妙華覆地幔以寶網綴以寶鈴留淨衆於此地置天人於他土是時下分身赴集寶樹皆高五百由旬者與多寶佛塔等也一方所分之身猶故未盡者言東方五百萬億那由它恆河沙等國土諸佛此中三千大千世界尚容不盡以見釋迦分身之多也時釋下再變淨土言八方更變者此在娑婆界外八方也目真鄰陀山石山也通為一佛國土者言將十六百萬億那由它國土通為一國也釋迦下三變淨土如前問如來之土未嘗不淨而必欲變既變而必三者何答若以世法言齊一變而至魯魯一變而至道若以出世法言自火宅而入化城由化城而至寶所若以機言機有三故變亦三也問世尊具一切智至於松直棘曲鵠白烏玄皆了元由何不一變盡容分身至於不能盡容而後再變者豈如來智慧亦有所不知耶答如來一變一動總是為機若一變盡容則不知其數量故先變娑婆不能容盡東方分身諸佛則有數量可知此正對數量不銷者現數量耳若是過量人一變已多況再三乎故多寶全身不離當處見佛慧之甚深釋迦分身遍十方界見佛慧之無量要知一為無量不為多無量為一不為少全身分身本無差別此界他方原無有二不離當處周遍十方周遍十方不離當處故佛華會中將娑婆世界置華藏界裏法華會上移華藏世界置娑婆界中故知佛華法華始終一貫所謂如是體相果報究竟平等佛慧如斯而已所以世尊四十餘年脫珍著弊能為下劣忍於斯事直至靈山法會始得一現正如優曇鉢華豈易見哉爾時東方釋迦牟尼所分之身百千萬億那由它恆河沙等國土中諸佛各各說法來集於此如是次第十方諸佛皆悉來集坐於八方爾時一一方四百萬億那由它國土諸佛如來遍滿其中是時諸佛各在寶樹下坐師子座皆遣侍者問訊釋迦牟尼佛各齎機寶華滿掬居而告之言善男子汝往詣耆闍崛山釋迦牟尼佛所如我辭曰少病少惱氣力安樂及菩薩聲聞衆悉安隱不以此寶華散佛供養而作是言彼某甲佛與玉欲開此寶塔諸佛遣使亦復如是爾時釋迦牟尼佛見所分身佛悉已來集各各坐於師子之座皆聞諸佛與玉欲同開寶塔即從座起住虗空中一切四衆起立合掌一心觀佛於是釋迦牟尼佛以右指開七寶塔戶出大音聲如却關鑰開大城門即時一切衆會皆見多寶如來於寶塔中坐師子座全身不散如入禪定又聞其言善哉善哉釋迦牟尼佛快說是法華經我為聽是經故而來至此爾時四衆等見過去無量千萬億劫滅度佛說如是言歎未曾有以天寶華聚散多寶佛及釋迦牟尼佛上東方諸佛皆集娑婆九方諸佛各坐八方儼然一幅華藏圖也大經云一切法門無盡海同會一法道場中正是此意是時下分身遣侍問訊正見甚深佛慧元不離尋常日用也爾時下分身與欲同開寶塔問分身諸佛欲開寶塔然必待釋迦者何故豈分身神力不如釋迦乎答釋迦是化身本佛十方分身皆是釋迦化中之化蓋多寶是全身本佛釋迦是化身本佛唯本佛方見本佛必全身方見全身故欲開塔必待釋迦而後身全非神力不如也即從下釋迦住虗空者過去佛住虗空在現佛亦住虗空以見一切諸佛究竟涅槃終歸於空也於是下彈指開塔佛華會上普賢彈指而彌勒樓閣門開法華會上釋迦按指而多寶塔啓即時衆會皆見多寶者人人從無量劫來皆有一座塔一尊多寶佛在只是現在佛不靈不能按指塔戶不開多寶佛亦不現今一切衆會皆得見過去多寶佛者現在釋迦一按指之力也所謂昔未見者今已見也又聞下昔未聞者今已聞也爾時四衆散華者志求大果也耶爾時多寶佛於寶塔中分半坐於釋迦牟尼佛而作是言釋迦牟尼佛可就此座即時釋迦牟尼佛入其塔中坐其半座結加趺坐爾時大衆見二如來在七寶塔中師子座上結加趺坐各作是念佛坐高遠唯願如來以神通力令我等輩俱處虗空即時釋迦牟尼佛以神通力接諸大衆皆在虗空以大音聲普告四衆誰能於此娑婆國土廣說妙法華經今正是時如來不久當入涅槃佛欲以此妙法華經付囑有在釋迦變土集分身佛多寶涌塔現全身佛要知一座寶塔與三變淨土元同十方分身與一佛全身無異總不離此一座塔子故多寶平分半座與釋迦釋迦即坐其半座以明佛佛道同古今不易也爾時下大衆作念佛座高遠者正顯未得第一義空者不能親近多寶佛塔故以神力接之也以大下覔流通之人也佛欲以此妙法華經付囑有在者以此二字要看得重莫是白紙黑字喚作妙法華經莫是黃絹赤軸喚作妙法華經耶正謂此一部大經渾渾圇圇巍巍逈逈無縫無罅絶言絶思頓在諸人面前只是無人覷著不肯流通故三世十方諸佛興慈運悲出現於世不過欲將此卷大經付囑與人展轉流通無令斷火絶𦦨耳言有在者以此事有人發願擔當便有在無人發願擔當便無在也爾時世尊欲重宣此義而說偈言聖主世尊雖久滅度在寶塔中尚為法來諸人云何不勤為法此佛滅度無央數劫處處聽法以難遇故彼佛本願我滅度後在在所往常為聽法又我分身無量諸佛如恆沙等來欲聽法又見滅度多寶如來各捨妙土及弟子衆天人龍神諸供養事令法久住故來至此為坐諸佛以神通力移無量衆令國清淨諸佛各各詣寶樹下如清淨池蓮華莊嚴其寶樹下諸師子座佛坐其上光明嚴飾如夜暗中然大炬火身出妙香遍十方國衆生蒙熏喜不自勝譬如大風吹小樹杖以是方便令法久住告諸大衆我滅度後誰能護持讀說斯經今於佛前自說誓言其多寶佛雖久滅度以大誓願而師子吼多寶如來及與我身所集化佛當知此意諸佛子等誰能護法當發大願令得久住其有能護此經法者則為供養我及多寶此多寶佛處於寶塔常遊十方為是經故亦復供養諸來化佛莊嚴光飾諸世界者若說此經則為見我多寶如來及諸化佛欲以此法付囑有在故先頌出多寶來意以激勵大衆也尚為法來者言古佛已證此法已入滅度本願不忘尚來聽法汝等諸人尚未證得不肯發願受持此經者何也無央劫數處處聽法者以此經希有難得故無時無處不往聽也雲門云火𦦨為三世諸佛說法三世諸佛立地聽此即無舌人說法無耳人聽法之意又我下出分身來意令法久住故來至此者言十方諸佛聚會於此不是無端欲令末世佛種不斷久住於世故各將一卷大經直示與人使人心生欣樂勤修此法若不直示未曾親見心懷疑惑不肯進修是故分身悉來集會耳為坐下頌三變淨土如清淨池蓮華莊嚴者言佛詣寶樹下恰如蓮華之在清淨池也佛在樹下光明嚴飾又如暗中之然炬火也衆生蒙香歡喜絶倒又如大風吹小樹枝無不披靡也以是方便令法久住者言作如此種種方便正欲令人欣慕荷擔此法令法久住不令斷絶也告諸下招告持經也自說誓言者勸人發願也言古佛有願力喚作願塔由此願塔得成菩提故雖滅度願塔猶存今於此會出大音聲作師子吼汝等亦由宿昔願力得聞此經今得授記是故汝等將來若欲此經流通不斷宜發大願成就此塔也多寶如來過去佛也我現在佛也化佛十方佛也言三世十方諸佛皆集於此更無他事汝等當知諸佛來意不過皆為當人面前一卷大經此經是諸佛護念故名佛所護念經汝等若欲護持佛所護念者當發大願保特覆護方得流通世間常住在世若無願力便散失矣其有下讚持經功德若有護持此經即同供養一切諸佛以我為此經而出現多寶為此經而涌塔化佛為此經而聚會故凡有護持此經及說此經者即為親見靈山一會無異也諸善男子各諦思惟此為難事宜發大願諸餘經典數如恆沙雖說此等未足為難若接須彌擲置它方無數佛土亦未為難若以足指動大千界遠擲它國亦未為難若立有頂為衆演說無量餘經亦未為難若佛滅後於惡世中能說此經是則為難假使有人手把虗空而以遊行亦未為難於我滅後若自書持若使人書是則為難若以大地置足甲上升於梵天亦未為難佛滅度後於惡世中暫讀此經是則為難假使劫燒擔負乾草入中不燒亦未為難我滅度後若持此經為一人說是則為難若持八萬四千法藏十二部經為人演說令諸聽者得六神通雖能如是亦未為難於我滅後聽受此經問其義趣是則為難若人說法令千萬億無量無數恆沙衆生得阿羅漢具六神通雖有是益亦未為難於我滅後若能奉持如斯經典是則為難我為佛道於無量土從始至今廣說諸經而於其中此經第一若有能持則持佛身諸善男子於我滅後誰能受持讀誦此經今於佛前自說誓言此經難持若暫持者我則歡喜諸佛亦然如是之人諸佛所歎是則勇猛是則精進是名持戒行頭陀者則為疾得無上佛道能於來世讀持此經是真佛子住淳善地佛滅度後能解其義是諸天人世間之眼於恐畏世能須臾說一切天人皆應供養此勸衆發願也各諦思惟者令其熟思而詳審也言擔荷此事甚大艱難若非具大願力不肯承當故知願之所在即經之所在經之所在即佛之所在大經云毗盧遮那佛願力周沙界一切佛土中常轉無上輪釋迦云我本立誓願欲令一切衆如我等無異今多寶佛願塔現前正為此經汝等欲得此經亦宜發大誓願也諸餘下廣顯末世持經之難以慫慂其發願也雖說餘經如恆河沙固是難事然皆稱機之談人亦易信不足為難若以手掌接須彌而擲方外又以足指動大千而擲他國至乎立有頂而說餘經雖皆難事猶未為難以世人皆能傾信故唯是佛滅度後若在濁惡世中說此妙法華經最為難事人不信故生怨嫉故招罵詈故加杖木故若無大願生退屈故手把虗空者虗空本不可把而或可把未足為難唯佛滅後能把筆書經者又難於把空也言暫讀者暫時一讀不常讀也為一人說者以私意竊為一人不為多人也聽經問義者既聽經而欲解義也奉持者言捧持而著之心胸間不令忘失也已上總言末世作五種法師之難我為下顯此經之尊勝若有下讚持經法師之獲益則持佛身者言能持此經即是持諸佛全身以諸佛全身不離此經故諸善下招告持經今於下勸發大願唯有大願然後能持此經故若暫持者言不但入息不居陰界出息不涉萬緣常轉是經者諸佛歡喜即有一念回光暫持此經者諸佛亦皆歡喜也是則勇猛精進者即為盡行諸佛無量道法故是名持戒者即為具足清白梵行故行頭陀者即為抖擻一切法塵故疾得無上道者即心自性成就慧身不由他悟故住淳善地者止於至善故為天人眼者具正法眼故天人供養者即是天人導師故提婆達多品第十二頌云傲象謀虞舜提婆害釋迦門庭稍有異遭際略無差狂聖必同處親冤定一家他山不借石安得玉無瑕奇特龍王女神機何迅哉一肩擔佛去雙手獻珠回勇決超屠額飛騰却善財自今看烈𦦨冷地笑寒灰梵語提婆達多此云天熱生時人天心熱故斛飯王之子也往昔曾與釋迦為善知識授法華經此世又與釋迦作惡知識所謂或順或違無非增上故於此品出其因而授記也此品大意有二一欲令四衆發願持經故引己身作證言我曾於無量劫中勤求大法故得成佛最彼已受化者精勤修習不生疲怠復恐淺根以為佛道長遠久受勤苦方始得成不肯進修故又以龍女現身作證但聞此經即得成佛令彼亦生好樂不生退曲也故楞伽云以凡愚計常外道妄想長養惡見生死無窮欲令厭離生死趣輪精勤勝進故為彼說言諸佛易見非如優曇鉢華難得見故息方便求有時復觀諸受化者作是說言佛難值遇如優曇鉢華故知說難說易皆是如來善巧方便菩提豈有是哉二者冤家授記異類成佛正顯甚深佛慧究竟平等無冤親相無男女相但辦肯心決不相賺爾時佛告諸菩薩及天人四衆吾於過去無量劫中求法華經無有懈倦於多劫中常作國王發願求於無上菩提心不退轉為欲滿足六波羅蜜勤行布施心無吝惜象馬七珍國城妻子奴婢僕從頭目髓腦身肉手足不惜軀命時世人民壽命無量為於法故捐捨國位委政太子擊鼓宣令四方求法誰能為我說大乘者吾當終身供給走使時有仙人來白王言我有大乘名妙法華經若不違我當為宣說王聞仙言歡喜踊躍即隨仙人供給所須采果汲水拾薪設食乃至以身而為牀座身心無倦于時奉事經於千歲為於法故精勤給侍令無所乏爾時世尊欲重宣此義而說偈言我念過去世為求大法故雖作世國王不貪五欲樂椎垂鐘告四方誰有大法者若為我解說身當為奴僕時有阿私仙來白於大王我有微妙法世間所希有若能修行者吾當為汝說時王聞仙言心生大喜悅即便隨仙人供給於所須采薪及果蓏隨時恭敬與情存妙法故身心無懈倦普為諸衆生勤求於大法亦不為己身及以五欲樂故為大國王勤求獲此法遂致得成佛今故為汝說無量劫中求法華經無有懈倦正顯此經非懈怠者可得必精進勇猛方能擔荷也於多劫中常作國王如華嚴經中為大威光太子世世生生發願求菩提果是也為欲下求其因也象馬等外施也頭目等內施也為於下求法也捨王位而求法者知天爵貴於人爵也誰能下出求法之令也時有下仙人聞風而至也王聞下不食其言終身供給也采果下言一身常兼數事以至身為牀座而無懈倦于時下事師之久也此是釋迦自陳往昔勤求妙法得成菩提所以偏稱勇猛也頌中我念下為大法而捨位也椎鐘下宣令求法也時有下說法人至也長行云若不違我當為宣說此云若能修行吾當為說不違我即是依教修行正恐知而不行說之無益故先以此言激之時王下順命給待也情存妙法身心無懈正謂心心無間唯欲發明此事更無別慕故雖勤渠不生懈倦普為下結顯如來求法是為衆生不為己身故能捨五欲樂而作辛勤勞苦之事得證菩提也佛告諸比丘爾時王者則我身是時仙人者今提婆達多是由提婆達多善知識故令我具足六波羅蜜慈悲喜捨三十二相八十種好紫磨金色十力四無所畏四攝法十八不共神通道力成等正覺廣度衆生皆因提婆達多善知識故告諸四衆提婆達多却後過無量劫當得成佛號曰天王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊世界名天道時天王佛住世二十中劫廣為衆生說於妙法恆河沙衆生得阿羅漢果無量衆生發緣覺心恆河沙衆生發無上道心得無生忍至不退轉時天王佛般涅槃後正法住世二十中劫全身舍利起七寶塔高六十由旬縱廣四十由旬諸天人民悉以雜華末香燒香塗香衣服瓔珞幢幡寶蓋技樂歌頌禮拜供養七寶妙塔無量衆生得阿羅漢果無量衆生悟辟支佛不可思議衆生發菩提心至不退轉佛告諸比丘未來世中若有善男子善女人聞妙法華經提婆達多品淨心信敬不生疑惑者不墮地獄餓鬼畜生生十方佛前所生之處常聞此經若生人天中受勝妙樂若在佛前蓮華化生先指昔證今由提下出提婆之因而歸功於師也告諸下授提婆之記佛號天王者有大威力成就如來大因大果故世界名天道者天道無親常與善人故要知提婆今世之憎心不異昔年之妙法釋迦今日之冤家不異昔時之知識不作兩心方名平等廣為下說法度生時天下滅後得益佛告下勸衆生信問提婆達多造五逆罪生身陷入地獄佛說法時尚未出獄何故亦得授記答提婆在地獄時佛令阿難問儞在地獄安否曰我在地獄如三禪天樂佛又令問還求出否曰我待世尊來便出阿難云佛是三界導師豈有入地獄分曰佛既無入地獄分我豈有出地獄分只此數語便是天王如來何待授記於時下方多寶世尊所從菩薩名曰智積白多寶佛當還本土釋迦牟尼佛告智積曰善男子且待須臾此有菩薩名文殊師利可與相見論說妙法可還本土爾時文殊師利座千葉蓮華大如車輪俱來菩薩亦坐寶蓮華從於大海娑竭羅龍宮自然涌出住虗空中詣靈鷲山從蓮華下至於佛所頭面敬禮二世尊足修敬已畢往智積所共相慰問却坐一面智積菩薩問文殊師利仁往龍宮所化衆生其數幾何文殊師利言其數無量不可稱計非口所宣非心所測且待須臾自當證知所言未竟無數菩薩坐寶蓮華從海涌出詣靈鷲山住在虗空此諸菩薩皆是文殊師利之所化度具菩薩行皆共論說六波羅蜜本聲聞人在虗空中說聲聞行今皆修行大乘空義文殊師利謂智積曰於海教化其事如是爾時智積菩薩以偈讚曰大智德勇健化度無量衆今此諸大會及我皆已見演暢實相義開闡一乘法廣導諸衆生令速成菩提文殊師利言我於海中唯常宣說妙法華經先智積請還言智積者未至無智無得尚有智礙故請佛還土者佛事已畢勸還本國也且待下欵留之也雖是主賓分上亦是要智積與文殊相見論說妙法顯露此土菩薩家風亦使異國菩薩生渴仰心得露法味不孤來意也爾時下文殊從海涌出者表從性海流出也先禮佛足而次慰菩薩者禮也智積下問其所化意謂龍性多瞋不堪受法故問所化幾何文殊下答所化甚多所言下化衆涌出住在虗空者同證平等大乘空故爾時下偈讚文殊隨機設化之謂智混一無跡之謂德強禦不畏之謂勇教化不息之謂健具此四者堪度衆生故以此讚之演暢下是問辭言汝所化之衆為是演暢實相之義而化之乎為以實相之義開種種門而導之也文殊下言我不別開門戶唯以實相示人也智積問文殊師利言此經甚深微妙諸經中寶世所希有頗有衆生勤加精進修行此經速得佛不文殊師利言有娑竭羅龍王女年始八歲智慧利根善知衆生諸根行業得陀羅尼諸佛所說甚深祕藏悉能受持深入禪定了達諸法於剎那頃發菩提心得不退轉辨才無礙慈念衆生猶如赤子功德具足心念口演微妙廣大慈悲仁讓志意和雅能至菩提智積菩薩言我見釋迦如來於無量劫難行苦行積功纍德求菩提道未曾止息觀三千大千世界乃至無有如芥子許非是菩薩捨身命處為衆生故然後乃得成菩提道不信此女於須臾頃便成正覺言論未訖時龍王女忽現於前頭面禮敬却住一面以偈讚曰深達罪福相遍照於十方微妙淨法身具相三十二以八十種好用莊嚴法身天人所戴仰龍神咸恭敬一切衆生類無不宗奉者又聞成菩提唯佛當證知我闡大乘教度脫苦衆生此審問利根也言此經甚深微妙是法寶中之大如意寶世所希有既有如此奇特頗有聞此而勤加精進一生頓獲無上菩提者乎文殊下答出龍女言龍女者顯是異類明非過去久修年始八歲者見其甚小明非今世習學智慧利根四字是總讚龍女善知下別讚智慧諸根即信進念定慧五根也行業即所作善惡業也此知機也得陀尼等下知法也言龍女具十力故能知機知法也於利下別讚利根初發心時即得不退也辨才無礙者得四無礙智也慈念衆生者以慈修身也功德具足者萬行圓滿也心念口演者自利利他也微妙廣大者致廣大而盡精微也仁者不自有其德讓者不自張其功和者無卒暴故能就物雅者無圭角故能成物以此女衆德具足故至速至菩提也文殊為三世諸佛師又為諸菩薩師又與龍衆龍女為師回類異類逆行順行無非皆是妙光發露處故求法當效釋迦而說法度生又當效文殊也智積下菩薩騰疑所謂不退諸菩薩亦復不能知也言論下龍女呈身深達下偈讚文殊罪謂龍女福謂如來達此二相本來空寂古佛所謂罪福皆空無所住是也以此讚文殊所以抑智積也以智積有二相故遍照於十方者言文殊智光周遍融通非若智積滯而不通也微妙下讚文殊亦是古佛現身也又聞下言我成佛唯佛證知我說法度生亦唯佛證知反顯智積不能知也時舍利弗語龍女言汝謂不久得無上道是事難信所以者何女身垢穢非是法器云何能得無上菩提佛道懸曠經無量劫勤苦積行具修諸度然後乃成又女人身猶有五障一者不得作梵天王二者帝釋三者魔王四者轉輪聖王五者佛身云何女身速得成佛爾時龍女有一寶珠價值三千大千世界持以上佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寶珠世尊納受是事疾不答言甚疾女言以汝神力觀我成佛復速於此當時衆會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺三十二相八十種好普為十方一切衆生演說妙法爾時娑婆世界菩薩聲聞天龍八部人與非人皆遙見彼龍女成佛普為時會人天說法心大歡喜悉遙敬禮無量衆生聞法解悟得不退轉無量衆生得受道記無垢世界六反震動娑婆世界三千衆生住不退地三千衆生發菩提心而得授記智積菩薩及舍利弗一切衆會默然信受此鶖子呈疑所謂假使舍利弗亦復不能知也垢穢非法器者言此身腥臊交遘抑且是龍又非人類故非受法之器佛道下與智積一模脫出梵天王色界天主清淨為梵女身不淨故亦是八地菩薩示現故帝釋是欲界天主是二地菩薩示現故魔王即魔醯首羅是十地菩薩示現故輪王是人中極尊諸佛降生處故亦是初地菩薩所現示故佛為諸聖之極尊故言女身尚不能得世間主云何疾得出世間之最上法王乎智積鶖子總是色相不空智障不破墮在佛見衆生見中大家將龍女掂斤播兩當知異國菩薩堪與此土聲聞同列耳爾時下龍女呈珠龍女却有大人度量不與他辨是論非直下拈出一顆圓明無價鎮海明珠呈似世尊却要世尊作個證明世尊即受與它打個照會龍女却用紅綿索子反套二圓尊者却問言我獻寶珠世尊納受是事疾否爛泥裏有刺智積與尊者口嘴相同未免答個甚疾鼻孔却在龍女手中龍女却把二尊者鼻孔輕輕捩轉却道汝等以神力觀我成佛汝等眼力之速又速於我之成佛汝尚不知云何知我成佛之甚疾乎他方此土菩薩聲聞却被八歲龍女當面熱瞞也不知故曰若人生百歲不會諸佛機不如生一日而能決了之當時下龍女賭身不賭口忽然變未成男子立地成佛可見菩提之道無久暫無頓漸無遲速唯在精進唯在妙悟而已昔灌溪參末山尼山問上座今日離何處曰路口山曰何不蓋却始禮拜問如何是末山山曰不露頂曰如何是末山主山曰非男女相師乃喝云何不變去山曰不是神不是鬼變個甚麼師服膺作園頭三年末山道不變龍女却變且道變是不變是普為下說法度生且道說何等法化龍經前云成菩提闡大教度衆生唯佛證知意見乎此爾時下大衆歡喜敬禮也是隨邪逐怪無量下聞法得益惱亂春風卒未休默然信受者直得亡鋒結舌杜口無言也持品第十三頌云季世情多譎流言捷有神證龜能作鱉指機即為人藥腐曇摩齒刀刲師子身漠然都不校方見受持真因前寶塔品云我欲以此妙法華經付囑有在又云此為難事宜發大願已將大衆志願聳動復恐發心不猛不烈故復引自己往昔求法華經至於身為牀座終無懈倦以勵之又令親見龍女聽法華經即證菩提以進之由是始有發願持經者故曰持品持之一字是五種法師之要訣故特標品名爾時藥王菩薩摩訶薩及大樂說菩薩摩訶薩與二萬菩薩眷屬俱皆於佛前作是誓言惟願世尊不以為慮我等於佛滅後當奉持讀誦說此經典後惡世衆生善根轉少多增上慢貪利供養增不善根遠離解脫雖難可教化我等當起大忍力讀誦此經持說書寫種種供養不惜身命爾時衆中五百阿羅漢得受記者白佛言世尊我等亦自誓願於異國土廣說此經復有學無學八千人得受記者從座而起合掌向佛作是誓言世尊我等亦當於它國土廣說此經所以者何是娑婆國中人多弊惡懷增上慢功德淺薄瞋濁諂曲心不實故先會中菩薩發願持經然數有八萬而藥王大樂說與二萬菩薩俱者亦見其餘畏難之意不以為慮者安慰之辭我等下承當之語應前誰能於此娑婆世界廣宣妙法等語後惡下是發願語應前誰能護法廣發大願之語言後惡世者正指後五百歲鬪諍堅固時言善根者即無貪無瞋無癡三善根也不善根者即貪瞋癡三不善根也正言末世善根少而不善根多善人少而不善人多也起大忍力便是發願作五種法師也意謂末世衆生雖剛狠難化當以大忍辱力作此五種佛事漸漬熏染徐徐誘入即使惡罵捶打乃至節節支解皆悉忍受昔黑齒比丘訴佛云舍利弗罵我說我佛喚舍利弗問云汝實罵說否舍利弗云心不定者云罵說我心已定者云何罵說如折角牛不觸嬈人如殘童子恥不惱彼我心如地淨與不淨大小便利一切皆受心如掃帚淨與不淨一切皆掃云何于他而有罵說佛云如是惡人汝云何觀答人有五種有身善口意不善者但念其身不念口意如糞掃比丘見糞聚弊帛截棄不淨而取其淨我亦如是念其身淨以規我身念其口意以防口意有口淨身意不淨者亦用其口棄其身意有意淨身口不淨者亦用其意棄其身口有一種皆不淨者雖無可用當痛惜之若三種皆淨者常存於心以自規訓此亦大忍之漸也爾時下無學人發願異國持經復有下有學人發願異國持經此即聲聞得記學菩薩行習法師事之初心也弊惡者言娑婆世界壞人惡人多也瞋者謂剛暴無柔和之色濁者謂汙穢無清白之行諂者工媚悅而無丈夫之氣曲者習逢迎而無質直之心其人如此故不可以真實法授之故不願入娑婆也則知娑婆世界衆生皆見棄於聲聞弟子若無大忍力菩薩為法師與之暢曲旁通不幾乎皆為異類哉爾時佛姨母摩阿波闍波提比丘尼與學無學比丘尼六千人俱從座而起一心合掌瞻仰尊顏目不暫捨於時世尊告憍曇彌何故憂色而視如來汝心將無謂我不說汝名授阿耨多羅三藐三菩提記耶憍曇彌我先總說一切聲聞皆已授記今汝欲知記者將來之世當於六萬八千億諸佛法中為大法師及六千學無學比丘尼俱為法師汝如是漸漸具菩薩道當得作佛號一切衆生喜見如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊憍曇彌是一切衆生喜見佛及六千菩薩轉次授記得阿耨多羅三藐三菩提爾時羅睺羅母耶輸陀羅比丘尼作世念世尊於授記中獨不說我名佛告耶輸陀羅汝於來世百千萬億諸佛法中修菩薩行為大法師漸具佛道於善國中當得作佛號具足千萬光相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊佛壽無量阿僧祇劫爾時摩訶波闍波提比丘尼及耶輸陀羅比丘尼并其眷屬皆大歡喜得未曾有即於佛前而說偈言世尊導師安隱天人我等聞記心安具足諸比丘尼說是偈已白佛言世尊我等亦能於它方國廣宣此經由不稱名授記不敢發願持經故以目注如來不暫捨者欲如來知其意也於時下先點破目視之意憍曇下如來與記為大法師者欲其廣宣大法漸具菩薩道也佛號一切衆生喜見者由因中能大愛道作大法師故果上一切皆喜見也佛號具足光相者因中作大法師闡明如來大法光明故果上具足光相也偈中心安具足者未得記時心不得安志願不得滿今得授記心亦安而願亦滿故曰心安具足也諸比下因得授記亦發願持經也問諸聲聞衆既得授記發願持經然皆願向異國不願入娑婆而與菩薩異者何故答聲聞人持淨戒時不應起一念三界更受後身故菩薩淨持戒時能於無量阿僧祇堪受後身不生厭怠由尋常用心各異故今發願亦各不同此皆順其本意隨其習種非矯強也若以內祕外現言則聲聞弟子久在娑婆行菩薩道故當生淨國也爾時世尊視八十萬億那由它諸菩薩摩訶薩是諸菩薩皆是阿惟越致轉不退法輪得諸陀羅尼即從座起至於佛前一心合掌而作是念若世尊告敕我等持說此經者當如佛教廣宣斯法復作是念佛今默然不見告敕我當云何時諸菩薩敬順佛意并欲自滿本願便於佛前作師子吼而發誓言世尊我等於如來滅後周旋往反十方世界能令衆生書寫此經受持讀誦解說其義如法修行正憶念皆是佛之威力唯願世尊在於它方遙見守護世尊見發願持經皆在異國畏入娑婆皆不愜意故以目招菩薩也即從下菩薩作念因目視而起立合掌因默然而又作念也時諸下順佛心而發願由領世尊目視之意故曰敬順佛意本願亦欲如此故曰自滿本願也作師吼者不同聲聞有畏怯也往反十方者去去來來不拘一界也能令下言我自能書寫受持讀誦解說修行正念而又能令衆生受持書寫作種種佛事也皆是佛威力者歸功於師不自有其功也遙見守護者復請如來神力冥加也即時諸菩薩俱同發聲而說偈言惟願不為慮於佛滅度後恐怖惡世中我等當廣說有諸無智人惡口罵詈利等及加刀杖者我等皆當忍惡世中比丘邪智心諂曲未得謂為得我慢心充滿或有阿練若納衣在空間自謂行真道輕賤人間者貪著利養故與白衣說法為世所恭敬如六通羅漢是人懷惡心常念世俗事假名阿練若好出我等過而作如是言此諸比丘等為貪利養故說外道論義自作此經典誑惑世間人為求名聞故分別於是經常在大衆中欲毀我等故向國王大臣婆羅門居士及餘比丘衆誹謗說我惡謂是邪見人說外道論義我等敬佛故悉忍是諸惡為斯所輕言汝等皆是佛如此輕慢言皆當忍受之濁劫惡世中多有諸恐怖惡鬼入其身罵詈利毀辱我我等敬信佛當著忍辱鎧為說是經故忍此諸難事我不愛身命但惜無上道我等於來世護持佛所囑世尊自當知濁世惡比丘不知佛方便隨宜所說法惡口而嚬平蹙促數數見擯出遠離於塔寺如是等衆惡念佛告敕故皆當忍是事諸聚落城邑其有求法者我皆到其所說佛所囑法我是世尊使處衆無所畏我當善說法願佛安隱住我於世尊前諸來十方佛發如是誓言佛自知我心此是菩薩一篇發願文也初四句是總有諸下別陳我等皆當忍者忍字與瞋字對決定毗尼經云若菩薩修行大乘如河沙劫貪心相應而犯戒者其罪尚輕若一瞋心而犯於戒其罪甚重何以故因貪犯戒攝受衆生因瞋犯戒棄捨衆生故所有諸法能攝受衆生菩薩於此不應生畏所有諸法能捨衆生菩薩於此應生怖畏故斷愛是小乘所先斷瞋是菩薩之急務故菩薩濁世持經當行忍辱也惡世下廣言所忍之事言比丘者正顯壞法之人不在白衣而在衲衣所謂師子身中蟲自食師子肉也邪智者無正知見出隨風倒柁之語諂曲者奴顏婢膝作狐媚求容之態我慢者由邪智諂曲遂能交結權貴狐假虎威眼空四海眇忽一切自謂天上天下唯我獨尊如此等人劍戟在心戈矛在舌故在在處處飛殃作孽譽己毀人所謂未得謂得也或有下出謗因也梵語阿練若此云寂靜處納衣在空間者言褁納衣住在深山窮谷空間寂寞之濵自謂我行如來真正之道其視人間說法度生作佛事者目為邪道故意輕賤也言此等人雖是矯飾形儀假粧皮面以為無求於世殊不知言清行濁不是真修貪著利養暗地却與白衣說法誑惑無知彼無知者為彼所愚敬如羅漢此等既得白衣恭敬復恐明眼作家冷地覷破心不自安便懷惡心故在人前抑人揚己自謂行道輕賤人間耳彼雖不處人間深藏丘壑而心所注念皆是世俗鄙陋之事患得患失氷炭交心何曾有一念寂靜豈非假名阿練若乎如斯等人將無作有好生過釁而作下出謗辭也或曰此人間說法比丘皆為貪著利養故說此等外道論義非是如來正說或曰是比丘所說是自己造作出來誑惑世人不是代佛揚化或曰此等比丘沽名釣譽故說是經不為度生常在下出謗毀之處此等謗辭或在大勢力人前毀或在淨行人前毀或在有道人前毀或在同袍面前毀謂彼說法者是邪見人謂彼所說者是外道法彼雖如是加謗加毀我等敬佛告敕悉能忍其惡也為斯下三句亦謗毀之辭有二義一是惡比丘見說法比丘故作輕慢之語云汝等說法皆是活佛出世豈當等間二或是惡比丘指授記之語對衆人云不是佛說却是說法比丘邀人恭敬自己故意作此輕薄之語汝等是佛不可盡信惡比丘雖作是說我亦置而不校也濁世下出謗毀之故言如此比丘恐怖它人唯此土有他土所無此等比丘皆是惡鬼入其心腑故雖以惡口罵我毀我辱我我等敬信佛語著忍辱鎧行忍辱行以我受佛敕而說此經即加我難忍之事我皆忍之然我所忍人毀罵者非愛身而不敢與之校但我自惜法王之道正在己躬故自珍自重如連城不與瓦礫爭價鵷雛不與梟鷲同鳴故不容不默默耳然此皆是領荷如來付囑有在一語更無他故世尊自當知我心也濁世下出謗毀之意濁世比丘無有智慧不解如來授記作佛亦是方便接人故一聞此語即加惡口罵詈顰眉蹙額以為是外道法數數擯出不容入寺即有如是諸惡加我我亦能忍我雖遠離塔寺若聚落城邑中有求法者我乘願力決不退墮復至其所而為說法以我受佛付囑即是如來所遣之使以佛莊嚴而自莊嚴故我處衆無畏不辱使命常以善言誘論令彼悟入續佛慧命不令斷滅我願如斯唯願如來安隱住世不勞有慮也我於下結誓
