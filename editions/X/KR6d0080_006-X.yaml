body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋隨喜品第十八頌云眼未開時識未乾普天都是夢邯鄲眉頭略展機關透却笑嫦娥住廣寒前以受持讀誦者校量次以受持書寫者校量三以受持兼行六度者校量四以五種俱作六度齊修者校量此品將前一念隨喜者校量功德也言隨喜者謂如來滅後有人偶至法會見人說法一入耳根毫無違逆不生毀訾隨順於心能生歡喜故名隨喜前八部見鶖子授記生隨喜心即得授記地涌菩薩聞如來度生事亦生隨喜即得囑累此由如來在世能說之人色心圓勝故聞經而易生隨喜至乎如來滅度後五百歲道法陵遲鬪諍堅固雖有說法之人易生毀訾隨喜實難此隨喜功德所以必欲校量也爾時彌勒菩薩摩訶薩白佛言世尊若有善男子善女人聞是法華經隨喜者得幾所福而說偈言世尊滅度後其有聞是經若能隨喜者為得幾所福爾時佛告彌勒菩薩摩訶薩阿逸多如來滅後若比丘比丘尼優婆塞優婆夷及餘智者若長若幼聞是經隨喜已從法會出至於餘處若在僧坊若空閑處若城邑巷陌麥聚落田里如其所聞為父母宗親善友知識隨力演說是諸人等聞已隨喜復行轉教餘人聞已亦隨喜轉教如是展轉至第五十阿逸多其第五十善男子善女人隨喜功德我今說之汝當善聽若四百萬億阿僧祇世界六趣四生眾生卵生胎生濕生化生若有形無形有想無想非有想非無想無足二足四足多足如是等在眾生數者有人求福隨其所欲娛樂之具皆給與之一一眾生與滿閻浮提金銀琉璃硨磲碼碯珊瑚琥珀諸妙珍寶及象馬車乘七寶所成宮殿樓閣等是大施主如是布施滿八十年已而作是念我已施眾生娛樂之具隨意所欲然此眾生皆已衰老年過八十髮白面皺縐將死不久我當以佛法而訓導之即集此眾生宣布法化示教利喜一時皆得須陀洹道斯陀含道阿那含道阿羅漢道盡諸有漏於深禪定皆得自在具八解脫於汝意云何是大施主所得功德寧為多不彌勒白佛言世尊是人功德甚多無量無邊若是施主但施眾生一切樂具功德無量何況令得阿羅漢果佛告彌勒我今分明語汝是人以一切樂具施於四百萬億阿僧祇世界六趣眾生又令得阿羅漢果所得功德不如是第五十人聞法華經一偈隨喜功德百分千分百千萬億分不及其一乃至算數譬喻所不能知阿逸多如是第五十人展轉聞法華經隨喜功德尚無量無邊阿僧祇何況最初於會中聞而隨喜者其福復勝無量無邊阿僧祇不可得比又阿逸多若人為是經故往詣僧坊若坐若立須臾聽受緣是功德轉身所生得好上妙象馬車乘珍寶輦輿及乘天宮若復有人於講法處坐更有人來勸令坐聽若分座令坐是人功德轉身得帝釋坐處若梵王坐處若轉輪聖王所坐之處阿逸多若復有人語餘人言有經名法華可共往聽即受其教乃至須臾間聞是人功德轉身得與陀羅尼菩薩共生一處利根智慧百千萬世終不瘖瘂口氣不臭舌常無病口亦無病齒不垢黑不黃不疎亦不缺落不差不曲唇不下垂亦不褰千縮宿不麤初澁色不瘡疹軫亦不缺壞亦不咼快平聲斜不厚不大亦不黧力黑無諸可惡鼻不匾扁𠥶替亦不曲戾面色不黑亦不陿長亦不窊哇曲無有一切不可喜相唇舌牙齒悉皆嚴好鼻修高直面貌圓滿眉高而長頞厄廣平正人相具足世世所生見佛聞法信受教誨阿逸多汝且觀是勸於一人往令聽法功德如此何況一心說聽讀誦而於大眾為人分別如說修行爾時世尊欲重宣此義而說偈言若人於法會得聞是經典乃至於一偈隨喜為他說如是展轉教至於第五十最後人獲福今當分別之如有大施主供給無量眾具滿八十歲隨意之所欲見彼衰老相髮白而面皺齒疎形枯竭念其死不久我今應當教令得於道果即為方便說涅槃真實法世皆不牢固如水沫末泡拋燄汝等咸應當疾生厭離心諸人聞是法皆得阿羅漢具足六神通三明八解脫最後第五十聞一偈隨喜是人福勝彼不可為譬喻如是展轉聞其福尚無量何況於法會初聞隨喜者若有勸一人將引聽法華言此經深妙千萬劫難遇即受教往聽乃至須臾聞斯人之福報今當分別說世世無口患齒不疎黃黑唇不厚褰千缺無有可惡相舌不乾黑短鼻高修且直頞廣而平正面目悉端嚴為人所喜見口氣無臭穢優鉢華之香常從其口出若故詣僧坊欲聽法華經須臾聞歡喜今當說其福後生天人中得妙象馬車珍寶之輦輿及乘天宮殿若於講法處勸人坐聽經是福因緣得釋梵轉輪座何況一心聽解說其義趣如說而修行其福不可限先彌勒請問爾時下正答舉第五十人隨喜校量者反顯最初隨喜功德尤多也卵生者魚鳥龜蛇之類胎生者人畜龍仙之類濕生者含蠢蠕動之類化生者轉蛻飛行之類有形者休咎精明之類無形者空散銷沉之類有想者神鬼精靈之類無想者土木金石之類非有想者如蒲盧之類非無想者如土梟之類無足者鰍鱔之類二足者雞鴨之類四足者犬羊之類多足者馬蚿之類有人求福者指作福人也隨其所欲皆與之者隨彼一切有情心之所欲者皆施與之也一一下出所施之物是大下出行施之時而作下既以財施復以法施也一時下聞法得果須陀洹此云預流初果也斯陀含此云一來二果也阿那含此云不來三果也阿羅漢此云殺賊四果也深禪定九次第定也於汝下徵其功德多少彌勒下答顯功德無量佛告下校量功德言彼功德雖多尚不及第五十人隨喜此經一偈功德尤多也第五十人隨喜一偈功德已是無量何況最初聞而隨喜者其功德寧可量哉問隨喜法華一偈便能超越爾所功德如來之語不亦大逕庭乎答瞽者無以與文章黼黻之觀聾者無以與乎絲竹管弦之妙此皆如來至語但聾瞽者不肯信耳此經喻如摩尼寶餘經喻如照乘珠得百斛照乘珠不如得一顆摩尼寶故也又阿下顯獨往聽法功德由獨往聽法故得自受用物也若復下又顯勸人聽法功德謂在講法處坐偶有人來勸令坐聽由勸坐分座故感帝釋梵王之坐阿逸下又顯合伴聽法功德陀羅尼菩薩謂九地已上菩薩由合伴同聽故得與陀羅尼菩薩共生一處也終不瘖瘂者音聲清徹也口不臭者常出青蓮香也舌無病者不乾不短語言便捷也口無病者不歪斜也下垂者妥唇也褰縮者短唇也缺壞者缺唇也匾𠥶者塌鼻也曲戾者歪鼻也窊曲者凹面也悉皆嚴好者如唇紅而正舌薄而長齒白而密鼻修而隆直面圓而滿眉高而長頞廣而平正等阿逸下校量功德言勸一人聽法功德如斯況一心聽人說法者一心讀誦者一心為人分別解說者一心如說而修行者其功德類可知矣頌中世皆不牢固如水沫泡𦦨此即為彼說無常法令彼捨生死也如云是身無常無堅速朽之法是身如聚沫不可撮摩是身如泡不得久立是身如燄從渴愛生之類若有下頌勸人聽法若故下自己聽法若於下在講法處偶勸人聽法何況下校勝法師功德品第十九頌云眼裡泥沙耳裡塵東呼西應最分明猩猩要得重相見十字街頭喚一聲前二品中校量功德皆是宣說受持讀誦解說書寫供養此經所得功德皆是以勝校劣然未曾宣說法師現在六根所獲功德也故此品及之此五種法師若精進勇猛又藉佛法熏習之力當時證得一念相應慧得見平等法身便入六根清淨位故楞嚴云是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界由彼開佛知見根根塵塵清淨本然周遍法界故廣顯其功德也爾時佛告常精進菩薩摩訶薩若善男子善女人受持是法華經若讀若誦若解說若書寫是人當得八百眼功德千二百耳功德八百鼻功德千二百舌功德八百身功德千二百意功德以是功德莊嚴六根皆令清淨是善男子善女人父母所生清淨肉眼見於三千大千世界內外所有山林河海下至阿鼻地獄上至有頂亦見其中一切眾生及業因緣果報生處悉見悉知爾時世尊欲重宣此義而說偈言若於大眾中以無所畏心說是法華經汝聽其功德是人得八百功德殊勝眼以是莊嚴故其目甚清淨父母所生眼悉見三千界內外彌樓山須彌及鐵圍并諸餘山林大海江河水下至阿鼻獄上至有頂處其中諸眾生一切皆悉見雖未得天眼肉眼力如是先總明五種法師功德告常精進者唯是精進不怠之人一生便得故告之也是人當得者言此法師若肯直下承當常常精進造次顛沛無須臾離是人即入信位一生即得六根清淨功德如楞嚴所明八百眼功德者前方全明後方全暗故千二百耳功德者十方擊鼓十處齊聞故八百鼻功德者有出有入缺中交故千二百舌功德者言有方分理無窮盡故八百身功德者合時能覺離中不知故千二百意功德者唯聖與凡無不包容故以六根具有如是功德莊嚴故開佛知見時即得清淨也前云欲令佛之知見使得清淨故出現於世者此之謂也是善下先明眼根功德世界無情器界也眾生有情界也雖是尋常肉眼却與天眼同功故能遠近悉見纖悉不遺古德云盡大地是沙門一隻眼盡十方世界在沙門眼睛裏是也頌中以無所畏心一句正顯得六根清淨之所以大的恐畏皆生於不足道力未充故今言無畏者由彼涵養既久道力既充神氣亦滿即有刀杖罵詈不足以干其慮昔玄沙備禪師薪於山中傍僧呼曰和尚看虎玄沙見虎顧僧曰是你靈潤法師山行野燒迅飛而來同遊者避之潤安步如常曰心外無火火實自心謂火可逃何由免火火至即滅又廬山緣德禪師時胡則據九江大將軍曹翰部曲渡江入寺禪者驚走師淡坐如平日翰至不起不揖翰訶曰長老不聞殺人不眨眼將軍乎師熟視曰汝安知有不懼死和尚耶所云無畏者蓋如此能以此心說此經眼根自然清淨矣不然稍有動搖則目眩心馳安得清淨乎內外彌樓山者梵語彌樓此云光明即七金山也言內外者以七金山有七重故一切悉皆現者如楞嚴云一切密圓淨妙悉現其中則不止現內外彌樓等也復次常精進若善男子善女人受持此經若讀若誦若解說若書寫得千二百耳功德以是清淨耳聞三千大千世界下至阿鼻地獄上至有頂其中內外種種語言音聲象聲馬聲牛聲車聲啼哭聲愁歎聲螺聲鼓聲鐘聲鈴聲笑聲語聲男聲女聲童子聲童女聲法聲非法聲苦聲樂聲凡夫聲聖人聲喜聲不喜聲天聲龍聲夜叉聲乾闥婆聲阿修羅聲迦樓羅聲緊那羅聲摩睺羅伽聲火聲水聲風聲地獄聲畜生聲餓鬼聲比丘聲比丘尼聲聲聞聲辟支佛聲菩薩聲佛聲以要言之三千大千世界中一切內外所有諸聲雖未得天耳以父母所生清淨常耳皆悉聞知如是分別種種音聲而不壞耳根爾時世尊欲重宣此義而說偈言父母所生耳清淨無濁穢以此常耳聞三千世界聲象馬車牛聲鐘鈴螺鼓鼓琴瑟箜篌聲簫笛之音聲清淨好歌聲聽之而不着無數種人聲聞悉能解了又聞諸天聲微妙之歌音及聞男女聲童子童女聲山川險谷中迦陵頻伽聲命命等諸鳥悉聞其音聲地獄眾苦痛種種楚毒聲餓鬼饑渴逼求索飲食聲諸阿修羅等居在大海邊自共言語時出於大音聲如是說法者安住於此間遙聞是眾聲而不壞耳根十方世界中禽獸鳴相呼其說法之人於此悉聞之其諸梵天上光音及徧淨乃至有頂天言語之音聲法師住於此悉皆得聞之一切比丘眾及諸比丘尼若讀誦經典若為他人說法師住於此悉皆得聞之復有諸菩薩讀誦於經法若為他人說撰集解其義如是諸音聲悉皆得聞之諸佛大聖尊教化眾生者於諸大會中演說微妙法持此法華者悉皆得聞之三千大千界內外諸音聲下至阿鼻獄上至有頂天皆聞其音聲而不壞耳根其耳聰利故悉能分別知持是法華者雖未得天耳但用所生耳功德已如是次明耳根功德象馬等車馬聲啼哭愁嘆不可意聲螺鼓鐘鈴法樂聲法聲柔和順軟聲非法聲貪瞋鬬諍聲天聲下八部聲火水風三災聲地獄下三途聲比丘下二眾四聖聲不壞耳根者聽之不著歷歷分明也偈中父母下頌欲界聲無數種人聲聞悉能解了者達方言也頻伽好音鳥命命共命鳥其諸下頌色界聲一切下頌二眾聲復有下頌菩薩聲諸佛下頌佛說法聲三千下總結纔入信位耳根已得圓通如此況入聖位乎昔洞山清稟禪師唯宴坐一日呼侍者下法堂謂曳木者無損階砌侍者出視無有還白寂無人跡稟又使求之侍者臨簷俯視乃羣蟻曳蜻蜓翼緣階而上蓋靜極靈而知也復次常精進若善男子善女人受持是經若讀若誦若解說若書寫成就八百鼻功德以是清淨鼻根聞於三千大千世界上下內外種種諸香須曼那華香闍提華香末利華香瞻蔔華香波羅羅華香赤蓮華香青蓮華香白蓮華香華樹香果樹香栴檀香沉水香多摩羅䟦香多伽羅香及千萬種和香若末若丸若塗香持是經者於此間住悉能分別又復別知眾生之香象香馬香牛羊等香男香女香童子香童女香及草木叢林香若近若遠所有諸香悉皆得聞分別不錯持是經者雖住於此亦聞天上諸天之香波利質多羅拘皮陀羅樹香及曼陀羅華香摩訶曼陀羅華香曼殊沙華香摩訶曼殊沙華香栴檀沉水種種末香諸雜華香如是等天香和合所出之香無不聞知又聞諸天身香釋提桓因在勝殿上五欲娛樂嬉戲時香若在妙法堂上為忉利諸天說法時香若於諸園遊戲時香及餘天等男女身香能悉遙聞如是展轉乃至梵世上至有頂諸天身香亦皆聞之并聞諸天所燒之香及聲聞香辟支佛香菩薩香諸佛身香亦皆遙聞知其所在雖聞此香然於鼻根不壞不錯若欲分別為他人說憶念不謬爾時世尊欲重宣此義而說偈言是人鼻清淨於此世界中若香若臭物種種悉聞知須曼那闍提多摩羅栴檀沉水及桂香種種華果香及知眾生香男子女人香說法者遠住聞香知所在大勢轉輪王小轉輪及子羣臣諸宮人聞香知所在身所著珍寶及地中寶藏轉輪王寶女聞香知所在諸人嚴身具衣服及瓔珞種種所塗香聞香知其身諸天若行坐遊戲及神變持是法華者聞香悉能知諸樹華果實及酥油香氣持經者住此悉知其所在諸山深險處栴檀樹華敷眾生在中者聞香悉能知鐵圍山大海地中諸眾生持經者聞香悉知其所在阿修羅男女及其諸眷屬鬬諍遊戲時聞香皆能知曠野險隘處師子象虎狼野牛水牛等聞香知所在若有懷妊任者未辯其男女無根及非人聞香悉能知以聞香力故知其初懷妊成就不成就安樂產福子以聞香力故知男女所念染欲癡恚惠心亦知修善者地中眾伏藏金銀諸珍寶銅器之所盛聞香悉能知種種諸瓔珞無能識其價聞香知貴賤出處及所在天上諸華等曼陀曼殊沙波利質多樹聞香悉能知天上諸宮殿上中下差別眾寶華莊嚴聞香悉能知天園林勝殿諸觀妙法堂在中而娛樂聞香悉能知諸天若聽法或受五欲時來往行坐臥聞香悉能知天女所著衣好華香莊嚴周旋遊戲時聞香悉能知如是展轉上乃至於梵世入禪出禪者聞香悉能知光音徧淨天乃至於有頂初生及退沒聞香悉能知諸比丘眾等於法常精進若坐若經行及讀誦經典或在林樹下專精而坐禪持經者聞香悉知其所在菩薩志堅固坐禪若讀誦或為人說法聞香悉能知在在方世尊一切所恭敬愍眾而說法聞香悉能知眾生在佛前聞經皆歡喜如法而修行聞香悉能知雖未得菩薩無漏法生鼻而是持經者先得此鼻相三明鼻根功德闍提此云金錢華末利此云鬘可作鬘故瞻蔔此云黃華波羅羅此云薰華多摩羅䟦此云性無垢多伽羅此云根香和香百和香也九香餅香也此皆人間華樹香也又復下皆眾生香也持是下諸天無情香也波利質多羅即帝釋殿前圓生樹其根莖枝葉能逆風香拘陀羅此云大遊戲地樹又聞下諸天有情香也娛樂嬉戲香淫佚香也說法香清淨香也梵世香禪定香也及聲下四聖法身香也偈中須曼下頌無情香及知下頌有情香大勢轉輪即金輪王王四天下故曰大小轉輪王即銀輪銅輪鐵輪王三二一天下故曰小也地中寶藏即伏藏也寶女即女寶也聞香知所在聞其氣而知其處也諸人即輪王侍從之人聞香知其身者其聞氣而知其人也諸天或行坐或遊戲者聞其氣而知其動靜也修羅或鬪諍或遊戲者聞其氣而知其瞋喜也若有懷姙聞香悉知者聞其氣而決其形也知男女所念者聞其氣而知其心也人間伏藏聞香悉知者聞其氣而知其物也種種瓔珞聞香悉知者聞其氣而知其價也天上下聞其氣而知欲界事如是下聞其氣而知色界事諸比下聞其氣而知進修事也復次常精進若善男子善女人受持此經若讀若誦若解說若書寫得千二百舌功德若好若醜若美不美及諸苦澁物在其舌根皆變成上味如天甘露無不美者若以舌根於大眾中有所演說出深妙聲能入其心皆令歡喜快樂又諸天子天女釋梵諸天聞是深妙音聲有所演說言論次第皆悉來聽及諸龍龍女夜叉夜叉女乾闥婆乾闥婆女阿修羅阿修羅女迦樓羅迦樓羅女緊那羅緊那羅女摩睺羅伽摩睺羅伽女為聽法故皆來親近恭敬供養及比丘比丘尼優婆塞優婆夷國王王子羣臣眷屬小轉輪王大轉輪王七寶千子內外眷屬乘其宮殿俱來聽法以是菩薩善說法故婆羅門居士國內人民盡其形壽隨侍供養又諸聲聞辟支佛菩薩諸佛常樂見之是人所在方面諸佛皆向其處說法悉能受持一切佛法又能出於深妙法音爾時世尊欲重宣此義而說偈言是人舌根淨終不受惡味其有所食噉悉皆成甘露以深淨妙聲於大眾說法以諸因緣喻引導眾生心聞者皆歡喜設諸上供養諸天龍夜叉及阿修羅等皆以恭敬心而共來聽法是說法之人若欲以妙音徧滿三千界隨意即能至大小轉輪王及千子眷屬合掌恭敬心常來聽受法諸天龍夜叉羅剎毗舍闍亦以懽喜心常樂來供養梵天王魔王自在大自在如是諸天眾常來至其所諸佛及弟子聞其說法音常念而守護或時為現身四明舌根功德若好下顯知味功德若以下顯說法功德言以一味之法流入眾生之心令生歡喜故悉來聽法也歸宗云諸方有五味禪我這裏只有一味禪深妙聲者即一味禪也又諸下八部聽法供養及此下四眾聽法供養又諸下四聖樂見偈中是人下頌得甘露味以深下頌說一味法僧問烏石山靈觀禪師如何是佛師引舌示之其僧禮拜師曰你見甚麼便禮拜曰謝和尚出示舌相師曰老僧近日舌上生瘡所謂出深淨妙音於大眾說法也復次常精進若善男子善女人受持是經若讀若誦若解說若書寫得八百身功德得清淨身如淨琉璃眾生喜見其身淨故三千大千世界眾生生時死時上下好醜生善處惡處悉於中現及鐵圍山大鐵圍山彌樓山摩訶彌樓山等諸山及其中眾生悉於中現下至阿鼻地獄上至有頂所有及眾生悉於中現若聲聞辟支佛菩薩諸佛說法皆於身中現其色像爾時世尊欲重宣此義而說偈言若持法華者其身甚清淨如彼淨琉璃眾生皆喜見又如淨明鏡悉見諸色像菩薩於淨身皆見世所有唯獨自明了餘人所不見三千世界中一切諸羣萌天人阿修羅地獄鬼畜生如是諸色像皆於身中現諸天等宮殿乃至於有頂鐵圍及彌樓摩訶彌樓山諸大海水等皆於身中現諸佛及聲聞佛子菩薩等若獨若在眾說法悉皆現雖未得無漏法性之妙身以清淨常體一切於中現五明身根功德得清淨身如淨琉璃者即古德云盡大地都盧是一個身內外明徹猶如琉璃一切有情無情六凡四聖現於身中如鏡現像是也偈中唯獨自明了餘人所不見者所謂如魚飲水冷暖自知也清淨常體者赤肉團上即是無位真人所住處也復次常精進若善男子善女人如來滅後受持是經若讀若誦若解說若書寫得千二百意功德以是清淨意根乃至聞一偈一句通達無量無邊之義解是義已能演說一句一偈至於一月四月乃至一歲諸所說法隨其義趣皆與實相不相違背若說俗間經書治世語言資生業等皆順正法三千大千世界六趣眾生心之所行心所動作心所戲論悉皆知之雖未得無漏智慧而其意根清淨如此是人有所思惟籌量言說皆是佛法無不真實亦是先佛經中所說爾時世尊欲重宣此義而說偈言是人意清淨明利無濁穢以此妙意根知上中下法乃至聞一偈通達無量義次第如法說月四月至歲是世界內外一切諸眾生若天龍及人夜叉鬼神等其在六趣中所念若干種持法華之報一時皆悉知十方無數佛百福莊嚴相為眾生說法悉聞能受持思惟無量義說法亦無量終始不忘錯以持法華故悉知諸法相隨義識次第達名字語言如所知演說此人有所說皆是先佛法以演此法故於眾無所畏持法華經者意根淨若斯雖未得無漏先有如是相是人持此經安住希有地為一切眾生歡喜而愛敬能以千萬種善巧之語言分別而說法持法華經故六明意根功德辯才在口達義在心故聞一句而解無盡之義得一義而演無盡之語正如龍王得一滴水便能興雲致雨大經云於一文字語言中演說無邊契經海是也諸所下明其知法治世語言如五經十九史之類資生業等如醫卜雜流之類皆順正法者言合如來正法不相逆也昔盤山寶積禪師因於市肆行見一客買猪肉語屠家曰精底割一斤來屠家放下屠刀叉手曰長史那個不是精的師於此有省如盤山者所謂世諦語言皆合道也三千下明其知機心之所行者行業也心所動作者作念也心所戲論者謂作念將何等語言出諸口也是人下言其舉心動舌皆合如來之道也偈中知上下頌知法也是世下頌知機也十方下聞佛說法受持思惟至於為眾演說皆不錯也以持下出不錯之所以由受持此經故能知法相由知法相故能了義趣由了義趣故能識次第由識次第故能達名言由達名言故能隨機說法由能隨機說法故雖世諦語言皆順正法由順正法故處眾而無畏也安住希有地者謂此能持正法者其所處地位與諸佛菩薩把手共行高出天人之外為一切眾生懽喜愛敬也常不輕品第二十頌曰鑄就金身十丈高心中穩實脚堅牢烈風驟雨難吹灑刀杖何能損一毛前欲會中諸大菩薩聲聞弟子發願持經故如來引自己曾為國王忍苦求法以勵之此欲地涌菩薩發願持經故復引自己初作法師忍辱持經以勵之故有斯品然此品論忍辱則含三忍四樂之行論持經則顯一句全經之益論功德則始得六根清淨終得無上菩提由此一品攝前數品之義又前品明所證此品明能證能證之人名常不輕者由彼尊法重人故不生輕慢由不輕慢故能修忍辱而成菩提也爾時佛告得大勢菩薩摩訶薩汝今當知若比丘比丘尼優婆塞優婆夷持法華經者若有惡口罵詈誹謗獲大罪報如前所說其所得功德如向所說眼耳鼻舌身意清淨得大勢乃往古昔過無量無邊不可思議阿僧祇劫有佛名威音王如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊劫名離衰國名大成其威音王佛於彼世中為天人阿修羅說法為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩因阿耨多羅三藐三菩提說應六波羅蜜法究竟佛慧得大勢是威音王佛壽四十萬億那由它恒河沙劫正法住世劫數如一閻浮提微塵像法住世劫數如四天下微塵其佛饒益眾生已然後滅度正法像法滅盡之後於此國土復有佛出亦號威音王如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊如是次第有二萬億佛皆同一號最初威音王如來既已滅度正法滅後於像法中增上慢比丘有大勢力爾時有一菩薩比丘名常不輕得大勢以何因緣名常不輕是比丘凡有所見若比丘比丘尼優婆塞優婆夷皆悉禮拜讚歎而作是言我深敬汝等不敢輕慢所以者何汝等皆行菩薩道當得作佛而是比丘不專讀誦經典但行禮拜乃至遠見四眾亦復故往禮拜讚歎而作是言我不敢輕於汝等汝等皆當作佛佛次時唐宣宗為沙彌問曰不著佛求不著法求不著僧求長老禮拜當何所求師曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為師便掌彌曰太粗生師曰這裏是甚麼所在說粗說細隨後叉掌又李翱刺史訪藥山山執經卷不顧侍者曰太守在此守性褊急乃曰見面不如聞名拂袖而出山曰太守何得貴耳賤目守曰問云如何是道山以手指上下曰會麼守曰不會山曰雲在青天水在瓶守乃作禮此皆具大法勢力然後能化得大勢之人也爾時下出菩薩之名比丘而行菩薩行故曰菩薩比丘得大下願得名之實以彼凡見四眾皆悉禮拜讚歎敬視如佛故得此不輕名也禮拜者身業也讚歎者口業也深敬者心業也主一無適之謂敬敬而曰深者敬之至也言我心深敬汝等故現之於身發之於口而禮拜而讚歎非是腹誹而口譽內慢而外恭也所以敬汝重汝者以汝等尋常日用折旋俯仰迎賓送客處皆與諸佛菩薩日用所行毫無別異於當來世必得作佛故我敬視如佛而禮拜讚歎也而是下申明禮拜讚歎之意言此比丘不專心讀誦經典唯默默受持一句伽陀修習一句伽陀故遠見四眾禮拜讚歎即以此一句伽陀開導之也古德云步步登高易心心放下難不輕菩薩是真放下身心者也四眾之中有生瞋恚怒心不淨者惡口罵詈言是無智比丘從何所來自言我不輕汝而與我等授記當得作佛我等不用如是虗妄授記如此經歷多年常被罵詈不生瞋恚常作是言汝當作佛說是語時眾人或以杖木瓦石而打頂擲之避走遠住猶高聲唱言我不敢輕於汝等汝等皆當作佛以其常作是語故增上慢比丘比丘尼優婆塞優婆夷號之為常不輕此四眾瞋罵也言以平等佛慧授之而彼反以為無智以真實事告之而彼反以為虗妄以禮拜讚歎而進之而彼反生瞋恚加罵詈所謂夜光投人鮮不按劍豈止聞而不信稱怨大喚者哉多年罵詈不生瞋恚者謂菩薩工夫純熟故彼雖詈我我自尊之彼雖辱我我自敬之常不離此一句伽陀亦常以此一句伽陀教人也昔普化禪師凡見人無高下皆振鐸一聲或將鐸就人耳邊振之或拊其背有回顧者即展手曰乞我一文錢此亦以一句伽陀導人也眾人聞此益增其怒更加杖木瓦石者所謂卞和三獻未免遭刑也避走遠住猶高聲唱者彼以瞋來我以慈應自非行三忍具四樂得大法勢者不能也又寒山因眾僧炙茄次山將茄串向一僧背上打一下僧回首山呈起茄曰是甚麼僧曰者風顛漢山謂傍僧曰你道這僧費却多少鹽醬又國清寺半月念戒眾集拾得拍手曰聚頭作想那事如何維那叱之得曰大德無瞋即是戒心淨即出家我性與汝合一切法無差所謂瞋來慈應也以其下出其得名之故言我等比丘常常侮慢彼彼則未嘗輕慢我故四眾目之為常不輕此亦是描寫增上慢比丘得大勢而倨傲之狀不輕能行忍辱全在深敬二字上若敬之不深不能視之如佛安能受其罵詈杖木瓦石哉語云出門如見大賓使民如承大祭曲禮云無不敬敬之一字是常不輕入道之基也雖然若使四眾之中有最上根如德山臨濟雲門丹霞輩流在則常不輕瑣瑣授記亦未免親遭瞋舉毒罵耳是比丘臨欲終時於虗空中具聞威音王佛先所說法華經二十千萬億偈悉能受持即得如上眼根清淨耳鼻舌身意根清淨得是六根清淨已更增壽命二百萬億那由他歲廣為人說是法華經於時增上慢四眾比丘比丘尼優婆塞優婆夷輕賤是人為作不輕名者見其得大神通力樂說辯力大善寂力聞其所說皆信伏隨從是菩薩復化千萬億眾令住阿耨多羅三藐三菩提命終之後得值二千億佛皆號日月燈明於其法中說是法華經以是因緣復值二千億佛同號雲自在燈王於此諸佛法中受持讀誦為諸四眾說此經典故得是常眼清淨耳鼻舌身意諸根清淨於四眾中說法心無所畏得大勢是常不輕菩薩摩訶薩供養如是若干諸佛恭敬尊重讚歎種諸善根於後復值千萬億佛亦於諸佛法中說是經典功德成就當得作佛得大勢於意云何爾時常不輕菩薩豈異人乎則我身是若我於宿世不受持讀誦此經為他人說者不能疾得阿耨多羅三藐三菩提我於先佛所受持讀誦此經為人說故疾得阿耨多羅三藐三菩提得大勢彼時四眾比丘比丘尼優婆塞優婆夷以瞋恚意輕賤我故二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱畢是罪已復遇常不輕菩薩教化阿耨多羅三藐三菩提得大勢於汝意云何爾時四眾常輕是菩薩者豈異人乎今此會中䟦陀婆羅等五百菩薩師子月等五百比丘尼思佛等五百優婆塞皆於阿耨多羅三藐三菩提不退轉者是得大勢當知是法華經大饒益諸菩薩摩訶薩能令至於阿耨多羅三藐三菩提是故諸菩薩摩訶薩於如來滅後常應受持讀誦解說書寫是經此言不輕現世獲益也言此比丘尋常但行禮拜不專讀誦昔所聞經遂至廢忘故臨終時具聞此經悉得受持由受持故即得六根清淨更增壽命也廣為人說者前則授人一句伽陀此則授人全經故廣演分別也於時下四眾回心得大神力者如六根清淨徧十方界是也樂說辨才者即廣演分別妙法華經是也大善寂力者即罵詈毀辱皆悉不動是也故始聞而加辱今則信順調伏矣始聞之而即去今則如影隨形矣是菩下既化四眾復化其餘以見法化之廣也命終下後世獲益化城品云如來在大通智勝佛時作菩薩沙彌說法華經此言在日月燈時作菩薩比丘說法華經足見然燈授記作佛皆是方便也心無所畏是六根清淨之根本故拈出照應得大下從因得果功德成就當作佛者出持此經行法師事至於功成行滿方證法王也得大下結顯自己成佛皆是初作法師持法華之力也已上證不輕持經獲益竟彼時下復證謗經獲罪也以瞋下謂四眾以瞋恚心輕賤我故常不值三寶常於三塗受苦罪畢復遇不輕者以謗法因緣復與菩薩共生一處引入菩提問信佛則與菩薩共生一處得沾法利固矣何故謗佛亦得共生一處獲沾法利答罵藥服之愈疾罵沉燒之得香故䟦陀等罵常不輕千劫於阿鼻受苦罪畢之後復遇不輕皆菩薩悲心所被也故不輕之名起自罵詈之日罵尚得益況敬信乎得大下總結讚謗獲益言大饒益者輕與不輕平等無二讚歎者已得大果即毀罵者當來亦得作佛故云聞而不信尚結佛果之因學而未成永異人天之福然則為比丘者不專心受持此經空消白日果何謂乎爾時世尊欲重宣此義而說偈言過去有佛號威音王神智無量將導一切天人龍神所共供養是佛滅後法欲盡時有一菩薩名常不輕時諸四眾計著於法不輕菩薩往到其所而語之言我不輕汝汝等行道皆當作佛諸人聞已輕毀罵詈不輕菩薩能忍受之其罪畢已臨命終時得聞此經六根清淨神通力故增益壽命復為諸人廣說是經諸著法眾皆蒙菩薩教化成就令住佛道不輕命終值無數佛說是經故得無量福漸具功德疾成佛道彼時不輕則我身是時四部眾著法之者聞不輕言汝當作佛以是因緣值無數佛此會菩薩五百之眾并及四眾清信士女今於我前聽法者是我於前世勸是諸人聽受斯經第一之法聞示教人令住涅槃世世受持如是經典億億萬劫至不可議時乃得聞是法華經億億萬劫至不可議諸佛世尊時說是經是故行者於佛滅後聞如是經勿生疑惑應當一心廣說此經世世值佛疾成佛道計著於法者言四眾計著法相不達佛性故菩薩以佛性徧告之也諸人下方木不入圓竅故四眾罵詈也其罪畢已一句准長行當在諸著法眾下臨命下七句頌現世獲益諸著下五句頌四眾回心不輕下頌後世獲益時四下四眾得益以是因緣者正指四眾昔聞菩薩汝當作佛之語雖驟加罵詈然畢竟藉此一句伽陀開熏因緣之力故後世得值無數佛古人謂之金剛種子信哉我於下言我宿世勸人聽受此經又以此經開示大眾又肯世世生生受持此經者難值遇故以過億億萬劫得聞此經以過億億萬劫值佛出世得說此經如此經者大不容易是故行者於佛滅後當一心廣說此經勿得更生疑惑果能廣說此經則值佛不難成佛亦不遠矣如來神力品第二十一頌云可憐日用自勞勞神力何曾減一毫腰胯虱行肩背癢便知將手去摩搔自持品最初二萬菩薩發願此界持經其次五百羅漢學無學比丘八千人學無學比丘尼六千人皆發願異國持經其次八十萬億那由他菩薩發願十方世尊往返持經蓋發願娑婆者則太狹發願十方者則太寬皆不愜如來本意故招下方菩薩從地涌出住在虗空如來則以五種較量顯持經之勝又以六根清淨功德顯法師之勝又以不輕菩薩顯得益之勝然後地涌菩薩發願釋迦分身國土持經諸佛歡喜同時將此一卷大經徧空徧界顯說密說橫說竪說使一切眾生見者聞者大喜徧身然後付囑故有斯品爾時千世界微塵等菩薩摩訶薩從地涌出者皆於佛前一心合掌瞻仰尊顏而白佛言世尊我等於佛滅後世尊分身所在國土滅度之處當廣說此經所以者何我等亦自欲得是真淨大法受持讀誦解說書寫而供養之此地涌菩薩發願釋迦分身國土持經言世尊往昔既能忍苦受持此經行法師事得證菩提我等亦欲得是真淨大法當不憚疲勞亦能忍苦行法師事於釋迦分身國土廣說此經無復疑慮矣爾時世尊於文殊師利等無量百千萬億舊住娑婆世界菩薩摩訶薩及諸比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切眾前現大神力出廣長舌上至梵世一切毛孔放於無量無數色光皆悉徧照十方世界眾寶樹下師子座上諸佛亦復如是出廣長舌放無量光釋迦牟尼佛及寶樹下諸佛現神力時滿百千歲然後還攝舌相一時謦請欬慨俱共彈指是二音聲徧至十方諸佛世界地皆六種震動其中眾生天龍夜叉乾闥婆阿修羅伽樓羅緊那羅摩睺羅伽人非人等以佛神力故皆見此娑婆世界無量無邊百千萬億眾寶樹下師子座上諸佛及見釋迦牟尼佛共多寶如來在寶塔中坐師子座又見無量無邊百千萬億菩薩摩訶薩及諸四眾恭敬圍繞釋迦牟尼佛既見是已皆大歡喜得未曾有此現光瑞以示全經也如來許多心事無非欲人持此大經故一聞地涌菩薩發願持經心事已畢諸佛歡喜故先示舌相次示光相也示廣長舌者見此經非三寸舌可得宣揚也示毛孔無量無數色光者又見如來渾身是個大光明藏不止光明在一毛端也思益經云如來身者即無量光明之藏是也光光徧照十方世界者又顯盡十方界總是一個大光明藏無處不徧無物不在不止一國一世界也分身諸佛同現舌相光相者正顯佛佛舌相光相悉皆平等一切佛各放一切毛孔光一切毛孔光各各徧照一切佛佛佛互見光光交羅圓融普徧各示全經覺場所證證此而已靈山所說說此而已諸佛授記授此而已祖師密傳傳此而已初中後善善此而已故世尊始以一光為無量發其始末以無量為一光結其終也諸佛下攝舌相而謦欬彈指也是二音聲遍至十方地皆震動者正顯諸佛無言之教萬象皆說也如來為此無量光無量音四十餘年忍而不發至乎靈山會上以三周九喻漸漸發明雖則承當尚存畏怯猶未盡善如來之心猶未痛快今得地涌菩薩發願持經一肩擔荷諸佛懽喜故以放光吐舌示其相復以謦欬彈指發其音則知如來渾身是口徧界是經以如是口說如是經諸佛說法如斯而已其中下大眾得益既見諸佛所證無量又見諸佛所化無量昔所未見者今已盡見故大喜各各充徧也即時諸天於虗空中高聲唱言過此無量無邊百千萬億阿僧祗世界有國名娑婆是中有佛名釋迦牟尼今為諸菩薩摩訶薩說大乘經名妙法蓮華教菩薩法佛所護念汝等當深心隨喜亦當禮拜供養釋迦牟尼佛彼諸眾生聞虗空中聲已合掌向娑婆世界作如是言南無釋迦牟尼佛南無釋迦牟尼佛以種種華香瓔珞旛蓋及諸嚴身之具珍寶妙物皆共遙散娑婆世界所散諸物從十方來譬如雲集變成寶帳徧覆此間諸佛之上於時十方世界通達無礙如一佛土爾時佛告上行等菩薩大眾諸佛神力如是無量無邊不可思議若我以是神力於無量無邊百千萬億阿僧祗劫為囑累故說此經功德猶不能盡以要言之如來一切所有之物如來一切自在神力如來一切秘要之藏如來一切甚深之事皆於此經宣示顯說是故汝等於如來滅後應一心受持讀誦解說書寫如說修行所在國土若有受持讀誦解說書寫如說修行若經卷所住之處若於園中若於林中若於樹下若於僧坊若白衣舍若在殿堂若山谷曠野是中皆應起塔供養所以者何當知是處即是道場諸佛於此得阿耨多羅三藐三菩提諸佛於此轉於法輪諸佛於此而般涅槃先諸天高唱今為菩薩說大乘者此是領會世尊吐舌放光彈指謦欬皆是說經恐人不知故為大眾旁通也彼諸下聞唱歸依以種下遙伸供養諸物變帳覆諸佛者合眾物而成一也十方世界通為一土者合眾界而為一也至此則一卷大經普覆世界徹上徹下法王法師皆已有在故下復讚歎叮嚀令其一心受持也爾時下益顯其勝言十方分身諸佛所現神力雖然如是不可思議若我今日為囑累此經故總將十方諸佛彈指謦欬廣長舌相遍身遍界一切光明於無量劫讚揚受持此經功德猶不能盡何以故如來一切所有之法此經無不具故以有無量法財資給一切取之無禁用之不竭故如來自在神力此經無不顯發故如云過去現在乃至窮未來際為度眾生無有懈倦等如來秘密之藏此經盡能開示故如云出家成道轉法輪入涅槃皆是方便等又以一音密闡普令一切漸入佛道等如來一切甚深之事此經悉其底蘊故如集分身化地涌菩薩騰疑二乘罔測等皆於此經宣示顯說者言如上自在秘要甚深之法皆不離目前一卷大經昔未宣揚者未呈示者半明半暗未曾顯說者今皆在吐舌放光彈指謦欬中徹底掀翻更無餘蘊是故應當一心受持此經乃至如說而修行此經莫生他念也所在下囑興供養當知是處即是道場者謂如來成佛之處不離此經也以諸佛藉此經而得菩提藉此經而轉法輪藉此經而入涅槃故知諸佛出世始終全為此卷大經故曰唯以一大事因緣出現於世也爾時世尊欲重宣此義而說偈言諸佛救世者住於大神通為悅眾生故現無量神力舌相至梵天身放無數光為求佛道者現此希有事諸佛謦請欬慨聲及彈指之聲周聞十方國地皆六種動以佛滅度後能持此經故諸佛皆懽喜現無量神力囑累是經故讚美受持者於無量劫中猶故不能盡是人之功德無邊無有窮如十方虗空不可得邊際能持是經者則為已見我亦見多寶佛及諸分身者又見我今日教化諸菩薩能持是經者令我及分身滅度多寶佛一切皆懽喜十方現在佛并過去未來亦見亦供養亦令得懽喜諸佛坐道場所得秘背密法能持是經者不久亦當得能持是經者於諸法之義名字及言辭樂說無窮盡如風於空中一切無障礙於如來滅後知佛所說經因緣及次第隨義如實說如日月光明能除諸幽冥斯人行世間能滅眾生闇教無量菩薩畢竟住一乘是故有智者聞此功德利於我滅度後應受持斯經是人於佛道決定無有疑初四句總頌五種神力舌相下四句別頌吐舌放光是為求佛道者現知佛不離此身也諸佛下八句別頌謦欬彈指地動是為持經者現知此經周徧一切也囑累下八句正言徧界是舌通身是口亦不能盡讚持經功德以持經人功德無際故能持下正顯持經功德言持經者親見靈山一會持經者諸佛悉皆歡喜持經者亦見佛亦供養佛亦得諸佛之歡喜持經者不久亦當作佛持經者即與九地已上菩薩等諸法者法無礙也義者義無礙也名字言辭者辭無礙也樂說者樂說無礙也如風二句喻四無礙也所說經者即十二部如因緣譬喻祇夜等也隨義如實說者依義不依文也如日下喻明隨義說經能破昏暗住一乘也是故下結勸受持囑累品第二十二頌云現成公案大家擔何必叮嚀至再三說到盡情還有說定須親手摘紅柑由前地涌菩薩發願持經如來現無量神力以應之令生歡喜然後付囑故有此品也言囑累者謂將此法付囑於汝累汝宣傳也古德云你若不是此等人自然不來殃及你之意又囑者是如來金口付囑令彼流通累者令菩薩懸係於心永無忘失也問作佛則曰授記持經則曰囑累者何也答正顯作佛難而持經為法即者尤不易也作佛是戴冕旒垂衣裳登九五位時作法師是冐鋒鏑親矢石定天下時也蓋闢土開疆經無量時受無量累然後大業成就方登寶位故知作法師者難於作佛也故欲其紹法王位則曰授記令其行法師事則曰囑累也春秋以一字定褒貶法華以二字定君師故如來先以法王之記授弟子後以法師之累囑菩薩則如來望於法師者重矣居此位者寧不自重而自輕也噫爾時釋迦牟尼佛從法座起現大神力以右手摩無量菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祗劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等應當一心流布此法廣令增益如是三摩諸菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祗劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等當受持讀誦廣宣此法令一切眾生普得聞知所以者何如來有大慈悲無諸慳悋亦無所畏能與眾生佛之智慧如來智慧自然智慧如來是一切眾生之大施主汝等亦應隨學如來之法勿生慳悋於未來世若有善男子善女人信如來智慧者當為演說此法華經使得聞知為令其人得佛慧故若有眾生不信受者當於如來餘深法中示教利喜汝等若能如是則為已報諸佛之恩時諸菩薩摩訶薩聞佛作是說已皆大歡喜徧滿其身益加恭敬曲躬低頭合掌向佛俱發聲言如世尊勅當具奉行唯然世尊願不有慮諸菩薩摩訶薩眾如是三反俱發聲言如世尊勅當具奉行唯然世尊願不有慮爾時釋迦牟尼佛令十方來諸分身佛各還本土而作是言諸佛各隨所安多寶佛塔還可如故說是語時十方無量分身諸佛坐寶樹下師子座上者及多寶佛并上行等無邊阿僧祗菩薩大眾舍利弗等聲聞四眾及一切世間天人阿修羅等聞佛所說皆大歡喜此摩頂付囑也從法座起者是從多寶塔中法座起也右手摩頂者欲以頂法付囑之故先出長臂以摩頂也此與文殊伸長臂摩善財頂同意而作下付囑之辭令其開拓家業也雖得菩提法者言此法人天不得外道不得聲聞不得緣覺不得十地乃至等覺菩薩皆不能得唯佛獨得故曰難得法今以此法囑累汝等則是汝等所有應當一心流通分布展轉授人廣令增益無令斷絕此是如來以千斤擔子交卸諸大菩薩也如是下再三叮嚀也所以下勉其勿悋勿畏勿悋者凡所有者皆當與勿有所悋惜也勿畏者凡所與者皆當盡勿畏其窮匱也佛之智慧者隨機說法覺悟眾生是化佛智如來智慧者從如實道來成正覺是報佛智自然智慧者本來自有不假修成是法佛智也如來既為一切眾生作大施主今將此法施與眾生汝等亦應取法如來亦當以此法平等施人勿生悋惜於未下出勿恡之意正言信與不信皆當授與信者即利根上智一聞即入者固當直授不信者即鈍根小智不肯承當者雖不直授亦當以方便善巧引入餘深法中示教利喜令彼漸得此經汝等若能如是平等說法是則名為報佛恩德矣時諸下菩薩奉行如是三反者答三摩頂之意爾時下佛事已畢故勅分身各還本土復留多寶者尚有菩薩求見故說是下普會共喜藥王本事品第二十三頌云膏肓有病最難調烈火光中立地銷渣滓皮毛皆煅盡當胸一點不曾燒自前文為國王時身為牀座為不輕時常行忍辱皆是如來自談本事以證由持經而得菩提此下六品俱說菩薩本事皆是堅持經者之信心令其倣效也言本事者謂其植眾德本行法師事經無量劫不止一劫二劫而已也先說藥王本事者以藥王為法亡身是真能著忍辱衣真能行精進真能作法供養者故先及之若以事言此菩薩昔名星光從尊者日藏聞說佛慧以雪山上藥供養眾僧願我未來能治眾生身心之病舉世歡喜號曰藥王若以理言此法華經便是藥王能空二執便是治病爾時宿王華菩薩白佛言世尊藥王菩薩云何遊於娑婆世界世尊是藥王菩薩有若干百千萬億那由他難行苦行幸善哉世尊願少解說諸天龍神夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等又他國土諸來菩薩及此聲聞眾聞皆懽喜爾時佛告宿王華菩薩乃往過去無量恒河沙劫有佛號日月淨明德如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊其佛有八十億大菩薩摩訶薩七十二恒河沙大聲聞眾佛壽四萬二千劫菩薩壽命亦等彼國無有女人地獄餓鬼畜生阿修羅等及以諸難地平如掌瑠璃所成寶樹莊嚴寶帳覆上垂寶華旛寶瓶香鑪周遍國界七寶為臺一樹一臺其樹去臺盡一節道此諸寶樹皆有菩薩聲聞而坐其下諸寶臺上各有百億諸天作天伎樂歌歎於佛以為供養爾時彼佛為一切眾生喜見菩薩及眾菩薩諸聲聞眾說法華經是一切眾生喜見菩薩樂習苦行於日月淨明德佛法中精進經行一心求佛滿萬二千歲已得現一切色身三昧得此三昧已心大歡喜即作念言我得現一切色身三昧皆是得聞法華經力我今當供養日月淨明德佛及法華經即時入是三昧於虗空中雨曼陀羅華摩訶曼陀羅華細末堅黑栴檀滿虗空中如雲而下又雨海此岸栴檀之香此香六銖價值娑婆世界以供養佛作是供養已從三昧起而自念言我雖以神力供養於佛不如以身供養即服諸香栴檀薰陸兜樓婆畢力迦沉水膠香又飲薝蔔諸華香油滿千二百歲已香油塗身於日月淨明德佛前以天寶衣而自纏身灌諸香油以神通力願而自然身光明遍照八十億恒河沙世界其中諸佛同時讚言善哉善哉善男子是真精進是名真法供養如來若以華香瓔珞燒香末香塗香天繒幡蓋及海此岸栴檀之香如是等種種諸物供養所不能及假使國城妻子布施亦所不及善男子是名第一之施於諸施中最尊最上以法供養諸如來故作是語已而各默然其身火然千二百歲過是已後其身乃盡欲明菩薩本事宿昔因華故假宿王華發問爾時下正答先明古佛劫國莊嚴爾時下次明古佛為喜見說法華經名喜見者因聞妙法故眾生喜見不有妙法薰心則語言無味面貌可憎何喜見之有是一下喜見獲益樂習苦行者忍所難忍行所難行也精進經行者晝三夜三孜孜不怠也一心求佛者凝神定志心無雜用也滿萬二千歲者違現業而根塵清淨也三昧名現一切色身者隨眾生喜見之身即能現此身也得此下知恩思報也即時下先雨華香供養旃檀有黑白二種若燒白旃檀眾欲清涼若黑旃檀其價甚貴若燒一銖普熏小千世界故有六銖則三千大千世界珍寶價直所不能及也作是下次以身供養言我雖以神力雨華雨香作世間供養不如將此全身一卷大經作法供養也薰陸乳香也兜樓婆草香也畢力迦丁香也沉水香出阿耨達池邊若燒一丸如麻子大其香熏閻浮世界膠香松香也服香飲香油亦滿千二百歲者使法身智慧等香滲於肌骨浹於四肢然後著忍辱衣以神通願力之火而自然身故光明徧照八十億恒河沙世界古德所謂十二處忘閑影響三千界放淨光明是也捨身命處正是轉藏識時能捨藏識則無我相故但知一心求佛不見有精進相但知渾身是法不見有身心相故但佛讚云是真精進是名真法供養如來雖然如是藥王焚身時覺痛不覺痛若覺痛同於凡夫若不覺痛同於草木且道正當是時藥王在甚麼處若以下正顯真法供養超過一切假法供養也國城雖重好名者能讓妻子雖親重義者能捨故所愛者唯有此身今亦為法而捨豈非第一之施豈非真法供養哉其身火然千二百歲過是已後其身乃盡者謂以神通願力之火在六根門頭鎔鑄鍛鍊我相方盡前云一心求佛萬二千歲次又服香油滿千二百歲其身火然千二百歲照應一切眾生喜見菩薩作如是法供養已命終之後復生日月淨明德佛國中於淨德王家結加趺坐忽然化生即為其父而說偈言大王今當知我經行彼處即時得一切現諸身三昧勤行大精進捨所愛之身說是偈已而白父言日月淨明德佛今故現在我先供養佛已得解一切眾生語言陀羅尼復聞是法華經八百千萬億那由他甄真迦羅頻婆羅阿閦初婆等偈大王我今當還供養此佛白已即坐七寶之臺上升虗空高七多羅樹往到佛所頭面禮足合十指爪以偈讚曰容顏甚奇妙光明照十方我適曾供養今復還親覲爾時一切眾生喜見菩薩說是偈已而白佛言世尊世尊猶故在世爾時日月淨明德佛告一切眾生喜見菩薩善男子我涅槃時到滅盡時至汝可安施牀坐我於今夜當般涅槃又勅一切眾生喜見菩薩善男子我以佛法囑累於汝及諸菩薩大弟子并阿耨多羅三藐三菩提法亦以三千大千七寶世界諸寶樹寶臺及給侍諸天悉付與汝我滅度後所有舍利亦付囑汝當令流布廣設供養應起若干千塔如是日月淨明德佛勅一切眾生喜見菩薩已於夜後分入於涅槃喜見生於日月淨明德佛國中命終復生淨德王家正顯始終不離淨德也偈中我經行彼處等正指日月淨明處修行得益也得解一切語言陀羅尼者由得現一切色身三昧又得解一切語言陀羅尼故能隨類現身隨機說法也大王下本願未盡重思興供也偈中我適曾供養長行云世尊猶故在世皆是顯再來之意爾時下如來唱滅又勅下交付王家我滅下又以身後之事囑之如是下入滅爾時一切眾生喜見菩薩見佛滅度悲感懊惱戀慕於佛即以海此岸旃檀為𧂐供養佛身而以燒之火滅已後收取舍利作八萬四千寶瓶以起八萬四千塔高三世界表剎莊嚴垂諸幡蓋懸眾寶鈴爾時一切眾生喜見菩薩復自念言我雖作是供養心猶未足我今更當供養舍利便語諸菩薩大弟子及天龍夜叉等一切大眾汝等當一心念我今供養日月淨明德佛舍利作是語已即於八萬四千塔前然百福莊嚴臂七萬二千歲而以供養令無數求聲聞眾無量阿僧祗人發阿耨多羅三藐三菩提心皆使得住現一切色身三昧爾時諸菩薩天人阿修羅等見其無臂憂惱悲哀而作是言此一切眾生喜見菩薩是我等師教化我者而今燒臂身不具足於時一切眾生喜見菩薩於大眾中立此誓言我捨兩臂必當得佛金色之身若實不虗令我兩臂還復如故作是誓已自然還復由斯菩薩福德智慧淳厚所致當爾之時三千大千世界六種震動天雨寶華一切人天得未曾有佛告宿王華菩薩於汝意云何一切眾生喜見菩薩豈異人乎今藥王菩薩是也其所捨身布施如是無量百千萬億那由他數宿王華若有發心欲得阿耨多羅三藐三菩提者能然手指乃至足一指供養佛塔勝以國城妻子及三千大千國土山林河池諸珍寶物而供養者此重興供養也旃檀為𧂐為梵身之具此古佛所傳茶毗法也火滅下不忘付囑造塔思供也爾時下然臂供塔問何故先以身供佛次以臂供塔答千二百歲然身供佛者空我執也我執粗顯故先捨供佛七萬二千歲然臂供塔者空法執也法執微細故後捨我執粗顯前七俱有故曰身法執微細唯六七有故曰兩臂令無下大眾獲益爾時下弟子悲哀於時下喜見立誓捨臂得佛者言捨法執而必得佛果也作誓還復者又見菩薩法執既空皆隨願力轉也福慧淳厚所致者反顯福慧淺劣者不能隨心轉移也佛告下援古證今其所下應前文百千萬億那由他難行苦行反顯今所說者大海一滴釋迦宿昔為大威光太子時精勤供養過去無量諸佛故速證菩提今藥王能捨身捨臂供佛其為逆流菩薩可知要知捨身捨臂非真得法忍者不能也故世尊特表出之宿王下勸人然指若果有發心求菩提者即不能如藥王然身煅臂即能然一指供塔亦勝一切珍寶供養何以故世間可愛者莫貴乎身故有拔一毛而利天下者尚不肯為況肯然一指乎然必真見其所以貴真知此身之不足貴而欲可不然徒增痛苦何益哉然末世有藉然指以要譽者其顛倒不已甚乎若復有人以七寶滿三千大千世界供養於佛及大菩薩辟支佛阿羅漢是人所得功德不及受持此法華經乃至一四句偈其福最多宿王華譬如一切川流江河諸水之中海為第一此法華經亦復如是於諸如來所說經中最為深大又如土山黑山小鐵圍山大鐵圍山及十寶山眾山之中須彌山為第一此法華經亦復如是於諸經中最為其上又如眾星之中月天子最為第一此法華經亦復如是於千萬億種諸經法中最為照明又如日天子能除諸闇此經亦復如是能破一切不善之暗又如諸小王中轉輪聖王最為第一此經亦復如是於眾經中最為其尊又如帝釋於三十三天中王此經亦復如是諸經中王又如大梵天王一切眾生之父此經亦復如是一切賢聖學無學及發菩薩心者之父又如一切凡夫人中須陀洹斯陀含阿那含阿羅漢辟支佛為第一此經亦復如是一切如來所說若菩薩所說若聲聞所說諸經法中最為第一有能受持是經典者亦復如是於一切眾生中亦為第一一切聲聞辟支佛中菩薩為第一此經亦復如是於一切諸經法中最為第一如佛為諸法王此經亦復如是諸經中王宿王華此經能救一切眾生者此經能令一切眾生離諸苦惱此經能大饒益一切眾生充滿其願如清涼池能滿一切諸渴乏者如寒者得火如躶者得衣如商人得主如子得母如渡得船如病得醫如闇得燈如貧得寶如民得王如客賈得海如炬除闇此法華經亦復如是能令眾生離一切苦一切病痛能解一切生死之縛若人得聞此法華經若自書若使人書所得功德以佛智慧籌量多少不得其邊若書是經卷華香瓔珞燒香末香塗香幡蓋衣服種種之燈酥燈油燈諸香油燈簷蔔油燈須曼那油燈波羅羅油燈婆利師迦油燈那婆摩利油燈供養所得功德亦復無量上言身臂供佛功德已超一切世間供養此下復言剎寶布施不如持經功德故引喻廣明先以海山日月喻此經是法性海最廣最深故此經是功德山唯高唯聳故此經是圓滿月顯說眾生即心即佛故此經是智慧日能破三毒煩惱黑闇故又如下次以三界世主喻轉輪聖王為人王中極貴衣被粟散此經是輪王髻珠在在稱尊故帝釋為欲界極尊統攝地居此經是秘密藏統攝群經故如大梵天能為人種此經為一切聖賢之父以一切聖賢皆從此經流出故又如下以出世聖賢喻辟支為四果之首此經是最勝法首出諸法故菩薩為二乘之首此經是教菩薩法不共二乘故如佛為法王此經在諸乘中是最上乘故宿王下又以世間極要切者喻此經具大智慧力故能救眾生此經具大寂滅樂故能離苦惱此經是無盡藏故能饒益一切眾生此經如清涼池令渴乏者皆得甘露醍醐上味徧體清凉故此經如火能令寒灰枯木者發智慧𦦨故此經如衣能令無功德莊嚴者著如來衣故此經如主能令青天白日弄精魂者識真主故此經如母能令弱喪他鄉不知歸者得慈母故此經如船能載眾生到彼岸故此經如醫能療眾生身心病故此經如燈能破生死長夜黑闇故此經如寶能令窮子所須如意故此經如王生死苦中得附大願王故此經如海煩惱海中得大智寶故此經如炬慧燄一發無明頓盡故離一切苦者五衰八苦也一切病痛身心二病也一切生死縛分段變易一生死也已上雖說種種譬喻以明此法然畢竟比類不及故大經云佛子如來以一切譬喻說種種事無有譬喻能喻此法何以故心智路絕不思議故古德所云向上一路千聖不傳學者勞形如猿捉影亦是此意若人下顯書經功德若論書經功德即以佛之智慧籌度思量尚不能知其邊際況其他乎若書下又顯書此經而以種種供養所得功德亦無有量婆利師迦此云夏生華那婆此云雜華摩利即末利也宿王華若有人聞是藥王菩薩本事品者亦得無量無邊功德若有女人聞是藥王菩薩本事品能受持者盡是女身後不復受若如來滅後後五百歲中若有女人聞是經典如說修行於此命終即往安樂世界阿彌陀佛大菩薩眾圍繞住處生蓮華中寶座之上不復為貪欲所惱亦復不為瞋恚愚癡所惱亦復不為憍慢嫉妬諸垢所惱得菩薩神通無生法忍得是忍已眼根清淨以是清淨眼根見七百萬二千億那由他恒河沙等諸佛如來是時諸佛遙共讚言善哉善哉善男子汝能於釋迦牟尼佛法中受持讀誦思惟是經為他人說所得福德無量無邊火不能焚水不能漂汝之功德千佛共說不能令盡汝今已能破諸魔賊壞生死軍諸餘怨敵皆悉摧滅善男子百千諸佛以神通力共守護汝於一切世間天人之中無如汝者唯除如來其諸聲聞辟支佛乃至菩薩智慧禪定無有與汝等者宿王華此菩薩成就如是功德智慧之力若有人聞是藥王菩薩本事品能隨喜讚善者是人現世口中常出青蓮華香身毛孔中常出牛頭旃檀之香所得功德如上所說是故宿王華以此藥王菩薩本事品囑累於汝我滅度後後五百歲中廣宣流布於閻浮提無令斷絕惡魔魔民諸天龍夜叉鳩槃茶等得其便也宿王華汝當以神通之力守護是經所以者何此經則為閻浮提人病之良藥若人有病得聞是經病即消滅不老不死宿王華汝若見有受持是經者應以青蓮華盛滿末香供散其上散已作是念言此人不久必當取草坐於道場破諸魔軍當吹法螺擊大法鼓度脫一切眾生老病死海是故求佛道者見有受持是經典人應當如是生恭敬心說是藥王菩薩本事品時八萬四千菩薩得解一切眾生語言陀羅尼多寶如來於寶塔中讚宿王華菩薩言善哉善哉宿王華汝成就不可思議功德乃能問釋迦牟尼佛如此之事利益無量一切眾生上明受持書寫供養全經功德此又獨顯聞持一品功德亦無有量以此一品亦該攝全經故不但一品該攝全經即藥王二字亦該攝全經故若有下復顯女人現世受持此品功德也盡是女人不復受者以女人兒女情多偏生愛著故聞藥王之風者即得轉女成男具丈夫相何以故以捨身捨臂非空我空法之大丈夫不能為故若如下又顯末世修行此經功德也命終生極樂者能捨娑婆極愛之物極愛之身故不為根隨煩惱所動而得菩薩遊戲神通又得菩薩無生法忍又得眼根清淨以是下亦是表斷七識俱生我法二執故得見諸佛而諸佛遙興讚歎言汝在釋迦會中受持此經為他人說所得功德無有限量究竟堅固不可破壞非如昔日所作有為功德水火可爛壞也何以故已能破五陰魔殺煩惱賊故又云由汝受持此經不但諸天護汝即諸佛亦共護汝以此法是諸佛護念故以汝已能成就如來大功德智慧故一切天人不及故一切賢聖不及故若有下又明聞此品而隨喜讚善功德也口中出香毛孔生香以得如來五分法身香故是故下囑累宿王先以一品囑累宿王下次以全經囑累宿王下又以持經人囑累說是下聞經獲益得解一切語言陀羅尼者得藥王之所得也多寶讚宿王者嘉其善問利益甚多也
