body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋方便品第二頌云何事收光後雄談八部前欲將如意寶換過止啼錢一衆生疑網其誰脫瘴煙虗空忽落地處處露青天上品放光是無言之方便此品借言説以發明無言之方便是以方便解方便故直曰方便是法不可示言詞相寂滅是不可以言語形容矣是法非思量分別之所能解是不可以識心推度矣既不可以言語形容不可以識心推度隨其意而安名立號曲解之曰佛乘佛知見非方便而何故對未開佛知見未入一佛乘者言是一佛乘者真實也非方便也若對一亦不立佛之一字亦不喜聞者言是一佛乘者方便也非真實也是知昔日分一為三固是方便今日會三為一是以方便去方便亦方便也所謂以楔出楔以言遣言也信乎一佛乘佛知見亦方便也故知諸佛智慧甚深無量不可以限量心執之若執今日一佛乘為實是何異乎執昔日之三乘也如是則不獨一品名方便即全經二十八品皆方便也不獨此經為方便四十九年所説三藏十二部一切修多羅皆方便也又不獨一切修多羅是方便即放光動地雨華香雲無非方便皆是筌諦昔唐宣宗問弘辨禪師云何等名為方便對曰方便者隱實覆相權巧之門被接中下曲施誘迪謂之方便設為上根言捨方便但説無上道者斯亦是方便之談乃至祖師忘功罷業亦不出方便之迹所以云聲前薦得分明過新羅句外承當已是不快漆桶待汝開口動舌堪作甚麼故下文云吾當為汝分別解説為汝二字即是不獲已而隨他意語也長沙示衆云我若一向舉揚宗教法堂前草深一丈事不獲已向汝諸人道盡十方世界是沙門一隻眼盡十方世界是沙門全身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我常向汝諸人道三世諸佛法界衆生是摩訶般若光光未發時汝等諸人向甚麼處委悉光未發時尚無佛無衆生何處得有山河國土來然則何者是真實義待案山子點頭即向汝道爾時世尊從三昧安詳而起告舍利弗諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知此下總歎實智權智楞伽所謂宗通説通也昔范增愛項羽增勸項羽殺沛公因鴻門設宴座中數舉所佩玉玦以示羽者三項羽默然不應世尊知二乘人守一解脫義故先説無量義經以撼之此以口示玦也又知彼住滅盡定世尊次以無量義定以示之此以身示玦也又知彼居五陰界世尊放白毫光以警之此以心示玦也奈二乘之不應何古德云盡大地是個大解脫門把手牽伊不肯入奈何故世尊忍俊不禁從三昧出托諸佛以賣弄自己神通故云諸佛智慧甚深無量然何以知其甚深無量也尋常稱汝是智慧第一的人就汝眼力所見如來身有丈六長於中有眼耳鼻舌有手足肩頂有臂腨顙額有脾脅胸腹有股胯顴頰有齒牙齗齶有百骸肢節有三十二相有八十種好有無數毛孔如上所説一一皆能作無量無邊佛事姑置無論然我今日略放眉間一毫孔中光明遍照東方萬八千土徹上徹下無畔無岸汝等思量測度尚不能知下落又豈知無數毛孔中一一皆有如此光明遍照法界作大佛事又豈知丈六身中眼耳手足肢節骨肉等一一皆有無量光明作大佛事又豈知我有無量無邊遍法界如來藏身一一身各有無量相一一相各有無量好一一好各有無量色乃至眼耳鼻舌手足肩頂等悉皆無量悉皆充滿百億蓮華藏世界海於一念中同時作無量無邊佛事汝又烏能知之哉且我丈六身中於一毛孔所放光明既不能知必不知諸佛最甚深之慧海無涯量之智空矣譬如涔蹄之水芥孔之空尚不能知又烏能知甚深之大海無量之虗空也故善財入普賢一毛孔剎中行一步過不可説不可説佛剎微塵數世界如是而行盡未來際猶不能知毛孔中剎海次第剎海莊嚴乃至剎海成剎海壞亦不能知佛海次第乃至佛海生佛海滅所有邊際亦復不知衆生界所有邊際所謂諸佛智慧甚深甚深無量無量如此如上所説是如來自證自悟自受用境界汝等不知固爾即諸佛成道已後四十年中開智慧門或對人天根者説十善法或對聲聞根者説四諦法或對辟支根者説十二因緣法汝等已熟聞熟習現今各各有證聲聞果者有證辟支果者汝等亦自謂解如來法得如來道入如來智慧門然而實未曾解如來法得如來道入如來智慧門也由汝等止宿草菴猶處門外是故即如來智慧門一切聲聞辟支佛亦不能知所以者何佛曾親近百千萬億無數諸佛盡行諸佛無量道法勇猛精進名稱普聞成就甚深未曾有法此徵釋諸佛實智甚深無量之所以言我之智慧所以甚深無量汝等不知者豈徒然哉由我往昔因中劫劫生生未嘗離佛以佛為師常隨佛學且所事之師又非一佛二佛三四五佛曾歷事百千萬億無數諸佛若事其師而不學猶勿師也學其道而不行猶勿學也於是師一佛學盡一佛道法行盡一佛道法事百千萬億無數諸佛學盡百千萬億無數諸佛道法行盡百千萬億無數諸佛道法由我如是勤學如是篤行愈學愈勇猛愈行愈精進從無量劫無有一毫疲懈心生故勇猛精進之名普遍微塵剎海故能成就諸佛所證甚深無量未曾有法所謂根深果茂名實相當也豈似汝等於佛法中心生疲懈不生一念好樂之心乎豈似汝等坐無為而不動醉寂滅而不醒乎莊生云風之積也不厚則負大翼也無力故九萬里者則風斯在下矣有味哉隨宜所説意趣難解舍利弗吾從成佛已來種種因緣種種譬喻廣演言教無數方便引導衆生令離諸著此釋諸佛權智難解難入之所以言我之智慧門所以難解難入者何亦由我因中學盡諸佛菩提道學盡諸佛度生道行盡諸佛菩提道行盡諸佛度生道故我將往昔三大阿僧祇劫所學所行底自證自悟底隨衆生之所宜就其門戶而啓迪之彼且為嬰兒即嬰兒法道之令其歡喜彼且為丈夫即以丈夫法進之令生歡喜然彼實不解我所説意趣也此何以故以我成佛已來證平等法見諸衆生在三界內為妄想絲之所纏縛頭頭羈紲處處耽著故我隨其根性投其所好或説種種因緣以脫其粘成説種種譬喻以解其縛或廣開無量無數方便法門以引導衆生無非皆是為人抽釘拔楔而已實無一法與人也今汝等隨語生解得一善而拳拳服膺守一法而沾沾自喜學一先生之言則暖暖妹妹而私自悅都是繫驢橛上覔驊琉又豈能知我所説哉所以者何如來方便知見波羅蜜皆已具足此雙徵如來用權實二智之所以言世尊既盡學佛道盡行佛道成就一切未曾有法如來本意原為利益一切衆生而求佛道不為獨善其身何不即以所得於諸佛者而直授之反隱其無量甚深佛慧而以佛海一滴順衆生而説者有何所以無乃吝而不施乎不亦忘其本願乎不亦有所揀擇乎故自釋云如來雖盡學盡行諸佛道法不直授與人而又隨機説法者有故如來於小不失於大不遺皆能隨順其實無有揀擇以如來具足知見方便二種波羅蜜故故其機可以授佛知見者即以佛知見授之其機不堪授佛知見者即以法之宜乎彼者而誘之若有實無權則沉埋中下若用權廢實則枉屈大根由彼權實並行故能曲成大小而不遺也舍利弗如來知見廣大深遠無量無礙力無所畏禪定解脫三昧深入無際成就一切未曾有法上言知見波羅蜜然不知佛所知所見者是何等法而一切聲聞辟支所不能知不能見覆自釋云如來所知者廣大所見者深遠決非汝等淺知劣見所能窮究蓋如來於法性海中隨舉一華或拈一草或謦咳彈指或放光動地無非實相不可思議故如來所得四無量心四無礙解十力四無所畏禪定門解脫門三昧門一一深入無有邊際此便是三阿僧祇劫親近諸佛於諸佛所成就一切未曾有法所謂於一切法成最正覺是也然則不知一法是名佛知不見一法是名佛見纖毫未盡即墮衆生知見矣故古德云不見一法存無見大似浮雲遮日面不知一法守空知猶太虗生閃電佛知佛見如此豈汝等淺知小見所能分別者哉故慧朗禪師初見馬祖祖問汝來何求曰求佛知見祖曰佛無知見知見乃魔耳四無量心者慈悲喜捨也小乘不度生故不知四無礙解者謂法無礙智一法演無量法義無礙智一義演無量義辭無礙智一音演無量音樂説無礙智稱機説法小乘不欣説法故不知十力者是處非處智力知可度不可度三世業報智力謂知有障無障根勝劣智力知信等根有軟中上種種界智力謂三乘五性等界即性也種種解智力或貪財利好名聞等亦名欲力一切至處道智力知衆生種種所行若出離行若不出離行各能至果禪定解脫三昧染淨智力如有漏無漏等宿住念智力知前際名姓苦樂等天眼智力謂死此生彼墮善惡趣大小好醜等斷諸習智力即漏盡智小乘不求佛道不學十力故不知四無畏者一一切智無畏有人難云若佛是一切智者有諸比丘從他方來何須問言安樂住否佛於此難安隱無畏答云我是一切智人但是攝受未來隨順世間師弟人情故二漏盡無畏難云若佛自言漏已盡者何以愛語羅云訶罵調達佛於此難安隱無怯乃自唱云我實漏盡但謂隨根而調伏故三説障道無畏難云若佛説欲能障道者何故預流一來尚有妻子之愛佛於此難心無怯弱答言我説欲能障道但障不還羅漢非初二果四説苦盡無畏難云若佛説諸聖道能盡苦者何故羅漢受瘡潰蛇螫之苦佛於此難安隱無畏答云我説聖道實能盡苦邊際但説未來非現在故初是離所知次是離煩惱三是出離障四是出離之道小乘不盡障有怯弱故不知解脫者不思議解脫無障礙解脫淨觀察解脫普照明解脫如來藏解脫隨順無礙輪解脫通達三世解脫法界藏解脫光明輪解脫無餘境界解脫此十為首有無量百千解脫門皆悉成就小乘唯得三解脫故不知三昧者普光三昧方網三昧海印三昧知過去莊嚴藏三昧智光明藏三昧了知一切世界佛莊嚴三昧衆生差別身大三昧法界自在大三昧無礙輪大三昧此等為首有無量百千三昧皆悉成就小乘耽寂定故不知也舍利弗如來能種種分別巧説諸法言辭柔軟悅可衆心上言方便波羅蜜不知是何等方便覆自釋云佛知佛見離心緣相非思量分別之所能解離言説相非齒牙紙墨所能詮顯故一落思惟一墮言詮無非皆是方便接人譬諸日月俱明各有所照二十八宿各有所主百藥並生各有所愈狐裘備寒絺綌御暑舟輿異路俱至行旅然則如來用善巧易入之方便柔和巽順之語言與諸衆生巧説一切修多羅無非曲垂誘迪適可衆心令生歡喜得親近我令入佛道然而皆非實法也以如來不説墮文字法故如是則如來信無一法與人奈何汝等執一解脫義而株守哉舍利弗取要言之無量無邊未曾有法佛悉成就此結上以生下文也若欲盡言如來所證即使經無量劫言之不盡豈知四無量等云云而已故普賢云剎塵心念可數知大海中水可飲盡虗空可量風可繫無能盡説佛功德若撮其要而言則無量無邊未曾有法佛悉成就一語可以盡蔽如思無邪蔽三百篇之大義也已上總是申明諸佛智慧四句下文廣明諸佛智慧甚深無量一切聲聞辟支佛所不能知止舍利弗不須復説所以者何佛所成就第一希有難解之法唯佛與佛乃能究盡諸法實相所謂諸法如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等止之一字是如來滿口要説復含糊不説正是竦動身子處猶俗語云罷不消説起又自解欲説不説之所以言我所説佛所成就第一希有難所解之法今日對汝等講説何異對三家村裏擔柴漢子説中書堂裏事總不知下落須是對自己家裏人説家裏事才領會得所謂唯聖知聖也故唯佛與佛志同道合彼所得者我亦得我所證者彼亦證心心相照眼眼相對故能究諸法實相而又能究盡諸法實相也實相者何所謂如是相相謂色相如是性性謂佛性如是體體謂法身如是力力謂願力如是作作謂作用如是因因謂自修如是緣緣謂助發如是果尅獲曰果如是報答果曰報如是本末本謂始生末謂入滅究竟等等謂平等由此十種皆是一相一味之法本無二相佛與衆生究竟平等本無高下故起信云所言覺者謂心體離念離念相者等虗空界法界一相即是如來平等法身得此法身方名開佛知見故如來於菩提場中於一切法成最正覺果也智入三世悉皆平等性也其身充滿一切世間其音普順十方國土於諸國土平等隨入體也身恆遍坐一切道場報也三世所行衆佛大海因也而恆示生諸佛國土緣也無邊色相光明圓滿遍照法界等無差別相也一一毛端悉能容受一切世界而無障礙作也各現無量神通之力教化調伏一切衆生力也遍十方界而無來往本末也此即華嚴經中十身相作也便是一個樣子汝等不然法身無相而汝等報三十二相以為實而不知無相之如來遍華藏界也故大經云如來非以相為體但是無相寂滅法是也如來無性汝等妄執如來實有自性以為唯佛一人有如來性能成正覺餘皆不能而不知無性之佛性充滿虗空也大經云如來成正覺時普見一切衆生成正覺乃至普見一切衆生入涅槃所謂無性無性之性即佛性也如來無體而汝等妄執丈六身以為體而不知如來之體遍一切處也大經云菩薩摩訶薩應於無量處見如來身不應於一法一事一身一國土一衆生見如來身應遍一切處見如來身譬如虗空遍至一切色非色處非至非不至如來身亦復如是遍一切法一切事一切國土一切身一切衆生何以故如來身無身故為衆生故示現其身所謂佛真法身猶若虗空應物現形如水中月是也今汝等但知如來降魔推外以為力而不知如來願力之周沙界也大經云毗盧遮那佛願力周沙界一切國土中恆轉無上輪是也汝等但知如來現前度衆生作佛事以為作而不知如來不思議業用塵塵剎剎度衆生辦佛事也大經云佛身充滿於法界普現一切羣生前是也汝等但知如來六年苦行以為因而不知過去無量劫中承事供養華藏世界無數諸佛修菩薩行乃至無有如芥子許非是菩薩捨身命處之大因也汝等但知王舍城靈鷲山等處説法利生為衆生作增上緣而不知勝音世界莊嚴劫中大通智勝時威音王時為太子為沙彌為比丘已與無量無數衆生作增上緣也汝等但知菩提樹下成正覺以為果而不知盡法界虗空界一切菩提樹下皆成正覺也汝等但知如來報土在娑婆而不知報土在華藏界也汝等但知如來入胎住胎出胎出家修行成道轉法輪入涅槃以為本末而不知如來壽量無盡未嘗生未嘗滅也不獨此也而復於諸佛邊生下劣想云如來三十二相我無有也如來之性我不具也如來之體我不逮也如來願力我不及也如來作用我不能也如來求佛之因非吾事也如來度生之緣非我要也如來之果非敢望也如來之報非敢慕也如來始終本末之事不敢冀其萬一也殊不知自己原與如來究竟平等也不獨此也而復於衆生邊生自足想以己出三界越四生為得淨相而觀三界衆生是不淨相自己為得聖性而觀衆生是異生性自以為得不思議變易身而觀衆生是業果身自以為得五力而觀衆生是業力自以為得神用而觀衆生是業用自以為得清淨因而觀衆生是業因自以為得清淨緣而觀衆生是染緣自以為得清淨果清淨報而觀衆生是業果是業報自以為始終是個出三界人而觀衆生是火宅種子殊不知自己原與衆生究竟平等也由於如來邊生下劣想故不肯上求佛道由於衆生邊生自足想故不喜下度衆生法本平等汝自歧之法本無相汝自礙之法本無著汝自執之如是妙法唯佛能知唯佛能見而汝終不得而知終不得而見也此言佛慧甚深二乘不知不見者蓋如此爾時世尊欲重宣此義而説偈言世雄不可量諸天及世人一切衆生類無能知佛者佛力無所畏解脫諸三昧及佛諸餘法無能測量者初四句頌人天二乘不知佛也捨王位擯欲樂絶二死滅五住為三界師作四生父故稱世雄豈特富貴不淫貧賤不移威武不屈而已哉故曰出家乃大丈夫事非將相所能為然雖如是無有一人能知佛者佛如虗空本無形量本不可以色見聲求故佛力下言此等非但不知佛抑且不知法以此法非思量分別可測故本從無數佛具足行諸道甚深微妙法難見難可了於無量億劫行此諸道已道場得成果我已悉知見如是大果報種種性相義我及十方佛乃能知見事是法不可示言辭相寂滅諸餘衆生類無有能得解除諸菩薩衆信力堅固者次言唯佛知唯菩薩知且我因中清淨無量諸佛時自灑掃應對折旋俯仰以至六度萬行無不習學無不行持然此甚深微妙之法尚不能見不能了至於經無量劫功成行滿坐於菩提樹下成最正覺然後見此甚深微妙難解之法故知如是性相果報究竟平等之法唯佛與佛乃能究盡餘無一人能知此者何以故是法本來寂滅不可以形貌指示不可以言辭談論要須自證自悟始得相應今現前四衆都向語言色相中求情枝意根上覔故無一人能得解者唯有過量大人一聞此法直下承當如將一百二十斤擔子一肩擔荷向前直往牢籠不住呼喚不回譬如香象渡河截流而過如此等人喚作信力堅固大心菩薩昔五臺智通禪師在歸宗會下忽一夜連呌云我大悟也明日衆集宗曰昨夜大悟底出來師出宗曰汝見箇甚麼道理便道大悟師曰師姑原是女人做明州大梅法常禪師初參大寂問如何是佛寂曰即心即佛師即大悟後僧問和尚見馬大師得箇甚麼便住此山師曰大師向我道即心即佛我便向這裏住僧曰大師近日佛法又別師曰作麼生曰又道非心非佛師曰這老漢惑亂入未有日在任他非心非佛我只管即心即佛其僧舉似馬祖祖曰梅子熟矣此等即信力堅固千喚不回之樣子也諸佛弟子衆曾供養諸佛一切漏已盡住是最後身如是諸人等其力所不堪此總明小乘不能擔荷大法也一切漏盡者是寒灰枯木人也力量淺薄不堪重任須是枯木糝花寒灰發𦦨始得昔有一婆子供養一菴主經二十年常令一女子送飯給侍一日令女子抱定曰正恁麼時如何主曰枯木倚寒巖三冬無暖氣女子舉似婆婆曰我二十年祗供養得箇俗漢遂遣出燒却菴假使滿世間皆如舍利弗盡思共度量不能測佛智正使滿十方皆如舍利弗及餘諸弟子亦滿十方剎盡思共度量亦復不能知此言性識聰敏的人未曾開口便將心意識領會故亦不能擔荷大法如香嚴智間禪師在百丈時性識聰敏參禪不得洎丈遷化遂參溈山山問父母未生時試道一句看師茫然乃自歎曰畫餅不可充飢屢乞溈山説破山曰我若説似汝汝已後罵我去我説的是我的終不干汝事師遂將平昔文字燒却曰此生不學佛法也且作箇長行粥飯僧免役精神乃泣辭溈山直過南陽覩忠國師遺迹遂止焉後一日芟除草木偶拋瓦礫擊竹作聲忽然省悟乃沐浴焚香遙禮溈山曰和尚大慈恩逾父母當時若為我説破何有今日之事乃有頌曰一擊妄所知更不假修持動容揚古路不墮悄然機處處無蹤迹聲色外威儀諸方達道者咸言上上機故知此事正要死盡偷心不在性識聰敏也滿世間者一佛剎也滿十方者十方剎也言十方剎者又多於一佛剎也盡思度量不能知者四住雖除無明未破故辟支佛利智無漏最後身亦滿十方界其數如竹林斯等共一心於億無量劫欲思佛實智莫能知少分新發意菩薩供養無數佛了達諸義趣又能善説法如稻麻竹葦充滿十方剎一心以妙智於恆河沙劫咸皆共思量不能知佛智不退諸菩薩其數如恆沙一心共思求亦復不能知辟支根器利於聲聞其數復多於聲聞一心思量亦不能知者以辟支雖斷界內無明未盡界外無明故初地已上菩薩名新發意其根勝於辟支其數又多於辟支其智又勝於辟支其時又過於億劫雖以妙智思量亦不能知者分別雖空俱生未盡故八地已上菩薩名不退其數又過於新發意一心思求亦不能知者雖空藏識異熟未空故乃至等覺菩薩雖見佛性如隔羅縠見月相似以有一分生相無明一障二愚猶未盡故等覺尚爾何況其他所以云離心意識參絶聖凡路學又告舍利弗無漏不思議甚深微妙法我今已具得唯我知是相十方佛亦然此明唯佛能知也毫無滲泄故曰無漏絶無意言名不思議二乘莫能窮其底故曰甚深等覺莫能見其兆故曰微妙如是勝法我及諸佛盡知盡得其餘一切皆不能知也舍利弗當知諸佛語無異於佛所説法當生大信力世尊法久後要當説真實告諸聲聞衆及求緣覺乘我令脫苦縛逮得涅槃者佛以方便力示以三乘教衆生處處著引之令得出先勸信世尊下點破向後所説者是實告諸下點破四十年前所説者是權要令二乘捨權就實故爾時大衆中有諸聲聞漏盡阿羅漢阿若憍陳如等千二百人及發聲聞辟支佛心比丘比丘尼優婆塞優婆夷各作是念今者世尊何故殷勤稱歎方便而作是言佛所得法甚深難解有所言説義趣難知一切聲聞辟支佛所不能及佛説一解脫義我等亦得此法到於涅槃而今不知是義所趣此四衆騰疑也漏盡者無學衆也發心者有學衆也各作是念者各自生疑也意謂世尊尋常只是誘掖獎勸曾不毀人譽己今日何故出定之後讚己毀人自言我所得法及所説法難解難知一切二乘皆不能及且世尊昔日鹿野苑中曾於衆中讚三乘法汝等當知此三乘法皆是聖所稱歎自在無繫無所依求乘是三乘便得無量安穩快樂我等當時一聞讚歎依之而行遂出生死親證涅槃是則佛所得所説者我等亦能解能知矣今日復言難解難知却不知又是何等義趣豈更有奇特之事勝於我等所證之涅槃者耶爾時舍利弗知四衆心疑自亦未了而白佛言世尊何因何緣殷勤稱歎諸佛第一方便甚深微妙難解之法我自昔來未曾從佛聞如是説今者四衆咸皆有疑惟願世尊敷演斯事世尊何故殷勤稱歎甚深微妙難解之法此鶖子呈疑請決也古語云宴安鴆毒不可懷也二乘一向臥涅槃牀以為足以高枕無憂矣殊不知尚有微細流注生滅業識遷流不注未可貼席穩臥也由二乘入尋常自以為出三界作了事漢坐守勝妙境界不生一念進趣之心故世尊與他説無量義經也不動入無量義定也不動至於放白毫光眉目稍動及至世尊出定之後賣弄自己神通一上却將三言兩語變作百千萬億箇疑團散在各人懷裏然後大家疑情齊動只此一點疑情却是開佛知見之種子也所以云大疑大悟小疑小悟不疑不悟舍利弗尋常疑著此事一聞此語身毛皆竪及聞法説便一擔承當去所以先得授記四大弟子見同列得記方始生疑故再聞喻説次得授記至於會中退席之衆唯不疑故不信也故知此事疑得極信得極疑得淺信得淺故曰除諸菩薩衆信力堅固者唯是信力堅固者却能從疑團打出也爾時舍利弗欲重宣此義而説偈言慧日大聖尊久乃説是法自説得如是力無畏三昧禪定解脫等不可思議法道場所得法無能發問者我意難可測亦無能問者無問而自説稱歎所行道智慧甚微妙諸佛之所得無漏諸羅漢及求涅槃者今皆墮疑網佛何故説是其求緣覺者比丘比丘尼諸天龍鬼神及乾闥婆等相視懷猶豫瞻仰兩足尊是事為云何願佛為解説於諸聲聞衆佛説我第一我今自於智疑惑不能了為是究竟法為是所行道佛口所生子合掌瞻仰待願出微妙音時為如實説諸天龍神等其數如恆沙求佛諸菩薩大數有八萬又諸萬億國轉輪聖王至合掌以敬心欲聞具足道初二句頌世尊自讚如來不出世萬古如長夜凡有目有趾者待是而後成功故曰慧日聖中之聖故曰大聖久乃説是法反顯四十年前未曾説也自説下四句牒前十力無所畏等道場下二句牒前道場得成果等我意下二句牒前假使滿世間等無問下四句正指如來自讚等語無漏下四句敘無學生疑其求下八句敘有學生疑中間相視二字描寫懷疑之狀如畫於諸下四句敘當機自疑言我在聲聞衆中智慧首出即今亦墮疑網況其他乎為是究竟法為是所行道此正出疑根也為是之為字當作平聲讀意謂佛説一解脫我等皆得今所稱讚究竟平等法不知何者為是今所稱讚具足行諸道又不知何者為是所以卒墮疑網而不能出也佛口下自陳情辭諸天下代衆請説具足道者時指法華也如古德云具足凡夫法凡夫不知具足聖人法聖人不會是也爾時佛告舍利弗止止不須復説若説是事一切世間諸天及人皆當驚疑重言止者固却之以勇其疑也言我今才動口汝等常隨我者尚且各各懷却滿肚疑情若我再説一切天人不但生疑且生驚恐矣此以法大機小實難擔荷却之舍利弗重白佛言世尊惟願説之惟願説之所以者何是會無數百千萬億阿僧祇衆生曾見諸佛諸根猛利智慧明了聞佛所説則能敬信爾時舍利弗欲重宣此義而説偈言法王無上尊惟説願勿慮是會無量衆有能敬信者再陳請辭也言此會中有大機可以擔荷不必慮也曾見諸佛者是福德大諸根猛利者是根器大智慧明了者是智慧大此等聞法決生敬信必不驚疑以敬則不驚信則不疑故佛復止舍利弗若説是事一切世間天人阿修羅皆當驚疑增上慢比丘將墜於大坑爾時世尊重説偈言止止不須説我法妙難思諸增上慢者聞必不敬信再止之者彼愈急而愈緩之也彼等久墮解脫深坑今我説法直欲援而出之復恐聞而不信反生謗法之𠍴是坑塹中重添坑塹矣此以執著堅固却之爾時舍利弗重白佛言世尊惟願説之惟願説之今此會中如我等比百千萬億世世已曾從佛受化如此人等必能敬信長夜安穩多所饒益爾時舍利弗欲重宣此義而説偈言無上兩足尊願説第一法我為佛長子惟垂分別法是會無量衆能敬信此法佛已曾世世教化如是等皆一心合掌欲聽受佛語我等千二百及餘求佛者願為此衆故惟垂分別説是等聞此法則生大歡喜此三陳請辭也如我等比受化已久決無上慢必能敬信決不生疑長夜安隱多所饒益決不墮坑惟垂分別説者意謂向上一路雖不可思不可説不妨曲為今時向第二門頭分別言説處略通一線也爾時世尊告舍利弗汝已殷勤三請豈得不説汝今諦聽善思念之吾當為汝分別解説此如來許説也吾當為汝分別解説者言此法如銅山鐵壁鑽研不得咬嚼不得無著力處無下口處我今為汝無分別處強作分別無言説處強作言説何以故以非三非一絶言説故無分別故非有量故是平等故若分三分一墮言説故是分別故是有量故不平等故然則如來不唯昔日説三乘是言説分別即今日説一乘亦是言説分別所以始也無問而自説既而三止而不説卒之三請而許説此是婆心太切處若是祖師禪別有生涯昔藥山久不升座院主白云大衆久思示誨請和尚為衆説法山令打鐘衆方集山升座良久便歸方丈主隨後問和尚適來許為衆説法云何不垂一言山云經有經師論有論師爭怪得老僧説此語時會中有比丘比丘尼優婆塞優婆夷五千人等即從座起禮佛而退所以者何此輩罪根深重及增上慢未得謂得未證謂證有如此失是以不住世尊默然而不制止爾時佛告舍利弗我今此衆無復枝葉純有真實舍利弗如是增上慢人退亦佳矣汝今善聽當為汝説舍利弗言唯然世尊願樂欲聞此五千退席也由此輩罪根深重我慢偏多尋常唯在語言上做工夫鬼窟裏作活計摘葉尋枝莫窮其本今聞妙法難思方木不入圓竅所以退席世尊逆知其意亦任其自去而不制止故預會者純是真實無枝葉也雖然黃面瞿曇未免壓良為賤靈山會上人天百萬菩薩聲聞不知其數箇箇摘葉尋枝阿漉漉地幸有此輩才聞許説撩起便行却與靈山一會大衆面上添光生彩雖則如是猶較衲僧百步豈不聞資福云隔江見資福剎竿便回去腳跟下好與三十棒何況過江來又大隨禪師在大溈會下數載食不至充臥不求暖清苦鍊行操履不羣溈深器之一日問曰闍梨在老僧此間不曾問一轉語師曰教某甲向甚麼處下口溈曰何不道如何是佛師便作手勢掩溈口溈歎曰子真得其髓又南泉為衆僧行飯次馬祖問桶裏是甚麼師云這老漢合取口作恁麼話祖便休具此眼目始解看經佛告舍利弗如是妙法諸佛如來時乃説之如優曇鉢花時一現耳舍利弗汝等當信佛之所説言不虗妄此勸信也四衆始不生疑故以放光發其疑復以歎德發其疑此疑不可無既疑之後將説大法此疑不可有故以優曇難值堅其信此如來所以因時而説法也時之名義大矣哉仲尼云可以言而不與之言失人不可與言而與之言失言故曰時然後言時之一字諸聖所宗故世尊説法亦必因時若會中有糟粳枝葉之衆而與之言是失言也不時也若會中有聞而敬信聞而歡喜讚歎者而不與之言是失人也不時也若四衆一向置在無事甲裏初未曾疑著此事驟而與之言者是失言也不時也若一聞此事即便驚疑不肯放捨決欲究明此事如渴思甘露蜂念好蜜者而不與之言是失人也不時也今會中既無枝葉之衆時之可説一也又有敬信之人時之可説二也四十年前總無人疑著此事今會中一衆皆疑時之可説三也且世尊尋常一言一笑一動一靜皆不妄發必有其時況此大事因緣究竟平等難解難信之法有不因時而説者乎然而時之難遇也四十年前未曾有人疑著此事今始有生疑者四十年前欲與之言而無可言之機故隱忍而不發今有可言之機矣既有可言之機又有欲説之事如矢在弦不得不發故曰如是妙法諸佛如來時乃説之言如是妙法者正指如是相如是性乃至本末究竟平等法也四十年中未曾顯説今日方始道破正如優曇鉢花時一現耳梵語優曇鉢羅此云靈瑞唯佛與輪王將出世時方現瑞相亦如此方黃河清而聖人生之意也言其時之難遇如此豈可忽哉故又戒之曰我四十年前祕而不説待到此時才對人説汝等當信佛之所説決非孟浪輕發也正恐大衆當作容易看作等間故諄諄戒勉此正老婆心竭力為人處也若是德山臨濟却無許多廉纖棒頭喝下當處分身如來禪祖師禪正好著眼舍利弗諸佛隨宜説法意趣難解所以者何我以無數方便種種因緣譬喻言辭演説諸法是法非思量分別之所能解此下申明其智慧門難解難入一切聲聞辟支亦不能知也故曰隨宜所説意趣難解言我昔日見汝等戀著生死無求出意故於鹿野苑中轉四諦法輪説三界內是生死苦説三界外是涅槃樂是以方便誘汝莫戀著三界生死如將蜜瓠換苦葫蘆非謂三界真如牢獄非謂衆生真如冤家亦非謂實有涅槃可證也而汝等戀此涅槃不肯度生却向虀甕淹殺此我之意趣難解如此我因見汝等戀著涅槃不求佛慧故於方等會中抑揚褒貶謂五逆之人塵勞之侶皆可發心皆可作佛彼二乘者若焦芽敗種永不發菩提心永無成佛之事此亦以方便激汝欲令汝等捨涅槃而進趨佛道也非謂汝等真不可發菩提心真不可成佛果也而汝等坐守涅槃甘為下劣自絶於如來寶藏之分於菩薩法遊戲神通亦不生一念好樂之心此我之意趣難解又如此我又見汝等不欣説法不肯度生故我於般若會中令汝等為諸菩薩説法教化領知衆物是以寶藏授汝而汝等又無希取一餐之意此我之意趣難解又如此然汝等病根在甚麼處在不解隨宜所説隨語生解故也豈知諸佛所説種種法門本無意路不落思惟不過信手拈來隨方解縛作止啼黃葉耳本不可以識心思量測度汝等乃以思惟心測度如來殊不知終涉思惟千里萬里所以終不解如來所説故即如來所説者亦唯諸佛方能究竟汝等亦不能知也所以者何諸佛世尊唯以一大事因緣故出現於世舍利弗云何名諸佛世尊唯以一大事因緣故出現於世諸佛世尊欲令衆生開佛知見使得清淨故出現於世欲示衆生佛之知見故出現於世欲令衆生悟佛知見故出現於世欲令衆生入佛知見道故出現於世舍利弗是為諸佛以一大事因緣故出現於世復徵云二乘皆不知唯諸佛能知者何故以諸佛同心同願同證此一大事因緣同為此一大事因緣出世故所謂一大事因緣者即佛知見也佛知見者即是諸佛如來道場成果時所知所見性相體用因緣果報本末究竟平等一相一味之法是諸佛成道藉此為因諸佛度生藉此為緣者諸佛既藉此法為因為緣是如來出世一件莫大之事諸佛既證此法而欲人人共證此法故如來不為二乘説法亦不為小小因緣出世唯為説大乘究竟平等法亦唯為此一種大事因緣出世也故出現品云如來出現以無量事無量緣而得出現無量事無量緣即一大事因緣也欲令衆生開佛知見使得清淨故出現於世者此句却將出世本懷盡情吐露言一切衆生具有如來智慧德相但以妄想執著染污佛知佛見不得開發不得清淨如來出世不過欲令衆生開佛知見使得清淨而已下文所云長者寶藏衣裏寶珠大白牛車即是物也寶藏要自己開故曰欲令衆生開開者以手推排之謂衣珠要自己知故曰欲令衆生悟悟者久忘勿記之謂白牛車要自己坐故曰欲令衆生入入者和身已到之謂然則如來不過指示衆生寶藏指示衆生衣珠指示衆生大白牛車而已故曰欲示衆生示者指點分明之謂也是則開悟入三字皆屬衆生示之一字單屬佛也若約此經大旨則開示悟入四字括盡一經之始終以開示二字屬佛悟入二字屬人此經自方便品以至法師品皆明開悟二字開者所謂開方便門也如説方便一品固方便也而身子悟故曰今日乃知真是佛子譬喻一品亦方便也而四大弟子悟故曰我等今日真是聲聞真阿羅漢因緣一品亦方便也而五百弟子學無學人皆悟故曰我今乃知真是菩薩等此是開三周方便門而令四衆皆悟也自寶塔品已下明示入二字示者所謂示真實相也如過去多寶現塔現身釋迦變土十方分身雲集一處乃至現舌相放毫光皆是直將佛知佛見示人至於菩薩發願持經如世尊敕當具奉行者皆是入佛知見之人也此是如來示真實相而使人入也其餘藥王等六品皆是為持經人作箇入佛知見之榜樣而已故先悟得當人有此一卷大經而後受持保任流通不斷然後能入故華嚴以信解行證為一經之要此經以開示悟入為一經之宗也昔洪州法達禪師問六祖法華經義祖曰汝念此經以何為宗師曰學人愚鈍豈知宗趣祖曰汝念一遍我為汝解説師即高聲念至方便品祖曰止此經元來以因緣出世為宗縱説多種譬喻無越於此何者因緣即一大事一大事即佛知見也汝慎勿錯解經意見他道開示悟入自是佛之知見我輩無分若作此解盡是謗經毀佛也彼既是佛已具知見何用更開汝當信佛知見者即汝自心更無別體蓋為一切衆生自蔽妙明貪愛塵境外緣內擾甘受驅馳便勞他從三昧起種種苦口勸令寢息莫向外求與佛無二故云開佛知見耳汝但勞勞執念為功課者何異牛愛尾也此段可作一經疏解佛告舍利弗諸佛如來但教化菩薩諸有所作常為一事唯以佛之知見示悟衆生舍利弗如來但以一佛乘故為衆生説法無有餘乘若二若三且諸佛度生法門廣博無量不獨以語言文字是故菩薩法即舉足按指揚眉瞬目謦咳彈指無非與人説菩薩法無非發明此一大事無非以此事指示人無非要人悟此事而已然則如來不但以口舌為衆生説菩薩法却又通身遍身為衆生説菩薩法故知如來未嘗説一乘法亦未嘗説三乘法始終唯以一乘法示人而使人悟入也至乎祖師門下搖鈴振鍚輥毬無笏驢鳴犬吠吹布毛舉拂子行棒行喝現瞋現喜亦無非為此一事是一也天得之而清地得之而寧日月得之而明鬼神得之而靈所謂通於一而萬事畢也古德云明明百草頭明明祖師意是也舍利弗一切十方諸佛法亦如是舍利弗過去諸佛以無量無數方便種種因緣譬喻言辭而為衆生演説諸法是法皆為一佛乘故是諸衆生從諸佛聞法究竟皆得一切種智舍利弗未來諸佛當出於世亦以無量無數方便種種因緣譬喻言辭而為衆生演説諸法是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智舍利弗現在十方無量百千萬億佛土中諸佛世尊多所饒益安樂衆生是諸佛亦以無量無數方便種種因緣譬喻言辭而為衆生演説諸法是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智舍利弗是諸佛但教化菩薩欲以佛之知見示衆生故欲以佛之知見悟衆生故欲令衆生入佛之知見故下廣引十方三世諸佛以證言此法不獨如來一身在娑婆世界中作如是説即我分身散影於十方世界中者亦作如是説也又不獨我分身諸佛作如是説即三世諸佛亦同如是説也然則一卷大經窮三世遍十方上際於天下蟠於地塵塵説剎剎説人人説物物説時時説念念説未曾間斷人自不識故開口動舌處便作語言會揚眉瞬目處又作道理會乃至日明雲暗風動塵起鳶飛魚躍雞鳴犬吠華藥欄柏樹子一切處又作境物會辜負如來説法不得如來一切種智耳舍利弗我今亦復如是知諸衆生有種種欲深心所著隨其本性以種種因緣譬喻言辭方便力而為説法舍利弗如此皆為得一佛乘一切種智故舍利弗十方世界中尚無二乘何況有三由三世十方諸佛同如是説故我亦做效諸佛之儀式亦作如是説也問十方三世諸佛既以此事為實世尊何不四十年前就將此法直示與人何故祕而不説而説種種方便因緣譬喻答隨機故由諸衆生根性不同樂欲各異故其根性有好大乘者有好小乘者有好人天乘者有好貨者好色者好名聞者好音聲者好滋味者好夸張者好儉嗇者好鬪者好勇者好乘肥衣輕者好憺怕寂默者好奇者好伎者好高潔者好狷介者乃至種種好樂不同我悉知之故就其性之偏僻愛著處開種種門説種種法因其明處而啓導之漸漸令彼皆入佛乘得一切智若導百川而歸之海也若鎔瓶盤叉釧為一金攪酥酪醍醐為一味也何以故十方三世無二法故古德云撞著道伴交肩過一生參學事畢舍利弗諸佛出於五濁惡世所謂劫濁煩惱濁衆生濁見濁命濁如是舍利弗劫濁亂時衆生垢重慳貪嫉妬成就諸不善根故諸佛以方便力於一佛乘分別説三問如來必欲從無三處説三十方諸佛亦於無三處説三者何故答隨時故由如來生此濁惡時世不得不順其機故也言劫濁者劫者時也世衰道喪天下紛擾如魚鳥不寧百姓求竭而求上古無為清淨之世不可得矣此之謂劫濁冰炭交心貪瞋互出空華翳眼狙詐橫生舉天下求一不識不知守純抱撲者不可得矣此之謂煩惱濁不奔命於名世即匿心於貨財不淹沒乎色聲則羈縻乎情識求其果腹而嬉擊壤而歌者不可得矣此之謂衆生濁淳風雕削道德澆漓情竇日開渾沌日死各私一伎各守一能逐好投工爭奇鬪艷而求一人開佛知見者不可得矣此之謂見濁嗜欲愈深天機愈淺風雲氣少兒女情多生死海中頭出頭沒而求達自然之慧命者不可得矣此之謂命濁如來出世正值斯時以佛眼觀實可憐愍況復渾身破碎滿面塵埃在己躬者拔一毛而不為在他人者縱貪婪而無厭斯實三途基本衆惡根柢至蠢至愚難調難伏若不隨其性欲施設治方而直授以一乘則不加杖木亦已幸矣惡能使之必信哉故諸佛曲垂方便將一方而分三巧設階梯設化城而誘進故內德論云夫一水無以和羮一木無以搆室一衣不稱衆體一藥不療殊疾一彩無以為文繡一聲無以諧琴瑟一言無以勸衆善一戒無以防多失何得怪頓漸之各異令法門而專一如是則方便之門豈得已哉舍利弗若我弟子自謂阿羅漢辟支佛者不聞不知諸佛如來但教化菩薩事此非佛弟子非阿羅漢非辟支佛又舍利弗是諸比丘比丘尼自謂已得阿羅漢是最後身究竟涅槃便不復志求阿耨多羅三藐三菩提當知此輩皆是增上慢人所以者何若有比丘實得阿羅漢若不信此法無有是處除佛滅度後現前無佛此以危言激之以堅其信也大經云信為道源功德母信能歡喜入佛法信能增長智功德信能必到如來地語云人而無信不知其可也又云信道不篤焉能為有焉能為無信之一字諸聖入道之門也故未説之前先以三止發其疑既説之後又以危言激其信由是而知發其疑正欲堅其信循循善誘於此可見一斑云故云若我弟子自謂得小乘道果以為了當無所事事從不曾聞如來為一大事因緣出世又不曾聞如來但教化菩薩事還當不得佛弟子當不得阿羅漢不得預弟子數中又有一等認定所得小果就是如來最後身所證涅槃就是如來究竟涅槃更無佛果可得涅槃可證縱聞如來為一大事因緣出世不復志求我自有這箇在決不回心斯等不但不得佛果亦未得阿羅漢果不得名阿羅漢謂之增上慢人言增上慢者決定毗尼經云若有比丘作是思惟我斷貪欲我斷貪瞋我斷愚癡名增上慢貪欲法異瞋恚法異愚癡法異諸佛法異名增上慢謂有所得謂有所證謂有所解名增上慢見諸法空見於無相見於無願見於無生見無所作名增上慢見法無常見有諸法名增上慢是名聲聞乘增上慢由此一激遂有下文許多弟子擔當授記作佛所以下復徵問云此輩不信佛乘不得佛果宜矣今現證阿羅漢而不許名阿羅漢謂之增上慢人者何故復自釋云豈有比丘實得阿羅漢而不肯信教菩薩法決無此理由此曹不肯信教菩薩法故不名羅漢謂之增上慢人亦宜除佛滅度後現前無佛時容有阿羅漢不信有佛乘者所謂無佛處稱尊者是也所以者何佛滅度後如是等經受持讀誦解義者是人難得若遇餘佛於此法中便得決了舍利弗汝等當一心信解受持佛語諸佛如來言無虗妄無有餘乘唯一佛乘此又以軟言勸之以發其信也又徵問云現前雖無佛而辟支亦是佛弟子不信有佛乘者何故復釋云是一佛乘即佛現在説時人猶不信尚有聞風而退席者況佛滅度不聞佛説而欲要其必信哉若佛滅度後縱不親聞佛説但肯將此經受持讀誦解義者亦為希有此時縱不能直下擔當一信永信然藉此受持讀誦熏習不忘之力以為遠因若遇他時佛出於世於彼佛邊一聞此法機教相投千了百當決得一切種智由此一勸遂有下文六種法師流通此法故知現前肯信此經者現生立地可得成佛若現前不信此經不肯擔當而肯受持讀誦解義作六種法師者至當來世亦得菩提此皆如來誠諦之語汝當深信莫更生疑所謂誠諦語者無有餘乘唯一佛乘八字而已故六祖云汝等諸人自心是佛莫更狐疑外無一物而能建立皆是本心生萬種法若欲成就種智須達一相三昧一行三昧若於一切處而不住相彼相中不生憎愛亦無取捨不念利益成壞等事安間恬靜虗融淡泊此名一相三昧若於一切行住坐臥純一直心不動道場真成淨土名一行三昧若人具二三昧如地有種能含藏長養成就其實一相一行亦復如是爾時世尊欲重宣此義而説偈言比丘比丘尼有懷增上慢優婆塞我慢優婆夷不信如是四衆等其數有五千不自見其過於戒有缺漏護惜其瑕疵是小智已出衆中之糟粳佛威德故去斯人鮮顯少也福德不堪受是法此衆無枝葉唯有諸貞實舍利弗善聽此頌出退席衆十種心病也未得謂得未證謂證一也恃我生憍不能謙下二也自甘下劣不信深法三也但恃己長不知其短四也梵行不完漏巵非器五也藏瑕匿玷矯飾形儀六也智量狹小不堪大任七也喜咽糟粳不欣精鑿八也內無福德難受大法九也摘葉尋枝不窮根本十也由此等衆只解鬼窟裏作活計不肯向自己腳跟下推窮故不願聞而去今會中既無此輩皆是真實究佛法者此我正當説法之時汝等亦當攝心而聽故勉之曰舍利弗善聽也言善聽者勿以昔日所聞纏繞其心應當句句消歸自己勿得更以聰明識見作文字語言會也諸佛所得法無量方便力而為衆生説衆生心所念種種所行道若干諸欲性先世善惡業佛悉知是已以諸緣譬喻言辭方便力令一切歡喜或説修多羅伽陀及本事本生未曾有亦説於因緣譬喻并祇夜優波提舍經鈍根樂小法貪著於生死於諸無量佛不行深妙道衆苦所惱亂為是説涅槃我設是方便令得入佛慧未曾説汝等當得成佛道所以未曾説説時未至故今正是其時決定説大乘我此九部法隨順衆生説入大乘為本以故説是經此頌如來隨宜説法也諸佛所得法三句總頌如來證平等法而開無量法門為衆生説也所得法者即前文未曾有法難解之法甚深微妙法道場所得法不可思議法究竟法正法妙法此等名雖不同總是如來自證自悟法也謂如來證此平等無限量法即以無量種種方便而為衆生説無量種種法門也衆生下正顯衆生樂欲不同故説法亦不同也念者思慮也種種者多多之謂所行道者或十善四諦十二緣六度乃至貨利名聞等若干者不定之數欣樂名欲習種名性欲性所作名業佛悉知是已者謂佛得十力故以種種解智力知衆生所行道以根勝劣智力知衆生所習欲性信等五根有軟中上以種種界智力知衆生深心所念謂三乘五性等以天眼業報智力知衆生所造善惡等業感愛不愛等果唯佛知此故能以方便力隨病投藥令俾服之皆生歡喜梵語修多羅此云契經謂契理契機之教伽陀者此云重頌或為鈍根説或為未聽者説本事者謂無量劫中所行事也本生者謂無量劫中受生事也此為迷宿世者説為大根者説未曾有法即本來無物究竟平等法也為劣根者説因緣為中根者説譬喻為事理俱明者説祇夜即孤起頌也為事理俱不明者説優波提舍此云議論經又為一種鈍根人天不樂大乘唯欣小法耽因著果不肯放捨於生死河頭出頭沒雖遇諸佛不行勝法未超八苦難免五衰不得已而三轉四諦法輪令俾脫生死苦證涅槃樂然此亦是一時權巧非決定説非真實法其實潛施密誘令入佛之智慧但不曾分明説出汝等當來皆得成佛耳然我所以不説者由汝等根器未純説時未至故今汝等根器既純我之説時亦至固宜撤去籓籬直授大乘平等空法也汝等應知往昔所説此九部法皆是隨他意語非是本懷無非欲令衆生入佛知見是以今日説法華經意有在也有佛子心淨柔軟亦利根無量諸佛所而行深妙道為此諸佛子説是大乘經我記如是人來世成佛道以深心念佛修持淨戒故此等聞得佛大喜充遍身佛知彼心行故為説大乘聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑此明對大機説大法也言佛子者能紹如來家業故言心淨者不以萬法為侶諸塵作對非若貪著五欲若癡蠅粘唾而不肯放捨者言柔軟者謂調順柔和易受化度非若剛強粗獷若狂象而難調伏者利根者搖鞭即去非若樂著小法若蹇驢駑馬䇿之而不肯前進者無量佛所行深妙道者聞聲即赴非若遇佛而不求勝法當面蹉過者如斯根器方是大根堪稱佛子堪受大法不獨為彼説大乘法亦復為彼授如來記何以故以深心故念佛故持戒故深心者樂修一切善法故念佛者志求無上菩提故持戒者具足清白梵行故如此等機一聞授記大喜遍身一肩擔荷由彼發心既深念佛又切戒根又淨佛知其心又知其行是故為彼説大乘也然此大乘是平等法無論鈍根利根心穢心淨但得一句染神皆得作佛正如伽陀妙藥但得沾唇疾無不療毋得以一毫思慮存乎胸中而不肯服也十方佛土中唯有一乘法無二亦無三除佛方便説但以假名字引導於衆生説佛智慧故此下廣明所以必説大乘者有五義一十方諦求無有餘乘故言諸佛國土際天蟠地唯有一法更無二物但諸佛以方便力強立種種假名不知種種假名都是引導衆生令入佛慧是故必説一乘諸佛出於世唯此一事實餘二則非真終不以小乘濟度於衆生二佛佛道同故言諸佛出世本懷唯此一事更無二事我寧敢違諸佛之儀式而以非真之法向人説乎故終不用小乘之法度生必説一乘佛自住大乘如其所得法定慧力莊嚴以此度衆生自證無上道大乘平等法若以小乘化乃至於一人我則墮慳貪此事為不可三自住一乘故謂諸佛渾身住在大乘平等法中當以自己所證度諸衆生方稱平等若自證大法而以小法化人即是吝惜即墮慳貪便不平不等無論以小法化多人為墮慳貪即以小法化一人亦墮落慳貪法中矣此事豈可為哉是故必説一乘慳者與小之謂貪者護大之謂若人信歸佛如來不欺誑亦無貪嫉意斷諸法中惡故佛於十方而獨無所畏我以相嚴身光明照世間無量衆所尊為説實相印四信心歸佛故若人不慕餘乘唯希大法信心歸佛信得如來不以人不見而熱謾不以我不知而妄語又信得未嘗吝法而不與人未嘗嫉人而不與法何以故以如來五住究盡在在稱尊故能有扣即應毫無畏怯寧獨不為我説乎由我不信佛乘正恐説而無益故不為我説耳如是自咎倍加深信爾時即現相好莊嚴之身亦如今日放白毫光普照世界為説實相法印是故必説一乘言印者謂一乘實相若朝廷印璽然以此一印印一切法故舍利弗當知我本立誓願欲令一切衆如我等無異如我昔所願今者已滿足化一切衆生皆令入佛道五如來本願故言我從無量劫來立大誓願若我成佛時度一切衆生悉皆成佛知我無異今欲滿本願是故必説一乘若我遇衆生盡教以佛道無智者錯亂迷惑不受教我知此衆生未曾修善本堅著於五欲癡愛故生惱以諸欲因緣墜墮三惡道輪回六趣中備受諸苦毒受胎之微形世世常增長薄德少福人衆苦所逼迫入邪見稠林若有若無等依止此諸見具足六十二深著虗妄法堅受不可捨我慢自矝高諂曲心不實於千萬億劫不聞佛名字亦不聞正法如是人難度是故舍利弗我為設方便説諸盡苦道示之以涅槃我雖説涅槃是亦非真滅諸法從本來常自寂滅相佛子行道已來世得作佛我有方便力開示三乘法一切諸世尊皆説一乘道今此諸大衆皆應除疑惑諸佛語無異唯一無二乘此明如來開權也問若爾何故又説二説三答機不同故若以此法對大智人説則歡喜領荷若以此法對小根無智人説則法不設根謂之錯亂顛倒不唯不信反生迷惑我知此等衆生未種善根堅著五欲皆由發業潤生二種無明復生瞋等種種煩惱由煩惱迷心耽著五欲造種種業由惑業故墜墮三塗受種種報此即衆生濁也由轉輪故有廣大威神而不能用向父母胎中受此眇小形軀世世生生貪愛相滋惑業增長福德日消於火宅中常為大火之所燒煮不能自出即命濁也即有發心欲出火宅不遇明師反修邪道依止斷常復生六十二見此見濁也由著諸見報身為我堅愛不捨恃我生憍貢高矜詡各各自謂成無上道不知皆是虗妄浮心並非真實此即煩惱濁也心言不直毀害潛生於千萬劫不聞佛法如是之人卒難得度此即劫濁也由彼墮於五濁世中纏綿不斷故我權開種種方便為説三十七品盡苦之道而復示以涅槃之樂誘令出苦然我雖説涅槃之樂是遣生死之苦耳非實如來空事境界自性涅槃也以如來自性涅槃從本已來本自寂滅不復更滅故佛子若肯信此涅槃一肩擔荷力行此道當來世中必得作佛更不待三生六十劫也我雖設種種法門開示衆生皆是方便據實而論三世諸佛唯説一乘無二法故今此大衆更莫存留一念疑情固當虗心領受以諸佛異口同音唯説一乘無二乘故仰山作沙彌時念經聲高乳源和尚咄云這沙彌念經恰似哭曰慧寂秖甚麼和尚却如何師乃顧視仰曰若甚麼與哭何異師乃休所謂唯一無二乘也過去無數劫無量滅度佛百千萬億種其數不可量如是諸世尊種種緣譬喻無數方便力演説諸法相是諸世尊等皆説一乘法化無量衆生令入於佛道又諸大聖主知一切世間天人羣生類深心之所欲更以異方便助顯第一義若有衆生類值諸過去佛若聞法布施或持戒忍辱精進禪智等種種修佛慧如是諸人等皆已成佛道諸佛滅度後若人善軟心如是諸衆生皆已成佛道諸佛滅度已供養舍利者起萬億種塔金銀及玻璃硨磲與碼瑙玫梅瑰規琉璃珠清淨廣嚴飾莊校於諸塔或有起石廟栴檀及沉水木樒眉并餘材甎專瓦泥土等若於曠野中積土成佛廟乃至童子戲聚沙為佛塔如是諸人等皆已成佛道若人為佛故建立諸形像雕刻成衆相皆已成佛道或以七寶成鍮偷妬十赤白銅白鑞拏及鉛元錫鐵木及與泥或以膠漆布嚴飾作佛像如是諸人等皆已成佛道彩畫作佛像百福莊嚴相自作若使人皆已成佛道乃至童子戲若草木及茟或以指爪甲而畫作佛像如是諸人等漸漸積功德具足大悲心皆已成佛道但化諸菩薩度脫無量衆若人於塔廟寶像及畫像以華香幡蓋敬心而供養若使人作樂擊鼓吹角貝簫笛琴箜空篌侯琵琶鐃銅鈸鉢如是衆妙音盡持以供養或以歡喜心歌唄頌佛德乃至一小音皆已成佛道若人散亂心乃至以一華供養於畫像漸見無數佛或有人禮拜或復但合掌乃至舉一手或復小低頭以此供養像漸見無量佛自成無上道廣度無數衆入無餘涅槃如薪盡火滅若人散亂心入於塔廟中一稱南無佛皆已成佛道於諸過去佛在世或滅後若有聞是法皆已成佛道此明過去諸佛亦以方便説法唯一無二也更以下言不但説三乘法是方便是助發又不但以放光為方便為助發更有多種奇異方便助發也如起塔廟造佛像或供一華或舉一手或合掌或低頭無非助顯衆生日用一件大事悉與如來放光等無差別所謂諸有所作常為一事龐居士云日用事無別唯吾自偶諧神通及妙用運水併搬柴正此義也由衆生視此為尋常世尊讚之為奇異要人知此一段奇異事正在尋常日用中故於放光處助發又於日用處助顯也若有下先明修六度萬行者皆已成佛道已成二字是言自己具有佛性為因其六度萬行皆緣也正如木中之火礦中之金是因其鑽之銷之者是緣也諸佛下次明修十善四諦十二緣者皆成佛道諸佛下三明供舍利起七寶塔造栴檀廟乃至積土為廟聚沙為塔皆成佛道者雖精粗不同等妙剎故世尊與衆行次以手指地云此處宜建梵剎帝釋將一莖草插於地上云建梵剎已竟便是這箇道理若人下四明造佛像者皆成佛道彩畫下五明畫佛像者皆成佛道若人下六明敬心供養佛像者皆成佛道有以香華幢蓋敬心供養者有以衆妙聲音敬心供養者有以歡喜歌唄頌佛德者七明散心供養畫像者有以散心合掌低頭作供養者有以散心一稱南無佛作供養者此等微因皆成佛道雖敬散不同等妙心故所謂融瓶盤叉釧為一金攪酥酪醍醐為一味者燈明之力歟抑妙光之力歟謂之奇異不亦宜乎昔調達臨終稱南無未及佛字已墮地獄佛記其地獄出當作辟支佛字曰南無又外國事天神者以金為像頭賊來取之稱南無佛便得像金頭明日衆聚天像失頭衆云我雖造像無天來著若天著者云何失頭天即降一人云賊來取頭時稱南無佛諸天驚動故得我便是故失頭衆人云天不如佛耶既不如佛何不尊事賊稱南無佛尚得天頭況賢者稱南無佛不得無上菩提乎未來諸世尊其數無有量是諸如來等亦方便説法一切諸如來以無量方便度脫諸衆生入佛無漏智若有聞法者無一不成佛諸佛本誓願我所行佛道普欲令衆生亦同得此道未來世諸佛雖説百千億無數諸法門其實為一乘諸佛兩足尊知法常無性佛種從緣起是故説一乘是法住法位世間相常住於道場知已導師方便説此明未來諸佛亦以方便説法唯一無二故一觸耳根無不成佛諸佛本誓下言諸佛本願故説一乘諸佛兩足下為發起大根故説一乘言兩足者福足慧足也知法常無性者知者覺也法者即衆生心也常者真常不變也無性者無自性他性也若此法不常即成斷滅何有五性若性定有五則聲聞緣覺及諸衆生決定不得作佛由知此法常而無性故隨熏習而各自成性所謂不變隨緣隨不變也故涅槃云無性之性即是佛性唯此佛性雖是衆生具有必以大乘法久遠熏習方能發起此世尊所以必説一乘也故六祖云汝等佛性譬如種子我今説法猶如時雨遇茲霑洽悉得發生承吾旨者決得菩提依吾行者定證妙果是法下開權也言此法是無位真人本無位次然四聖六凡諸法位中皆是此法所住之位故知頭頭法法無非皆是平等一寂滅相然必待坐道場開佛慧時方知此法成等正覺知此法已以方便力開種種門説種種法故知説大説小無非一法天人所供養現在十方佛其數如恆沙出現於世間安隱衆生故亦説如是法知第一寂滅以方便力故雖示種種道其實為佛乘知衆生諸行深心之所念過去所習業欲性精進力及諸根利鈍以種種因緣譬喻亦言辭隨應方便説此明現在諸佛亦先證寂滅法後以方便説三乘其實皆為一乘也知衆生所行者即種種所行道也深心之所念者即衆生心所念也過去所習業者即先世善惡業也欲性精進等者即若干諸欲性也今我亦如是安隱衆生故以種種法門宣示於佛道我以智慧力知衆生性欲方便説諸法皆令得歡喜此釋迦自謂亦是先説三乘實為一乘也衆苦不逼之謂安亂想不生之謂隱鋪文演義之謂宣放光入定之謂示舍利弗當知我以佛眼觀見六道衆生窮貧無福慧入生死險道相續苦不斷身著於五欲如牛愛尾以貪愛自蔽盲瞑無所見不求大勢佛及與斷苦法深入諸邪見以苦欲捨苦為是衆生故而起大悲心此明開權之所以無福曰貧無慧曰窮生死險道即三惡道也相續苦不斷者苦果也五欲者苦因也言我所以説三乘者有故由我初成道時開佛知見即以佛眼洞觀十方見六道衆生不修佛慧轉輪生死無有間斷推其所因皆由身著五欲譬如牛自愛其尾而卒為人害也衆生既以貪愛自蔽耽著五欲秪見其樂不見其苦如盲瞑然既眷戀於受胎微形復匍匐於生死險道遂將自己一尊巍巍堂堂大勢力佛棄之弗顧又不肯求斷苦之方甘心就死即有靈知發露欲出三界然而不遇明師不聞正法入邪見網更修邪戒邪定為出世因求出三界止如掘地覓天索冰於火惡可得哉如來愍此顛倒衆生所以興起大悲悉令拔濟也我始坐道場觀樹亦經行於三七日中思惟如是事我所得智慧微妙最第一衆生諸根鈍著樂癡所盲如斯之等類云何而可度爾時諸梵王及諸天帝釋護世四天王及大自在天并餘諸天衆眷屬百千萬恭敬合掌禮請我轉法輪我即自思惟若但讚佛乘衆生沒在苦不能信是法破法不信故墜於三惡道我寧不説法疾入於涅槃尋念過去佛所行方便力我今所得道亦應説三乘此下追敘三七思惟也是世尊四十年來心事復將盡情吐露一番以見説三説一悉依古佛法式非自撰也言我見此受苦衆生而興拔濟猶有許多難處故我初坐菩提樹下成正覺時觀樹經行者欲以菩提大樹蔭覆清涼一切衆生也然而必三思者熟思細審而後行也我所下敘初七思惟言我所得智慧甚深無量是未曾有是最殊勝復觀衆生信等五根淺薄陋劣既為五欲所纏又為無明所翳我法如此其機如此衆生云何而得度脫由我在三昧中興此一念説法度生之心梵釋諸天一時齊赴請轉法輪所以龍興雲起虎嘯風生也我即下二七思惟也我若即轉最上法輪衆生正沒大苦海中則法不稱機機不達法不但不能令彼生信抑且反令生謗破壞正法彼若謗法必墮三途是説法無益於生而反有害於生故我寧不説法速入涅槃之為愈也尋念下三七思惟也過去諸佛證道果時即開種種方便法門化度衆生今我説法亦當以過去諸佛而為儀式也作是思惟時十方佛皆現梵音慰喻我善哉釋迦文第一之導師得是無上法隨諸一切佛而用方便力我等亦皆得最妙第一法為諸衆生類分別説三乘少智樂小法不自信作佛是故以方便分別説諸果雖復説三乘但為教菩薩此敘諸佛慰喻也言我三七思惟欲行方便契合佛心故諸佛現身安慰曉喻且稱讚云釋迦既得如來平等道法而為世出世間第一導師尚不肯自專自用能隨諸佛所行方便不亦善哉即我等諸佛悉得最妙第一平等之法亦為衆生根性不同好樂各別亦向無分別中分別説三何以故由彼智慧狹劣但樂貧所樂法不信自己是佛不肯承當故是如來以方便力説三乘道而為中途小歇場地其實但為教菩薩法非實化以小乘道也舍利弗當知我聞聖師子深淨微妙音稱南無諸佛復作如是念我出濁惡世如諸佛所説我亦隨順行思惟是事已即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘説是名轉法輪便有涅槃音及以阿羅漢法僧差別名從久遠劫來讚示涅槃法生死苦永盡我常如是説此明如來昔日説三是倣效古佛儀式也一聞慰喻而稱南無佛者歸敬之辭也既歸敬已復作念云我今既出五濁世中如佛所説開方便門我今決定隨順如來依而行之作念已畢即趣鹿野苑中三轉四諦法輪然我所證一乘道法本來寂滅不容有聲安有所謂法僧差別之名由我權設方便巧合機宜故為憍陳如等五比丘説四諦時於是寂滅之法始得變通運轉便有轉法輪之名即以所證之法為涅槃復以能證之人為羅漢又以能轉法輪者為佛於是將此一味之法裂而為三名曰別相三寶復讚之曰此涅槃法是我從久遠劫中讚揚開示者汝等若得此法生死永盡不受後有有此利益故我於四十年中常作如是説也舍利弗當知我見佛子等志求佛道者無量千萬億咸以恭敬心皆來至佛所曾從諸佛聞方便所説法我即作是念如來所以出為説佛慧故今正是其時此如來自陳今日説一乘亦是倣效古佛儀式也言我又見大根器人不樂小法信力堅固志求無上菩提以恭敬心來至我所此等佛子於過去劫曾聞諸佛説方便法根器調熟回心慕大我即作念如來實為一大事因緣出現於世非為二乘小小因緣也欲説佛慧正當其時豈得不説所謂若人信歸佛為説實相印也由我具足方便知見二波羅蜜故我曲大小而不遺也舍利弗當知鈍根小智人著相憍慢者不能信是法今我喜無畏於諸菩薩中正直捨方便但説無上道菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛如三世諸佛説法之儀式我今亦如是説無分別法此下結上文説大説小之意言汝應知我此時正當演説佛慧尚有一等不肯回心鈍根羅漢守一隅而不反聞大法而驚疑住涅槃而不捨踞法我而生憍如此等人於甚深法不能生信乃有拂衣而去者今有捨故習慕大乘以恭敬心來至我所求殊勝法豈易得哉故我喜其不生畏怯自肯承當是菩薩器我即為彼捨去枝岐直下指出長安大道是故菩薩一聞是法即生敬信疑網皆除若羅漢亦聞是法而生敬信亦得授記如是則我對小説三對大説一源源本本悉依古佛恆規非自創也故我今日説無分別法者亦是倣古佛之儀式耳諸佛興出世懸遠值遇難正使出於世説是法復難無量無數劫聞是法亦難能聽是法者斯人亦復難譬如優曇華一切皆愛樂天人諸希有時時乃一出聞法歡喜讚乃至發一言則為已供養一切三世佛是人甚希有過於優曇華汝等勿有疑我為諸法王普告諸大衆但以一乘道教化諸菩薩無聲聞弟子長行以危言激其信頌中又以四難堅其信先言佛出世難如下文云一百八十劫空過無有佛又云過於百千劫未曾見是相又云於昔無量劫空過無有佛是也正使下次言説法者難四十年來能為下劣取相凡夫忍於斯事未曾吐露直至根熟志純心相體信然後方説豈不是難無量下三言聞法者難具威音之餘績帶智勝之遺塵者尚不能眨起眉毛承當此事豈不是難能聽下四言聽法者難不但一聞頓悟者難即歷耳根而不生誹謗不起怨嫉者亦難如不輕高唱瓦石亂加靈山會上尚有退席豈不是難故知巴歌和衆雪曲應稀也且無論佛出世難説法難聞法而悟入者難值如優曇鉢華即聽而不生誹謗怨嫉者是優曇出現豈易易哉無論聞法而悟入者過於優曇即聞法而不起怨嫉而生歡喜不生誹謗而興讚嘆者此人希有過於優曇則為供養諸佛功德等無有異何以故一切諸佛皆從此經流出故四難如此利益如此汝等今日既聞此法豈有不生難遭之想而復疑生惑者耶故勉之曰汝等無有疑也且我為法王於法自在決不賺誤後人故我今日於人天中出大音聲普告大衆云三世諸佛出現於世唯以一乘平等道法教化菩薩無有餘乘汝等當深信而無疑也汝等舍利弗聲聞及菩薩當知是妙法諸佛之祕要以五濁惡世但樂著諸欲如是等衆生終不成佛道當來世惡人聞佛説一乘迷惑不信受破法墮惡道有慚愧清淨志求佛道者當為如是等廣讚一乘道舍利弗當知諸佛法如是以萬億方便隨宜而説法其不習學者不能曉了此汝等既已知諸佛世之師隨宜方便事無復諸疑惑心生大歡喜自知當作佛此下付囑流通也祕要者擬心即差豈不是祕開口便是豈不是要正如輪王髻珠國之利器不肯輕易授人何以故以惡世中人耽著諸欲唯求人天因果不求佛道故祕而不説也昔初祖達磨初見梁王王即問云朕印經造像有何功德答實無功德又問如何是聖諦第一義諦答曰廓然無聖曰對朕者誰答曰不識帝不契遂人少林面壁九年此便是一箇樣子故勉之曰如此妙法三世諸佛尚不肯輕泄汝等亦當保持覆護勿妄宣傳當來下正明非器莫傳言惡人者不但造五逆十惡者名惡人但是聞此經而不信反生毀謗者此人即與造五逆十惡者無異此等斷佛種性墮無間獄故遇斯等人斷不可説有慚下又明遇人即授慚者言我巍巍堂堂大丈夫相如何甘為下劣之事愧者見人授記作佛時即自念云彼既丈夫我胡不爾有慚愧者即是尋常自咎自責如舍利弗者是也無法相曰清無非法相曰淨既有慚愧又不著相而志求佛道不樂餘乘如此等人心專志一的是大乘法器方堪授受汝當為彼廣讚此經令生歡喜舍利下總結諸佛所得道法不過證此一法而已更無奇特故曰諸佛法如是所謂諦觀法王法法王法如是也不但諸佛所證是一即諸佛度生亦不過將此一法左支右吾隨人解縛而已更無實法與人臨濟所謂佛法無多子是也此等法門其未學者固不知此今我既為汝等滿盤托出無復餘蘊汝等已知諸佛為世間導師不過將此一法隨人授與更無別事亦無奇特汝等更莫生疑當生大喜直下承當決定自知成佛不謬故六祖云自心作佛更莫狐疑李都尉云學道須是鐵漢把手心頭便判直取無上菩提一切是非莫管
