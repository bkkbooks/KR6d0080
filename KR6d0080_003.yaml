body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋藥草喻品第五頌云二木兼三草根莖大不齊一時同受雨隨分各生荑密樹團成幄柔華散作溪最憐萍與梗歲歲沒深泥譬喻一品為四大弟子喻明四十年前所説三乘是權今日所説最上一乘是實信解一品四大弟子領悟説三説一之旨此品雖與四大弟子述成却將前意轉換言我四十年前所説之法皆是一乘本無有三但機器有三見法有三耳故此品名自含二義謂約機約法約機者謂三草二木種性不同而所生所潤未嘗不一喻如五乘習種不同而一相一味之法本來平等然品不言二木獨言藥草者正顯如來四十年中實以大乘法雨平等灑但彼藥草根性下劣隨分受潤自私自小非法雨有私故下文云雖一地所生一雨所潤而諸草木各有差別是也約法者謂四十年中所説諸法皆是伽陀妙藥能療一切膏肓之疾但觸口沾唇皆得利益故下文云如來觀見無量衆生諸根利鈍精進懈怠隨其所堪而為説法皆令歡喜快得善利是也具此二義故以為名爾時世尊告摩訶迦葉及諸大弟子善哉善哉迦葉善説如來真實功德誠如所言如來復有無量無邊阿僧祇功德汝等若於無量億劫説不能盡迦葉當知如來是諸法之王若有所説皆不虗也善説如來真實功德誠如所言者謂如來真實功德非口所宣但汝所引長者始而中止一城以侯子常悔恨以憶子遣旁人以追子灑冷水以醒子設方便以誘子著垢衣以親子執糞器以近子勸勤作以勗子如米麵以安子無欺怠以讚子更與作而重子出衆寶以示子直至心相體信自鄙先心然後盡家業以付子如此形容實獲我心誠為善説然此亦是就汝心量可知可及處名善説耳不知如來尚有無量無邊阿僧祇功德汝等於無量億劫説不能盡非謂如來真實功德便爾爾也此句是此品張本又是化城一品之案迦葉下勸信言如來是諸法之王一字一言皆是實語不可不深生敬信也於一切法以智方便而演説之其所説法皆悉到於一切智地如來觀知一切諸法之所歸趣亦知一切衆生深心所行通達無礙又於諸法究盡明了示諸衆生一切智慧言如來功德所以説不盡者以如來四十年前所説一切世出世法無非皆以智慧善巧方便隨根逐性而為演説然其所説皆是一相一味無非欲令一切衆生皆悉到於如來一切智地實無所謂三乘也如來下言如來知法也謂如來知十善是教人天法知四諦是教小乘法知十二緣是教中乘法知六度是教菩薩法乃至教一切異類法皆悉了知皆有結局處亦知下言如來知機也又知十善是人天深心所行四諦是小乘深心所行十二緣是辟支深心所行六度是菩薩深心所行乃至異類衆生深心所行者殲悉皆知無有障礙又於諸法究盡明了者究竟諸法實相也示諸衆生一切智慧者示以平等佛慧也此言如來知機知法故能在差別機中示平等佛慧也問衆生之機既有差別何故如來是以平等佛慧答以機雖有異而所具智慧等無有異若謂機有異而智慧有異者則法法差別則如來不得名曰究竟明了亦不得曰示一切智慧以此智慧衆生具有物物平等唯佛究盡唯佛明了故開口動舌無非皆以此法示人汝等未能究盡未能明了便謂如來法有差別烏能盡知如來功德哉故汝等於如來真實功德可名善説未能竟其説也迦葉譬如三千大千世界山川溪谷土地所生卉木叢林及諸藥草種類若干名色各異密雲彌布遍覆三千大千世界一時等澍其澤普洽卉木叢林及諸藥草小枝小莖小枝小葉中根中莖中枝中葉大根大莖大根大葉諸樹大小隨上中下各有所受一雲所雨稱其種性而得生長華果敷實雖一地所生一雨所潤而諸草木各有差別此設喻以明差別機中示平等佛慧也山川溪谷土地喻五乘本住性所生卉木叢林藥草喻五乘習種性從一地而生三草二木喻性地是一因習種而分五乘也密雲下喻如來現身普蔭衆生猶如大雲遍覆世界也一時下喻如來以平等慧説平等法普利衆生猶如時雨平等普滋一切草木也卉木下喻五乘根性隨上中下各受平等法雨也一雲下喻五乘人受平等法雨隨習種而生芽發幹開華結實各各不同也雖一下喻五乘同在平等性地同沾一味法雨然隨習種各有差別非本性有差別也六祖所云心地含諸種普雨悉皆萌是也此一喻將世尊平等説法之意寫得極透迦葉當知如來亦復如是出現於世如大雲起以大音聲普遍世界天人阿修羅如彼大雲遍覆三千大千國土於大衆中而唱是言我是如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊未度者令度未解者令解未安者令安未涅槃者令得涅槃今世後世如實知之我是一切知者一切見者知道者開道者説道者汝等天人阿羅修衆皆應到此為聽法故爾時無數千萬億種衆生來至佛所而聽法如來于時觀是衆生諸根利鈍精進懈怠隨其所堪而為説法種種無量皆令歡喜快得善利是諸衆生聞是法已現世安隱後生善處以道受樂亦得聞法既聞法已離諸障礙於諸法中任力所能漸得入道如彼大雲雨於一切卉木叢林及諸藥草如其種性具足蒙潤各得生長此以法合喻也如大雲起者合密雲彌布也以大下合一時等澍其澤普洽也大經亦云譬如摩那斯龍王將欲降雨未便即降先起大雲彌覆虗空凝停七日待諸衆生作務究竟過七日已降微細雨普潤大地如來亦復如是將降法雨未便即降先興法雲成熟衆生待其熟已然後普降甘露法雨是也而唱下所謂大音也言未得如來滅度者我令彼度未解諸佛平等法者我令彼解有疑悔而未得安心者我令彼安在煩惱而未得涅槃者我令彼得此四法者或今世得或後世得我皆實知所謂知機知法也我是下又出知機知法之所以一切知者具四智也一切見者具五眼也由具四智五根故能自知此道而又能將此道開示人説與人能使未度者度未解者解未安者安未得者得也汝等下招其來也為聽下一音招告故大衆雲奔雨集也如來下觀根也隨其下逗教也為精進者説六度為懈怠者説四諦為利根者説十二緣為鈍根者説人天法等雖是觀機逗教無非皆是平等法雨故令彼無量衆生生歡喜而得善利此合隨根莖大小而各受雨也是諸下合受雨而生長也如人中聞十善即能受持現世即得安隱後世仗十善之力復生天上由此十善種子熏習增長還受樂果而於天上又得聞十善法由天中善法熏習之力後復增長離諸障礙十善如此餘法亦然人天如此三乘亦然如來於諸法中任彼力量所堪能者而為説法令彼種子熏習增長漸漸入道如此如彼下以喻合法可知如來説法一相一味所謂解脫相離相滅相究竟至於一切種智其有衆生聞如來法若持讀誦如説修行所得功德不自覺知所以者何唯有如來知此衆生種相體性念何事思何事修何事云何念云何思云何修以何法念以何法思以何法修以何法得何法衆生住於種種之地唯有如來如實見之明了無礙如彼卉木叢林諸藥草等而不自知上中下性如來知是一相一味之法所謂解脫相離相滅相究竟涅槃常寂滅相終歸於空佛知是已觀衆生心欲而將護之是故不即為説一切種智汝等迦葉甚為希有能知如來隨宜説法能信能受所以者何諸佛世尊隨宜説法難解難知此下申明如來知法知機故能以法投機也先申明知法如來法雨法法皆如同一相也物物皆洽同一味也因衆生沾法雨而超纏縛即以此法名解脫相沾法雨而離十二緣即以此法名離相沾法雨而得寂滅即以此法名寂滅相名雖有三其究也皆至如來一切種智歸宗所謂一味禪也故大經云譬如衆水皆是一味隨器異故水有差別如來説法唯是一味隨諸衆生心器異故無量差別此如來觀知一切諸法之所歸趣如此其有下次申明知機言衆生聞法道成德備不自覺知亦唯如來知也種相體性者種謂熏習種子相謂受報好醜體謂形體各別性謂善惡三性此知衆生過去事也念何事者如念天上受樂欲生天上等云何念者謂知其所念之故如厭人間受苦故念天上樂等以何法念者謂以何法然後能生天上等念既如此思修亦然天中如此三乘亦然此知衆生現在事也以何法得何法者如現在修如是因未來必受如是果此知衆生未來事也由衆生各處種種地位己實不知唯如來知所謂如來亦知一切深心所行通達無礙如此如彼下以喻合法可知如來下三申明以法投機也如來了知三相即是一相終歸于本來無物第一義聖智大空由如來知此一法觀諸衆生種性不同嗜好各異恐彼不能擔荷將之護之故雖以一音密闡不即為彼説破必待機熟而後説也所謂諸法究盡明了示諸衆生一切智慧如此汝等下結讚當機言如來真實功德如此即無量劫説不能盡但汝等一聞譬喻即能信受如來隨宜説法故知甚為希有何以故如來隨宜説法難解難知今汝等能信能受豈非甚為希有哉爾時世尊欲重宣此義而説偈言破有法王出現世間隨衆生欲種種説法如來尊重智慧深遠久默斯要不務速説有智若聞則能信解無智疑悔則為永失是故迦葉隨方為説以種種緣令得正見初四句頌權智也破有有義一是破三有而出三界曰破有一是現世間而破衆生之有有曰破有言如來破三有而現身世間説種種法不過隨人好樂脫粘去縛破衆生之有而已初未嘗以實法與人也以如來為三界師四生父尊如須彌重如九鼎其所得智慧深固幽遠譬如大海之難測虗空之難量故一言一動發必有時不肯輕泄是故四十年中久默而不務速説何以故若是根熟器純一經耳根即能信入永無退轉若淺根小智聞則必疑疑則必悔悔則必謗謗則必墮惡道如是之人不唯不得則為永失矣此如來不以平等佛慧速授與人故以漸陶熏染日就月將令彼捨偏邪而得正眼此如來所以稱破有法王也迦葉當知譬如大雲起於世間遍覆一切慧雲含潤電光晃黃上聲耀雷聲遠震令衆悅豫日光掩蔽地上清涼靉愛霴逮垂布如可承攬其雨普等四方俱下流澍無量率土充洽山川險谷幽邃所生卉木藥草大小諸樹百苗稼甘蔗葡萄雨之所潤無不豐足乾地普洽藥草並茂其雲所出一味之水草木叢林隨分受潤一切諸樹上中下等稱其大小各得生長根莖枝葉華果光色一雨所及皆得鮮澤如其體相性分大小所潤是一而各滋茂此頌密雲彌布也慧雲含潤者喻如來應身具含十二部經也機鋒似電故曰電光晃耀法語如雷故曰雷聲遠震六十二種邪光不現故曰日光掩蔽九十八種熱惱皆除故曰地上清涼現身世間如雲氣垂布故曰靉霴垂布人可得而同不可得而雜故曰如可承攬也其雨四句頌一時等澍其澤普洽也山川下十四句頌卉木叢林各有所受也乾地普洽者喻不但信心者得霑法澤即不信者亦得霑澤也一切下四句頌稱性而得生長華實也根莖下八句頌同地同雨隨種性而各有差別也佛亦如是出現于世譬如大雲普覆一切既出于世為諸衆生分別演説諸法之實大聖世尊於諸天人一切衆中而宣是言我為如來兩足之尊出于世間猶如大雲充潤一切枯稿衆生皆令離苦得安隱樂世間之樂及涅槃樂諸天人衆一心善聽皆應到此覲無上尊我為世尊無能及者安隱衆生故現于世初四句合大雲普覆既出下四句合出大音聲大聖下即所謂大音也言枯稿衆生者即未沾法雨之人得安隱樂者令疑悔者得安心也世間樂者四禪八定也涅槃樂者寂滅樂也諸天下八句招告大衆也為大衆説甘露淨法其法一味解脫涅槃以一妙音演暢斯義常為大乘而作因緣我觀一切普皆平等無有彼此愛憎之心我無貪著亦無限礙恆為一切平等説法如為一人衆多亦然常演説法曾無他事去來坐立終不疲厭充足世間如雨普潤貴賤上下持戒毀戒威儀具足及不具足正見邪見利根鈍根等雨法雨而無懈倦此頌如來平等説法合等澍而普洽也言甘露法者能除衆生煩熱渴惱故解脫下言昔日與三乘所説解脫涅槃皆是以一音演暢非有二也常為大乘而作因緣者所謂入大乘為本也我觀下言我所以平等説法者由我觀一切衆生皆悉具足平等法性故我無有彼此愛憎之心恆為一切説平等法亦不論一人多人但以此事諄諄教誨曾無疲怠令彼求法之人隨其所堪悉令充足虗往實歸正如以一味雨普潤一切也貴賤下八句即法雨所被之機也一切衆生聞我法者隨力所受住於諸地或處人天轉輪聖王釋梵諸王是小藥草知無漏法能得涅槃起六神通及得三明獨處山林常行禪定得緣覺證是中藥草求世尊處我當作佛行精進定是上藥草又諸佛子專心佛道常行慈悲自知作佛決定無疑是名小樹安住神通轉不退輪度無量億百千衆生如是菩薩名為大樹佛平等説如一味雨隨衆生性所受不同如彼草木所稟各異此下合隨根性而受法不同也或處下聞法而住人天乘名小草知無下聞法而得聲聞緣覺乘名中草求世下行事六度却向佛邊覓佛者為上草又諸下是向自己腳跟下求佛不從他處覓者為小樹安住下謂得六根互用分證法空度無量衆者為大機佛平下結顯言佛平等説一味法而衆生所受不同如此佛以此喻方便開示種種言辭演説一法於佛智慧如海一滴此結答迦葉也言我今日即以平等一味法雨普潤一切以喻如來種種因緣譬喻方便演説一法度脫無量衆生皆得平等佛慧雖然如是若以如來所證甚深佛慧較之正如將滴水以喻大海也佛慧如是即我亦不能説其萬分之一豈汝所能説哉此當在各得成實之下我雨法雨充滿世間一味之法隨力修行如彼叢林藥草諸樹隨其大小漸增茂好諸佛之法常以一味令諸世間普得具足漸次修行皆得道果聲聞緣覺處於山林住最後身聞法得果是名藥草各得增長若諸菩薩智慧堅固了達三界求最上乘是名小樹而得增長復有住禪得神通力聞諸法空心大歡喜放無數光度諸衆生是名大樹而得增長如是迦葉佛所説法譬如大雲以一味雨潤於人華各得成實此下合受法雨而增長敷華結實也隨力修行者即任力所能也漸增茂好者即漸得入道也藥草增長者始也聞四諦法斷生死證涅槃為得道果聞十二因緣法斷諸緣證勝性為得道果今則得無上大果為真聲聞為真緣覺豈非增長小樹增長者始也自知作佛決了無疑今則智慧堅固永無退轉又能了達三界猶如空華求最上乘不生畏縮豈非增長大澍增長者始也住不動地踞寂滅定心得自在不肯度生如來三橋七勸為説法空心大歡喜即能放光度無量衆豈非增長如是下總收法喻也潤於人華各得成實者言如來説一味法令諸衆生受法味而各證道果正如大雲以一味雨普潤一切卉木藥草名得敷華結實也迦葉當知以諸因緣種種譬喻開示佛道是我方便諸佛亦然今為汝等説最實事諸聲聞衆皆非滅度汝等所行是菩薩道漸漸修學悉當成佛此叮嚀告誡以堅其信也言我四十年中以種種因緣譬喻説法皆是開發指示一佛乘道四十年前未曾説破故我今日以最實事為汝説也諸聲聞衆向來坐守涅槃一事不為非真滅度汝等當知日用所行折旋俯仰拈匙把筯等事皆是菩薩堂堂大路汝等從此漸漸修學至於功成行滿成最正覺方得名為究竟滅度耳昔石梯和尚見侍者托鉢赴堂乃喚侍者者應諾師曰甚麼處去者曰上堂齋去師曰我問汝本分事者曰若是本分事某甲實是上堂齋去師曰汝不謬為我侍者又趙州在東司上見文遠過驀喚文遠遠應諾師曰東司上不可與汝説佛法所謂汝等所行是菩薩道也授記品第六頌云弟子承當處如來授記時從茲改頭面不復戀茅茨國界雖新主華叢盡故杖縱然今日到端的已嫌遲梵語和伽羅此云授記諄諄付與之謂授歷歷在心之謂記言我遠在大通智勝佛處近在二萬億佛所為無上道常教化汝汝今悉忘故我今日重復拈起諄諄付與汝當歷歷在心勿莫忘也問必待悟後方授記者何答如祖師悟後方傳衣鉢也故鶖子一聞法説斷疑生信踊躍歡喜如來即與授記四大弟子再聞譬喻自覺前非深生信解方得授記故在未信之前旁通曲導左挈右提俟其一番徹骨心相體信然後授之永無忘失故須悟後方授記也問諸大弟子皆出生死證涅槃然而授記之時皆曰事無量佛具菩薩道當得作佛者何也答諸聲聞衆雖斷六識破我執證生空得心自在未能盡業識破法執證法空得法自在其於佛法不啻太倉一粒九牛一毛故須歷事諸佛廣學道法使事事精了法法明透於三阿僧劫勤菩鍊行轉無明業識成一圓融清淨寶覺方得成報身佛故從今日授記之後行菩薩道始名學佛人始稱佛弟子是以動經多劫也問迦葉奉覲三百萬億諸佛方得菩提須菩提供養三百萬億那由它佛方得菩提迦栴延供養二萬八千億佛方得菩提目連供養二萬億八千佛方得菩提諸大弟子同聞妙法同得授記及成菩提則又遲速不同者何也答此亦隨其根性耳此唯佛知諸大弟子亦不自知前所謂而不自知上中下性是也由彼不自知如來所以諄諄付與令彼歷歷在心勤而行之勿更忘却也爾時世尊説是偈已告諸大衆唱如是言我此弟子摩訶迦葉於未來世當得奉覲三百萬億諸佛世尊供養恭敬尊重讚歎廣宣諸佛無量大法於最後身得成為佛名曰光明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊國名光德劫名大莊嚴佛壽十二小劫正法住世二十小劫像法亦住二十小劫國界嚴飭無諸穢惡瓦礫荊棘便利不淨其土平正無有高下坑坎堆阜琉璃為地寶樹行列黃金為繩以界道側散諸寶華周遍清淨其國菩薩無量千億諸聲聞衆亦復無數無有魔事雖有魔及魔民皆護佛法爾時世尊欲重宣此義而説偈言告諸比丘我以佛眼見是迦葉於未來世過無數劫當得作佛而於來世供養奉覲三百萬億諸佛世尊為佛智慧淨修梵行供養最上二足尊已修習一切無上之慧於最後身得成為佛其土清淨琉璃為地多諸寶樹行列道側金繩界道見者歡喜常出好香散衆名華種種奇妙以為莊嚴其他平正無有丘坑諸菩薩衆不可稱計其心調柔逮大神通奉持諸佛大乘經典諸聲聞衆無漏後身法王之子亦不可計乃以天眼不能數知其佛當壽十二小劫正法住世二十小劫像法亦住二十小劫光明世尊其事如是於未下植福也廣宣下修慧也福慧二嚴方成兩足尊也別號光明者因中以紫金塗佛形像世世生生身常金色故為羅漢時名飲光成佛時名光明也又在此會領得諸佛平等法光明故世尊末後拈華迦葉微笑如來即以正法眼藏涅槃妙心付囑迦葉迦葉將此一光傳與阿難阿難以後展轉流通以至此方一華五葉綿綿不絶皆迦葉之力歟故知傳佛心宗者也須奉覲三百萬億諸佛得成菩提誰曰宗門無佛可成乎國名光德者此國以光明勝劣顯德故劫名大莊嚴者亦以光明為莊嚴故國界下出莊嚴事也琉璃為地者無穢惡也寶樹行列者無荊棘也金繩界道者無坑坎堆阜也寶華周遍清淨者無便利不淨也其國下眷屬也魔皆護法者皆是不思議菩薩也偈頌可知爾時大目犍連須菩提摩訶迦栴延等皆悉悚聳栗立一心合掌瞻仰尊顏目不暫捨即共同聲而説偈言大雄猛世尊諸釋之法王哀愍我等故而賜佛音聲若知我深心見為授記者如以甘露灑除熱得清涼如從飢國來忽遇大王膳心猶懷疑懼未敢即便食若復得王教然後乃敢食我等亦如是每惟小乘過不知當云何得佛無上慧雖聞佛音聲言我等作佛心尚懷憂懼如未敢便食若蒙佛授記爾乃快安樂大雄猛世尊常欲安世間願賜我等記如飢須教食此弟子請記也見授記而不及其名為失大利故悚栗也斷人之所不能斷忍人之所不能忍行人之所不能行證人之所不能證故曰大雄猛世尊而又曰諸釋中之法王也且世尊向來哀愍我等不獲如來寶藏枉受貧窮故賜授記作佛之語今授記而不賜佛名莫不心懷熱惱若如來證知我等深心見為稱名授記何異甘露灑心頓令肺腑清涼也如從下喻明正如有人從飢國來忽值大王賜宴之時雖珍羞盈案寶饌滿前不得王命稱名宣召不敢受宴若得賜綸音乃敢受耳我等下法合言我等尋常思惟小乘過失好樂佛慧然不知當云何得正如飢人之思食也忽聞如來授記作佛然未唱名不知佛名何等心懷憂懼不敢擔荷正如逢王膳而不名不召故不敢食也若蒙賜佛號爾時乃得快爽安樂不懷憂懼矣且如來慈愍常欲安慰一切世間今者我等心懷悚栗世尊寧有不安慰者乎今願賜我等名號方能進修正如飢人之待教而後敢食也請記之語亦是小乘取價除糞之習爾時世尊知諸大弟子心之所念告諸比丘是須菩提於當來世奉覲三百萬億那由它佛供養恭敬尊重讚嘆常修梵行具菩薩道於最後身得成為佛號曰名相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊劫名有寶國名寶生其土平正玻璃為地寶樹莊嚴無諸丘坑沙礫力荊棘便利之穢寶華覆地周遍清淨其土人民皆處寶臺珍妙樓閣聲聞弟子無量無邊算數譬喻所不能知諸菩薩衆無數千萬億那由它佛壽十二小劫正法住世二十小劫像法亦住二十小劫其佛常處虗空為衆説法度脫無量菩薩及聲聞衆爾時世尊欲重宣此義而説偈言諸比丘衆今告汝等皆當一心聽我所説我大弟子須菩提者當得作佛號曰名相當供無數萬億諸佛隨佛所行漸具大道最後身得三十二相端正姝書妙猶如寶山其佛國土嚴淨第一衆生見者無不愛樂佛於其中度無量衆其佛法中多諸菩薩皆悉利根轉不退輪彼國常以菩薩莊嚴諸聲聞衆不可稱數皆得三明具六神通住八解脫有大威德其佛説法現於無量神通變化不可思議諸天人民數如恆沙皆供合掌聽受佛語其佛當壽十二小劫正法住世二十小劫像法亦住二十小劫須菩提在母胎時即知空寂為羅漢時名空生成佛時別號名相者先得真空後得妙有也離名相而談空非真空離真空而談名相非妙有今即相即空即空即相可謂真空妙有妙有真空矣故知向空劫已前承當佛未出世時薦取者也須奉覲三百萬億那由他佛具菩薩道方得成佛也劫名有寶國名寶生者從真空得智慧寶故爾時世尊復告諸比丘衆我今語汝是大迦栴延於當來世以諸供具供養奉事八千億佛恭敬尊重諸佛滅後各起塔廟高千由旬縱廣正等五百由旬以金銀琉璃硨磲瑪瑙真珠玫梅瑰規七寶合成衆華瓔珞塗香末香燒香繒情蓋幢幡供養塔廟過是已後當復供養二萬億佛亦復如是供養是諸佛已具菩薩道當得作佛號曰閻浮那提金光如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其土平正玻璃為地寶樹莊嚴黃金為繩以界道側妙華覆地周遍清淨見者歡喜無四惡道地獄餓鬼畜生阿修羅道多有天人諸聲聞衆及諸菩薩無量萬億莊嚴其國佛壽十二小劫正法住世二十小劫像法亦住二十小劫爾時世尊欲重宣此義而説偈言諸比丘衆皆一心聽如我所説真實無異是迦栴延當以種種妙好供具供養諸佛諸佛滅後起七寶塔亦以華香供養舍利其最後身得佛智慧成等正覺國土清淨度脫無量萬億衆生皆為十方之所供養佛之光明無能勝者其佛號曰閻浮金光菩薩聲聞斷一切有無量無數莊嚴其國迦栴延因中勤掃佛地為羅漢時能以議論莊嚴佛智慧光名曰文飾成佛時號閻浮那提金光以身光如閻浮樹金故要知談鋒似箭辨口如河者也須供養二萬八千億佛方得菩提此無劫國名號者或譯人遺失也爾時世尊復告大衆我今語汝是大目犍連當以種種供具供養八千諸佛恭敬尊重諸佛滅後各起塔廟高千由旬縱廣正等五百由旬以金銀琉璃硨磲碼瑙真珠玫瑰七寶合成衆華瓔珞塗香末香燒香繒蓋幢幡以用供養過是已後當復供養二百萬億諸佛亦復如是當得成佛號曰多摩羅跋栴檀香如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊劫名喜滿國名意樂其土平正玻璃為地寶樹莊嚴散真珠華周遍清淨見者歡喜多諸天人菩薩聲聞其數無量佛壽二十四小劫正法住世四十小劫像法亦住四十小劫爾時世尊欲重宣此義而説偈言我此弟子大目犍連捨是身已得見八千二百萬億諸佛世尊為佛道故供養恭敬於諸佛所常修梵行於無量劫奉持佛法諸佛滅後起七寶塔長表金剎華香伎樂而以供養諸佛塔廟漸漸具足菩薩道已於意樂國而得作佛號多摩羅栴檀之香其佛壽命二十四劫常為天人演説佛道聲聞無量如恆河沙三明六通有大威德菩薩無數志固精進於佛智慧皆不退轉佛滅度後正法當住四十小劫像法亦爾我諸弟子威德具足其數五百皆當授記於未來世咸得成佛我及汝等宿世因緣吾今當説汝等善聽目連作羅漢時神通第一故成佛時號栴檀香此香若燒一銖普熏小千世界亦神速故要知飛行輕舉現火現龍者也須供養二百萬億八千諸佛方得菩提劫名喜滿國名意樂者由衆生見神通香而喜聞神通香而樂故我及四句結上文而生下文也化城喻品第七頌云五百由旬外誰言是故居風光非本地縱好亦蘧盧有所非真實無城是掠虗大通諸子在試問定何如本無忽有故曰化禦敵防非故曰城此品雖與弟子説宿世因緣實發譬喻藥草之餘蘊蓋譬喻一品意在火宅白牛此品意在化城寶所出火宅而入化城駕白牛而至寶所兩相合而意始圓此品雖説如來在大通智勝佛時為十六沙彌覆説法華已為汝等作今日得度因緣然正發明藥草品中法雨等澍各有所受於諸法中任刀所能漸得入道等文所謂如來復有無量無邊阿僧祇功德汝等於無量億劫説不能盡者此也然譬喻品中鶖子才悟即為説因緣云我昔在二萬億佛所常教化汝汝亦長夜隨我受學其為因緣也近此品為千二百羅漢説其因緣在不可思議阿僧祇劫前為十六沙彌已曾開導教化汝等其為因緣也遠以因緣有近遠故各自言之使交相發而互相明也文中首標大通智勝佛者是往昔為釋迦之父所謂毗盧師法身主不落方所不涉數量者是也其成佛轉法輪事皆是逢場作戲耳至于十六沙彌才出家時即請大法代佛轉輪其氣象又非瑣瑣者比故能即紹大通之位與大通智勝一鼻孔出氣豈同下劣小乘若跛驢駑䇿之而不肯進者哉世尊所以援古證今者亦是激發小乘令彼奮發捨小智而入大通之智耳佛告諸比丘乃往過去無量無邊不可思議阿僧祇劫爾時有佛名大通智勝如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其國名好城劫名大相諸比丘彼佛滅度已來甚大久遠譬如三千大千世界所有地種假使有人磨以為墨過於東方千國土乃下一點大如微塵又過千國土復下一點如是展轉盡地種墨於汝等意云何是諸國土若算師若算師弟子能得邊際知其數不不也世尊諸比丘是人所經國土若點不點盡抹末為塵一塵一劫彼佛滅度已來復過是數無量無邊百千萬億阿僧祇劫我以如來知見力故觀彼久遠猶若今日爾時世尊欲重宣此義而説偈言我念過去世無量無邊劫有佛兩足尊名大通智勝如人以力磨三千大千土盡此諸地種皆悉以為墨過於千國土乃下一塵點如是展轉點盡此諸塵墨如是諸國土點與不點等復盡抹為塵一塵為一劫此諸微塵數其劫復過是彼佛滅度來如是無量劫如來無礙智知彼佛滅度及聲聞菩薩知見今滅度諸比丘當知佛智淨微妙無漏無所礙通達無量劫普遍廣容曰大四開八達曰通能應萬有曰智超出一切曰勝國名好城者莊嚴妙好勝一切城故劫名大相者曠大久遠數量難窮故彼佛下顯此佛在空劫已前本無始終不涉數量故以塵點為喻也僧問趙州空劫中還有人修行否師曰汝喚甚麼作空劫曰無一物是師曰這個秪稱得修行喚甚麼作空劫僧無對故知凡涉修行一路盡屬有劫非空劫也我以如來知見力故觀彼久遠猶若今日者由我開佛知見即以佛知佛見觀彼塵劫前事不異觀目前也正顯菩提之道無去來今偈中如來下言此塵點劫事如此久遠如來以無礙智觀彼佛滅度聲聞菩薩歷歷分明猶如今日者以如來具四智故佛智者大圓鏡智也淨者平等性智也微妙者妙觀察智也無漏無所礙者成所作智也具此四智故能通達無量劫猶若今日也古佛名大通智釋迦以四無礙智通之似空合空如鏡照鏡不知孰為古而孰為今也佛告諸比丘大通智勝佛壽五百四十萬億那由它劫其佛本坐道場破魔軍已垂得阿耨多羅三藐三菩提而諸佛法不現在前如是一小劫乃至十小劫結加趺坐身心不動而諸佛法猶不在前爾時忉利諸天先為彼佛於菩提樹下敷師子座高一由旬佛於此坐當得阿耨多羅三藐三菩提適坐此座時諸梵天王雨衆天華面百由旬香風時來吹去萎尾華更雨新者如是不絶滿十小劫供養於佛乃至滅度常雨此華四王諸天為供養佛常擊天鼓其餘諸天作天伎樂滿十小劫至於滅度亦復如是諸比丘大通智勝佛過十小劫諸佛之法乃現在前成阿耨多羅三藐三菩提此言大通成佛請轉法輪事也本坐道場者言此古佛雖是本來在道場坐不曾動著必要破盡魔軍方得名為新成古佛今言垂得菩提佛法不現者以生相無明猶在故有垂得之心未至乎圓滿菩提歸無所得故佛法不現古德所謂毫釐有差天地懸隔是也乃至十劫身心不動佛法猶不現者正見抱守功勳坐在病處殊不知孤危不立道方高也昔南嶽謂馬大師云汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛無定相便是此理由彼得心未捨坐相未空墮在數量故無量甚深佛慧不得現前也爾時下言佛未趺坐時忉利諸天先為設座佛於下天主祝辭適坐下言大通恰坐此座則梵天散華欲界四王諸天擊鼓其餘諸天奏樂自成佛以至滅度皆如是者正顯如來在世滅度原無二也過十小劫佛法現前者十者數之終數量銷滅一斷盡斷一證盡證也此段正顯大通智勝始存一念垂得之心即此一念自生障隔不得大通智亦不勝直至忘數量而平等佛慧方得現前方得名為大通智勝耳況小乘守滅定而不捨守小智而不離又烏能知甚深無量平等之佛慧哉其佛未出家時有十六子其第一者名曰智積諸子各有種種珍異玩好之具聞父得成阿耨多羅三藐三菩提皆捨所珍往詣佛所諸母涕泣而隨送之其祖轉輪聖王與一百大臣及餘百千萬億人民皆共圍繞隨至道場咸欲親近大通智勝如來供養恭敬尊重讚歎到已頭面禮足繞佛畢已一心合掌瞻仰世尊以偈頌曰大威德世尊為度衆生故於無量億歲爾乃得成佛諸願已具足善哉吉無上世尊甚希有一坐十小劫身體及手足靜然安不動其心常憺淡怕泊未曾有散亂究竟永寂滅安住無漏法今者見世尊安隱成佛道我等得善利稱慶大歡喜衆生常苦惱盲茫瞑明無導師不識苦盡道不知求解脫長夜增惡趣減損諸天衆從冥入於冥永不聞佛名今佛得最上安隱無漏道我等及天人為得最大利是故咸稽首歸命無上尊燈明有八子出家者表在纏八識意在轉八識而成四智也大通有十六子出家者表十六心意在轉小智而向大智也第一名智積者言雖具大智尚有凝滯未至大通也諸子下謂諸子盡將平生所得寶惜愛護者棄如涕唾至佛所而求平等佛智慧寶也諸子非一母生故曰諸母涕泣而送者未能割愛也其祖轉輪聖王即大通之父也轉輪聖王禮子足者出世法王即父不以子子之也偈中世尊下讚十小劫中事身體二句讚身不動其心二句讚心不動如此十劫用功至於生滅既滅寂滅現前方得安住無漏大菩提法今見世尊已超三界安隱成道我等必沾善澤所以稱慶大喜也何以故由諸衆生常在三塗受諸苦惱久處暗冥又無明眼導師方便引誘既不識盡苦之方又不知解脫之道長夜昏昏無歸無救所以惡趣轉增諸天益少在三塗中頭出頭沒從冥入冥豈但不得見佛抑且永不聞名今佛已得最上道法我及天人又得聞名覩相向後必沾最大利益所以稱慶歡喜稽首歸命也爾時十六王子偈讚佛已勸請世尊轉於法輪咸作是言世尊説法多所安隱憐愍饒益諸天人民重説偈言世雄無等倫百福自莊嚴得無上智慧願為世間説度脫於我等及諸衆生類為分別顯示令得是智慧若我等得佛衆生亦復然世尊知衆生深心之所念亦知所行道又知智慧力欲樂及修福宿命所行業世尊悉知已當轉無上輪此十六沙彌請轉法輪也十六沙彌才得出家見佛便有濟世之心即時請轉法輪其氣槩雄視一世真偉丈夫哉言多所安隱者能使愚者智不肖者賢懦者立弱者強倒懸者解利益甚廣故曰多也偈中世尊下謂如來具十力故知現在衆生念何事行何道得何智樂何法修何福又知過去作何業故能隨機授法今我等志慕大乘世尊必知我心亦定為我等轉無上輪也佛告諸比丘大通智勝佛得阿耨多羅三藐三菩提時十方各五百萬億諸佛世界六種震動其國中間幽冥之處日月威光所不能照而皆大明其中衆生各得相見咸作是言此中云何忽生衆生又其國界諸天宮殿乃至梵宮六種震動大光普照遍滿世界勝諸天光此以光告大衆也釋迦放光為末後一著大通放光為最初一句蓋最初一句不異末後一著故其光明亦徹上徹下以徹下故鐵圍山間鬼窟衆生各得相見以徹上故梵宮震動勝諸天光言勝者因佛光遍照天光掩蔽故曰勝也爾時東方五百萬億諸國土中梵天宮殿光明照曜倍於常明諸梵天王各作是念今者宮殿光明昔所未有以何因緣而現此相是時諸梵天王即各相詣共議此事時彼衆中有一大梵天王名救一切為諸梵衆而説偈言我等諸宮殿光明昔未有此是何因緣宜各共求之為大德天生為佛出世間而此大光明遍照於十方爾時五百萬億國土諸梵天王與宮殿俱各以衣裓盛諸天華共詣西方推尋是相見大通智勝如來處於道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪即時諸梵天王頭面禮佛繞百千匝即以天華而散佛上其所散華如須彌山并以供養佛菩提樹其菩提樹高十由旬華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願垂納處時諸梵天王即於佛前一心同聲以偈頌曰世尊甚希有難可得值遇具無量功德能救護一切天人之大師哀愍於世間十方諸衆生普皆蒙饒益我等所從來五百萬億國捨深禪定樂為供養佛故我等先世福宮殿甚嚴飾今以奉世尊惟願哀納受爾時諸梵天王偈讚佛已各作是言惟願世尊轉於法輪度脫衆生開涅槃道時諸梵天王一心同聲而説偈言世雄兩足尊唯願演説法以大慈悲力度苦惱衆生爾時大通智勝如來默然許之各作是念者諸天生疑也以何因緣而有此瑞者不知光之所因故疑也是時下相議推求也偈中為大德天生者梵天修禪定兼修四無量心故曰大德天爾時下尋光見佛與宮殿俱者以有隨身宮殿故曰俱衣裓盛華者備供佛也推尋是相者推求尋覓光相之所自出也即時下散華奉殿散華而及其樹者敬其主以及其樹也先供華而後奉殿者先以微禮進而後進其厚禮也時諸下説偈讚佛我等下自陳來處及來意也言我宿世修如意福因感此隨身宮殿故將此以奉佛也爾時諸梵下請轉法輪爾時大通下如來默許言默許者口不言而心許也已上歷敘種種佛事其意重在尋光見佛以人人有佛個個有光但不知光之所自故不得見佛耳若知光明之所自出其見佛也不遠故梵天作念以何因緣而現此相東方天王向西方尋南方天人向北方尋東南天人向西北方尋等皆是描寫佛光無在而無乎不在無有定處故東看則西南觀成北其實此光不離大通智勝佛邊故一見佛皆歡喜讚歎即捨所珍而求無上法王大寶也又諸比丘東南方五百萬億國土諸大梵王各自見宮殿光明照曜昔所未有歡喜踴躍生希有心即各相詣共議此事時彼衆中有一大梵天王名曰大悲為諸梵衆而説偈言是事何因緣而現如此相我等諸宮殿光明昔未有為大德天生為佛出世間未曾見此相當共一心求過千萬億土尋光共推之多是佛出世度脫苦衆生爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣西北方推尋是相見大通智勝如來處於道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願垂納受爾時諸梵天王即於佛前一心同聲以偈頌曰聖主天中王迦陵頻伽聲哀愍衆生者我等今敬禮世尊甚希有久遠乃一現一百八十劫空過無有佛三惡道充滿諸天衆減少今佛出於世為衆生作眼世間所歸趣救護於一切為衆生之父哀愍饒益者我等宿福慶今得值世尊爾時諸梵天王偈讚佛已各作是言唯願世尊哀愍一切轉於法輪度脫衆生時諸梵天王一心同聲而説偈曰大聖轉法輪顯示諸法相度苦惱衆生令得大歡喜衆生聞此法得道若生天諸惡道減少忍善者增益爾時大通智勝如來默然許之先共議推求諸大梵者每一國土各有大梵故曰諸偈中過千萬億土尋光共推之者言此光不在此土當過千萬億土之外求之要知此光雖過千萬億土元不離當處也爾時下尋光見佛時諸下散華奉殿聖主下説偈讚佛言聖主天中王者聖中之聖故曰主天中之天故曰王闞澤云孔老之教奉天而行不敢違天釋迦之教諸天奉行不敢違佛故曰天中王也空過下謂世無導師無以開化故作惡者多而作善者少也為衆生作眼者百八十劫空過無佛衆生在長夜中冥無所見無所趨向今佛出世為衆生作眼目使人有所見有所趨向也言救護者已入惡道者救之令出未入惡道者護之不入故曰哀愍而又曰饒益也今者遇佛決非小緣皆由我等宿生植福植慶故今生才得值佛耳已上皆自慶之辭爾時下請轉法輪諸法相者謂自相共相生滅相不生滅相人天法相聲聞法相菩薩法相諸佛法相等言諸衆生久在三塗受諸苦惱不䬸法味若得聞法相精勤修習必得道果或得生天則轉惡道而成善道轉善道而成聖道有此利益故請轉法輪也爾時下如來默許又諸比丘南方五百萬億國土諸大梵王各自見宮殿光明照曜昔所未有歡喜踊躍生希有心即各相詣共議此事以何因緣我等宮殿有此光曜而彼衆中有一大梵天王名曰妙法為諸梵衆而説偈言我等諸宮殿光明甚威嚁此非無因緣是相宜求之過於百千劫未曾見是相為大德天生為佛出世間爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣北方推尋是相見大通智勝如來處於道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願垂納受爾時諸梵天王即於佛前一心同聲以偈頌曰世尊甚難見破諸煩惱者過百三十劫今乃得一見諸飢渴衆生以法雨充滿昔所未曾覩無量智慧者如優曇鉢華今日乃值遇我等諸宮殿蒙光故嚴飾世尊大慈愍惟願垂納受爾時諸梵天王偈讚佛已各作是言唯願世尊轉於法輪令一切世間諸天魔梵沙門婆羅門皆獲安隱而得度脫時諸梵天王一心同聲以偈頌曰唯願天人尊轉無上法輪擊于大法鼓而吹大法螺普雨大法雨度無量衆生我等咸歸請當演深遠音爾時大通智勝如來默然許之西南方乃至下方亦復如是先共議推求爾時下尋光見佛時諸下散華奉殿爾時下説偈讚佛破諸煩惱者五住究盡故曰諸也諸飢渴衆生者謂佛不出世衆生久乏法喜禪悅之食甘露解脫之漿故皆飢渴今既得見佛必以法食充足世間使飢者得飽滿渴者亦得清涼也過一百三十劫未曾得見而今日現何異優曇現瑞乎且以光明及我宮殿故宮殿蒙光亦增嚴飾也爾時下請轉法輪魔天作惡梵天修善沙門是正婆羅是邪言使若善若惡若邪若正心未安者皆安未靜者皆靜未得度脫者咸得度脫也梵天名沙法故能請轉大法輪也擊鼓者警其惰吹螺者一其志雨雨者澤其枯稿由轉無上輪故演深遠音也爾時下如來默許西南下超略二方爾時上方五百萬億國土諸大梵王皆悉自覩所止宮殿光明威耀昔所未有歡喜踊躍生希有心即各相詣共議此事以何因緣我等宮殿有斯光明時彼衆中有一大梵天王名曰尸棄為諸梵衆而説偈言今以何因緣我等諸宮殿威德光明曜嚴飾未曾有如是之妙相昔所未聞見為大德天生為佛出世間爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣下方推尋是相見大通智勝如來處於道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願垂納處時諸梵天王即於佛前一心同聲以偈頌曰善哉見諸佛救世之聖尊能於三界獄勉出諸衆生普智天人尊哀愍羣萌類能開甘露門廣度於一切於昔無量劫空過無有佛世尊未出時十方常暗瞑三惡道增長阿修羅亦盛諸天衆轉減死多隨惡道不從佛聞法常行不善事色力及智慧斯等皆減少罪業因緣故失樂及樂想住於邪見法不識善儀則不蒙佛所化常墮於惡道佛為世間眼久遠時乃出哀愍諸衆生故現於世間超出成正覺我等甚欣慶及餘一切衆喜歎未曾有我等諸宮殿蒙光故嚴飾以今奉世尊惟垂哀納受願以此功德普及於一切我等於衆生皆共成佛道爾時五百萬億諸梵天王偈讚佛已各白佛言唯願世尊轉於法輪多所安隱多所度脫時諸梵天王而説偈言世尊轉法輪擊甘露法鼓度苦惱衆生開示涅槃道唯願受我請以大微妙音哀愍而敷演無量劫習法先共議推求爾時下尋光見佛時諸下散華奉殿善哉下説偈讚佛三界獄者前以三界喻火宅者以有五欲燒煮故此以三界喻獄者以有煩惱囚縛故群萌者即群生也草之初生曰萌言群生皆有善芽萌於內特無緣以發之耳今如來垂愍以甘露澤潤之使彼大小各遂其生也世尊未出時無有光明照耀世間故十方衆生俱處長夜不修十善俱墮三塗此等皆由不見如來端嚴妙相又不聞如來十善法音常行十惡無明愈重心量愈小故感色力智慧亦漸減少而受胎微形世世增長造諸惡業受報三塗既失人天涅槃之樂又不生人天涅槃之想即有萌善心者自不具眼復遇邪師修邪見法不識三千威儀不修八萬細行反持牛狗等戒為生天因以求出苦果由彼不遇如來正法開化雖求出苦而反入於苦也爾時下請轉法輪爾時大通智勝如來受十方諸梵天王及十六王子請即時三轉十二行法輪若沙門婆羅門若天魔梵及餘世間所不能轉謂是苦是苦集是苦滅是苦滅道此大通受請轉法輪也先小後大是古佛之恆規故先説四諦也言三轉者一示相轉此是苦逼迫性此是集招感性此是滅可證性此是道可修性也言示相者謂以四諦之相示之也此是苦逼迫性者言此身是生老病死之宅舍由有此身衆苦逼迫不得自在故此是集招感性者謂此苦身皆由自己貪愛五欲之所招集故即發業潤生無明也此是滅可證性者謂欲出苦果須是證寂滅樂故即無為法也此是道可修性者謂欲證寂滅須修道品故即三十七品助道法也二勸修轉者復以四法勸彼進修也此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修三作證轉者復以自己作證以勵之也此是苦我已知汝亦應知此是集我已斷汝亦應斷此是滅我已證汝亦應證此是道我已修汝亦應修言轉者謂將此法轉入衆生之心也轉必三者以根有三也十二行者行謂行業苦集是世間行滅道是出世間行三轉總有十二行也法輪者輪有摧碾義謂三轉四法皆能摧碾三界煩惱故然此四法唯如來具足方便波羅蜜故能轉其餘魔梵等無方便慧故不能轉及廣説十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱無明滅則行滅行滅則識滅識滅則名色滅名色滅則六入滅六入滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱滅言廣説者謂將四諦為中根人演為十二緣也此是廣苦集為流轉門廣滅道為還滅門也無明緣行者大經云於第一義諦不了名為無明謂愚癡者要先迷於所應知事次即於彼發起邪行等此無明是約迷四諦理從空橫起此即發業無明也所作業果是行言業者即福非福不動業也是彼無明所起果故行緣識者大經云行依止初心是識謂行為緣有初心識由行熏心有當果種及現行故識緣名色者大經云與識共生四取蘊為名色言識者即是現行識支也識在種邊唯是賴耶在現行位通於六識今揀現非種故云共生四蘊識蘊已屬所依識故四蘊為名羯羅藍等為色故名色緣六入者大經云名色增長為六處謂四七後諸根位滿六處明盛名增成意色增成餘五以四蘊為名時未分識相今意識明了故名為增以堅肉時未分五根但名一色今色根漸具故又開為五也六入緣觸者大經云根境識三事和合為觸觸雖是一據識分六然此六觸復攝為二前五名對觸意觸名增語觸觸雖無對所依五根是有對故眼等五識唯緣青等不緣青等名意識能緣青等亦緣青等名從境立名名增語觸俱舍頌云於三愛因異未了知名觸三受因者謂三受境境能生受故名為因即出胎時三兩歲來由未能了三故不名受而名觸也觸緣受者大經云觸共生名受分別三受領納於觸名觸共生俱舍頌云在淫愛前受謂五六歲至十四五時已了三受因差別相未起淫愛但名為受涅槃云染著一愛名之為受謂衣食愛也受緣愛者大經云於受染著是愛謂於三受中樂受纏綿希求故曰染著即是中下品貪俱舍云貪資具淫愛謂十五六後貪妙資具淫愛現行未廣追求但名為愛此即潤生無明也愛緣取者大經云愛增長是取謂雖攝餘惑而愛潤勝故説愛增俱舍云遍馳求名取取謂貪也謂年既長大貪五欲境四方馳求不憚勞倦故愛取別者初起名愛相續轉一故別立取名也取緣有者大經云取所起有漏業為有由取心所造諸業故名有漏此業親能招當果故名為有俱舍頌云有謂正能造牽當有果業由馳求故積集能牽當有果業業名為有有當果故以因從果故業名有也有緣生者大經云從業起蘊為生此約增上云從業起始從中有以至本有未衰變來皆名為生以業是善惡生是異熟無記果故若約因緣從二取種親生為生蘊熟為老蘊壞名死即諸衰變位名為蘊熟四十已後容顏漸衰既屬於老身壞命終乃名為死已上緣緣相生名流轉門所謂無明愛取三煩惱行有二支屬業道從識至受并生死七事同名一苦道即是惑業苦三也無明滅下還滅門也如無明一法先用推因智以推其因次用審因智以審其因次第推審現在過去未來悉無自體方得除滅一法既爾諸法皆然問無明有界內界外此斷何等答此斷界內無明即發潤二無明也若界外無明初住分斷至等覺而斷盡佛於天人大衆之中説是法時六百萬億那由它人以不受一切法故而於諸漏心得解脫皆得深妙禪定三明六通具八解脫第二第三第四説法時千萬億恆河沙那由他等衆生亦以不受一切法故而於諸漏心得解脫從是已後諸聲聞衆無量無邊不可稱數此四衆得益也不受一切法者意識滅盡故諸漏者即三漏也心得解脫諸漏盡而得心自在也深妙禪定者即滅盡定也具八解脫者亦名八背捨謂背此淨潔五欲捨此著心故名背捨一內有色相外觀色謂行人先觀自己色身相狀爛壞不淨不可愛樂一心寂靜更想皮肉脫落但見白骨有八色光明故曰內有色相又為欲界貪欲難斷雖已自觀內色不淨復以不淨觀於它人之色令生厭惡以求斷除故又曰外觀色也此即初背捨在初禪天定二內無色相外觀色謂行人為入二禪已滅內身色相故云內無色又為欲界貪欲難斷故猶觀外不淨相令生厭惡以求斷除故又云外觀色也此即第二背捨位在二禪天定三淨背捨身作證淨者謂緣於淨相也謂行人於第二背捨後除去外色不淨相但於定中練習八色光明清淨皎潔猶如妙寶色故曰淨背捨心既明淨樂漸增長遍滿身中悉皆怡悅故又曰身作證也此即第三背捨位在三禪天定四虗空處背捨謂行人於欲界已除棄自身不淨之色初背捨後又除棄內身白骨之色第二背捨後又除棄外身一切不淨之色尚餘八種淨色皆依心住若心捨色色即謝滅一心緣空與空相應即入無邊虗空處定故云虗空處背捨此即第四背捨位在四禪天定五識處背捨謂行人在捨虗空處一心緣識入定時即觀此定依五陰等悉皆無常苦空無我虗誑不實心生厭背而不愛著故云識處背捨六無所有處背捨謂行人若捨識處一心緣無所有處入定時即觀此定依五陰等悉皆無常苦空無我虗誑不實心生厭背而不愛著故名無所有處背捨七非有想處非無想處背捨謂行人若捨無所有處一心緣非有想非非想入定時即觀此定依五陰等悉皆無常苦空無我虗誑不實心生厭背而不愛著故名非有想非非想背捨八滅受想背捨受即欲受想即思想即五陰中受想二心也謂行人厭患此心散亂欲入定休息故背滅受想諸心是名滅受想背捨修此觀故發無漏智慧斷三界見思證羅漢果即轉名八解脫也已上是大通為中下二根説四諦十二緣也爾時十六王子皆以童子出家而為沙彌諸根通利智慧明了已曾供養百千萬億諸佛淨修梵行求阿耨多羅三藐三菩提俱白佛言世尊是諸無量千萬億大德聲聞皆已成就世尊亦當為我等説阿耨多羅三藐三菩提法我等聞已皆共修學世尊我等志願如來知見深心所念佛自證知爾時輪轉聖王所將衆中八萬億人見十六王子出家亦求出家王即聽許此十六沙彌請轉大法輪也童子出家即樂大法故在娑婆世界初降生時即云天上天下唯我獨尊諸根下嘆德也通利明了者通則不泥乎小道利則不樂乎漸乘明則不居乎陰界了則不滯乎中途已曾供佛者植福已廣淨修梵行者種德已深俱白下請大法也言小乘樂小法如來即以小法授之成就道果我等志樂大法如來當以大法授我我等修學必證大果也又言我等深心所念唯此一事如來具一切智必知我心不待我等三請懇求也八萬億人求出家者上行下效也爾時彼佛受沙彌請過二萬劫已乃於四衆之中説是大乘經名妙法蓮華教菩薩法佛所護念説是經已十六沙彌為阿耨多羅三藐三菩提故皆共受持諷誦通利説是經時十六菩薩沙彌皆悉信受聲聞衆中亦有信解其餘衆生千萬億種皆生疑惑佛説是經於八千劫未曾休廢説是經已即入靜室住於禪定八萬四千劫此大通為大根説大法也受請而又過二萬劫方説者亦是久默斯要不務速説必待其憤憤悱悱好樂之極而後啓發之也説是下沙彌持經也受者領納於心不遺一字持者拳拳服膺守而勿失諷誦者諷讀而習誦也信受者深信而領受也餘皆生疑者大聲不入里耳也日月燈明説法華經六十小劫謂如食頃此則經八千劫未曾休廢者所謂塵説剎説熾然説無間歇也經畢入定者復以法華三昧默示之也是時十六菩薩沙彌知佛入室寂然禪定各升法座亦於八萬四千劫為四部衆廣説分別沙法華經一一皆度六百萬億那由它恆河沙等衆生示教利喜令發阿耨多羅三藐三菩提心大通智勝佛過八萬四千劫已從三昧起往詣法座安詳而坐普告大衆是十六菩薩沙彌甚為希有諸根通利智慧明了已曾供養無量千萬億數諸佛於諸佛所常修梵行受持佛智開示衆生令入其中汝等皆當數數親近而供養之所以者何若聲聞辟支佛及諸菩薩能信是十六菩薩所説經法受持不毀者是人皆當得阿耨多羅三藐三菩提如來之慧此沙彌代轉法輪也言菩薩沙彌者謂沙彌時即能擔當大事故曰沙彌而又曰菩薩也昔高沙彌參藥山山問甚處來答曰南嶽來山曰何處去曰江陵受戒去山曰受戒圖甚麼曰圖免生死山曰有一人不受戒亦無生死可免汝還知麼曰恁麼則佛戒無用山曰這沙彌猶挂唇齒在即禮拜而退一日山云長安甚閙曰吾國晏然山曰汝從看經得請益得曰不從看經得不從請益得山曰大有人不看經不請益為甚麼不得曰不道不得只是不肯承當一日山曰何不受戒去曰知是般事便休更喚甚麼作戒若高沙彌者可謂菩薩沙彌也各升法座者由佛入定衆無所聞故各代佛轉輪也一一下所度之衆示謂指示如言此是善此是惡等教謂教誨如言善當行惡當捨等利謂利益如令行惡者捨惡而行善令得利益等喜謂懼喜隨其小善而讚歎之令生歡喜勤行不退等以此四事莊嚴佛法令彼發菩提心大通下沙彌得記開示衆生令入其中者言度一切衆生皆令入佛慧也既曰度衆生入佛慧則自證佛慧可知故雖不言授記即授記之事也佛告諸比丘是十六菩薩常樂説是妙法蓮華經一一菩薩所化六百萬億那由它恆河沙等衆生世世所生與菩薩俱從其聞法悉皆信解以此因緣得值四萬億諸佛世尊于今不盡諸比丘我今語汝彼佛弟子十六沙彌今皆得阿耨多羅三藐三菩提於十方國土現在説法有無量百千萬億菩薩聲聞以為眷屬其二沙彌東方作佛一名阿閦在歡喜國二名須彌頂東南方二佛一名師子音二名師子相南方二佛一名虗空住二名常滅西南方二佛一名帝相二名梵相西方二佛一名阿彌陀二名度一切世間苦惱西北方二佛一名多摩羅跋栴檀香神通二名須彌相北方二佛一名雲自在二名雲自在王東北方佛名壞一切世間怖畏第十六我釋迦牟尼佛於娑婆國土成阿耨多羅三藐三菩提此言十六沙彌授記之後行法師事度衆生也一一下言所化皆大根也由聞妙法因緣故六百萬億那由它恆河沙等大根衆生世世生生常與十六菩薩共生一處從其聞法悉得信解又藉此聞經得度因緣得值四萬億佛至今不絶諸比下言十六沙彌從法師而得法王也東方震方也震為雷動物也動萬物者莫疾乎雷佛名阿閦者此翻不動須彌頂者此翻妙高峨然突出亦不動之象正顯無明動處證不動智也東南巽方也巽為風撓萬物者莫疾乎風佛名師子音師子相者師音一吼百獸惱裂巽風一鼓萬竅怒號故易曰巽以行權謂以權實二智降魔伏冤故南離方也離為火燥物也燥萬物者莫燥乎火佛名虗空住者如日在空無所不照故又名常滅者以有智慧日無明常滅故聖人南面而聽天下童子南詢以求知識蓋取諸此西諸方也坤為地順物也載萬物者莫厚乎地佛名帝相梵相者厚德載物帝相也統王大千梵相也西兌方也兌為澤悅萬物者莫悅乎澤佛名阿彌陀此云無量壽慧澤無窮故又名度一切世間苦惱者以慧澤及人令人除熱惱而得清涼故西北乾方也乾為天健物也始萬物者莫神乎天佛名栴檀香神通者不速而疾不行而至故又名須彌相高出萬物故北坎方也坎為水潤萬物者莫潤乎水佛名雲自在又名雲自在王者以無心潤萬物如雲行雨施故東北艮方也艮為山終萬物而始萬物者莫盛乎艮佛名壞一切世間者一止能壞滅一切世間法故又名釋迦牟尼此云能仁寂默一止能成就一切世間法故所謂災火欲壞之時一吹頓滅世界將成之際舉念全收此萬物之所以成始而成終也易曰帝出乎震齊乎巽相見乎離致役乎坤悅言乎兌戰乎乾勞乎坎成言乎艮偶與此相符故引及之以見世出世法原無二也佛無定方而必定方所者為衆生而各王一方也又見佛身無在而無乎不在也方方各二者忍智合説也諸比丘我等為沙彌時各各教化無量百千萬億恆河沙等衆生從我聞法為阿耨多羅三藐三菩提此諸衆生於今有住聲聞地者我常教化阿耨多羅三藐三菩提是諸人等應以是法漸入佛道所以者何如來智慧難信難解爾時所化無量恆河沙等衆生者汝等諸比丘及我滅度後未來世中聲聞弟子是也至此才吐正意言我等昔為沙彌説法華時各各教化無量百千萬億恆河沙衆生此諸衆生從我聞法本願皆欲成就無上菩提由彼中途盡忘本願自以為足至今尚有住聲聞地者然我未嘗不以菩提法授之但彼器量狹小不能盡受故我以一味法雨平等普滋令彼漸入佛道所謂於諸法中任力所能漸得入道者如此爾時下點破言我往昔為沙彌時所化無量恆河沙等衆生皆非異人即今現在千二百羅漢及未來聲聞弟子是也由是言之不但今日始為汝等説一乘法即從無量劫來已為汝等説一乘法直至於今未嘗有異汝等猶不能荷擔者何也我滅度後復有弟子不聞是經不知不覺菩薩所行自於所得功德生滅度想當入涅槃我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經唯以佛乘而得滅度更無餘乘除諸如來方便説法此言未來弟子亦以是法漸入佛道也意謂佛在世時現前弟子親得覲佛聞法華經得入佛道信矣若未來世佛既入滅無人説法不聞是經亦不知覺日用所行是菩薩道自謂已得究竟涅槃此等弟子我亦不捨我在餘國作佛更名易號彼等還藉宿世因緣復生一處求佛智慧我即為説此經令彼得入平等佛慧故知始終所説皆一佛乘除佛乘外餘所説者皆是如來方便語耳此見如來悲心極於三世所謂成始而成終者如此所謂無量阿僧祇功德於無量劫説不能盡者如此諸比丘若如來自知涅槃時到衆又清淨信解堅固了達空法深入禪定便集諸菩薩及聲聞衆為説是經世間無有二乘而得滅度唯一佛乘得滅度耳比丘當知如來方便深入衆生之性知其志樂小法深著五欲為是等故説於涅槃是人若聞則便信受此喻本也涅槃時到者時已至也衆又清淨者根已熟也信解堅固則衆説不能惑了達空法則萬法莫能入深入禪定則毀譽不能動便集下言衆生根熟志純遂集衆説法華也比丘下言根未熟時隨根説法也深入衆生之性者由彼不知上中下性我則深知其性故隨機演法為説涅槃所謂亦知一切深心所行通達無礙如此譬如五百由旬險難惡道曠絶無人怖畏之處若有多衆欲過此道至珍寶處有一導師聰慧明達善知險道通塞之相將導衆人欲過此難所將人衆中路懈退白導師言我等疲極而復怖畏不能復進前路猶遠今欲退還導師多諸方便而作是念此等可愍云何捨大珍寶而欲退還作是念已以方便力於險道中過三百由旬化作一城告衆人言汝等勿怖莫得退還今此大城可於中止隨意所作若入是城快得安隱若能前至寶所亦可得去是時疲極之衆心大歡喜歎未曾有我等今者免斯惡道快得安隱於是衆人前入化城生已度想生安隱想爾時導師知此人衆既得止息無復疲倦即滅化城語衆人言汝等去來寶處在近向者大城我所化作為止息耳此設喻以明先説三乘後説一乘之意五百由旬喻三界及二涅槃也險難惡道者喻生死惡道也曠絶無人者謂曠遠四絶之地又無人家可以息足喻生死中無涅槃可依也若有多衆欲過險道至珍寶處者喻未得滅度之人欲超生死險道而入佛慧也導師者喻如來是指路人也善知通塞者知何等是出生死之通衢何等是入生死之惡路也將導衆人欲過此難者將引也喻如來直欲引出生死惡道而徑入佛慧也所將人衆中路懈退者以懈怠故欲半途而退也白導師下喻聞大法而生退墮也我等足力已疲又值曠絶無人可畏之處欲至寶所則前路尚在遙遠故我等皆欲退還也導師作念下喻設方便也過三百由旬化作一城者喻在三界生死曠絶無人之地假設二涅槃作小歇場地也告衆下喻説涅槃也可於中止者言此中可暫作歇宿處也隨意所作者言或眠或坐無不適意喻六通縱任也若入是城快得安隱者喻證涅槃可以離怖畏也若能前至寶所亦可得去者若汝也言汝等不負初心不廢前來三百由旬之功努力向前肯至寶所則此化城亦是便道亦可從此得去也是時下衆入化城也生已度想生安隱想者喻以涅槃為究竟不復進求殊不知蘧廬止可一宿非久居之地也既得止息無復疲倦者喻見思惑盡神氣完足也即滅化城者見其戀著故滅之也寶處在近者言直進便是促之令入也向者大城我所化作為止息者言向日所見化城為汝等告倦不肯前進故我化作與汝歇息暫解疲勞非得寶之處也問何故但言寶處在近不言里數答若有里數還是化城即非寶所要知寶所本無方向不涉途程不離目前只是無人能到故曰在近當知從語言文字入者總在化城古德云路途之樂終未到家是也自從己胸中流出者方是寶所也諸比丘如來亦復如是今為汝等作大導師知諸生死煩惱惡道險難長遠應去應度若衆生但聞一佛乘者則不欲見佛不欲親近便作是念佛道長遠久受勤苦乃可得成佛知是心怯弱下劣以方便力而欲中道為止息故説二涅槃若衆生住於二地如來爾時即便為説汝等所作未辦汝所住地近於佛慧當觀察籌量所得涅槃非真實也但是如來方便之力於一佛乘分別説三如彼導師為止息故化作大城既知息已而告之言寶處在近此城非實我化作耳此法合也生死惡道合五百由旬險難惡道等也知應去應度者合善知通塞之相也若衆下合前中路懈退也若如來不以二乘法化導衆生而直示其諸佛無量道法彼且不欲見佛亦不欲親近佛則法堂前草深一丈矣以彼自念佛道長遠難得成就不能速出三界生死故佛知下合設方便也怯弱者謂畏怯孱弱無勇猛精進之具下劣者謂卑下陋劣無高明遠大之度為此輩人以方便力而於半路説二涅槃此即三百由旬之外所設化城殊不知此二涅槃雖在三百由旬之外尚在五百由旬之內也衆生住二地者合前生已度想生安隱想戀著不捨也如來下點破涅槃非實也言汝還要習學許多廣大佛事方是涅槃不可便謂究竟且汝所住地與佛慧相近非是已得佛慧所謂但離虗妄名得解脫耳如彼下復以喻合法正如導師為止息疲極之衆故於中路化作大城暫令止息見其戀著又滅化城促進寶所所謂去即印住住即印破鐵牛之機也爾時世尊欲重宣此義而説偈言大通智勝佛十劫坐道場佛法不現前不得成佛道諸天神龍王阿修羅衆等常雨於天華以供養彼佛諸天擊天鼓并作衆伎樂香風吹萎華更雨新好者過十小劫已乃得成佛道諸天及世人心皆懷踊躍彼佛十六子皆與其眷屬千萬億圍繞俱行至佛所頭面禮佛足而請轉法輪聖師子法雨充我及一切世尊甚難值久遠時一現為覺悟群生震動於一切東方諸世界五百萬億國梵宮殿光曜昔所未曾有諸梵見此相尋來至佛所散華以供養并奉上宮殿請佛轉法輪以偈而讚嘆佛知時未至受請默然坐三方及四維上下亦復爾散華奉宮殿請佛轉法輪世尊甚難值願以本慈悲廣開甘露門轉無上法輪無量慧世尊受彼衆人請為宣種種法四諦十二緣無明至老死皆從生緣有如是衆過患汝等應當知宣暢是法時六百萬億姟該得盡諸苦際皆成阿羅漢第二説法時千萬恆沙衆於諸法不受亦得阿羅漢從是後得道其數無有量萬億劫算數不能得其邊時十六王子出家作沙彌皆共請彼佛演説大乘法我等及營從皆當成佛道願得如世尊慧眼第一淨佛知童子心宿世之所行以無量因緣種種諸譬喻説六波羅蜜及諸神通事分別真實法菩薩所行道説是法華經如恆河沙偈彼佛説經已靜室入禪定一心一處坐八萬四千劫是諸沙彌等知佛禪未出為無量億衆説佛無上慧各各坐法座説是大乘經於佛宴寂後宣揚助法化一一沙彌等所度諸衆生有六百萬億恆河沙等衆彼佛滅度後是諸聞法者在在諸佛土常與師俱生是十六沙彌具足行佛道今現在十方各得成正覺爾時聞法者各在諸佛所其有住聲聞漸教以佛道我在十六數曾亦為汝説是故以方便引汝趣佛慧以是本因緣今説法華經令汝入佛道慎勿懷驚懼十劫坐道場不得成佛道者如雲門所謂得到法身為法執不忘己見猶存墮在法身邊是病佛眼亦云騎驢不肯下者亦是病也過十小劫方得成道者所謂如來得菩提實不繫於日也彼佛下沙彌請轉法輪東方下諸梵請轉法輪佛知下如來默許三方下九方請轉法輪無量下大通説二乘法宣暢下大衆得益時十下沙彌請大法佛知下為沙彌説大法彼佛下經畢入定是諸下沙彌紹法王位爾時下正出今日説法之本因言汝等所以得聞法華者正出昔日大通佛時曾為汝等演説此經由有往昔因緣故今日復為汝等説耳汝等當直下承當勿得更懷驚懼於胸中也譬如險惡道逈絶多毒獸又復無水草人所怖畏處無數千萬衆欲過此險道其路甚曠遠經五百由旬時有一導師強識有智慧明了心決定在險濟衆難衆人皆疲倦而白導師言我等今頓乏於此欲退還導師作是念此輩甚可愍如何欲退還而失大珍寶尋時思方便當設神通力化作大城郭莊嚴諸舍宅周匝有園林渠流及浴池重門高樓閣男女皆充滿即作是化已慰衆言勿懼汝等入此城各可隨所樂諸人既入城心皆大歡喜皆生安隱想自謂已得度導師知息已集衆而告言汝等當前進此是化城耳我見汝疲極中路欲退還故以方便力權化作此城汝今勤精進當共至寶所逈絶者無人行也無水草者乏資糧也非若三賢菩薩有資糧可以直進也時有下導師濟難衆人下諸人告倦既無資糧路又曠遠所以委頓疲乏而欲退也導師下以方便設化城也舍宅者安身處喻空寂園林者遊戲處喻六通浴池者澡身處喻八解脫重門者出入處喻四諦法樓閣者眺望處喻天眼男女者取樂處喻寂滅樂我亦復如是為一切導師見諸求道者中路而懈廢不能度生死煩惱諸險道故以方便力為息説涅槃言汝等苦滅所作皆已辦既知到涅槃皆得阿羅漢爾乃集大衆為説真實法諸佛方便力分別説三乘唯有一佛乘息處故説二今為汝説實汝所得非滅為佛一切智當發大精進汝證一切智十力等佛法具三十二相乃是真實滅諸佛之導師為息説涅槃既如是息已引入於佛慧我亦下合導師見諸下合衆人告倦故以下合化城為息説涅槃者為欲汝息煩惱故説涅槃也既知下合滅化城而促至寶所也諸佛下示真實處也
