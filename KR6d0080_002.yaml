body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋譬喻品火宅喻第三頌云朽宅已堪畏況多諸苦叢癡風竟夜黑業火亘天紅劫石煙中盡迷盧𦦨裏空豈知金色界原在破墻東譬喻者托物比類借此例彼之義如以團扇類月蒼狗類雲圓蓋類天方輿類地但取其似而已非實事也昔有未見麟者問嘗見麟者曰麟何類見者曰麟如麟也問者曰若我嘗見麟則不問子矣而曰麟如麟寧可解哉見者乃曰麟身牛尾鹿蹄馬背而有角問者霍解由對未嘗見麟者比例發明故曰譬喻也此品因千二百人未解説三説一之因緣故設譬以明其中以一門喻業識三車喻三乘大白牛車喻佛乘何以故蓋三界生死根本都由微細業識凡小莫測一時説與不能深信故令修三乘法斷六識三毒令出三界證涅槃得心自在然未曾轉業識得四智除法障證法空也故此品與諸弟子喻明昔日之三乘是令空六識而出生死今日之一乘欲令轉業識而成菩提也爾時舍利弗踊躍歡喜即起合掌瞻仰尊顏而白佛言今從世尊聞此法音心懷踊躍得未曾有先敘悟踊躍歡喜者發明大事歡喜遍身不自知其手舞足蹈也子湖一夜僧堂前叫云有賊衆皆驚有一僧在僧堂內出把住曰維那賊在這裏捉得也僧曰不是某甲師曰是即是只是不肯承當又古德云三十年來用意猜幾番曾把此心灰而今潦倒逢知己李白元來是秀才歡喜踊躍者正是鶖子逢知己時直下承當時也所以者何我昔從佛聞如是法見諸菩薩受記作佛而我等不預斯事甚自感傷失於如來無量知見世尊我常獨處山林樹下若坐若行每作是念我等同入法性云何如來以小乘法而見濟度是我等咎非世尊也所以者何若我等待説所因成就阿耨多羅三藐三菩提者必以大乘而得度脫然我等不解方便隨宜所説初聞佛法遇便信受思惟取證次追敘昔失言世尊在方等會中為諸菩薩説大乘經即與授記我等往昔雖預法會預聞佛法而不預授記之列甚自憂惱不知何故遂失如來知見世尊下出感傷之意言我尋常四威儀中私自懊惱者由我等與諸菩薩同在一會等觀性空同入法性同是如來弟子本無差別云何如來偏以大乘平等之法授記菩薩而以小乘之法濟度我等豈非如來心有所偏墮不平等之過耶故每一興念即便憂惱今聞世尊云自證無上道大乘平等法若以小乘化我則墮慳貪此事為不可乃知世尊無不平等咎咎在自己所以下出自己之咎也若我等當初肯待世尊分明説出三乘所因原為成就無上菩提而權設者爾時我等決不思惟取證小果如來必以大乘濟度我等由世尊當初不肯就與我等道破所因是成就菩提事我等最初又不解如來是方便説才聞佛語即便信受認為實事日夜思惟取證小果不求佛道是以如來不為我等説大乘法亦不為我等授記作佛耳此則咎在自己隨語生解如來實無不平等咎所謂醒後方知酒誤人也世尊我從昔來終日竟夜每自剋責而今從佛聞所未聞未曾有法斷諸疑悔身意泰然快得安隱今日乃知真是佛子從佛口生從法化生得佛法分三慶今得由我等尋常不肯甘為小乘日夜痛責故今一聞羅漢作佛之語則是昔未聞者今已聞昔未得者今已得昔所疑悔者今日泰然安隱矣且我向也自以為非真佛子難紹如來家業今日乃知真是佛子堪紹如來家業矣向也以為但可得涅槃無佛法分今日乃知渾身住在佛口中全身住在法化裏具有如來寶藏之分矣寧不慶快而踊躍哉故知有昔日之尅責乃有今日之踊躍有昔日之感傷乃有今日之歡喜有昔日之疑悔乃有今日之泰然安隱若昔日不尅責不感傷不疑悔安有今日之踊躍歡喜泰然安隱之事乎爾時舍利弗欲重宣此義而説偈言我聞是法音得所未曾有心懷大歡喜疑網皆已除昔來蒙佛教不失於大乘佛音甚希有能除衆生惱我已得漏盡聞亦除憂惱首四句是總頌歡喜踊躍一段昔來下是發明疑網皆已除一句言我昔日之疑正疑自失大乘也今聞唯一無二無三之語始知昔來蒙佛授我四諦十二緣時實未曾失大乘也但是自己不肯承當耳今日自肯承當乃知不獨今日所説之法為希有即昔日蒙佛所説之法亦甚希有何以故當我未出三界作衆生時聞是法而除世間憂惱既得漏盡成阿羅漢作出三界人然而四十年來不預授記之列不蒙如來平等法化故每自思惟亦常憂惱今日忽聞羅漢作佛之語乃知不失如來無量知見復除我等不得授記作佛之憂惱所謂以一味雨潤於人華此佛音之所以甚為希有也我處於山谷或在林樹下若坐若經行常思惟是事嗚呼深自責云何而自欺我等亦佛子同入無漏法不能於未來演説無上道金色三十二十力諸解脫同共一法中而不得此事八十種妙好十八不共法如是等功德而我皆已失我獨經行時見佛在大衆名聞滿十方廣饒益衆生自惟失此利我為自欺誑我常於日夜每思惟是事欲以問世尊為失不為失我常見世尊稱讚諸菩薩以是於日夜籌量如是事此下頌昔失也言我昔日憂惱不除者由我不肯甘為小乘坐失如來教菩薩法每自思惟深自痛責云何我等自欺如此我等與菩薩皆以佛為師皆是如來之子同入法性同得無漏云何菩薩偏能於未來世説法度生我獨不能豈非自欺此痛責自己不如菩薩也金色下痛責失如來自利功德我獨下又痛責失如來利生功德也我為自欺誑者言如來證平等法肯以不平等法欺我誑我故前文云若人信歸佛如來不欺誑為説實相印故知是我自欺自誑如來不為我説耳且此佛性圓同太虗無欠無餘云何如來偏有佛性成等正覺繄我獨無故我日夜每一思惟身毛皆竪欲將此意咨詢世尊不知還是真失此利益乎抑或有之而自暴自棄乎此我所以日夜思惟而疑且悔也且我又見如來在大衆中讚菩薩為龍象斥小乘為跛驢我等一聞此語心甚不平日夜籌量我與菩薩實為同列云何如來偏讚菩薩貶斥我等此我所以日夜痛責而感傷也今聞佛音聲隨宜而説法無漏難思議令衆至道場我本著邪見為諸梵志師世尊知我心拔邪説涅槃我悉除邪見於空法得證爾時心自謂得至於滅度而今乃自覺非是實滅度若得作佛時具三十二相天人夜叉衆龍神等恭敬是時乃可謂永盡滅無餘佛於大衆中説我當作佛聞如是法音疑悔悉已除頌今得也今聞世尊云四十年中所説種種諸法皆是方便乃至或讚或毀常為一事無非皆以大乘無漏難思議法示人欲令開佛知見坐道場成正覺而已實無所謂大乘小乘人天乘若讚若毀也昔白雲端參楊岐岐問受業師為誰師曰茶陵郁和尚岐曰我聞渠過橋遭跌作偈甚奇曾記得否師誦曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵岐笑而起師愕然通昔不寐黎明詢之適歲暮岐曰汝見昨日打毆儺者麼曰見師曰汝一籌不及渠師駭曰意旨如何岐曰渠愛人笑汝怕人笑師大悟慈明謁汾陽陽默而器之每見必詬罵或詆毀諸方及有所訓皆流俗鄙事一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事不明失出家之利語未卒陽熟視罵曰是惡知識敢裨販我怒舉杖逐之師擬伸救陽掩師口乃大悟曰是知臨濟道出常情所謂嬉笑怒罵彈斥褒稱無非佛事無二無三我本下出隨宜説法意謂世尊説法本無二三所以隨宜説大説小或讚或毀者由我等昔事外道學邪見法世尊知我心事投我所好拔我邪根故説小乘涅槃之法誘之是以楔出楔也既證涅槃得少為足自謂出三界人無所事事坐守勝妙境界不復趨進菩提故於方等會中褒歎譏訶激發進修我等不知今日世尊分明告曰我雖説涅槃是亦非真滅我等才知非實滅度若得作佛五住究盡二死永亡方是真實無餘涅槃自性空事境界要知昔日取證小果皆是自欺非如來咎故我今日一聞如來授記作佛疑悔悉除此我所以歡喜踊躍也序品云諸求三乘人若有疑悔者佛當為除斷令盡無有餘方便品云隨宜方便事無復諸疑惑此云聞如是法音疑悔皆已除迭相照應初聞佛所説心中大驚疑將非魔作佛惱亂我心耶佛以種種緣譬喻巧言説其心安如海我聞疑網斷佛説過去世無量滅度佛安住方便中亦皆説是法現在未來佛其數無有量亦以諸方便演説如是法如今者世尊從生及出家得道轉法輪亦以方便説世尊説實道波旬無此事以是我定知非是魔作佛我墮疑網故謂是魔所為聞佛柔軟音深遠甚微妙演暢清淨法我心大歡喜疑悔永已盡安住實智中我定當作佛為天人所敬轉無上法輪教化諸菩薩此追敘驚疑也言我等四十年中曾不聞授記聲聞作佛今驟聞此語且驚且疑惶惑不定疑佛為魔佛以善巧方便誘掖我等其心汪洋安如大海我等既聽其語復察其心故知非魔所作深信斯言疑網盡裂佛説下正出如來善巧方便言三世諸佛皆是方便説法無非一事故知如來所説皆是實語定非魔説由我自墮疑網疑佛為魔今聞如來如是柔和軟順之音其義深遠其語微妙而所演暢者皆是一相一味清白梵行故我疑根永盡生大歡喜不復更執昔日之權乘今日安住實智中矣亦不滯於昔日之小果今日定知作佛轉大法輪教化菩薩矣此是鶖子承當處香嚴云當時若為我説破何有今日之事乃知世尊四十年中不與小乘説破正為今日也黃龍南云蓋今之人容易聽法者衆欲如田夫時時乾之令其枯渴然後灌溉方得秀實亦是此意此是佛祖鍛鍊聖賢之妙訣也爾時佛告舍利弗吾今於天人沙門婆羅門等大衆中説我昔曾於二萬億佛所為無上道故常教化汝汝亦長夜隨我受學我以方便引導汝故生我法中舍利弗我昔教汝志願佛道汝今悉忘而便自謂已得滅度我今還欲令汝憶念本願所行道故為諸聲聞説是大乘經名妙法蓮華教菩薩法佛所護念舍利弗汝於未來世過無量無邊不可思議劫供養若干千萬億佛奉持正法具足菩薩所行之道當得作佛號曰華光如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊此如來述成與記也必待信而後授記者信而後言未信則以為厲己也由鶖子從因緣悟入故復述宿世因緣以曉之言我為此一大事因緣往昔曾在二萬億佛所常以方便法門導汝汝亦在長夜中隨我受學由此昔緣世世生生常在一處然我在往昔劫中實未曾以小乘誨汝元先教汝志慕佛乘汝今何得遂忘本願得少為足自謂得涅槃乎汝雖忘却本願而我則親言出自親口歷然在心曾未忘却今欲助發汝等往昔本願故我不惜唇皮宣説此經菩薩因華如來道果盡在乎此故曰教菩薩法佛所護念也觀此則知世尊無量劫中一動一靜一念一頃無非教人志願佛道豈止一生舍利下授記也言汝聞此大經之後即當藉此經為因於未來世經無量劫事無量佛學無量道修無量行直至因圓果滿水到渠成成最正覺名曰華光此即由法師位而入法王位也楞嚴所謂以不生不滅為因然後圓成果地修證是也言華光者以智慧華入光明覺故國名離垢其土平正清淨嚴飾安隱豐樂天人熾盛琉璃為地有八交道黃金為繩以界其側其旁各有七寶行樹常有華果華光如來亦以三乘教化衆生舍利弗彼佛出時雖非惡世以本願故説三乘法國名離垢者如大唐大宋大明之類是報身所居報土也其土平正者無高下無傾側也清淨嚴飾者衆寶莊嚴無五濁雜穢也安穩者無三災八難之苦也豐樂者無求不得之苦也天人熾盛者無三惡道也琉璃為地者無坑坎堆阜也有八交道者無周障屈曲也黃金為繩者無藩籬界限也常有寶樹寶華寶果者無可凋之樹可謝之華可熟之果也舍利下通難難云如來出五濁世故以方便説三乘法誘掖羣生華光報土既非濁世原是淨既無二乘純是菩薩何故亦以三乘之法教化衆生答華光國土雖非惡世由彼本願説三乘法今雖得果不廢宿心故其劫名大寶莊嚴何故名曰大寶莊嚴其國中以菩薩為大寶故彼諸菩薩無量無邊不可思議算數譬喻所不能及非佛智力無能知者若欲行時寶華承足此諸菩薩非初發意皆久植德本於無量百千萬億佛所淨修梵行恆為諸佛之所稱歎常修佛慧具大神通善知一切諸法之門質直無偽志念堅固如是菩薩充滿其國舍利弗華光佛壽十二小劫除為王子未作佛時其國人民壽八小劫華光如來過十二小劫授堅滿菩薩阿耨多羅三藐三菩提記告諸比丘是堅滿菩薩次當作佛號曰華足安行多陀阿伽度阿羅訶三藐三佛陀其佛國土亦復如是舍利弗是華光佛滅度之後正法住世三十二小劫像法住世亦三十二小劫劫者時也大寶莊嚴者年號也如洪武嘉靖萬曆之類菩薩為大寶莊嚴者此土不以國界莊嚴為大寶以此土純是菩薩莊嚴國土無有二乘即以菩薩而為大寶若舅犯以仁親為寶楚國以善為寶之意彼諸下顯菩薩數量之多此諸下顯菩薩樹德之廣於無下見菩薩事佛之久恆為下見菩薩名聞之大常修下見菩薩入道之深善知下顯菩薩度生之普質直無偽者渾金璞玉無有矯飾故曰質如弦如矢無有邪曲故曰直實證實悟毫無假借故曰無虗偽四相不遷八風不動故曰志念堅固如是菩薩充滿其國此劫名所以稱大寶莊嚴也舍利下紀壽也授堅滿記者傳衣鉢也佛號華足安行者萬行具足安而行之也國名離垢者佛佛道同也正法者信解行證悉皆具足也像法者信解行證或有缺也授記之文不過直將報佛國劫莊嚴眷屬多少佛壽短長授之而已更無他説正如人家父親臨命終時一張遺囑將田地家資什物一一計開明白更寫一個華押柱上交與兒子便了爾時世尊欲重宣此義而説偈言舍利弗來世成佛普智尊號名曰華光當度無量衆供養無數佛具足菩薩行十力等功德證於無上道過無量劫已劫名大寶嚴世界名離垢清淨無瑕穢以琉璃為地金繩界其道七寶雜色樹常有華果實彼國諸菩薩志念常堅固神通波羅蜜皆已悉具足於無數佛所善學菩薩道如是等大士華光佛所化佛為王子時棄國捨世榮於最末後身出家成佛道華光佛住世壽十二小劫其國人民衆壽命八小劫佛滅度之後正法住於世三十二小劫廣度諸衆生正法滅盡已像法三十二舍利廣流布天人普供養華光佛所為其事皆如是其兩足聖尊最勝無倫匹彼即是汝身宜應自欣慶首二偈頌授記過無下頌國劫莊嚴眷屬佛為下言華光佛亦如釋迦捨金輪而出家成道也應長行除為王子一句華光下頌佛壽正法像法也前云心生大歡喜自知當作佛此云彼即是汝身宜應自欣慶照應爾時四部衆比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽等大衆見舍利弗於佛前受阿耨多羅三藐三菩提記心大歡喜踊躍無量各各脫身所著上衣以供養佛釋提桓因梵天王等與無數天子亦以天妙衣天曼陀羅華摩訶曼陀羅華等供養於佛所散天衣住虗空中而自回轉諸天伎樂百千萬種於虗空中一時俱作雨衆天華而作是言佛昔於波羅奈初轉法輪今乃復轉無上最大法輪鶖子得記四衆天龍歡喜踊躍者見一華而知天下皆春記一人而知人人皆有分也頌曰巢居知風穴處知雨鶖子得記天龍歡喜四衆諸天皆脫天衣供佛者知為如來衣之所覆故捨所珍也宗家所謂脫鶻臭衣著青州衫也散華供佛者酬説法華之意也奏天樂者酬授記之音也以此三種皆諸天所珍故以所珍供佛者敬之至也佛以自受用法授人故各以自受用物供佛也天衣空中回轉者是無情踊躍也頌云一個渾身坐白牛騎羊跨鹿外邊求天衣尚在虗空轉何事人心不轉頭而作是言下是諸天讚佛轉輪也世尊臨入涅槃文殊請佛再轉法輪世尊咄曰文殊吾四十九年住世未曾説一字汝請我再轉法輪是我曾轉法輪耶且道諸天見處與文殊是同是別試參詳看爾時諸天子欲重宣此義而説偈言昔於波羅奈轉四諦法輪分別説諸法五衆之生滅今復轉最妙無上大法輪是法甚深奧少有能信者我等從昔來數聞世尊説未曾聞如是深妙之上法世尊説是法我等皆隨喜大智舍利弗今得授尊記我等亦如是必當得作佛於一切世間最尊無有上佛道叵頗思議方便隨宜説我所有福業今世若過世及見佛功德盡回向佛道五衆生滅者言五蘊衆生皆有苦集悉有生滅故説諸法生滅四諦也無上大法輪者諸法實相也隨喜者見人喜而隨生歡喜也大智下出隨喜之意所謂彼既丈夫我亦爾也佛道二句亦是領會以一乘道隨宜説三也我所下回向佛道也由回向佛道此天衣所以回轉虗空也古德云非風幡動仁者心動此亦云非天衣轉八部心轉爾時舍利弗白佛言世尊我今無復疑悔親於佛前得受阿耨多羅三藐三菩提記是諸千二百心自在者昔住學地佛常教化言我法能離生老病死究竟涅槃是學無學人亦各自以離我見及有無見等謂得涅槃而今於世尊前聞所未聞皆墮疑惑善哉世尊願為四衆説其因緣令離疑悔此鶖子陳疑申請也言我既領即心即佛之旨復聞宿世因緣之事頓歇疑情一肩擔荷不是如來教我承認亦非自己勉強承當故曰親於佛前得菩提記也是諸下疑陳也意謂同類千二百人四十年前聞如來法皆證涅槃各各自謂已得滅度已得究竟今聞授記不惟不信反墮疑城所以墮疑城者彼意正謂果有授記之事何故四十年前不説直待今日由彼不知四十年前不説之所以故今日雖聞羅漢作佛之語尚墮疑惑不肯承當耳願為剖明四十年前所以不説之因緣方得離疑惑而生信也此段見得鶖子尋常自疑自悔感傷尅責故一聞生信千二百人尋常置在無事甲裏故一聞而生疑此四大弟子不及鶖子一籌處也且疑者悟之機不疑則不悟故知今日之疑情又是將來之悟機也爾時佛告舍利弗我先不言諸佛世尊以種種因緣譬喻言辭方便説法皆為阿耨多羅三藐三菩提耶是諸所説皆為化菩薩故然舍利弗今當復以譬喻更明此義諸有智者以譬喻得解此如來許説也言汝請我為諸四衆復説因緣者豈我向前不曾與汝説乎如來為一大事因緣出現於世諸有所作常為一事諸所説者皆化菩薩詳明如此何必更欲説其因緣耶彼既不解我今復以淺近易曉之事比類發明若從此喻而得解了尚得稱為智人不然則終於無知而已舍利弗若國邑聚落有大長者其年衰邁財富無量多有田宅及諸童僕其家廣大唯有一門多諸人衆一百二百乃至五百人止住其中堂閣朽故墻壁隤頽落柱根腐敗梁棟傾危周匝俱時欻旭然火起焚燒舍宅長者諸子若十二十或至三十在此宅中此下總將方便品中大義演作譬喻重為發明也若國邑聚落喻三界也有大長者喻化佛也長者具十德一姓貴如三皇之胄五帝之裔二位尊輔弼阿衡鹽梅燮理三大富如銅陵金穴四威猛如嚴霜凜雪五智深胸如武庫六年耆貌如松柏七行淨圭壁無瑕八禮備威儀庠序九上敬大人仰德十下歸衆庶歸心十德具而稱長者喻十號具而稱世尊也其年衰邁者喻涅槃將至也財富無量者喻智慧無量也此句是總下別釋田宅者喻大慈悲也童僕者喻方便也其家廣大者喻三界為家也唯有一門者喻三界中總以業識為門也古德云業識茫茫無本可據是也有五百人止住其中者喻五趣衆生皆在業識窟中也堂閣四句顯三界是佛化土具有敗壞之相非若如來報土以金剛為地宮殿堂閣棟梁墻壁皆是摩尼妙寶之所成就風吹不入雨已不濕火不能燒水不能溺也火燒舍宅者喻三界中總被五衰八苦之火交煎也諸子亦在宅中者喻具三乘根性微有省覺者亦在業識窟中也諸子雖有微醒欲出三界不遇明師蹉入邪路以苦捨苦故不能出非若五趣衆生昏昏昧昧全無知覺也子言十而人言百者覺者少而昧者多也長者見是大火從四面起即大驚怖而作是念我雖能於此所燒之門安隱得出而諸子等於火宅內樂著嬉戲不覺不知不驚不怖火來逼身苦痛切己紀心不厭患無求出意次明長者興慈也長者見火而驚怖者愍其子故驚惜其人故怖同體之憂也喻以佛眼觀六道衆生起大悲心也而作下喻初七思惟也言我五住究盡故安二死永亡故隱轉識成智故得出三界之門無奈諸子以三界為留連之地故樂著而不覺不知以三界為遊樂之場故嬉戲而不驚不怖雖有衆苦逼迫其身至於髓枯精竭頭爛額焦無一念厭離之心亦無一毫恐怖之狀故終無求出之意也此喻前衆生諸根鈍著樂癡所盲等文舍利弗是長者作是思惟我身手有力當以衣裓格若以几案從舍出之此喻二七思惟也我身手有力者喻神力智慧力也衣裓几案喻知見力無所畏也此皆如來自受用物意謂身手有力或將諸子貯於衣裓捧而出之抑將諸子置於几案擎而出之也喻前若但讚一乘不能信是法等文復更思惟是舍唯有一門而復狹狹小諸子幼稚未有所識戀著戲處或當墮落為火所燒我當為説怖畏之事此舍已燒宜時疾出無令為火之所燒害作是念已如所思惟具告諸子汝等速出父雖憐愍善言誘諭而諸子等樂著嬉戲不肯信受不驚不畏了無出心亦復不知何者是火何者為舍云何為失但東西走戲視父而已爾時長者即作是念此舍已為大火所燒我及諸子若不時出必為所焚我今當設方便令諸子等得免斯害父知諸子先心各有所好種種珍玩奇異之物情必樂著而告之言汝等所可玩好希有難得汝若不取後必憂悔如此種種羊車鹿車牛車今在門外可以遊戲汝等於此火宅宜速出來隨汝所欲皆當與汝此喻三七思惟設方便也再思曰更三思曰復更言三界內生生死死唯是業識為主人云此識甚深微細諸子幼稚未有知識即欲與説彼則未有知識復恐迷而不解若不與説復恐耽戀愛著以為遊樂嬉戲之處而不能捨若一失足終為所燒如此衆生剛強難化當以苦切之言可怖畏事而調伏之言是地獄是餓鬼是畜生是諸難處是愚人生處是殺生是殺生報是邪淫是邪淫報是愚癡是愚癡報乃至此是三災此八難等此皆六識三毒為因招感此身生老病死之果且此舍宅即今已是被燒若不早求出離必當墮落至於身肉糜爛而後已如是思惟即以所思惟者具告諸子誘其速出此喻説苦集也父雖下子不受教也言雖告以剛強苦切之言恐怖之事由彼貪戀既深遊歷既熟自以為樂不肯信受毫無怖畏了無出心亦復不知何為苦因何為苦果云何名為墮落但東遊西戲瞪眼視父恬不介意見其迷之深而惑之甚也爾時下以喻説滅道也由彼苦切之言既不能入怖畏之事又不能動復以可樂之物可戲之處以誘之故長者復作念云此舍已被火燒迫近身體此時不出則我與子皆為火焚且濁世不可以莊語愚人不可以正言故思以方便誘之也難云世尊已於所燒之門安隱得出何故説我及諸子必為所焚答如來現身三界救拔衆生彼出則出彼入則入其子病而父母亦病所謂同體大悲憂人之憂也父知下思以樂具易其苦具也知其宿習根性差別又知其現在好樂之事故以所好投之所謂知子莫如父也而告下喻三乘也汝若下勸其證也如此下告其車之處也今在門外者言此三車在火宅外不在火宅中也可以遊戲者示其車之用也言乘此可以縱任六通遊戲自在也汝等下速其出也隨汝下許與其車也言羊鹿牛車可汝意者我即與之也爾時諸子聞父所説珍玩之物適其願故心各勇鋭瑞互相推排競共馳走爭出火宅此諸子出火宅也適其願故者機教相投也心各勇鋭者謂努力向前也互相推排者交相切磋也以手相抵曰推以手相分曰排競共馳走者俱行八正道也爭出火宅者共證無學果也問是舍唯有一門是喻三界輪轉唯有業識也今小乘既出三界便能淨除業識耶既淨除業識他處又言二乘不知業識者何也答三界生死根元實由第八業識為主人公第七隨所生所繫然第八雖名業識不自造業實由第六意識造業招引第八出生入死耳由彼小乘根器下劣又欲速出三界此識含藏既廣不能一時淨盡故即指造業之意識為生死因令盡意識得滅盡定意識既盡得轉一分業識便出三界故不牽引第八出生入死謂之出業識門亦宜然此唯是如來得知二乘實不知也所謂令彼道成德備而不自知是也問二乘既轉業識已出三界何故又教進修佛慧轉識成智答前不云乎業識含藏種子甚廣有我有法小乘但空我執已捨賴耶未空法執猶在異熟故知不但界內衆生在業識內即界外二乘乃至十地菩薩亦未能盡除業識猶在業識之內故先令彼出界內之業識次復令彼生界外之業識也是時長者見諸子等安隱得出皆於四衢道中露地而坐無復障礙其心泰然歡喜踊躍此長者歡喜也安隱得出者生死不逼也在四衢道者證四諦理也露地而坐者踞寂滅定也無復障礙者煩惱障盡也其心泰然者得心自在也踊躍歡喜者樂人之樂也時諸子等各白父言父先所許玩好之具羊車鹿車牛車願時賜與舍利弗爾時長者各賜諸子等一大車其車高廣衆寶莊校周匝欄楯四面懸鈴又於其上張設幰險蓋亦以珍奇雜寶而嚴飾之寶繩交絡垂諸華瓔重敷婉筵安置丹枕駕以白牛膚色充潔形體姝好有大筋力行步平正其疾如風又多僕從而侍衛之所以者何是大長者財富無量種種諸藏悉皆充溢而作是念我財物無極不應以下劣小車與諸子等今此幼童皆是吾子愛無偏黨我有如是七寶大車其數無量應當等心各各與之不宜差別所以者何以我此物周給一國猶尚不匱愧何況諸子是時諸子各乘大車得未曾有非本所望此諸子索車也六祖所謂坐却白牛車更從門外覔三車是也舍利弗下等賜大車也前云志求佛道者正直捨方便是也其車高廣者喻一佛乘竪窮橫遍也衆寶莊校者富有萬德也周匝欄楯者總持遮護也四面懸鈴者四辨説法也帳設幰蓋者慈悲普覆也雜寶嚴飾者萬善嚴此慈悲也寶繩交絡者大誓固此慈悲也垂諸華纓者神通四攝悅勸衆生也重敷婉筵者以平等心安慰一切也安置丹枕者以戒法安佚群生也駕以白牛者是有大力量有大智慧人所以運轉此車也膚色充潔形體姝好者德本植而身潤有諸內而形諸外也有大筋力者堪任大事也行步平正者動作合度入於坦途也其疾如風者智巧敏捷也又多僕從者方便具足也南泉云王老師自小養一頭水牯牛擬向東溪牧未免食他國王水草擬向西溪牧未免食他國王水草不如隨分納些些總不見得大安云安在溈山三十年喫溈山飯屙溈山屎不參溈山禪秪看一頭水牯牛若落路入草便把鼻孔搜轉來才犯人苗稼即鞭撻調伏既久可憐生受人言語如今變作露地白牛常在面前終日露逈逈地趁亦不去且道即今在甚麼處南嶽云如牛駕車車若不行打車即是打牛即是釋迦傳下一頭大白牛祖師又留下一頭水牯牛一任諸人耕田種地切不得犯人苗稼所以下徵釋等賜大車之意財富無極者喻法財悉備也諸藏充溢者喻聲聞辟支菩薩如來藏或是信戒等十藏言諸藏中具足如來無量法財也而作下言我財物無極不應以此小車賜我諸子今此幼童皆是我子不應偏愛若以羊鹿牛車各賜諸子則愛有偏黨故我以平等心各以大車等賜之也所以下復徵釋等賜之意言我有此無量法藏即以此物周給一國遍施一切尚無匱乏況我親生之子寧不等賜之耶雖然如是諸子分上少個甚麼乃欲等賜癡人面前不得説夢是時下諸子得車歡喜過望也非本所望者言本無心有所希望而得無上法王大寶豈非望外之事故曰得未曾有舍利弗於汝意云何是長者等與諸子珍寶大車寧有虗妄不舍利弗言不也世尊是長者但令諸子得免火難全其軀命非為虗妄何以故若全身命便為已得玩好之具況復方便於彼火宅而拔濟之世尊若是長者乃至不與最小一車猶不虗妄何以故是長者先作是意我以方便令子得出以是因緣無虗妄也何況長者自知財富無量欲饒益諸子等與大車佛告舍利弗善哉善哉如汝所言此辨核不虗也故呼鶖子而問之云諸子索車長者不與小車而反等賜大車汝云何解此事寧有虗妄否答云不也意謂不與小車尚不虗妄何況等賜大車而有虗妄乎哉何以故由彼長者見諸子等於火宅中樂著嬉戲無求出意故作方便令諸子等得出火宅不令法身慧命有所損傷便是實事何必定與玩好之具然後為實何以故人所愛者莫如身命諸子既全身命不遭火害便為已得玩好之具不必更與三車也何況如來原是見彼耽戀火宅不得已而誘其出門者耶且無論不與鹿車牛車不是虗妄即使不與最小羊車亦不虗妄何以故以長者本意不欲以小車與人但以方便誘引令子得出火宅之門以是因緣故雖不與小車亦不虗妄何況如來自知財富無量本意欲令饒益諸子不待彼求甘心欲以大車等賜諸子而有虗妄者乎佛告下印其言之當理舍利弗如來亦復如是則為一切世間之父於諸怖畏衰惱憂患無明暗蔽永盡無餘而悉成就無量知見力無所畏有大神力及智慧力具足方便智慧波羅蜜大慈大悲常無懈倦恆求善事利益一切而生三界朽故火宅為度衆生生老病死憂悲苦惱愚癡暗蔽三毒之火教化令得阿耨多羅三藐三菩提此下以法合喻也如來為三界之父者合上長者有大家業也如來出三界而入三界所以為三界四生之父於諸下正顯如來原從凡夫地中修證非天成也怖畏衰惱等者謂轉無量怖畏而成就無量無畏力轉無量衰惱而成就無量大神力轉無量憂患而成就無量知見力轉無量無明而成就無量大智慧力轉無量暗蔽煩惱而成就無量方便智慧力轉殺心而上與諸佛同一慈力轉害心而下與六道同悲仰力轉懈怠而成精進力具足種種廣大神力故能恆求善事利益一切所以現生三界度脫衆生如鏡像水月也衆苦依止名生苦謂才落地時苦根不斷也能令變壞名老苦謂形容枯稿顏色憔悴也能迫身田名病苦謂呻吟牀簀嘆息房闈也能滅諸根名死苦謂眼光落地四大分張也求而不得則憂得而復失則悲惡境相觸則苦苦而不已則惱唯其無怖畏故能度衆生之生死怖畏唯其無衰惱憂患故能度衆生之憂悲苦惱唯其無無明暗蔽故能度衆生之愚癡暗蔽三毒之火唯其成就知見力無畏等故能教化衆生令得阿耨菩提總言如來自覺圓而能覺他也見諸衆生為生老病死憂悲苦惱之所燒煮亦以五欲財利故受種種苦又以貪著追求故現受衆苦後受地獄畜生餓鬼之苦若生天上及在人間貧窮困苦愛別離苦冤憎會苦如是等種種諸苦衆生沒在其中歡喜遊戲不覺不知不驚不怖亦不生厭不求解脫於此三界火宅東西馳走雖遭大苦不以為患舍利弗佛見此已便作是念我為衆生之父應拔其苦難與無量無邊佛智慧樂令其遊戲舍利弗如來復作是念若我但以神力及智慧力捨於方便為諸衆生讚如來知見力無所畏者衆生不能以是得度所以者何是諸衆生未免生老病死憂悲苦惱而為三界火宅所燒何由能解佛之智慧合上長者興慈也見者謂以佛眼觀見也八苦皆合火四苦如前餘四復釋非愛共會名冤憎會苦可愛相違名愛別離苦希望不遂名求不得苦是前衆苦聚集名五陰熾盛苦合前四苦所謂人間八苦也若合生老等為一苦名五苦亦以五欲財利受種種苦者是求不得苦也又以下此即五陰熾盛苦也謂貪著五欲財利追求必得雖龍宮虎穴不避艱險既現受苦復墮三塗即生天上人間尚有貧窮困苦也言貧窮困苦者無財曰貧無眷屬曰窮不舒暢曰困愛別二句配二苦可知沒在其中者言渾身溺在苦中也不但不知苦抑且歡喜遊戲唯其歡喜故不知不覺唯其遊戲故不驚不怖由不知不覺故不厭苦集由不驚不怖故不求解脫於此三界火宅東馳西走溺喪而不知歸終身沒苦而不以為患此如來所以興憐愍也舍利弗下合三七思惟也言彼既為我子我為其父應當即以我之神力智慧力令彼頓拔業識之苦頓與佛慧之樂令其遊戲大寂滅場方愜本願復作下設方便也若我但用神力廣讚佛乘不行方便不令先斷六識三毒超出三界取證涅槃而欲驟令行菩薩事頓捨業識頓入佛慧恐機小法大法不投機不能得度何以故未出三界尚為五欲三毒八苦火之所燒彼將撲滅之不暇即與之説何由能解諸佛甚深無量之智慧乎正如人在縲絏之中與談帝王富貴何益於事故不得不用方便以拔濟之也舍利弗如彼長者雖復身手有力而不用之但以殷勤方便勉濟諸子火宅之難然後各與珍實大車此提出喻中要義合上文而起下文如彼長者下合上文也但以殷勤下起下文也如來亦復如是雖有力無所畏而不用之但以智慧方便於三界火宅拔濟衆生為説三乘聲聞辟支佛佛乘而作是言汝等莫得樂住三界火宅勿貪粗弊色聲香味觸也若貪著生愛則為所燒汝速出三界當得三乘聲聞辟支佛佛乘我今為汝保任此事終不虗也汝等但當勤修精進如來以是方便誘進衆生復作是言汝等當知此三乘法皆是聖所稱嘆自在無繫無所依求乘是三乘以無漏根力覺道禪定解脫三昧等而自娛樂便得無量安隱快樂如來下合身手有力而不用之但以下合但以殷勤方便勉濟諸子之難也汝等莫得樂住三界火宅者勸其離苦也商書云如火之燎於原不可嚮邇何況沒在其中乎勿貪粗弊下是六識所緣之境勸其斷集也蛾眉皓齒是伐性之斧絲竹管絃是奪心之賊華香酒氣是作孽之媒甘脆膿肥是腐腸之藥雲繒霧縠是惰身之機故勸其勿貪貪之者識也若貪著則生愛有愛則為所燒貪愛不生潤生已絶故頭藍弗以世俗智伏下地惑獲非想定具五神通時君尊敬迎入宮掖女子接足而禮頭藍弗觸女子手遂生貪欲便失五通故知輪轉三界悉由貪愛所使透得此關出塵羅漢矣汝速下勸其修道必證果也我今下復以巽語誘之也言我今為汝作保擔當此事決不賺汝雖然如是還須要你自己著力修進勿生疲怠始得如來循循善誘如此復作下廣讚三十七品助道法以慫慂之所謂四念處四正勤五根五力七菩提八聖道乃至九定三解脫此等道法皆是鍛聖賢之爐鞴出生死之要關故諸佛極口稱嘆謂此道法是自在無繫無所依求之物也言自在者若知苦則無生死逼迫之苦果而有身心自在之樂無繫者若斷集則無三界繫縛之苦因而有縱任不拘之樂無所依者若證滅則我生已盡不受後有不嬉戲火宅無求者若修道則旅泊三界無所希求不貪著世間乘此三乘行此道法證寂滅樂不受三界八苦交煎不為粗弊色聲香味觸所困便得無量安隱快樂矣舍利弗若有衆生內有智性從佛世尊聞法信受殷勤精進欲速出三界自求涅槃是名聲聞乘如彼諸子為求羊車出於火宅若有衆生從佛世尊聞法信受殷勤精進求自然慧樂獨善寂深知諸法因緣是名辟支佛乘如彼諸子為求鹿車出於火宅若有衆生從佛世尊聞法信受勤修精進求一切智佛智自然智無師智如來智見力無所畏愍念安樂無量衆生利益天人度脫一切是名大乘菩薩求此乘故名為摩訶薩如彼諸子為求牛車出於火宅此言諸子修道證滅以合出火宅也內有智性者宿有種子也聞法信受者緣以發之也殷勤精進欲出三界者修道也自求涅槃者證滅也欲速自求是小乘病欲速故不達自求故不大因乖萬行果闕圓常皆欲速自求之過也是名下結名也聲聞根鈍名小乘亦名下乘如彼下合喻也求自然慧者任其自悟不求師也樂獨善寂者單丁自守不求友也此獨覺也深知諸法因緣者觀察十二因緣也此緣覺也辟支根利於聲聞而劣於菩薩名二乘亦名中乘一切智者妙觀察智也佛智者大圓鏡智也自然智者平等性智也無師智者成所作智也或是菩薩智佛智聲聞智辟支智也由菩薩萬行齊修四智盡學故名大乘亦名上乘舍利弗如彼長者見諸子等安隱得出火宅到無畏處自惟財富無量等以大車而賜諸子如來亦復如是為一切衆生之父若見無量億千衆生以佛教門出三界苦怖畏險道得涅槃樂如來爾時便作是念我有無量無邊智慧力無畏等諸佛法藏是諸衆生皆是我子等與大乘不令有人獨得滅度皆以如來滅度而滅度之是諸衆生脫三界者悉與諸佛禪定解脫等娛樂之具皆是一相一種聖所稱歎能生淨妙第一之樂此明出火宅而等賜大車也必使到無畏處然後等賜大車者盈科後進教不躐等也如來亦復下令如彼長者見諸子等安隱得出火宅到無畏處也如來爾時下合自惟財富無量等與大車也亦含前文我財物無極諸藏充溢今此幼童愛無偏黨應當等心各各與之等文悉與諸佛禪定解脫等者又將諸佛深入無際甚深無量之解脫禪定以易小乘之解脫寂滅定也娛樂之具者具謂器具有是具方有是樂衆生昔以粗弊色香為器具日用貪著嬉戲為快樂故世尊將九定三解脫之具自在無繫無所依求無量安隱之樂以易之自後貪著此具而不肯捨如來復以一相一種諸佛禪定解脫之具能生淨妙第一之樂以易之以此具易彼具以金博金也故三乘禪定解脫娛樂之具是聖所讚歎諸佛禪定解脫娛樂之具亦曰聖所稱歎也不然彼又安能肯捨娛樂之具哉言淨妙第一者小乘有變易生死故不淨如來則二死永亡故淨小乘但證人空故不妙如來二空雙證故妙小乘唯脫見思故非第一如來五住究盡故第一也舍利弗如彼長者初以三車誘引諸子然後但與大車寶物莊嚴安隱第一然彼長者無虗妄之咎如來亦復如是無有虗妄初説三乘引導衆生然後但以大乘而度脫之何以故如來有無量智慧力無所畏諸法之藏能與一切衆生大乘之法但不盡能受舍利弗以是因緣當知諸佛方便力故於一佛乘分別説三此合辨核不虗如彼下舉喻如來下法合何以故下徵釋先説三乘然後等賜佛乘不是虗妄意謂如來初意原要即欲與大乘法原不欲與小乘法但彼根器下劣容受不盡故隨量授與舍利下結答問辭汝前問云願為四衆説其因緣何故四十年中説二説三今説一乘故結答云別無他故由四十年前根器狹劣不能容受以是因緣四十年來將一佛乘裂而為三耳佛欲重宣此義而説偈言譬如長者有一大宅其宅久故而復頓弊堂舍高危柱根摧朽梁棟傾斜基陛隤頽毀墻壁圮丕拆策泥塗阤矢落覆苫山亂墜椽篆梠呂差脫周障屈曲雜穢充遍有五百人止住其中偈中將前略處盡情摹寫儼然一幅三界圖也譬如長者有一大宅者喻如來以三界為家故大宅為長者有也其宅久故而復頓弊者喻一迷已來便有此界而此世界久經時劫既已朽故而復安頓許多弊惡之物在內也堂舍下八句釋其宅久故也高危者高突而危險也摧朽者摧折而朽腐也傾斜者傾倒而欹側也隤毀者崩頽而毀壞也圮坼者外圮而內裂也阤落者阤壞而剝落也差脫者參差而疏脫也由此化土以識性為堂舍故高危以亂想為柱根故摧朽以無明為梁棟故傾斜以貪愛為基陛故隤毀以我慢為墻壁故崩倒以雜染為泥塗故阤落以二障為覆苫故亂墜以塵勞為椽梠故差脫正顯化土之可壞非若報土之不壞也彼報土者以法性為堂舍寧有高危以禪定為柱根何得摧朽以願力為梁棟寧有傾斜以福德為基陛寧有隤毀以戒律為墻壁寧有圮坼以衆香為泥塗寧有阤落以慈悲為覆苫安得亂墜以萬行為椽梠寧有差脫周障下釋而復頓弊也周障者周遭障隔非若報土之十方無壁落也屈曲者盤旋曲折非若報土之平易坦途也雜穢充遍者不淨之物無處不有非若報土之清淨也有五百人止住其中者正顯五趣衆生雜居在內非若報土之純菩薩衆也鴟癡梟消雕刁鷲秀烏鵲鳩鴿合蚖完蛇蝮蠍蜈蚣蚰由蜒延守宮百足鼬又貍立鼷奚鼠諸惡蟲輩交橫馳走此下描寫人其面而獸其心者攝在禽門也鴟梟雕鷲下別明五趣衆生皆為三毒所使如下文所云者鴟即鴟鵂亦名鵂鶹亦名怪鴟其鳴即雨晝無所見夜即飛噉蚊虻莊子所謂鴟鵂夜撮蚤而晝不見泰山是也此怪鳥也人之反常怪誕有如此者梟即土梟附塊為兒子成父母皆遭其食不孝鳥也人之不孝有如此者雕似鷹而大黑色俗呼皂雕亦名鷲性刻制翱翔水上扇魚令出沸波攫而食之亦名沸河淘河在岸則魚入沸河在岸則魚湧刁刻鳥也人之刁刻有如此者烏鵲者烏傳沫鵲傳枝詩云莫黑匪烏鵲之強強皆刺淫泆也鳩則借巢為居拙鳥也人之性拙有如此者鴿性易合淫鳥也人之淫佚有如此者蚖蛇大蛇也亦名蝮蛇蝮復也觸之則復蝮蛇怒時毒在頭尾螫手則斷手螫足則斷足是蛇毒之尤者又云蝮蛇鼻反其上有針衆蛇之中此獨胎産生輒坼其母腹鴆鳥食之人之含毒有如此者蠍全蠍也奮毒螫人蜈蚣一名蝍且見大蛇緣而食其腦莊子云即且甘帶是也人之食人髓腦而不知畏有如此者蚰蜒即蜈蚣也頸赤者為蜈蚣頸不赤者名蚰蜒百足亦名馬蚿亦名商距莊子云商距馳河是也又云百足之蟲死而無僵以其扶之者衆也其助桀為虐有如此者守宮即蜥蜴也亦名蝘蜓以朱飼之其體盡赤搗之萬杵以點女身終身不滅如赤痣偶則落俗謂之蠍虎善緣籬壁人之攀緣有如此者鼬鼠捷於捕鼠俗呼黃鼠狼亦名鼪莊子云卑身而伏以候敖者東西跳梁不避高下者是也人之跳梁不畏有如此者貍善卜者也行則止而擬度其發必獲人之百發百中有如此者鼷鼠鼠之最小者莊子云載鼷以車馬是也一名甘口鼠雖傷人人不知痛人之陰害人而人不知有如此者諸惡二句言此等諸蟲於世界中交橫馳走無忌憚也屎尿臭處不淨流溢𧏙羌蜋良諸蟲而集其上狐乎狼野干咀嚼踐踏嚌計齧業死尸骨肉狼郎藉由是群狗競來搏撮飢羸雷慞惶處處求食鬪諍爭𢳛吒掣徹啀喍柴嘷毫吠其舍恐怖變狀如是𧏙蜋亦名蛣𧏙衝波傳曰𧏙蜋無鼻而聞香經營穢場之下車轉糞丸一前推之一後挽之若僕人轉車故曰𧏙蜋之智在於轉丸也四句描寫世人貪著欲境耽戀不捨認糞穢為香潔美妙之物法眼視之何異𧏙蜋之集於臭壤耶人之耽欲有如此者果能將革囊盛糞一語勘破雖天女滿前亦不能動矣狐狼者狐妖媚之獸禮北斗而靈善變化其為物也妖淫人之妖媚有如此者狼犬如狗青色物之尤暴戾者人之暴戾有如此者嚌者啖其肉囓者併啖其骨粗嚼曰咀細咀曰嚼輕踏曰踐重踐曰踏皆是據而口囓之狀四句描寫世人耽著世味如矦鯖禁臠珍羞寶饌者法眼視之何異狐狼野干之嚌囓死尸也由是下群狗爭奪也狐狼野干之狼藉者又有群狗復取其餘撮聚一處而噉之由其飢羸之甚不充其腹故處處慞皇求食所謂乞其餘不足又顧而之他也鬪諍𢳛掣者用力爭奪之狀啀喋嘷吠者呀口作聲之狀六句描寫貪著追求不知厭足有如此者其舍下總言三界之內可畏之事變態之狀有如此者處處皆有魑癡魅魍魎夜叉惡鬼食噉人肉毒蟲之屬諸惡禽獸孚乳産生各自藏護夜叉競來爭取食之食之既飽惡心轉熾鬪諍之聲甚可怖畏鳩槃茶鬼蹲存踞土埵朵或時離地一尺二尺往返遊行縱逸嬉戲捉狗兩足撲令失聲以腳加頸怖狗自樂復有諸鬼其身長大裸形黑瘦常住其中發大惡聲叫呼求食復有諸鬼其咽如針復有諸鬼首如牛頭或食人肉或復噉狗頭髮髼蓬亂殘害凶險飢渴所逼叫喚馳走夜叉餓鬼諸惡鳥獸飢急四向窺看窗牖如是諸難恐畏無量此下描寫人其面而鬼其心者收在鬼門也上以禽獸摸寫癡鈍之人此以惡鬼描寫狡猾之輩極盡世間可畏之狀欲人生驚恐而生厭離也魑魅者魅人之鬼有瞞人昧己如此物者魍魎者似有如無之鬼有劈空駕虗之人如此物者夜叉此云捷疾鬼有機變之人如此物者言處處皆有如此狙詐駕虗之輩恃鬼計而行凶謀人家産囓人肌肉而不知厭足者此與世間惡鬼何異哉毒蟲下喻搏利以肥子孫而復為人奪去者孚乳産生者以爪護子曰孚以乳哺子曰乳有等惡毒之人唯是護惜己家不顧他亦有家藏護己子不顧他亦有子欺人孤兒寡婦而洗蕩其子孫吞併其家産欲傳之後世子孫作千年萬年之計卒之遇有力夜叉併其子孫家産一口吞盡則向所吞併人者今復為人吞併矣所謂出乎爾者反乎爾也而此夜叉既逞其志其心愈熾必將併天下而盡吞之然後為快於是無處不飛鬪諍之聲其可畏之甚有如此者鳩槃者此云甕形鬼虛坐曰蹲實坐曰踞土埵者壟斷也有時離地一尺二尺者言處高而復高也既處高位則威勢愈重往反遊行任其所向無不縱心恣意即遇一毛不拔之夫若臨之以刀斧加之以箠楚計不容施辨不容口既縛其足復躡其頸令他生怖自取其樂其可畏有如此者復有諸鬼下餓鬼也形雖長大狀實可憎既無服飾嚴其身又無粗糲充其腹唯是沿街叫呼求食而已其寒乞之狀有如此者其咽如針者心欲吞而咽不能咽者懨懨病夫有如此者首如牛頭者鬼而畜者也既鬼而畜則人畜併噉矣此雖殘物害人形凶心險悉由飢渴所逼故叫喚馳走無時暫停也飢急四向窺看窗牖者言此飢虗火逼之時即有回心思求出路其如周障屈曲故雖欲出而不能出唯是窺看窗牖而已如是二句結前所謂頓弊者如此欲界衆生俱為財食而起鬪諍故多所描寫鬪諍若除便得無諍三昧矣是朽故宅屬于一人其人近出未久之間於後宅舍忽然火起四面一時其𦦨俱熾棟梁緣柱𪹼聲震裂摧折墮落墻壁崩倒諸鬼神等揚聲大叫雕鷲諸鳥鳩槃茶等周慞惶怖不能自出惡獸毒蟲藏竄孔穴毗舍闍鬼亦住其中薄福德故為火所逼共相殘害飲血噉肉野干之屬並已前死諸大惡獸競來食噉臭煙熢蓬㶿卜四面充塞蜈蚣蚰由蜒延毒蛇之類為火所燒爭走出穴鳩槃茶鬼隨取而食又諸餓鬼頭上火然飢渴熱惱周障悶走其宅如是甚可怖畏毒害火災衆難非一其人下譬如來在世教化衆生令伏煩惱如來應化他方暫時不在衆生煩惱火便發也四面下喻三界中同時同處火災齊發𪹼列之聲徹天震地而所謂棟梁椽柱悉成灰燼墻壁皆成砂礫矣即使尋常倚聲托勢欺己瞞人其機如鬼其謀如神者至火發時無可奈何不過揚聲大叫自怨自恨而已其鷙惡如雕鷲可畏如鳩槃尋常縱逸嬉戲不畏神明損人害物及至此時周慞惶怖欲出而不能出亦噬臍無及矣惡獸下喻同類相殘也其最愚者如惡獸毒蛇最癡者如毗舍闍鬼尋常在十字街頭交馳橫走恣意嬉戲及至此時悉皆藏竄孔穴欲免此難不知惡貫滿盈酬對一至非山海中可得避脫況孔穴乎即使藏竄平生不曾積德修福不得免離火來逼身又無出路茫無投奔昔時之為妻子眷屬同䬸同飲者至此亦各不相顧飲血噉肉共相殘害即有狡猾如野干者皆焚死於火𦦨之前矣更有一等最癡極惡諸大惡獸雖有如此榜樣毫無恐懼猶然競來食噉死尸所謂至死而不覺悟有如此者大火四面齊發故臭煙四面充塞也蜈蚣下喻異類食噉也在孔穴中有藏竄而自類相殘有出走而惡鬼食噉足見無常火發在三界中既不能竄而免又不能逃而脫甘心待焚束手就斃哀哉又有一等人尋常不餐法味及乎火到頭上渾身熱惱正如落湯螃蟹手忙腳亂唯有周慞悶走而已其宅四句總結毒獸火災種種可畏皆萃於一門之內也火宅一喻此世尊自述昔日以剛強苦切之言化人天法也然欲界人天俱耽著五欲心如鬼畜者多故將比例鬪諍可畏之狀令彼警醒生厭離心勿貪著耳上二界雖與欲界優劣不同然鬪諍之根未絶五衰之相未除以未盡煩惱故總在煩惱火中日夜燒然也問如上比例亦有説乎曰有如本經以大白牛車喻佛乘羊鹿牛車喻三乘他處又以師子比佛以龍象比菩薩以跛驢比二乘既以此物喻聖人當以此物喻愚人矣如易以龍虎比陽則以魚豕比陰詩以騶虞比仁慈君子則以鴟鶚比陰險惡人是也曰古德以貪瞋等各各別配可乎曰可曰何不依之曰但如此配合大煞板定如以烏鵲等配淫豈烏鵲等遂無瞋癡乎故我以三毒混融則知諸物所使皆三毒耳曰如來化土既是五趣雜居則當以五百人配人趣諸子配天趣禽獸配畜生趣諸鬼配鬼趣地獄趣引人天出三惡道可乎答若如此配皆是實事非譬喻也既曰譬喻則知如來借彼相例明矣故以五百人例五趣衆生復以諸子例具三乘根性之人總在火宅貪戀五欲故以𧏙蜋諸蟲寫貪色之狀狐狼野干寫貪味之狀夜叉寫富而不仁之態鳩槃寫貴而貪酷之態由此界中以五欲財利受種種苦故世尊竭力描寫使人警省不令貪著而生厭耳如貪色者何異𧏙蜋之集糞穢貪味者何異狐狼之囓死尸富而不仁者何異夜叉之競取貴而貪酷者何異鳩槃之怖狗乃至別寫許多情狀不過誘引出三界苦漸入佛乘耳是時宅主在門外立聞有人言汝諸子等先因遊戲來入此宅稚小無知歡娛樂著長者聞已驚入火宅方宜救濟令無燒害此長者興慈也在門外立者喻如來雖應化他方常緣此界故不處法空之座常立於門外聽此方之消息也聞有人言者喻他方佛報消息也文句引經云十方佛語釋迦云汝有緣諸子在三界中善根將滅汝往濟之等先因遊戲者先字與後文先來求子之先意同言諸子往昔因中不肯精進修持縱逸嬉戲故墮落三界抑且稚小無知不知此界是險難處不可頓足而反歡娛樂著不肯捨離故長者聞消息而驚入火宅欲以方便救拔之也問前云以佛眼觀此云聞有人言者何也答因聞人言而後以佛眼觀也告喻諸子説衆患難惡鬼毒蟲災火蔓延衆苦次第相續不絶毒蛇蚖蝮及諸夜叉鳩槃荼鬼野干狐狗雕鷲鴟梟百足之屬飢渴惱急甚可怖畏此苦難處況復大火諸子無知雖聞父誨猶故樂著嬉戲不已是時長者而作是念諸子如此益我愁惱今此舍宅無一可樂而諸子等耽單湎勉嬉戲不受我教將為火害即便思惟設諸方便告諸子等我有種種珍玩之具妙寶好車羊車鹿車大牛之車今在門外汝等出來吾為汝等造作此車隨意所樂可以遊戲諸子聞説如此諸車即時奔競馳走而出到於空地離諸苦難長者見子得出火宅住於四衢坐師子座而自慶言我今快樂此諸子等生育甚難愚小無知而入險宅多諸毒蟲魑魅可畏大火猛𦦨四面俱起而此諸子貪樂嬉戲我已救之令得脫難是故諸人我今快樂爾時諸子知父安坐皆詣父所而白父言願賜我等三種寶車如前所許諸子出來當以三車隨汝所欲今正是時惟垂給與長者大富庫藏衆多金銀琉璃硨磲瑪瑙以衆寶物造諸大車莊校嚴餝尺周匝欄楯四面懸鈴金繩妄絡真珠羅網張施其上金華諸瓔處處垂下衆綵雜飭一作飾周匝圍繞柔軟繒情纊况以為茵褥入上妙細氎蝶價直千億鮮先白淨潔以覆其上有大白牛肥壯多力形體姝好以駕寶車多諸儐從而侍衛之以是妙車等賜諸子諸子是時歡喜踊躍乘是寶車遊於四方嬉戲快樂自在無礙喻説苦集也所謂為説怖畏之事也災火蔓延者災火即火災也言此八苦火災不息如藤蔓之連延不絶也諸子下謂父雖憐愍善言誘諭而諸子等了無出心愚癡之極罔若不聞不受教訓也是時下廣讚滅道也即以珍玩之樂具易其粗弊之苦具也諸子下競共推排爭出火宅也長者下長者見子得出火宅歡喜自慶也爾時下諸子索車也長者下等與大車也以衆寶造車非若堂舍之高危也莊校嚴飾非若朽宅之久故也周匝欄楯者非若周障屈曲也四面懸鈴者非若四面𪹼聲震裂也金繩交絡者非若梁棟傾斜也真珠羅網張施其上者非若覆苫亂墜也金華諸瓔處處垂下者非若椽梠差脫也衆綵雜飾周匝圍繞者非若墻壁圮坼也柔軟繒纊以為茵褥者非若基陛頽毀也上妙細氎以覆其上者非若泥塗阤落也有大白牛以駕寶車者非若柱根摧朽也多諸儐從而侍衛之者非若有五百人止住其中也由以火宅狀其醜惡故以寶車狀其美好耳諸子下謂得車受用遊於四方所向無礙非若昔日飢急四向竊看窗牖也告舍利弗我亦如是衆聖中尊世間之父一切衆生皆是吾子深著世樂無有慧心三界無安猶如火宅衆苦充滿甚可怖畏常有生老病死憂患如是等火熾然不息如來已離三界火宅寂然間居安處林野今此三界皆是我有其中衆生悉是吾子而今此處多諸患難唯我一人能為救護雖復教詔而不信受於諸欲染貪著深故以是方便為説三乘令諸衆生知三界苦開示演説出世間道是諸子等若心決定具足三明及六神通有得緣覺不退菩薩汝舍利弗我為衆生以此譬喻説一佛乘汝等若能信受是語一切皆當成得佛道是乘微妙清淨第一於諸世間為無有上佛所悅可一切衆生所應稱讚供養禮拜無量億千諸力解脫禪定智慧及佛餘法得如是乘令諸子等日夜劫數常得遊戲與諸菩薩及聲聞衆乘此寶乘直至道場以是因緣十方諦求更無餘乘除佛方便此合譬如長者至衆難非一一節以父合長者以子合一切衆生以三界合火宅以生老病死合火也深著世樂者言三界衆生未盡貪愛耽著世間五欲之樂而無一毫出世慧心豈知三界不安猶如火宅更有衆多苦難充滿其中而甚可怖畏者哉昔有人有罪於王其人恐怖逃走王令醉象逐之其人怖急自投丘井半井得一腐草以手執之下有惡龍吐毒向之傍有五毒蛇復欲加害二鼠嚙草草復將斷大象臨其上復欲取之其人危苦極大恐怖上有一樹樹上時有密滴落其口中以著味故而忘恐怖丘井生死也醉象無常也毒龍惡道也五毒蛇五陰也腐草命根也黑白二鼠日月也密滴五欲樂也得密滴而忘怖畏者喻衆生得五欲蜜滴不畏生死苦也如來下合長者興慈也如來在三界外故見三界內是火若在三界內則亦貪著嬉戲不見火矣今此下見如來雖在三界外實不忘三界衆生也雖復下合説苦集也所謂告喻諸子説衆患難雖聞父説猶故樂著也於諸下二句是三界衆生之病根故特拈出以是下合讚滅道也出世間道即助道法也是諸下合出火宅也三明者天眼它心宿命也六通者加天耳神境漏盡也汝舍下合等賜大車也言我先為汝説諸有所作常為一事今復將此譬喻例説佛乘但從譬喻而得信解亦得稱為智人矣勿更疑也是乘下廣讚一乘也及餘佛法者言此乘中無量佛法皆悉具足正如大白牛車無所不載言我得如是乘載諸衆生日夜遊戲如是即四十年前未嘗不以佛乘載汝等也我今將此大乘轉與汝等汝等乘是寶乘可以直至如來道場矣以是因緣十方諦求唯一佛乘更無餘乘即有餘乘此皆諸佛方便之力以一佛乘分別説三也告舍利弗汝諸人等皆是吾子我則是父汝等纍劫衆苦所燒我皆濟拔令出三界我雖先説汝等滅度但盡生死而實不滅今所應作唯佛智慧若有菩薩於是衆中能一心聽諸佛實法諸佛世尊雖以方便所化衆生皆是菩薩若人小智深著愛欲為此等故説於苦諦衆生心喜得未曾有佛説苦諦真實無異若有衆生不知苦本深著苦因不能暫捨為是等故方便説道諸苦所因貪欲為本若滅貪欲無所依止滅盡諸苦名第三諦為滅諦故修行於道離諸苦縛名得解脫是人於何而得解脫但離虗妄名為解脫其實未得一切解脫佛説是人未實滅度斯人未得無上道故我意不欲令至滅度我為法王於法自在安隱衆生故現於世此下委曲叮嚀警其生信言汝等皆是我親生之子我即是汝等之父故我不止一生一劫濟拔汝等汝等纍劫在三界內衆苦所燒我亦纍劫在三界中濟拔汝等令出衆苦如是不但四十年前為汝等説三乘法即纍劫中未嘗不為汝等説三乘法也故我四十年前稱讚汝等已得滅度者但汝等已出三界生死苦惱故説汝等得滅度耳其實未得如來究竟寂滅也今汝既悟諸佛智慧則嬉笑怒罵謦咳啼唾凡所作為非無皆是用佛智慧然雖如是原與昔日未嘗異也要知先後説法未曾有二但是隨人換名色耳衆中若有菩薩根器不慕餘乘一心欲聽諸佛實法諸佛却將此法喚作方便雖以方便接引衆生所化衆生皆成菩薩何以故由彼好樂諸佛實法故若人小智深著愛欲留戀三界為此等人又將此法喚作苦諦豈知苦諦原與諸佛真實之法本無有異若有衆生雖厭苦果不知苦果之所因深著苦因不知苦因之根本為此等人又將此法喚作貪欲之本若有人已滅貪欲則諸衆苦無所依止世尊又將此法喚作滅諦為欲證此滅諦而修三十七品助道法者又將此法喚作道諦因彼修道而證滅遠離三界衆苦之因又喚此人名為得解脫之羅漢然則雖有許多名目無非原是一法但換湯名不曾換藥所以苦集滅道雖不同而諦未有不同者是人下通難難云是人既未證平等佛慧何故喚作得解脫者答雖未證平等佛慧但彼盡六識斷三毒除我障證生空超三界越四生逍遙乎無為之鄉放曠乎幽間之地無拘無繫泯見絶聞亦得名為得解脫也問若爾何故如來又説聲聞不得滅度答未曾空異熟盡法障證法空得四智故所謂考其名則是究其實則非是故我説是人未實滅度直至於一切法成最正覺得無上道始名如來真滅度耳我為法王得法自在故能將此一法作種種名或説得解脫不得解脫或説得滅度不得滅度等無非欲令未安隱者令得安隱未解脫者令得解脫此諸佛所以為一大事因緣出現於世也汝舍利弗我此法印為欲利益世間故説在所遊方勿妄宣傳若有聞者隨喜頂受當知是人阿惟越致若有信受此經法者是人已曾見過去佛恭敬供養亦聞是法若人有能信汝所説則為見我亦見於汝及比丘僧并諸菩薩斯法華經為深智説淺識聞之迷惑不解一切聲聞及辟支佛於此經中力所不及汝舍利弗尚於此經以信得入況餘聲聞其餘聲聞信佛語故隨順此經非己紀智分又舍利弗憍慢懈怠計我見者莫説此經凡夫淺識深著五欲聞不能解亦勿為説若人不信毀謗此經則斷一切世間佛種或復顰蹙平而懷疑惑汝當聽説此人罪報若佛在世若滅度後其有誹謗如斯經四見有讀誦書持經者輕賤憎嫉而懷結恨此人罪報汝今復聽其人命終入阿鼻獄具足一劫劫盡更生如是展轉至無數劫從地獄出當墮畜生若狗野干其形𩑔哭瘦黧力黮坦疥癩人所觸嬈交又復為人之所惡賤常困飢渴骨肉枯竭生受楚毒死被瓦石斷佛種故受斯罪報若作馲駝或生驢中身常負重加諸杖捶但念水草餘無所知謗斯經故獲罪如是有作野干來入聚落身體疥癩又無一目為諸童子之所打頂擲直受諸苦痛或時致死於此死已更受蟒身其形長大五百由旬聾騃矮無足宛轉腹行為諸小蟲之所咂甲食晝夜受苦無有休息謗斯經故獲罪如是若得為人諸根暗鈍矬坐平聲狹癵連躄盲聾背傴雨有所言説人不信受口氣常臭魑魅所著貧窮下賤為人所使多病痟消瘦無所依怙戶雖親附人人不在意若有所得尋復忘失若修醫道順方治病更增它疾或復致死若自有病無人救療設服良藥而復增劇若它反逆抄劫竊盜如是等罪橫罹其殃如斯罪人永不見佛衆聖之王説法教化如斯罪人常生難處狂聾心亂永不聞法於無數劫如恆河沙生輒聾啞諸根不具常處地獄如遊園觀在餘惡道如己紀舍宅駝驢豬朱狗是其行處謗斯經故獲罪如是若得為人聾盲瘖啞貧窮諸衰以自莊嚴水腫乾痟疥癩癰疽如是等病以為衣服身常臭處垢穢不淨深著我見增益瞋恚淫欲熾盛不擇禽獸謗斯經故獲罪如是告舍利弗謗斯經者若説其罪窮劫不盡以是因緣我故語汝無智人中莫説此經此下付囑流通也故又呼其名而囑之云我此實相法印為欲利益一切世間衆生故説汝當弘通此經然授受之際須當著眼勿妄宣傳若流通不得其人反生誹謗墜於大坑此又胸中一種不了事也故復以隨機説法之方授之若有下明信根堪授也若一著耳根隨即大喜遍身頂戴受持此等即是上上根器現世即得不退轉地者固當授與其或聞而不得大喜遍身或一聞即信或一信即受永無退失者此人根器亦利曾在過去佛前久植德本亦當授與其或不能信受即信汝所説而不生誹謗者亦非容易此人則為親見靈山一會亦當授與故我今日説此經典純為大根不為淺識若淺識聞之不唯不解而反迷不唯不信而反惑所以一切二乘盡思度量皆不能知也聲聞衆中汝稱智慧第一尚以信而得入此經況餘聲聞不信而能入哉其餘聲聞但是信受佛語隨順此經以為佛知佛見是佛分上事與我無干不信自己亦是有分直下承當故知此輩力所不及不堪授與憍慢者貢高托大不肯卑心懈怠者心耽安逸不勤精進計我見者封著己見至言不入此等皆有膏肓之疾不堪授與凡夫者謂未入小果之人五欲者財色名食睡也逐臭之夫授以沉檀非其所好故勿堪與若人下正出所以不與者恐人不信反生毀謗墮落三塗非吝而不説也言佛種者此經是一切諸佛之母一切諸佛皆從此經流出故顰蹙者顰眉蹙額也懷疑惑者半信半不信也誹謗者出非理之語以毀此經也輕賤憎嫉者眇忽之謂輕卑視之謂賤厭惡之謂憎忌妬之謂嫉中心忿忿之謂結恨其人下出不信誹謗之報阿鼻此云無間謗法之罪皆入阿鼻與五逆罪同此受地獄報也從地下受畜生報也狗執吝之物野干癡著之物由執吝癡著故墮此類無法味資神故𩑔瘦無清白梵行故斑黑無威德莊嚴故疥癩觸嬈侮弄也昔曾觸嬈人今復為人觸嬈也昔曾惡賤人今亦為人惡賤也困飢渴者不䬸法喜食不飲甘露漿故此皆斷佛種之報也問負重是償宿債何故謗經亦受此報答此經是大白牛車能載運一切功德法財授與四衆而反興謗毀是負債之尤者其受此報不亦宜乎但念水草餘無所知者由斷一切種智故除齕草飲水餘總不知也有作野干者不喜獅音好樂邪説故又無一目者破壞如來正眼故童子打擲者輕賤憎嫉故更受蟒身者以彼結恨故其形長大者毀謗大經故聾騃無足者騃癡也癡著不信不修福慧故宛轉腹行者諂曲不實故小蟲咂食者謗經毀佛人人切齒思欲寢其皮而食其肉故此受畜生報也暗不明也鈍不利也矬矮小也陋醜陋也癵躄者足不能行也背僂者曲背也總之貌不驚人也有所言説人不信受者語不厭衆也口氣常臭者無青蓮香也魑魅所著者天龍不護也富有萬德號令群衆者法王也而輕賤之故貧窮下賤為人所使也毀金剛之正體故多病憎無上之醍醐故痟瘦不信此經是一切衆生之父母故無所依怙雖親附人人不在意者言此法與人同眠共起可為至親然而曾無一念隨順之心謂之背德故雖親附人人亦不在意也有所得而復失者不見根本未發佛慧故治病增疾者佛是醫王能治一切衆生根本心病由不信佛法故順方治病而反更增他疾以致死也自病不療反增劇者此經如善見藥王樹見之者眼得清淨聞之者耳得清淨等是以心藥治心病也今不信此經既無有藥難除心病故雖服藥反增其劇也若他反逆等者若隨順此經則物物燈明智體頭頭普賢行門若不隨順而與相忤則與接為搆日與心鬪自劫家寶故有此等橫事加其身也永不見佛聞法者既生三途八難又得狂聾之疾故永不見不聞也生輒聾啞者由不餐采不讚嘆故園觀者遊樂處也舍宅者安身處也行處者經行處也水腫者貢高自滿故乾消者法味不沾故無法財故貧無德本故病貧病隨身故曰莊嚴而又曰衣服也身長臭穢者不觸清淨妙蓮香故深著我見者五利使也增益瞋恚者五鈍使也淫欲熾盛者於戒缺漏也告舍利弗下結非器莫傳也無智人中莫説此經者雖是反復叮嚀亦是微露如來四十年中祕而不説之意亦恐無智人聞謗而不信故也若有利根智慧明了多聞強識求佛道者如是之人乃可為説若人曾見億百千佛植諸善本深心堅固如是之人乃可為説若人精進常修慈心不惜身命乃可為説若人恭敬無有異心離諸凡愚獨處山澤如是之人乃可為説又舍利弗若見有人捨惡知識親近善友如是之人乃可為説若見佛子持戒清潔如淨明珠求大乘經如是之人乃可為説若人無瞋質直柔軟常慜一切恭敬諸佛如是之人乃可為説復有佛子於大衆中以清淨心種種因緣譬喻言辭説法無礙如是之人乃可為説若有比丘為一切智四方求法合掌頂受但樂受持大乘經典乃至不受餘經一偈如是之人乃可為説如人至心求佛舍利如是求經得已頂受其人不復志求餘經亦未曾念外道典籍如是之人乃可為説告舍利弗我説是相求佛道者窮劫不盡如是等人則能信解汝當為説妙法華經此言大根方授也利根智慧明了者是見鞭影而行非鈍根小智之人也多聞強識者是敬而好學非著相憍慢之人也求佛道者是直下承當非小根劣行之人也此皆載道之器故可説供億佛植衆善深心堅固永不退轉者如長慶七破蒲團香林四十年打成一片之類是大乘法器故可説精進修慈至於不惜身命如藥王菩薩雪山童子之類是勇猛丈夫故可説恭敬無有異心者所謂天龍恭敬不以為喜也離凡愚而獨行獨步處山澤而無慕無求如恆超懶瓚道悟之類由彼心無異緣物不能誘故可説捨惡親善是能辨邪識正者故可説持戒清潔如淨明珠者是護持佛性戒珠具足清白梵行之人故可説無瞋而質直柔軟愍物而恭敬諸佛是住忍辱力而悲敬二田皆具足者故可説以清淨心説法無礙者是得佛智慧紹佛家業弘佛道而報佛恩者故可説樂大乘而不受餘經一偈者若法常僧稠之不受仙書之類是純餐甘露唯味醍醐者故可説如人下喻人求法之專當如康僧會之求舍利也不受餘經一偈不念外道典籍者是心路不岐諸見不動者故可説古德所謂如經蠱毒之鄉水也不得沾他一滴是也告舍下結大根方授也信解品窮子喻第四頌云不識家珍富都忘父子親故將除糞器翻作乞憐人瘡癬為常服支離是報身忽然瞥地處直御法王輪前聞法説而動惑生疑今聞喻説而生信起解故名信解品二品皆以父子為喻前品以大富長者喻如來資財不匱故言等賜大白牛車此品以幼稚貧兒喻弟子無心希求故言忽得如來寶藏之分前品寫如來慈愍為子之心最切故云驚入火宅此品寫弟子愚癡背父之事居多故曰疾走而去前品寫如來誘引出三界門故云今在門外此品寫窮子不肯入如來門故曰住立門側父子兩人各吐心膽説出四十年中許多間關曲折各極其致至今日始得父子投機師資合道問四大弟子是衆中綱領居僧之首云何不先悟入而反動惑生疑鶖子云何先得領悟答但看兩處敘悟之文便知端的由舍利弗尋常在山林樹下自疑自悔自咎自責不肯甘為小乘故一聞嘆佛智慧即便生疑一聞羅漢作佛當時擔荷乃云今日乃知真是佛子得佛法分四大弟子尋常疲懈不疑不咎直待如來危言激勵又聞鶖子授記然後生疑鶖子代請如來説喻方始信解故先敘云我等自謂已得涅槃不知真是佛子不復進求阿耨菩提今聞譬喻我等今者乃知真是聲聞我等今者真阿羅漢所謂睡輕者一呼便應睡熟者搖撼方驚也爾時慧命須菩提摩訶迦旃延摩訶迦葉摩訶目犍連從佛所聞未曾有法世尊授舍利弗阿耨多羅三藐三菩提記發希有心歡喜踊躍即從座起整衣服偏袒右肩右膝著地一心合掌曲躬恭敬瞻仰尊顏而白佛言我等居僧之首年並朽邁自謂已得涅槃無所堪任不復進求阿耨多羅三藐三菩提世尊往昔説法既久我時在座身體疲懈但念空無相無作於菩薩法遊戲神通淨佛國土成就衆生心不喜樂所以者何世尊令我等出於三界得涅槃證又今我等年已朽邁於佛教化菩薩阿耨多羅三藐三菩提不生一念好樂之心我等今於佛前聞授聲聞阿耨多羅三藐三菩提記心甚歡喜得未曾有不謂於今忽然得聞希有之法深自慶幸獲大善利無量珍寶不求自得初經家敘悟未曾有法即究章平等法也既聞大法又聞授記故今亦發未曾有心此所以歡喜踊躍亦如鶖子也即從下三業翹誠致敬之儀也我等下追敘昔日之疲懈言我等四十餘年不復志求佛道者有故由我等法臘並高盡居僧首自謂已得究竟涅槃寂滅之樂已超三界生死之苦自謂大事已畢無所事事即見如來三十二相八十種好我雖不得無復志求正如敗根之士其於五欲不復能利故世尊下又言我四十餘年不樂菩薩法者亦有故我見世尊説法既久亦常見如來稱讚菩薩授記作佛我時雖預在座身體懈倦疲於津梁坐在正位但念空無相無作三解脫門故於菩薩遊戲神通淨佛國土之事亦不喜樂遊戲神通者如淨名之請香積借座燈王之類是也淨佛國土者如衆生之類是菩薩淨土菩薩隨所化衆生而取佛土隨所調伏衆生而取佛土之類是也所以下又徵釋不求菩提不樂度生之故由我等往昔住於邪見貪著火宅受諸苦逼世尊令我出三界苦證涅槃樂心滿意足故於佛法寶藏自無志願又今我等年已朽邁但得內滅自謂為足唯了此事更無餘事故於淨佛國土教化衆生都無欣樂也我等下敘今日之歡喜今聞授記聲聞歡喜慶幸以我無意菩提而菩提自至正如無量珍寶不求自得不求二字見得不似鶖子尋常自責自咎洪州水潦和尚初參馬祖問曰如何是祖師西來的意祖曰禮拜著師才禮拜祖乃當胸踏倒師大悟起來拊掌大笑曰也大奇也大奇百千三昧無量妙門秪向一毛頭上識得根源去也住後每告人曰自從一喫馬師踏直至如今笑不休所謂歡喜慶幸也世尊我等今者樂説譬喻以明斯義譬若有人年既幼稚捨父逃逝久住它國或十二十至五十歲年既長大加復窮困馳騁逞四方以求衣食漸漸遊行遇向本國樂説譬喻以明斯義者言世尊既以譬喻寫哀愍之心我等亦以譬喻寫愚癡之態所謂投桃報李也其中初敘父子相背次敘父子相見三敘父子相信然後承受如來家業年既幼稚者未有所識也捨父逃逝者背覺合塵也久住它國者拋家散走也至五十歲者一念心動五陰俱生也年既下言年長大而愈窮愈困也身無慚愧之衣口無禪悅之味不得已而甘為乞兒馳騁四方從人索衣食也喻如三界受苦已劇忽生一念厭世之心向外馳走而求貧所樂法也漸漸遊行遇向本國者正喻無心佛國因漸漸求師覔道而遇向佛國也其父先來求子不得中止一城其家大富財寶無量金銀琉璃珊瑚琥珀玻璃珠等其諸倉庫悉皆盈溢多有僮僕臣佐吏民象馬車乘牛羊無數出入息利乃遍它國商估賈古客亦甚衆多上言子捨父而遊行故遇向本國此言父求子而不得故中止一城一行一止寫得頓措其父先來求子不得一句是領是時宅主在門外立聞有人言汝諸子等先因遊戲來入此宅稚子無知歡喜樂著長者聞已驚入火宅方宜救濟等文正言如來往昔曾為我等現身三界故曰先來中止一城者言如來昔曾化導由我等機緣不熟時節未至求子不得故不在人間久住遂隱身而居報土以俟緣熟也其家下描寫報土境界以實如來是大富長者言大富者廣博包容名大無物不有名富財寶無量者福德為財般若名寶言福慧無盡也金銀琉璃等即十力四無量四無礙等盛糧穀者為倉盛器物者為庫盈者充乎內溢者流於外此皆喻如來自受用物也童僕使役之人臣佐輔弼之衆吏民所以聽教令首象馬牛羊所以運車乘者出入息利遍他國者謂所出之息利猶能博施濟衆不但一國抑且遍及他國見其本大而息多也此領以我此物周給一國猶尚不匱之語商估賈客無處不有者喻如來以神力加被菩薩説法度生正如商人領本生息也此皆喻如來方便利生之物也自利利他二智具足所以稱大富也時貧窮子遊諸聚落經歷國邑遂到其父所止之城前明窮子自它國至本國此又從本國以遊聚落由聚落以經國自國及邑自邑及城雖展轉遊行實未識親生之父正如處處皆是本地風光只是不見自己本來面目所謂不識廬山真面目只緣身在此山中是也前説其父求子不得中止一城此言子遊聚落到父之城父子總在一城只是兩不相見父每念子與子離別五十餘年而未曾向人説如此事但自思惟心懷悔恨自念老朽多有財物金銀珍寶倉庫盈溢無有子息一旦終沒財物散失無所委付是以殷勤每憶其子復作是念我若得子委付財物坦然快樂無復憂慮此言父憂念子也離別五十餘年者金剛三昧經云譬如迷子手執金錢而不知有遊行十方經五十年貧窮困苦專事求索而以養身而不充足其父見子有如是事而謂子言汝執金錢何不取用隨意所需皆得充足其子醒已而得金錢心大歡喜父言汝勿欣懌所得金錢是汝本物非汝有得云何可喜無住菩薩言彼父知其子迷云何經五十年十方遊歷貧窮困苦方始告言佛言經五十年者一念心動十方遊歷遠行遍計無住菩薩言云何一念心動經五十年佛言一念心動五陰俱生五陰生中具五十惡故正言父每念子與我原在一處由彼昔日一念心動五陰俱生具五十惡遂與離別五十餘年遠歷他方不復相見也而我未曾向人説破此事者恐彼機緣未熟不肯擔當也心懷悔恨者悔昔日之不留恨今日之不見也自念下次念老朽化期將至無子紹業即有財物無所委付是以殷勤念念憶子所謂老覺情多念子孫也復作下三念若我得子委付家業方暢本懷無復憂慮耳父每念子但自思惟復作是念三句是領三七思惟之意世尊爾時窮子傭賃展轉遇到父舍住立門側遙見其父踞師子牀寶几承足諸婆羅門剎利居士皆恭敬圍繞以真珠瓔珞價直千萬莊嚴其身吏民童僕手執白拂侍立左石覆以寶帳垂諸華幡香水灑地散衆名華羅列寶物出內取與有如是等種種嚴飾威德特尊窮子見父有大力勢即懷恐怖悔來至此竊作是念此或是王或是王等非我傭力得物之處不如往至貧里肆力有地衣食易得若久住此或見逼迫強使我作作念是已疾走而去此明父每念子而子不念父也傭賃者任人使用而取貝也展轉者轉換不定也遇到父舍住立門側者言自城及舍不敢入門故立門側也遙見其父而不識誤認為王始見而恐既又見而生疑不知法王即是父而己即法王之親子乃甘心於貧里疾走而去所謂當面錯過此即片葉遮睛時也遙見其父下寫長者富貴之態師子座喻法空座也神通為足無畏為几所以助神通也婆羅門淨行也剎利王族也居士居家有道之士也此喻菩薩圍繞也以真珠等莊嚴其身者正喻報身有無量色色有無量相相有無量好等以為莊嚴也吏民侍立左右者喻無量善巧方便以應物也覆慈悲之寶帳蓋護群生垂四攝之華幡引導一切法水灌域中之心地覺華驅界外之情塵羅列寶物者隨人賞玩也出內取與者收放自如也威德特尊者堂堂舍那非化佛可並也窮子下寫窮子怖畏之狀法大機小不惟畏懼抑且悔來也竊作者私自作念也此或是王等者王是國王王等或是王之兄弟親戚眷屬也見報身而生恐以為非我得物之地者如云佛道長遠久受勤苦乃可得成故不願也不如往至貧里肆力有地等者有餘涅槃是我有分也所謂甘為下劣枉受貧窮也若久下言此時若不早去而住此彼必以勢力強使我作不與工價也作是念而疾去者惟恐人追也時富長者於師子座見子便識心大歡喜即作是念我財物庫藏今有所付我常思念此子無由見之而忽自來甚適我願我雖年朽猶故貪惜即遣旁人急追將還爾時使者疾走往捉窮子驚愕惡稱怨大喚我不相犯何為見捉使者執之逾急強牽將還于時窮子自念無罪而被囚執此必定死轉更惶怖悶絶躃地子見父而不識故生畏生疑父見子而便識故生歡生喜故子雖疾走而令急追也貪惜者言子雖不識我是彼父故背我而走由我老朽無子彼雖背我而我猶愛惜此子不異昔日此真老婆心切處也旁人急追者如以神力加被菩薩命彼説法度之也爾時使者下喻菩薩説住向行地大乘法也窮子下怖大也無因而至故驚愕也稱怨大喚者小乘以煩惱為怨以生死為賊若説煩惱即佛種生死即涅槃是以怨臨之故稱怨而大喚也我不相犯何為見捉者言我本不欲與生死煩惱作活計何為強逼我也使者下彼雖不聽猶以此法強使之聽也于時下言我志樂本不願學菩薩法亦不願在生死煩惱中住而強我入生死煩惱是無罪而被囚執也若果如此慧命必絶如此思念轉加惶怖至於悶絶而躃地也父遙見之而語使言不須此人勿強將來以冷水灑面令得醒悟莫復與語所以者何父知其子志意不劣自知豪貴為子所難審知是子而以方便不語他人云是我子父遙見之者由見子惶怖悶絶故囑菩薩以方便誘之也不須下言不必強與説大乘法亦不須強彼入佛境界宜以四諦清涼之水除其熱惱令彼醒悟又囑之曰汝今切勿向彼道破以為我是彼父彼是我子何以故由我知其根器下劣又知自己尊貴縱與之説一時難信不肯承當故雖明明審知是親生之子而以方便終不向他人面前漏泄此言也父子雖親終是兩個故不肯相信如此僧問大隨云父子至親為甚麼岐路各別隨曰為有父子使者語之我今放汝隨意所趣窮子歡喜得未曾有從地而起往至貧里以求衣食此菩薩以方便語告之也言我今不以大乘之法拘禁汝矣但隨汝等心之所願行何等事我皆順汝窮子不為菩薩強逼方適所願迷悶方醒不復躃地即從地起由彼根器下劣熟習不忘便向四諦門頭尋求貧所樂法以自資給所謂捨明珠而求魚目也爾時長者將欲誘引其子而設方便密遣二人形色憔悴無威德者汝可詣彼徐語窮子此有作處倍與汝直窮子若許將來使作若言欲何所作便可語之雇故汝除糞我等二人亦共汝作時二使人即求窮子既已得之具陳上事此囑菩薩隱實現權也密遣二人者令菩薩隱其自在威神之力外現聲聞緣覺之相而化之故曰密遣也形色憔悴無威德者形同稿木心如死灰也下文云知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺是也汝可詣彼除語窮子者囑其當以小教徐徐誘引不當復以大乘之法急追強牽也此有作處倍與汝直者言汝若欲向貧里傭作而求衣食則此有可作之處其價復倍於他處也言倍者喻修四諦既能出生死而又得涅槃也窮子若許將來使作者言問彼若許即引來執役勿強之也彼若問言欲何所作不可更以淨佛國土成就衆生告之當云不過令汝掃除糞穢而已更無難事即我二人亦與汝同作此事所謂菩薩以同事攝導人也見思二惑穢汙心田故曰糞時二下依教奉行也具陳上事者即以如來叮嚀之語告之也爾時窮子先取其價尋與除糞其父見子慜而怪之又以他日於窗牖中遙見子身羸雷瘦憔悴糞土塵坌粉汙穢不淨即脫瓔珞細軟上服嚴飾之具更著粗初弊垢膩義之衣塵土坌身右手執持除糞之器狀有所畏語諸作人汝等勤作勿得懈息以方便故得近其子此言如來隱實現權也先取價而後除糞者先取滅道之價而後除苦集之糞也見子愍怪者愍其有廣大威神而不能用怪其好為下劣之事也於窗牖中窺其子者恐彼復生恐怖不以威德特尊之身明現其前故於窗牖中遠窺之也法味不充故羸瘦福德不具故憔悴土喻見惑塵喻思惑見惑粗而思惑細故分二也脫珍御之服者隱舍那之身也著弊垢之衣者現丈六之形也塵土坌身手持糞器者降尊就卑現相人中亦毀生死讚涅槃也語令勤作者勉修正勤也前云汝等但當勤修精進是也以方便故得近其子者言以種種善巧方便然後父子始得相見而子不生疑怖也此明鹿野苑中初轉四諦時也已上總敘父子相見之難如此後復告言咄篤男子汝常此作勿復餘去當加汝價諸有所須盆器米麵面鹽醋之屬莫自疑難亦有老弊使人須者相給好自安意我如汝父勿復憂慮所以者何我年老大而汝少壯汝常作時無有欺怠瞋恨怨言都不見汝有此諸惡如餘作人自今已後如所生子即時長者更與作字名命之為兒此下復以軟言慰之也咄男子者警惺之辭言汝當常常在此勤作勿得生心他往我當於工價之外倍加汝價凡百所須之器與夫日用資身養生之物隨汝取用莫得自作疑難即汝欲需老弊使人以供役使亦當相給既受用之物與使令之人悉皆具足好自安心不須動念我即如汝之親父隨汝所欲皆當給與勿以有所缺少而生憂慮至此才微微露出是大富長者無所不有但不向彼説破是親生之父故云如也言我所以即如汝父者以我年紀老大化期將至又無子息汝既少壯又肯努力用功我又常當見汝日用動作處內不見有自欺之心外不見有怠墮之相口不見有瞋恨之語以無此三惡故勝一切作人自今已後事同一家我如汝之親父汝亦如我之親子於是更其與作二字名之曰兒此敘阿含十二年中勸修四諦時也爾時窮子雖欣此遇猶故自謂客作賤人由是之故於二十年中常令除糞過是已後心相體信入出無難然其所止猶在本處父雖殷勤勸諭命之為兒窮子亦欣遭此際會但是歡喜遇得一個賢主人却不省得彼是生身之父己實是彼親生之子猶然自謂客作賤人由彼不肯自信是彼親生之子是故阿含十二方等八年中間常令為客作賤人之事不以家業委付也此敘父子既得相見而相信之難又如此直至二十年後見佛既久熏習亦深始得心相體信出入堂奧毫無間隔不作難色然其所止不離舊處猶在客作賤人之房以彼確守無為正位故所謂昔年行處半步不移此敘方等已後褒圓嘆大亦不欣彈偏斥小亦不怖時也世尊爾時長者有疾自知將死不久語窮子言我今多有金銀珍寶倉庫盈溢其中多少所應取與汝悉知之我心如是當體此意所以者何今我與汝便為不異宜加用心無令漏失爾時窮子即受教敕領知衆物金銀珍寶及諸庫藏而無希取一餐之意然其所止故在本處下劣之心亦未能捨自知將死不久喻將近涅槃時也所應取與者自利利他之事也當體此意者言當以我心為汝心也我以傳般若續慧命為心汝亦當如是也今我與汝便為不異者言我不異汝父汝亦不異我子不異二字比前如字較更親矣由不異故我之所有即汝之所有宜加用心一一領知無令漏失也窮子雖受教敕領知衆物但信佛語而隨順尚未信此庫藏中物是我分內所當有者尚以為不是己財是王者之財我為守財之人耳無論不敢多用即一餐之小費亦不敢取用之也然其所止猶在本處者未脫貧兒局套也古人比之為無為坑金鎖難白淨地夜明簾寒灰死水是也下劣之心亦未能捨者守定功勳不肯承當家業也此敘般若會中命知家事轉教時也復經少時父知子意漸以通泰成就大志自鄙先心臨欲終時而命其子并會親族國王大臣剎利居士皆悉已集即自宣言諸君當知此是我子我之所生於某城中捨我逃走竛竮辛苦五十餘年其本字某我名某甲昔在本城懷憂推覔忽於此間遇會得之此實我子我實其父今我所有一切財物皆是子有先所出內是子所知世尊是時窮子聞父此言即大歡喜得未曾有而作是念我本無心有所希求今此寶藏自然而至復經少時者過般若而法華時至也知子莫如父故曰父知子意也漸已通泰者不滯於小之謂通安心於大之謂泰成就大志自鄙先心者今知法王是生身之父自己是法王之子寶藏是固有之物又悟四十年中枉作貧兒也臨欲終時者即唱滅時也而命其子者喻授記作佛也言先雖命之為兒尚未有證乃集衆以為證也分身佛如親族多寶佛是國王菩薩是大臣剎利居士是四衆也即自下四句授記作佛也於某下出其今日所以得授記也言我曾於二萬億佛所常以佛法教導汝等故我實是其父由彼捨我逃逝經歷城邑五十餘年不相識耳其本字某我名某甲者如舊字舍利今名華光之類昔在下言我昔在本城尋覔不見故中止一城今始得遇也今我所有皆是子有者是委付成佛事也先所出內是子所知者是委付度生事也世尊下得記歡喜正如貧兒獲寶白衣拜相安得不喜而作下言我本無心志求佛道而今忽聞授記作佛是寶藏不求而自至此所以歡喜過望也世尊大富長者則是如來我等皆似佛子如來常説我等為子世尊我等以三苦故於生死中受諸熱惱迷惑無知樂著小法今日世尊令我等思惟蠲除諸法戲論之糞我等於中勤加精進得至涅槃一日之價既得此已心大歡喜自以為足便自謂言於佛法中勤精進故所得弘多然世尊先知我等心著弊欲樂於小法便見縱捨不為分別汝等當有如來知見寶藏之分此以法合喻也如來合父似子合子子言似者髣佛不真之謂言如來常視我等為子但我等不信如來為父故曰似也若一信之後即真子矣三苦者謂苦苦行苦壞苦也於生死中受諸熱惱者為生老病死憂悲苦惱之所燒煮也迷惑無知者亦復不知何者是火是舍也樂著小法者好樂人天小果不解如來寶藏皆是我有也世尊令我等者謂世尊相頭製帽故令我等知苦斷集於二十年中蠲除六識三毒戲論之糞也我等於中勤加精進者修三十七品助道法也得至涅槃一日之價者得證寂滅樂也心大歡喜自謂所得弘多者但得一日之工價其利甚微自生滿足以為大得珍寶若河伯井蛙之見以為天下之美盡在乎己而不知海之大也世尊下言世尊先知我等心著粗弊色聲樂於小法不樂大乘故世尊亦便放捨不與我説如來寶藏我等有分正如審知是子而以方便不語他人云是我子此我等所以名似子也此合阿含中事也世尊以方便力説如來智慧我等從佛得涅槃一日之價以為大得於此大乘無有志求世尊又以方便力於方等會中褒圓歎大説如來智慧時亦是激勵我等進趨佛道而我等坐守涅槃一曰工價以為大得於菩薩法遊戲神通等事不肯志求此我等所以名似子也此合方等會中事也我等又因如來智慧為諸菩薩開示演説而自於此無有志願所以者何佛知我等心樂小法以方便力隨我等説而我等不知真是佛子世尊又於般若會中令我等將如來智慧轉教菩薩者是欲我等領諸衆物及諸庫藏即以家業付我也我等不解秪是與人傳言送語通消通息而無一念好樂之心何異逢王膳而不餐也此合般若會中事也所以下徵釋世尊三時説法之意世尊所以三時説法不同者由知我等志樂小法不能荷擔如來家業故以種種方便引誘我等令入佛慧而我等不知真是佛子此我等所以名似子也今我等方知世尊於佛智慧無所吝吝惜所以者何我等昔來真是佛子而但樂小法若我等有樂大之心佛則為我説大乘法於此經中唯説一乘而昔於菩薩前毀訾茲聲聞樂小法者然佛實以大乘教化由前三時多方誘掖直至于今世尊説破云我實汝父汝實我子一切財實皆是子有始知如來未嘗吝惜佛慧而不示我亦未曾吝惜寶藏而不肯與我即我亦未嘗不是如來真子但我等好樂貧所樂法不肯承當故不將寶藏委付我等若我等昔日有樂大之心早將如來寶藏委付之矣何待今日如此則我等辜負世尊亦既久矣今日始悟反而思之不惟今日於此經中唯説一乘即昔日方等會中褒揚菩薩毀訾聲聞時實以教菩薩法教化我等由我等樂著小法迷而不知於此大乘無有志求此我等所以名似子也是故我等説本無心有所希求今法王大寶自然而至如佛子所應得者皆已得之言我昔於阿含時樂著小法故無志求方等時絶望故不求般若時以為分故不求一向不求今日忽得授記是為無心希求而法王大寶自至至今日而乃知真是佛子也大珠和尚初參馬祖祖問從何處來曰越州大雲寺來曰來此擬須何事曰來求佛法祖曰我這裡一物也無求甚麼佛法自家寶藏不顧拋家散走作麼曰阿那個是慧海寶藏祖曰即今問我者是汝寶藏一切具足更無欠少使用自在何假外求師於言下自識本心此便是得法王大寶之樣子也爾時摩訶迦葉欲重宣此義而説偈言我等今日聞佛音教歡喜踊躍得未曾有佛説聲聞當得作佛無上寶聚不求自得譬如童子幼稚無識捨父逃逝遠到它土周流諸國五十餘年其父憂念四方推求求之既疲頓止一城造立舍宅五欲自娛于其家巨富多諸金銀硨磲碼瑙真珠琉璃象馬牛羊輦輿車乘田業僮僕卜人民衆多出入息利乃遍它國商估賈古人無處不有千萬億衆圍繞恭敬常為王者之所愛念羣臣豪族皆共宗重以諸緣故往來者衆豪富如是有大力勢而年朽邁益憂念子夙夜惟念死時將至癡子捨我五十餘年庫藏諸物當如之何我等下頌敘悟聞佛音教者即聞羅漢作佛事也譬如下喻子背父馳走一人常忘也捨自己親父甘為乞兒棄本地家鄉遠為浪子所謂不信自尊貴甘為下劣人也其父下喻如來念子一人常憶也四方推求者擊鼓而求唐子也頓止一城者正恐愈求愈遠故中止一城待其自至也多諸下自受用物也象馬下利人之物也入出息利者喻所化之衆甚多也商估賈人無處不有者喻能化之人亦多也千萬億衆者龍神八部圍繞也夙夜唯念死時將至者自念形容枯稿髮白面皺涅槃將至也庫藏諸物當如之何者思欲交付家業不得其人也爾時窮子求索衣食從邑至邑從國至國或有所得或無所得飢餓羸雷瘦體生瘡癬漸次經歷到父住城傭賃任展轉遂至父舍子忽到門也數語模寫貧兒如晝從邑四句寫貧子之行腳飢餓二句寫貧子之態狀言遂至者言本無心到父舍宅因乞食而遂至父舍也爾時長者於其門內施大寶帳處師子座眷屬圍繞諸人侍衛或有計算金銀寶物出內財産注記券疏窮子見父豪貴尊嚴謂是國王若國王等驚怖自怪何故至此覆自念言我若久住或見逼迫強驅使作思惟是已馳走而去借問貧里欲往傭容作長者是時在獅子座遙見其子默而識之即敕使者追捉將來窮子驚喚迷悶躃必地是人執我必當見殺何用衣食使我至此爾時下寫長者富貴之態窮子下貧子見父而驚愕也是國王等者言窮子不識是父覿面蹉過誤認親父為國王及國王之親戚眷屬不敢攀攬反生驚怖也強驅使作者不與工值也貧里傭作者所謂捨自己之珍羞覔他家之殘瀝也長者急追者子見父而不識故驚愕自怪父見子而默識故急追將來也是人執我必當見殺者夜光投人鮮不按劒也窮子驚喚下惶怖而自悔也何用衣食使我至此者言我本求衣食養生而至此今反為衣食而見殺有衣食而死不如餓涷而生何用衣食而令我遭此刑戮也此窮子自怨之辭也長者知子愚癡狹劣列不信我言不信是父即以方便更遣餘人眇殍目矬鑿陋無威德者汝可語之云當相雇除諸糞穢倍與汝價窮子聞之歡喜隨來為除糞穢淨諸房舍此長者遣人設方便以誘之也愚癡者心地不明狹劣者器量褊淺更遣餘人眇目矮陋者謂以眇目化眇目以矬陋化矬陋若齊國迎晉却克之意也云當相雇倍與汝價者非若他人強驅使作也歡喜隨來者以適其願故轉驚愕而成歡喜也長者於牖常見其子念子愚劣樂為鄙事於是長者著弊垢衣執除糞器往到子所方便附近語令勤作既益汝價并塗足油飲食充足薦席厚暖如是苦言汝當勤作又以軟語若如吾子長者有智漸令入出經二十年執作家事示其金銀真珠玻璃諸物出入皆使令知猶處門外止宿草菴自念貧事我無此物長者設方便以近之也樂為鄙事者不樂富貴甘為下劣也著弊垢衣等者先令同類鈎牽然後長者俯就亦執糞器而附近之也附近者傍附其處親近其身使彼見而不生疑也塗足油如不龜手之樂所以潤其足也飲食充足者充其腹也薦席厚暖者逸其體也汝當勤作者言事事皆備當一心精勤作活也此喻阿含時也又以軟語若如我子者若猶汝也更與作而名兒也此喻方等時也於二十年執作家事者作大管家即般若會中轉教時也猶處門外止宿草菴者雖得見遇不肯擔當終隔一重門戶作門外漢也問小乘既出三界何故止宿草菴答雖空煩惱未盡所知故雖出火宅門止宿草菴猶未入如來門也自念貧事我無此物者下劣之心猶未能捨也父知子心漸已曠大欲與財物即聚親族國王大臣剎利居士於此大衆説是我子捨我它行經五十歲自見子來已二十年昔於某城而失是子周行求索遂來至此凡我所有舍宅人民悉以付之恣其所用交付家業也漸已曠大者厭昔日之鄙事也説是我子者言真是我子非若前云如我子也自見子來已二十年者長行中二十年中除糞是前二十年此二十年是般若會中二十年也前二十年心猶畏怯或有隱邀故不得見後二十年心相體信出入無難故得見子也凡我所有下付家業也子念昔貧志意下劣今於父所大獲珍寶并及舍宅一切財物甚大歡喜得未曾有得業歡喜也言我昔日是個貧兒甘心向窮村委巷索衣覔食元無有心得大珍寶今在父所得大珍寶凡我昔日所未有者今皆有之安得不踊躍歡喜哉佛亦如是知我樂小未曾説言汝等作佛而説我等得諸無漏成就小乘聲聞弟子以法合喻也佛亦如是者言佛即如長者四十年前不説我等是佛之子然非如來棄我而不以我為子也由知我等好樂小法聞説作佛即便恐怖所以世尊亦便縱捨不為分別汝等當有如來寶藏之分而令我蠲除戲論之糞得無漏法作解脫人耳此合阿含方等時也佛敕我等説最上道修習此者當得成佛我承佛教為大菩薩以諸因緣種種譬喻若干言辭説無上道諸佛子等從我聞法日夜思惟精勤修習是時諸佛即授其記汝於來世當得作佛一切諸佛祕藏之法但為菩薩演其實事而不為我説斯真要如彼窮子得近其父雖知諸物心不希取我等雖説佛法寶藏自無志願亦復如是此合般若會中執作家事代佛轉教也佛敕下如來命彼轉教也我承下受佛敕而轉教也説無上道即開佛知見事也諸佛下菩薩聞法而獲記也一切下自謂如來祕藏菩薩有分我等無分不生欣樂正如窮子得近其父執作家事領知財物以為非我所有心不希取所謂身處膏腴不能自潤也我等內滅自謂為足唯了此事更無餘事我等若聞淨佛國土教化衆生都無欣樂所以者何一切諸法皆悉空寂無生無滅無大無小無漏無為如是思惟不生喜樂我等長夜於佛智慧無貪無著無復志願而自於法謂是究竟我等長夜修習空法得脫三界苦惱之患住最後身有於涅槃佛所教化得道不虗則為已得報佛之恩我等雖為諸佛子等説菩薩法以求佛道而於是法永無願樂導師見捨觀我心故初不勸進説有實利如富長者知子志劣以方便力柔伏其心然後乃付一切財物佛亦如是現希有事知樂小者以方便力調伏其心乃教大智此下盡情吐露心不希取之意我等內滅自謂為足者謂我滅盡六識三毒得滅盡定心滿意足於三界中作個了事漢子無心道人更不知有大事因緣化菩薩法故我雖聞淨佛國土如風過樹都無欣樂所以不欣樂者正由我了達一切染淨諸法皆悉空寂故無生滅大小相故無漏無為故以淨佛國土教化衆生是不空故是有相故是有作故我作如是思惟都無欣樂所謂知真空而不知妙有古德所謂莫謂無心云是道無心尚隔一重關是也藥山一日坐石頭次石頭問曰汝在這裡作麼曰一事不為曰恁麼即間坐也師曰若間坐即為也曰汝道不為不為個甚麼曰千聖不識且道與此無為是同是別我等雖得內滅猶處長夜不得開曉於佛智慧無有志願亦是自謂得阿羅漢是究竟法故亦是自謂住最後身得報恩故由我如是思惟故我雖與菩薩説法而己實無志樂也世尊知我志意下劣亦便縱捨初不勸進又不為説自己實有此利只是默默要人自肯擔當故我不知亦無願樂耳如富下頌先行方便後付家業也佛亦下合喻我等今日得未曾有非先所望而今自得如彼窮子得無量寶世尊我今得道得果於無漏法得清淨眼我等長夜持佛淨戒始於今日得其果報法王法中久修梵行今得無漏無上大果我等今者真是聲聞以佛道聲令一切聞我等今者真阿羅漢於諸世間天人魔梵普於其中應受供養世尊大恩以希有事憐愍教化利益我等無量億劫誰能報者手足供給頭頂禮敬一切供養皆不能報若以頂戴兩肩荷負於恆沙劫盡心恭敬又以美膳無量寶衣及諸臥具種種湯藥牛頭旃檀及諸珍寶以起塔廟寶衣布地如斯等事以用供養於恆沙劫亦不能報諸佛希有無量無邊不可思議大神通力無漏無為諸法之王能為下劣忍於斯事取相凡夫隨宜為説諸佛於法得最自在知諸衆生種種欲樂及其志力隨所堪任以無量喻而為説法隨諸衆生宿世善根又知成熟未成熟者種種籌量分別知已於一乘道隨宜説三慶今得也得道下言我等向也得八正道今得無上道矣向也得聲聞果今得菩提果矣向也得無漏法今於無漏法中又得清淨正法眼藏矣向也持佛清淨具戒今日得其大果報矣向也久修清白梵行今日始得無上大果今日乃知向之聲聞聞四諦法始得自利非真聲聞今也以佛道聲令一切聞始得名為真聲聞矣向之羅漢斷見思惑出三界苦以為大得而不信佛乘非阿羅漢非佛弟子不名應供今日得聞佛乘獲如來藏堪受天人供養始得名真阿羅漢真應供矣向也以為住最後身有餘涅槃則為已得報佛之恩今也方知世尊大恩無能報者始我無量劫中墮煩惱火中日夜燒煮住於生死世尊乃於無量劫中興憐愍心又以種種方便軟語誘掖獎勸令出煩惱火宅住於涅槃清涼寂滅之地此世尊於無量劫實有大造於我也世尊見我住於涅槃不獲如來寶藏復興種種憐愍之心入無量定以示我放無量光以示我出定之後又以軟語教化我未能信解復以譬喻引誘我見我貧窮又以法王寶藏利益我如此深恩昊天罔極誰能報者手足供給如調羮進膳服勞奉養之類頂戴肩負者謂戴之於首荷之於背也如此經恆沙劫盡心恭敬亦不能報憐愍之心萬分之一也即使以栴檀珍寶塔廟以奉其身寶衣布地以襯其足四事供養以給其日用如是經河沙劫亦不能報萬分之一也諸佛下廣讚佛恩諸佛有不可思議大神通力為大法王乃能忍此而不顯露脫珍著弊執糞器以附近我等下劣賤人使其心相體信交付家業又能為彼取相凡夫隨機授法各去膏肓之疾令得快樂何以故由諸佛達一切法知衆生機故能隨機授法應病與藥無不驗者隨諸下六句釋知根也於一下二句釋授法也言如來深恩如此所以終不能報也
