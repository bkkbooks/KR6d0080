front:
  text: 法華大窾自敘予初習法華時即知此經是如來自陳出世本懷然不知妙法蓮華命題之意每於禪誦之暇拈此四字時時提撕終無所解及尋諸疏解皆以法喻為名終不釋然後讀佛華經至華藏莊嚴世界品云香水海中有大蓮華名種種光明蕊香幢有十佛剎微塵數世界種住在其中又至如來出現品云有大蓮華名如來出現處躍然有省廼知一切世界種皆在自心蓮華中住一切如來亦在自心蓮華中住所謂妙法蓮華者意在茲乎於是將此二經置案頭展轉披閱然佛華文廣而義周易尋頭緒故開卷時即有入處法華文顯而義幽血脉難會每一展卷未嘗不反覆沉思胸中著一疑團也涵泳日久而後灼見二經一貫之旨故以二經大義合解命名大庶讀法華者藉佛華而知法華之要讀佛華者藉法華而知佛華之詳如是不獨常轉法華即佛華亦常轉矣或曰說法華時三變穢令成淨土移置天人唯留聖眾是有淨穢二相在也又龍女於剎那頃即轉女身具菩薩行南方成佛亦有男女二相在也說佛華時即此娑婆便是華藏不待變也萬法一如更無二相不待轉也二經旨趣迥別何得始終一貫答佛華所談純被上機故頭頭法法直顯法身圓滿無礙之體本來具足不假脩成故不勞轉變法華所說曲引權機入法界門故有轉變之說然轉與不轉變與不變盡屬化機大事因緣本無是事切不得以情見作兩橛會要知妙法隨緣不變不變隨緣原非有定不可以轉不轉作死語定之經不云乎是法非思量分別之所能解若以思量分別心解之不獨一椉極唱入理深談是死語即拈華微笑瞬目揚眉等事盡成死語安得名曰妙法乎若以佛心解佛經以法眼照諸法不但轉與不轉變與不變是一貫即拍門打地嬉笑怒罵等事無非一貫故知一切在人不在法也昔有三藏問大珠禪師云真如有變易否師曰有變易藏曰錯也師却問三藏有真如否曰有師曰若無變易決定是凡僧也豈不聞善知識者能回三毒為三聚淨戒回六識為六神通回煩惱作菩提回無明為大智真如若無變易三藏即是自然外道也藏曰若爾真如即有變易也師曰若執真如有變易者亦是外道藏曰禪師適來說真如變易如今又道不變易如何的當曰若了了見性人如摩尼珠現色說變易亦得說不變易亦得若不見性人說變易便作變易會說不變易便作不變易會故知南宗實不可測三藏作禮而去會得此意具得此眼方解看經切不得扭定死語自生荊棘須要推究世尊出世畢竟為著何等一件大事此件大事何故喚作妙法蓮華向四威儀中默默體會忽然心華洞開然後知古人所云從自己胸中流出方始盖天盖地者便是此件大事此件大事即是妙法蓮華非他物也爾時方信佛華法華原非二物方信予言之有徵也鐵山通潤撰蓮華大窾敘妙法蓮華有耶有則不妙也妙法蓮華無耶無則亦不妙也故天人師亦稱導師導者何導也在導者而不在妙法蓮華也大者南方尊宿一雨所導也不稱導稱大者明導無可導在妙法蓮華而不在導者也導者見法妙讀者見導妙因見法妙也則妙讀妙法蓮華大者也妙讀者余宗僧實法師湛脩也湛脩軍持歷落數十年乃得於蓮華須上建由旬寶幢信手拈示皆中理解則一雨師所導也重刻大者導導師所導也雨在法中脩在雨中後讀者在脩中筋肢相屬可同而語也乃知捉刀人真英雄也不捉刀不可讀大也妙在讀者而不在導者也亦不在妙法蓮華也妙讀者視蓮華如視白牛視白牛如風之步無全步也則妙讀妙法蓮華大者也聞有讀蓮華經三十年來世口中常作蓮華香者又未知其所讀何也善乎李禿翁曰妙法蓮華經品品皆說妙法蓮華至求其所謂妙法蓮華者則渺不可得嗚乎此其所以謂妙法蓮華也歟嗚乎此其所以謂妙法蓮華大也歟崇禎庚午莫春幾望日霧山嬾禪劉谷貞題妙法蓮華經弘傳序唐終南山沙門道宣述明金庭比丘通潤箋妙法蓮華經者統諸佛降靈之本致也統者該攝也言十方三世諸佛降生心事盡在此經該攝無遺也昔如來乘六牙白象入母胎時已有許多大驚小怪及乎纔出母胎一手指天一手指地曰天上天下唯我獨尊爾時降靈本致已見其槩及至菩提樹下成等正覺嘆曰善哉一切眾生具有如來智慧德相但以妄想執著而不證得此又見得不但天上天下唯我獨尊即一切眾生悉皆與我平等無二於是稱法界性說華嚴經欲令眾生皆證此法無奈小機不能擔荷以故四十年中含忍不發俟其根熟志純心相體信直至靈山會上始將出世本懷盡情吐露言我出現世間別無所事不過欲令眾生箇箇知得自己脚跟下皆有天上天下唯我獨尊一件大事在我來為汝作箇牓樣要汝等向自己脚跟下各自薦取去不唯我與汝等作牓樣即三世十方諸佛出世不過皆為汝等作牓樣而已無他事也故曰統諸佛降靈之本致也蘊結大夏出彼千齡東傳震旦三百餘載西晉惠帝永康年中長安青門燉煌菩薩竺法護者初翻此經名正法華東晉安帝隆安年中後秦弘始丘慈龜茲沙門鳩摩羅什次翻此經名妙法蓮華隋氏仁壽大興善寺北天竺沙門闍那笈多後所翻者同名妙法首四句明此經流傳來歷大夏者指中印土西域有五印土如來生於中印故以中印為大夏四方為四印土印土之外皆為別名亦如此方以中原為華夏四方為蠻夷戎狄之意蘊者藏也結者固而不出也言此經出中印土已有千年然國中寶惜不肯妄傳他國故藏於中印千年然後傳於震旦即此方也震為東方日所出之處故以東國為震旦國也此經雖傳震旦三百餘年然未經翻譯不得流通故下復序翻譯源流言西晉者司馬氏所都在洛陽永康惠帝年號長安者古咸陽地秦漢建都之處也青門者長安東門也東方屬青故以東門為青門燉煌郡名竺法護者月氏國人自本國至此國駐鍚燉煌時人尊之不敢名謂之燉煌菩薩後入長安青門初翻此經名正法華經有十卷五胡亂華元帝自西晉渡江建都建康對西晉言故曰東晉隆安安帝年號後秦對前秦言初符堅自稱大秦王晉敗符堅而符堅之將姚萇自稱後秦王姚萇卒子姚興立改年弘始乃迎龜茲沙門鳩摩羅什於草堂寺重譯此經名妙法蓮華龜茲國名鳩摩羅什此翻童壽童年而有耆德故隋氏仁壽者即隋高祖文皇帝也仁壽文帝年號普曜寺沙門上行請闍那崛多及達摩笈多二師於大興善寺重譯此經名添品妙法蓮華經有八卷闍那崛多此云志德達摩笈多此云法密也三經重沓文旨互陳時所宗尚皆弘秦本自餘支品別偈不無其流具如序曆故所非述沓猶疊也謂三經重見而迭出也此經因三譯不同而文旨詳略亦各有異如如是性如是相等二本皆有晉本獨無如藥草品二本各多半品秦本獨無如提婆達多品二本皆有秦本獨無如普門品偈隋本獨有而二本皆無故雖三經並傳於世而世之所宗奉尊尚者獨秦本為尤焉問若爾則秦理為得二譯為失且二譯之支品別偈或多或少者何故答二本中雖有支品別偈然各自有流派由彼所見梵本有詳有略故譯人因之而有增減耳然文雖有增減其所說開佛知見一大事因緣皆悉具足如序曆然毫末不爽正不必較其誰得誰失故我所以不述也以序曆喻者如曆曰正月大二月小大月三十日小月二十九日大月多一日小月少一日殊不知多者一月少者亦一月也或序曆是指添品法華經序說此序詳明三譯支品別偈來歷故曰序歷其言曰昔燉煌沙門竺法護於晉武之世譯正法華後秦姚興更請羅什譯妙法蓮華考詳二譯定非一本護似多羅之葉什似龜茲之文余檢經藏備見二本多則與正法符會龜茲則共妙法允同護葉尚有所遺什文寧無其漏而護所闕者普門品偈也什所闕者藥草喻品之半富樓那及法師等二品之初提婆達多品普門品偈也什又移囑累在藥王之前二本陀羅尼並置普門之後其間異同言不能極竊見提婆達多及普門品偈先賢續出補關流行余景仰遺風憲章成範大隋仁壽元年辛酉之歲因普曜寺沙門上行所請遂共三藏崛多笈多二法師於大興善寺重勘天竺多羅葉本富樓那及法師等二品之初勘本猶闕藥草喻品更益其半提婆達多通入塔品陀羅尼次神力之後囑累還結其終等序主意謂支品別偈來歷具在此序故我不復述也曆歷二字古麻字也夫以靈嶽降靈非大聖無由開化適化所及非昔緣無以導心所以僊苑告成機分小大之別金河顧命道殊半滿之科豈非教被乘時無足覈其高會是知五千退席為進增慢之儔五百授記俱崇密化之跡問云上說如來降靈本致不知為何事出現故云夫以釋尊現相人中示居靈鷲豈無故哉直為一切眾生醉生夢死佛眼不開自非大覺聖人無由開廣大之教化令其成然𥧌者豁然醒也如來出現其在茲乎然如來教化廣大平等無私適當化之所及必彼此皆有昔緣令彼所化者易入而能化者易導若使往昔無大乘緣驟而與之說大乘法彼將執而不化必稱怨大喚疾走而去豈能親近佛乘哉所以世尊始從鹿苑告厥成功終至金河重宣顧命中間機分大小教有淺深者豈非教之所被亦必乘時而設乎所以如此者由其根器狹劣未足預乎法華高會考其實而授之記故以方便法門誘引之耳然則四十年前斷斷乎不可以大乘平等告之必俟其出涯涘而後可以語大理也金河即泥連河水色如金故曰金河告成者謂世尊初成道時告厥成功也顧命者謂世尊將涅槃時顧視諸弟子命彼有疑請決也問若爾則四十年中調根已熟今在法華會上純是大根何故復有退席之眾答由是而知法華高會無枝葉眾純是真實即有退席五千亦是為人做牓樣䇿進增上慢人非真有退席志也由是而知五百弟子同日授記者亦是顯彼尋常內秘外現非真聲聞也若是則得記者與退席者悉是一流實無差別是知法華會上信乎可以說平等一乘法矣所以放光現瑞開發請之教源出定揚德暢佛慧之宏略朽宅通入大之文軌化城引昔緣之不墜繫珠明理性之常在鑿井顯示悟之多方所以二字承上生下之辭言如來雖知根器已熟然法不孤起必有所因所以放白毫光照見東方萬八千土而又散華動地者正欲警覺諸人開發請之端以為說經之張本故彌勒騰疑文殊領答也既放光已於時世尊從三昧起告舍利弗諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知所謂出定揚德也然如來出定揚德者知彼大眾根器已熟故將佛慧暢明大略實欲激發二乘進脩佛慧非自讚以毀人也故方便品中發明出世因緣鶖子得記次復說朽宅一喻者以四大弟子疑而不信故也其中引三車一車之喻以況三乘一乘之法故經云譬如長者有一大宅有五百人止住其中歘然火起是舍唯有一門而復狹小諸子戀著無求出意長者為設方便我有種種羊車鹿車牛車今在門外宜速出來隨汝所欲皆當與之於是諸子爭出火宅然後長者等賜大白牛車等說此一喻正為會中尚有不解以一乘道隨宜說三者欲其通達昔日說小原為入大若曰書同文車同軌之意言書雖不同而文同車雖不同而軌同故曰我此九部法入大乘為本也譬喻既明四大弟子又得授記而復說化城喻者引昔日之因緣證今日之授記有自也經云大通智勝佛有十六沙彌曾與六百萬億恒河沙等眾生說法華經爾時所化恒河沙等眾生者即汝等比丘及我滅度後未來世中聲聞弟子是也如是則知今日法華會上得授記者皆有昔日一線因緣在也化城之喻既明五百弟子皆得授記故深領宿昔因緣說繫珠喻以自責自喜故經云譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去其人醉臥都不覺知起已遊行到於他國為衣食故勤力求索甚大艱難於後親友會遇見之而作是言咄哉丈夫何為衣食乃至如是我昔以無價寶珠繫汝衣裏今故現在而汝不知汝今可以此寶貿易所須常可如意無所乏少此喻正領十六沙彌說法華時已將此珠繫著衣裏而我不知今日世尊指示於我令我得珠乃知此珠原是自己衣裏本有之物世尊不過作箇示珠人耳故曰我今乃知實是菩薩得受阿耨多羅三藐三菩提記以是因緣甚大歡喜自上放光揚德朽宅化城是敘世尊說法開佛知見之意繫珠一喻是敘弟子領悟之意鑿井一喻正喻世尊說法多方而此經典最為第一經云譬如有人渴乏須水於彼高原穿鑿求之猶見乾土知水尚遠施功不已轉見溼土遂漸至泥其心決定知水必近此喻正顯求佛道者必藉此經也若未聞此經而求佛道正知索水於高原之上雖是用功尚見乾土時也若得聞此經而思惟脩習決定自知成佛不遠正如索水而見濕土爛泥時也此喻是如來為滅度後令弟子作六種法師受持此經故極贊美之也辭義宛然喻陳惟遠自非大哀曠濟拔滯溺之沉流一極悲心拯昏迷之失性自漢至唐六百餘載總歷羣藉四千餘軸受持盛者無出此經將非機教相扣並智勝之遺塵聞而深敬俱威王之餘勣言此經雖文辭義理摹寫宛然而譬喻鋪陳旨趣實遠自非如來弘慈曠濟拔滯溺於生死海中者孰肯左提右挈援其手而出之也自非如來至極悲心拯昏迷於火宅之內者孰肯近牽遠引投其好而誘之哉正見婆心太切故有落草之談此結歸非大聖無由開化也遺塵猶言流風餘韻也勣功也言六百年中天竺羣經傳於此土者總有四千餘軸四千餘軸之內舉天下唯受持此經者是機教相投也然而今日機教相投大非容易皆是釋迦往昔在大通智勝佛時為十六沙彌說法華經之流風餘韻也無論機教相投受持不失者是有宿因即聞此經而有一念竦然深敬者亦是釋迦在威音佛時作常不輕菩薩而以佛性遍記四眾之餘功也不然則一聞此經即以杖木瓦石打擲之矣安能令其深敬哉此結歸非昔緣無以導心也輒於經首序而綜之庶得早淨六根仰慈尊之嘉會速成四德趨樂土之玄猷弘贊莫窮永貽諸後云爾言我即於經首錯錝其說而成此序亦欲藉此微因庶幾現世六根清淨仰見慈尊他生四德圓成得趨樂土然此經之妙豈可以筆舌罄之哉貽之後人作敲門瓦子耳言慈尊樂土者是佛皆號慈尊是佛土悉名樂土不必專指慈氏為慈尊西方為樂土也四德者一者諸佛護念二者植眾德本三者入正定聚四者發救一切眾生之心是也玄猷猶言妙道也妙法蓮華經大窾卷首姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋此經是如來原始要終最尊最勝之極談也然謂之妙法蓮華經者有故昔世尊菩提場中於一切法成最正覺便欲將自己證入處拈出示人於是不起樹王現法界身徧坐一切道場稱法界性說華嚴經以闡普徧圓融無礙大解脫法門故初會菩提場中放眉間光加被普賢菩薩入如來藏身三昧而說華藏莊嚴世界海以顯如來依報正報二種果法至玄至極非思量分別之所能解故大經云爾時普賢菩薩坐蓮華藏師子之座承佛神力入於三昧此三昧名一切諸佛毗盧遮那如來藏身普入一切眾生平等法性入此三昧如是盡法界虗空界十方三世微細無礙廣大光明佛眼所見佛力所到佛身所現一切國土及此國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有微塵數諸佛一一佛前有微塵數普賢菩薩亦皆入此諸佛毗盧遮那如來藏身三昧普賢一入如來藏身三昧便顯如來依正重重無盡爾時普賢告諸大眾此華藏世界海是毗盧遮那如來往昔於世界海微塵數劫脩菩薩行時一一劫中親近世界海微塵數佛一一佛所淨脩世界海微塵數大願之所嚴淨此言如來因中有大行大願故感如是大果報諸佛子此華藏世界海有須彌山微塵數風輪所持其最下風輪名平等住其最上者名殊勝威王藏能持普光摩尼莊嚴香水海此香水海有大蓮華名種種光明蕋香幢華藏莊嚴世界住在其中一經大旨不出如來藏身華藏世界八字如來藏身即是如來正報華藏世界即是如來依報也八十一卷大經中間不過摸寫如來藏身在華藏世界海作種種佛事耳此華藏莊嚴世界海大輪圍山住日珠光蓮華之上栴檀摩尼以為其身威德寶王以為其峰妙香摩尼以為其輪如是等有世界海微塵數眾妙莊嚴自此以下皆是寫出華藏世界圖樣言華藏世界之邊岸有大輪圍山四面包褁住日珠王蓮華之上即種種光明蕋香幢也此世界海大地中有十不可說佛剎微塵數香水海一切妙寶莊嚴其底妙香摩尼莊嚴其岸毗盧遮那摩尼寶而為其網此言輪圍山內大地上復有十不可說佛剎微塵數小香水海在大地之中也一一香水海各有微塵數香水河右旋圍繞一一河皆有世界海微塵數莊嚴此言一小香水海復有微塵數香水河旋繞一海如此眾海皆然故云各善男子此諸香河兩間之地有何等世界住我今當說諸佛子此十不可說佛剎微塵數香水海中有十不可說佛剎微塵數世界種安住一一世界復有不可說佛剎微塵數世界此言每一小香水海有一世界種安住十不可說小香水海有十不可說世界種安住一世界種中復有不可說佛剎微塵數世界在一世界種中安住諸佛子此十不可說佛剎微塵數香水海在華藏莊嚴世界海中如天帝網分布而住此總結也如此世界皆是毗盧如來往昔因中行菩薩行時大願之所嚴淨諸佛子此最中央香水海名無邊妙華光出大蓮華名一切摩尼王莊嚴有世界種而住其上名普照熾然寶光明以一切莊嚴具為體有不可說佛剎微塵數世界於中布列其最下方有世界名最勝光徧照佛號淨眼離垢燈此上過佛剎微塵數世界名種種香蓮華妙莊嚴佛號師子光勝照二佛剎微塵數世界圍繞此上過佛剎微塵數世界有世界名一切寶莊嚴普照光佛號淨光智勝幢三佛剎微塵數世界圍繞至第十三重有世界名娑婆其佛即是毗盧遮那如來十三佛剎微塵數世界圍繞上文云華藏世界皆是毗盧遮那如來之所嚴淨此云即是毗盧遮那可見釋迦牟尼即是毗盧隱勝顯劣所分之身也乃至最上第二十重有世界名寶𦦨佛號福德相光明二十佛剎微塵數世界圍繞此徧照十方熾然寶光明世界種有如是等不可說佛剎微塵數廣大世界各各所依住各各形狀各各體性各各方面各各趣入各各莊嚴各各分齊各各行列各各無差別各各力加持周匝旋繞所謂十佛剎微塵數迴轉形世界十佛剎微塵數江河形世界旋流形世界壇墠形世界樹林形世界樓觀形世界尸羅幢形世界普方形世界胎藏形世界佉勒迦形世界眾生形世界佛相形世界圓光形世界雲形世界網形世界門闥形世界如是等有不可說佛剎微塵數此一一世界各有十佛剎微塵數廣大世界圍繞此諸世界一一復有如上所說微塵數世界而為眷屬如是所說皆在此無邊妙華光香水海及圍繞此海香水河中此特舉華藏世界香水海中十不可說佛剎微塵數世界種中之一世界種而言自下而上有二十重總在最中央無邊妙華光香水海中即此華中一世界種佛有不可說佛剎微塵數世界周匝圍繞如此已是極玄又況此無邊香水海東南西北所圍繞者尚有十不可說佛剎微塵數世界圍繞一一世界種中各各復有不可說佛剎微塵數世界圍繞故又云此無邊妙華香水海東次有世界海名離垢燄藏此離垢燄藏南復有香水海名無盡光明輪等每一世界種從下至上亦有二十重如是重重無盡世界總在蓮華藏香水海中如此世界皆是釋迦牟尼佛坐菩提樹下成等正覺時所知所見之世界也所謂開佛知見者如此故知藏識清淨即名如來藏世界種清淨即名蓮華藏如來名藏世界亦名藏者總是轉藏識得名耳是以佛知見不開藏識不轉總有如來藏身華藏世界却被一微塵覆蔽不見其大佛知見一開藏識一轉始知有此大身有此大世界且知此大身本來周徧如此大世界也故古德云若端的一回汗出便向一莖草上現瓊樓玉殿若未端的一回汗出縱有瓊樓玉殿却被一莖草葢正此意也然如來與諸大菩薩七處九會鼓揚此道而舍利弗大目犍連等諸大聲聞皆悉不見如來神力如來嚴好如來境界如來遊戲如來神變如來尊勝如來妙行如來威德如來住持如來淨剎亦復不見不可思議菩薩境界菩薩神變菩薩遊戲菩薩宮殿菩薩莊嚴師子座菩薩住處菩薩所入三昧菩薩授記乃至菩薩諸行圓滿如是等一切聲聞諸大弟子皆悉不見何以故以善根不同故本不脩習見佛自在善根故本不讚說十方世界一切佛剎清淨功德故本不稱嘆諸佛世尊種種神變故本不於生死流轉中發菩提心故本不令他住菩提心故本不能令如來種性不斷絕故本不攝受諸眾生故本不勸他脩習菩薩波羅蜜故本在生死流中不勸眾生求於最勝大智眼故本不發一切菩薩諸大願故乃至本不得菩薩廣大歡喜故如來皆是普賢菩薩智眼境界不與一切二乘所共以是因緣諸大聲聞不能見不能知乃至不能思惟不能分別是故雖在逝多林中不見如來諸大神變所謂雙丸塞耳片葉遮睛有眼不見舍那身有耳不聞華藏法由是觀之世尊本意要一切眾生成正覺開佛知見出現於世非為自己一人獨作佛以自尊也所以菩提樹下纔成正覺開佛知見急忙便將佛知佛見廣示一切菩薩聲聞及諸大眾而諸菩薩目擊道存不言而喻其奈聲聞不知不見何是謂覿面面過於是世尊隱法界藏身化為丈六隱華藏世界現居娑婆脫珍著獘設種種方便親近其子令子得見循循善誘令其心相體信根熟志純至法華會上然後重番舊案乃以實言告之言我本意原要汝等證如來藏身原不要汝等證此變易身原要汝等入如來華藏世界海原不要汝等入一解脫門原要汝等開佛知見獲大寶藏不要汝等得涅槃一日之價以汝等原有如來寶藏分原有如來藏身分原有華藏莊嚴世界海分原與毗盧如來一般富貴不曾欠少一絲毫原先在華藏各各已成佛道但汝自暴自棄不把做一件大事不放在懷裏東飄西蕩甘為下劣枉受貧窮故我今日不惜唇皮一一為汝指出自家寶藏與汝受用更與汝等安名立號汝等即是當來華藏界中某佛某佛也此等華藏大世界皆是汝等真實受用處自今已後切須記取切須保任切莫忘失此便是如來以妙法蓮華經授與人也然雖授與若不受持讀誦復恐遺忘故教其發願持經作大法師則法王大寶永無遺失此便是如來始終為一大事因緣出現於世之本懷也故出現品云譬如世界初欲成時有大水生徧滿三千大千世界生大蓮華名如來出現徧覆水上光照十方一切世界摩醯首羅淨居天等見是華已即決定知於此劫中有爾所佛出興於世又云如來不以一事不以一緣出現於世為無量事無量緣出現於世此經云如來唯以一大事因緣出現於世無量事無量緣即一大事因緣也一大事因緣即妙法也是知心華不開如來不現有法不妙世界即成娑婆必也心華一開如來現而心法妙世界總成華藏矣所以大經名佛華而此經名法華佛華法華先後不同其究也總為一大事因緣出世耳問云華嚴是最初之教法華是末後之談二經各自有宗何必勾牽合說答云經有明文非臆說也大經云爾時世尊菩提場中於一切法成最正覺果也智入三世悉皆平等性也其身充滿一切世間其音普順十方國土於諸國土平等隨入體也身恒徧坐一切道場報也三世所行眾福大海悉已清淨因也而恒示生諸佛國土緣也無邊色相圓滿光明徧照法界等無差別相也演一切法如布大雲一一毛端悉能容受一切世界而無障礙作也各現無量神通之力教化調伏一切眾生力也徧十方界而無來往智入諸相了法空寂本末此是釋尊初成正覺開佛知見時所得妙法也如來四十年中秘而不說者此也直至法華會上欲將此事向人吐露故先放光現瑞一眾驚疑不知所措彌勒為眾旁通云佛坐道場所得妙法為欲說此為當授記此是彌勒暗猜世尊欲將菩提樹下所得妙法久默而不說者向人吐露也是彌勒又猜世尊欲將此事轉授與人也及乎世尊出定之後却將自己初坐道場開佛知見時所證所得者在大眾前賣弄一上云諸佛智慧甚深無量一切聲聞辟支佛所不能知所以者何佛所成就第一希有難解之法唯佛與佛乃能究盡諸法實相所謂諸法如是相如是性乃至如是本末究竟等偈中又云道場得成果我已悉知見如是大果報種種性相義我及十方佛乃能知是事此是世尊分明顯說初坐道場所說究竟平等妙法唯佛與佛乃能究盡但如來體相因緣果報等事一一皆在後文發明故但云如是體相因緣果報本末究竟平等而已言如是者猶言如此也意指如來如此徧華藏海之體相因緣果報也下文又將四十年中所說諸法復賣弄云諸佛隨宜所說意趣難解一切聲聞辟支佛亦不能知唯有佛知所以者何諸佛如來唯以一大事因緣出現於世唯以佛之知見示悟眾生故我四十年來實未曾說二乘法皆是指示眾生佛知佛見欲令眾生同證如來如是體相因緣果報究竟平等妙法而已汝自不知不解錯會佛心取證小果我今亦將此事為汝道破故說方便一周而身子悟則曰吾今乃知真是佛子而如來即與授記次說譬喻一周而四大弟子悟則曰我等今日真是聲聞真阿羅漢而如來即與授記又說因緣一周而五百弟子學無學人齊悟故曰我今乃知真是菩薩而如來悉與授記至法師品總將如來在世及滅度後若有人聞妙法華經一句一偈乃至一念隨喜此經及受持讀誦解說書寫供養此經者皆得授記如上完結其智慧門難解難入二句然二乘雖得授記若不行法師事受持此經畢竟不能紹法王位故在法師品中極讚法師持經功德令彼心生好樂發願受持然恐不知此卷大經何等式樣云何受持於是釋迦牟尼却將初坐道場開佛知見時所得妙法在大眾前覿面親呈令彼親見一回故待多寶現塔現身而如來三變淨土雲集十方百千萬億那由他恒河沙等國土分身諸佛各各在寶樹下坐師子座釋迦如來與多寶佛在寶塔中坐師子座者此是諸佛如來各將自己徧華藏世界如是體如是相如是性如是果報一卷大經滿盤托出以示大眾也及談大因則曰我於無量無數劫為國王時即求此經為常不輕時即持此經者是說自己往昔因中脩菩薩行嚴淨華藏莊嚴世界海者皆為此經也及談壽量則曰我成佛已來無量百千萬億那由他阿僧祇劫自從是來我常在此娑婆世界說法教化亦於餘處百千萬億阿僧祇國導利眾生者無非亦為此經也由如來苦口勸持又引自己作證於是會中二萬菩薩及八十萬億那由他菩薩併得記諸大弟子乃至從地涌出六萬恒河沙等諸大菩薩無量無邊算數譬喻所不能知者一時皆悉發願持經至此則法王法師之位已定諸佛出世本懷已得了當心生懽喜在大眾前現大神力出廣長舌上至梵世一切毛孔放無量無數色光皆悉徧滿十方世界眾寶樹下師子座上諸佛亦復如是出廣長舌放無量光一時謦欬俱供彈指是二音聲徧至十方諸佛世界令諸大眾皆見此娑婆世界無量無邊百千萬億眾寶樹下師子座上諸佛及見釋迦牟尼佛及多寶如來在寶塔中坐師子座又見無量無邊百千萬億菩薩摩訶薩及諸四眾恭敬圍繞釋迦牟尼佛既見是已皆大歡喜至此完結諸佛智慧甚深無量二句於是如來以右手摩無量菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祇劫脩習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等當一心流布此法廣令增益如是三摩諸菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祇劫脩習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等當受持讀誦廣宣此法令一切眾生普得聞知時諸菩薩俱發聲言如世尊勅當具奉行唯願世尊願不有慮爾時無量菩薩大眾舍利弗等聲聞四眾及一切世間天人阿脩羅等聞佛所說皆大歡喜由是而知諸佛出世不過欲令一切眾生盡知盡見盡得受持讀誦如此徧華藏莊嚴世界海之大體大相大性大作用大因緣大果報究竟平等一卷大經而已更無他事然則雖會靈山宛然華藏雖說法華實與大眾重說一徧華嚴也故知二經所說始終不出種種光明蕋香幢大蓮華中事所以大經名佛華而此經名法華者良有意也序品第一頌云一段光明在揚眉即煥然秪緣不自見所以受人憐慈氏佯停馬文殊詐著鞭當人欲薦取休離眼稍邊序者由也始也陳教起之因由作法興之漸始故又序者緒也如繭得緒而盡一繭之絲經得序而盡一經之旨故此品雖為一經之發起實括全經之始終故直名序品於中說無量義經入無量義定天雨四華地搖六震放一毫光現十界相於是彌勒騰疑文殊領答原始要終則諸佛出世本懷盡情吐露無復餘蘊矣自餘三周說法曰方便曰譬喻曰因緣乃至現寶塔集分身涌菩薩說壽量無非皆是發明光中所現之事而已無他道也品者類也分義類以彰品名冠全經而稱第一如是我聞一時佛在王舍城耆闍舍崛山中與大比丘眾萬二千人俱皆是阿羅漢如是者指法之辭如是之法我從佛聞證法有所授非自說也一時下出說法之時處及聽眾也梵語羅閱祇伽羅此云王舍城國名摩伽陀此云不害無刑殺故亦云摩竭提此云天羅即王名也以王名國此王即斑足王之父從久遠劫此王主千國王巡山值牸師子眾人迸散仍共王交後月滿來殿上生子王知是己子訛言我既無兒此是天賜養為太子足上斑駁時人號為斑足後紹王位極喜啖肉常勅厨人無令肉少偶一時闕乃取城西新死小兒為膳王言太美勅云日當辦此肉厨人日捕一人為饍舉國愁恐千小王興兵廢王置耆闍山中諸羅剎輔之為國王因與山神誓誓取千王祭山捕得九百九唯少普明王後時伺執得之王大啼哭自恨生來實語而今乖信斑足放之普明還國作大施立太子仍來就死形悅心安斑足問之答云得聞聖法因令說之廣讚慈心毀呰殺害仍說無常偈斑足聞之即證初地千王各取一滴血三條髮賽山神願斑足與千王共立舍城都五山中仍為大國千小王各以國付子更迭知大國事故曰王舍又云斑足得道放赦千王千王被赦於其地故名王赦而經家借名為屋舍字耳耆闍崛山此云靈鷲峯如鷲形故此山有五精舍一名天主穴二名七葉穴三名蛇神穴四名少獨力山五曰耆闍崛也大比丘眾者器量尊勝超諸外道為天主所敬故曰大也比丘者秦言淨命乞食破煩惱能持戒怖魔天竺一名含此四義故存本稱言眾者梵語僧伽此翻和合眾一人不名和合三人已上乃名和合阿羅漢者亦含三義我生已盡不受後有故名不生九十八使煩惱已盡故名殺賊具智斷德堪為人天福田故名應供含此三義亦存本稱諸漏已盡無復煩惱逮得己紀利盡諸有結心得自在此嘆德也諸漏者三漏也謂欲漏有漏無明漏欲界諸愛名欲漏上二界愛名有漏三界無明名無明漏煩惱者見思二惑也諸有結者即欲結有結無明結也以果言謂之漏漏落生死故以因言謂之結結生相續故今言斷煩惱盡漏結者因亡果喪也逮得己利者自出三界不願度生因乖萬善也心得自在者躭寂滅樂不求佛道果缺圓常也宗門所謂鶴立枯松點水滴凍百尺竿頭坐的人也其名曰阿若惹憍驕陳如摩訶迦葉涉優樓頻螺迦葉迦耶迦葉那提迦葉舍利弗大目犍連摩訶加旃延阿㝹樓䭾劫賓那憍梵波提離婆多畢陵伽婆蹉薄拘羅摩訶拘絺羅難陀孫陀羅難陀富樓那彌多羅尼子須菩提阿難羅𬑟羅如是眾所知識大阿羅漢等此列名也憍陳如姓也此翻火器其先事火由此命族阿若者此翻最初解閻浮得道最在先故佛昔於饑世化為赤目大魚閉氣不喘示為死相木工五人先以斧斫其肉佛時誓言於當來世先度此等先願與其無生故名阿若增一阿含云我佛法中寬仁博識初受法味者拘鄰如比丘第一摩訶迦葉此云大龜氏其先學道靈龜負仙圖而應從德命族故亦名飲光以身光映物故付法藏云毗婆尸佛滅度後以金師因塔像金色缺壞時有貧女乞得金珠倩彼嚴飾金師歡喜粧瑩事畢立誓為無姻夫婦九十一劫人間天上身恒金色增一阿含云我佛法中行頭陀行大迦葉第一優樓頻螺此翻木瓜林依林住故那提此翻河伽耶此翻城三兄弟皆事火毗婆尸佛時共堅剎柱緣是為兄弟兄為瓶沙王師有五百弟子兩弟各二百五十行兄法佛作十種變度之所謂毒龍不中龍火不燒恒水不溺三方取果此取粳糧忉利取甘露知嫌隱去知念現來火滅還然斧舉不下廣出瑞應雖覩眾變邪執未改復云瞿曇雖神不如我道真佛即語云汝非羅漢亦不得道霍然開悟師徒皆伏二弟亦隨歸佛成一千比丘增一阿含云優樓毗比丘能將護四眾供給四事令無所乏最為第一那提比丘心意寂然降伏諸結精進第一伽耶比丘觀了諸法都無所著善能教化最為第一舍利弗此翻身子母好形身身之所生故經云過去甥舅俱為織師知王寶藏因穿土盜之大獲珍寶寶監白王王曰勿揚彼盜尋來伺而執之甥復令舅倒入被執甥恐人識即級舅頭王令以尸置四衢道引取其親後因賈客羣集猥閙甥以薪覆之王猶伺取又因兒童舞戲投火燒之又復置酒與伺者飲伺者大醉復以酒瓶盛骨而去王憂狡猾出女誘之嚴防水邊誡其女曰來者執喚彼浮先株於水防者謂人視之乃株連日不備因是得來通女女執其衣即授死人手而去女大喚視之乃死人手耳因是有身生男端正王令乳母抱出有嗚者執之一日至煑餅爐下餅師與餅而嗚王更令抱出因酤醇酒醉乳母抱兒而去出過他國他國賢其謀欲以大臣女妻之不允因字之為兒聘本國王女許之王疑其前盜復以五百騎鞍馬衣服一種相似往迎婦時本國王知是前盜歎其姦詐以女歸之爾時甥者舍利弗是爾時舅者調達是也難陀䟦難陀二龍護王舍城雨澤以時國無饑年王及人民歲設大會置三高座坐王太子論師時身子年八歲身到會所問人三座人具答之即越眾登論牀羣儒皆耻不肯論議僉曰勝此小兒無足顯譽脫其不如屈辱甚大皆遣侍者傳語問之答過問表盡隳諸幢無敢當者及年十六究盡閱浮典籍無事不閑十六大國議論無雙五天竺國最為第一後於路中逢見馬勝威儀庠序因問師法答諸法從緣生亦復從緣滅吾師大沙門常作如是說一聞此偈即得須陀洹果來至佛所七日遍達佛法淵海十五日得阿羅漢果為羅云和尚增一云我佛法中智慧無窮決了無疑舍利弗第一大目犍連此翻萊茯根又翻胡豆二物古仙所嗜因以命族往昔曾助辟支佛剃頭浣染縫袈裟發願求得神通昔外道師徒五百用呪移山經一月日簸峨已動目連念言此山若移多所損害即於山頂虗空中結跏趺坐山還不動外道相謂我法山動計日必移云何不動必是沙門使爾自知力弱歸心佛道難陀䟦難陀二龍居須彌邊海佛常飛空上忉利天宮二龍瞋恨云何禿人從我上過後時佛欲上忉利天二龍吐黑雲闇霧隱翳三光諸比丘咸欲降之佛不聽目連云我能降是龍龍以身繞須彌七匝尾挑海水頭枕山頂目連倍現其身繞山十四匝尾出海外頭枕梵宮是龍瞋盛雨金剛砂目連變砂為寶華輕軟可愛猶瞋不已目連化為細身入龍身內從眼入耳出耳入鼻出鑽齧孽其身使受痛苦其龍乃伏目連攝巨細二身示沙門像將是二龍來至佛所增一阿含云弟子中神通輕舉飛到十方者目犍連第一摩訶迦旃延此翻文餝長阿含云有外道執斷見謂無他世答云今之日月為此世為他世若無他世則無明日又云我見人死不還云何說其受苦故知無他世答如罪人被駐寧得歸否又云若生天上何故不歸故知無他世答如人墮廁得出寧肯更入廁否且天上一日當此百年生彼三五日未遑歸心設有歸者汝身已化寧得知之又云鑊煑罪人密葢其上伺之不見神出故知無他世答汝晝眠時傍人在邊見汝神出否又云我剝死人皮臠肉碎骨求神不得故知無他世答譬如小兒析薪寸寸分裂求火寧有得否又云我秤死人更重若神去應輕若無神去應無他世答如火與鐵合則輕銕失火則重人生有神則輕人死失神則重又云我見人臨死反轉求神不得故知無他世答如人反轉求於貝聲寧得聲否又云汝雖種種破我我執甚久而不能捨答如人採穭初見麻取麻次捨麻取麻皮次捨麻皮取縷次捨縷取布次捨布取絹次捨絹取銀次捨銀取金捨劣取勝云何不能又云非但我如是說諸人亦如是說云何謂我為非答如兩商人逢鬼鬼為人形語云前路豐米足草載之何為一商便棄至於前路人牛皆饑為鬼所噉一商人云若得新草米故草米可棄人牛皆不為鬼噉諸人妄說如鬼誑言汝不納我言如不棄故米草今既得新何不棄故又云我不能捨勸我則瞋答汝如養猪人路上逢糞頭擎將還在路逢雨汁下汙頭傍人令棄反瞋勸者如是番番析破外道便伏增一云善分別義敷演道法迦旃延第一阿㝹樓䭾此翻無貧昔於饑世以稗飯供辟支佛九十一劫果報充足故名無貧賢愚經云弗沙佛末法時饑饉有辟支佛名利吒行乞空鉢無獲有一貧人見而悲悼白言勝士能受稗否答云可耳即以所噉奉之食已作十八變而去後更採稗有兔抱其背變為死人無伴得脫待暗還家委兔於地即成金人拔指隨生取脚更出用之無盡惡人惡王欲來奪之便見死屍而彼所覩純是金寶故號無貧又云昔為劫賊入佛寺盜物佛燈欲滅那律以箭剔燈見佛毛竪即自念言他尚捨物我云何盜便捨而去以是因緣得天眼洞視增一云我佛法中天眼徹視者阿那律第一斛飯王之次子也劫賓那此翻房宿父母禱房星而生善占星宿明識圖像從解得名增一云我佛法中善占星宿日月者劫賓那第一又初出家時欲向佛所夜值天雨寄宿陶師房以草為座又一比丘亦隨後來寄宿即推草與之就地而坐後比丘中夜相問欲何所之答云覓佛後比丘即為說法豁然得道後比丘即佛也由彼與佛同房共宿得見法身故名房宿此從得道處得名憍梵鉢提此翻牛呞亦云牛跡昔五百世為牛王牛常食後恒事虗哨餘報未盡唼唼常嚼故名牛呞人但觀形不知有德若輕笑羅漢則得大罪由避人罪故常居天上天知有德不笑其形故增一云樂在天上不樂在人間者牛跡比丘第一離婆多亦云離越此翻假和合釋論云空亭中宿見二鬼爭尸令其分判設依理枉理俱不免害乃隨實而答大鬼拔其手足小鬼取尸補之食意拭口而去因有煩惱不測誰身遂疑此身從何所來若是我身眼見拔去若是他身隨我行住由此疑惑逢人即問汝見我身否眾僧云此人易度遂語云此身本是他人遺體非己有也於是得道增一云坐禪入定心不倒亂者離越比丘第一畢陵伽婆蹉此翻餘習五百世為婆羅門雖得道果餘習猶高過恒河水對河神曰咄小婢駐流河神為之兩派神往訴佛佛令懺謝即合掌云小婢莫瞋大眾笑云懺而更罵佛言本習如此實無高心增一云樹下苦坐不避風雨者婆蹉第一薄拘羅此翻善容色貌端正故毗婆尸佛時有一比丘患頭痛尊者夙為貧人因持一訶黎勒果施之病愈緣施菓故九十一劫天上人中享福快樂未甞有病最後生婆羅門家其母早亡父聘後妻拘羅年幼見母作餅從而索之後母憎恚即促拘羅擲置𨫼上𨫼雖焦熱不能燒害母後煑肉拘那復索母益瞋恚尋置釜中亦不能煑母後向河拘羅隨去尋擲水中大魚吞之遭捕入市遇父買歸時剖魚腹拘羅尚活告父安詳無至傷兒父既見子喜拘而出長大出家得羅漢果年百六十歲自樂寂靜常處閒居不樂眾中乃至舍利塔亦樂閑靜阿育王禮諸羅漢塔次至其塔而說偈言雖自鍊無明於世少利益供二十貝子貝子從塔飛出著王足閑靜少欲塔亦如是增一云壽命極長終不中夭常樂閑居不處眾中者薄拘羅第一摩訶俱絺羅此翻大膝舍利弗舅也由來論常勝姊姊孕論則不勝知懷智人寄辨尚爾何況出家乃棄家往南天竺讀十八經時眾笑之累世難通一生豈冀喟然歎曰在家為姊所勝出家為他所輕誓讀不休無暇剪爪時人呼為長爪梵志學訖還家問甥所在人曰為佛弟子即生大慢我甥八歲聲震五天彼沙門者有何道術誘我姊子逕往佛所索佛論義世尊曰汝意以何為宗志曰我以一切不受為宗世尊曰是見受否志拂袖而去至中路乃省歎曰我義兩處負墮是見若受負門處粗是見不受負門處細一切人天二乘不知我墮處唯有世尊諸大菩薩知我墮處於是同五百徒眾一時出家證阿羅漢增一云得四辯才觸難能答者拘絺羅第一難陀亦云放牛難陀此翻善懽喜淨飯王偪十萬釋出家即其一也孫陀羅難陀此翻艶喜是佛親弟四月九日生短佛四指容儀挺特與世殊異若在眾中有不識者謂言佛來彌沙塞律云摩竭有裸形外道大聰明國人號為智者共身子議論結舌乃生善心欲於佛法中出家見難陀形貌奇偉歎云短小比丘智慧難概況堂者乎難陀即度出家婦即孫陀羅極端正食息不相離佛與阿難入城乞食次至難陀門首而立難陀迎禮世尊時孫陀便作是念我若放去世尊必定與其出家遂牽衣不令出難陀曰今可暫放禮世尊已我即却回孫陀羅曰共作要期方隨意去以粧濕額而告之曰此點未乾即宜却至若遲違者罰金錢五百難陀曰可爾即至門首禮足取如來鉢盛滿美食持至門首世尊遂去即與阿難世尊現相不令取鉢難陀持鉢默然隨去世尊至寺難陀持鉢以奉世尊食已告曰難陀汝食我殘否答云我食佛即授與難陀食已世尊告曰汝能出家否答云出家即告阿難汝與難陀剃除鬚髮答曰如世尊教即覔剃頭人為其落髮難陀乃握拳語剃者我不久當作轉輪王汝若剃我髮者當截汝腕彼即大怖褁收刀具即欲辭出阿難白佛佛便自去問言難陀汝出家否答言出家是時世尊自持瓶水灌其頂上淨人即剃便作是念我今敬奉世尊旦為出家暮即歸舍既至日晚尋路而歸世尊於其行路化作大坑不能得去愁苦通夜詰朝佛與五百比丘應請難陀求住守寺意欲迯去佛令關房掃地關南北開掃此彼穢復懼佛歸即迯走於路值佛隱身樹下佛令其樹舉枝高上其身露現佛見喚還問云何故欲去答昨與婦別待還與食憶婦食耳佛將彼遊天堂次遊地獄然後歇下富樓那彌多羅尼子富樓此翻滿彌多羅翻慈西域稱男為那女為尼此從父母兩緣得名內外經書靡不該練增一云善能廣說分別義理滿慈子第一欲還本國利生佛言彼國獘惡汝云何化答我當修忍人若毀我當自幸不得拳毆拳毆時自幸不得木杖木杖時自幸不得刀刃刀刃時自幸離五濁毒器由彼忍滿故曰滿慈也須菩提此翻空生生時庫藏皆空占者曰解空之相吉故名空生所修行業以空為本常入空定住無諍三昧善說空法有所宣說皆分別空佛從忉利天下率土輻輳爭前頂禮尊者端坐石室念諸法空色非佛乃至識非佛眼非佛乃至意非佛豁然悟道得見法身故名空生諸弟子中解空第一阿難此翻歡喜又翻不染中阿含云四眾若聞阿難所說若多若少無不歡喜欲發問先謦欬大眾皆歡喜四眾若觀其嘿或行住坐臥指撝處分進止動轉皆歡喜年二十五佛前求侍佛言阿難勝過去侍過去侍聞說乃解今佛未發言阿難已解阿難侍佛二十五年所聞八千犍陀皆誦不遺不重問一句佛滅度後坐師子床迦葉大眾讚曰面如淨滿月眼若青蓮華佛法大海水流入阿難心增一云知時明物所至無疑所憶不忘多聞廣達堪任奉持者阿難陀第一羅𬑟羅此翻覆障昔塞鼠穴由是因緣故名覆障昔太子求出家父王不許殷勤不已王言汝若有子聽汝出家太子指腹妃却後六年汝當生男太子出家後耶輸有娠在胎六年方得產生諸釋咸瞋何因有此欲治欲殺惡聲載道耶輸即焚火坑發大誓願我若非為子母俱滅若真遺體天當為證因抱子投坑坑變為池蓮華捧體王及國人乃始釋疑後佛還國耶輸令羅云奉佛歡喜丸羅云幼稚竟持上佛耶輸由此息謗祖王歡喜雖失其父而獲其子為金輪王吾亦何恨想其長大冀神寶至而佛索令出家父王不許耶輸將上高樓目連飛空來取佛度出家付舍利弗為弟子作沙彌時喜妄語凡國王大臣居士來欲見佛俱答言不在令無量人不得見佛由妄語故佛每訶責佛出行還使羅云洗足佛以脚挑澡盆三覆三仰然後覆地命令注水羅云盆覆注水不得立佛言汝今妄語猶如覆盆於佛法水亦不得立今當實語莫妄語也諸弟子中密行第一眾所知識者言此等皆是大眾首領人人心知眼識者復有學無學二千人摩訶波闍波提比丘尼與眷屬六千人俱羅睺羅母耶輸陀羅比丘尼亦與眷屬俱此敘有學眾也真窮惑盡無所事事者名無學即阿羅漢是也研真斷惑而欲造於真窮惑盡者名學無學也摩訶波闍波提此翻大愛道亦云憍曇彌此翻尼眾主即佛姨母也耶輸陀羅此翻華色亦翻名聞羅云母也菩薩摩訶薩八萬人皆於阿耨多羅三藐三菩提不退轉皆得陀羅尼樂說辯才轉不退轉法輪供養無量百千諸佛於諸佛所植眾德本常為諸佛之所稱歎以慈修身善入佛慧通達大智到於彼岸名稱普聞無量世界能度無數百千眾生此歎菩薩德也菩薩者梵語之半具云菩提薩埵此云覺有情亦名大心眾生具大慈得大智修大因證大果故梵語阿耨多羅此云無上三藐三菩提此云正等正覺皆於菩提不退轉者荷擔如來大事因緣決定自知成佛不謬非若小乘自謂已得涅槃不復道求也皆得陀羅尼樂說辯才者梵語陀羅尼此翻總持樂說辯才者四無礙之二也九地菩薩斷一障二愚得四無礙解一障者利它不欲行障二愚者一於無量所說法無量名句字後後慧辯陀羅尼自在愚二辯才自在愚於無量所說法陀羅尼自在者謂義無礙解即於所詮總持自在於一義中現一切義故於無量名句字陀羅尼自在者謂法無礙解即於能詮總持自在於一名字中現一切名字故於後後慧辯陀羅尼自在者謂詞無礙解即於言音展轉訓釋總持自在於一音聲中現一切音聲故辯才自在者謂辯無礙解善達機宜巧為說故菩薩斷此二愚得法自在非若小乘但得心自在也轉不退轉法輪者得是道以處己運是道以利人非若小乘不欣說法自守幽閑也供諸佛植眾德者一切如來皆悉供養一切德本無不培植不似小乘身體疲懈但念空無相無作也常為諸佛之所稱歎者菩薩智德宏深神通游戲故諸佛咨嗟不似小乘如來尋常斥之為焦芽敗種也以慈修身善入佛慧者菩薩視三界為家等四生為子借度生以入佛慧故曰善入非若小乘觀三界如牢獄視四生如怨賊也通達大智到於彼岸者通者推而行之之謂達者深造自得之謂大智者即法空智也菩薩以般若觀空漚和利物故能誕登道岸不似小乘得人空智尚在中流也名稱普聞無量世界者名者實之賓菩薩實行既廣故名稱亦普不似小乘獨善其身而名只在一國之內也能度無量眾生者願力無窮度生無盡非若小乘逮得己利成就眾生心不喜樂也宗門謂之寒灰發𦦨枯木生華百尺竿頭更進一步者也其名曰文殊師利菩薩觀世音菩薩得大勢菩薩常精進菩薩不休息菩薩寶掌菩薩藥王菩薩勇施菩薩寶月菩薩月光菩薩滿月菩薩大力菩薩無量力菩薩越三界菩薩䟦陀婆羅菩薩彌勒菩薩寶積菩薩導師菩薩如是等菩薩摩訶薩八萬人俱梵語文殊此翻妙德思益云雖說諸法而不起法想亦不起非法想故曰妙德大經云了了見佛性猶如妙德等觀世音者思益云眾生見者必得菩提稱名者得免眾苦故寶藏佛云汝觀一切眾生生大悲心今當字汝為觀世音得大勢者思益云我投足處震動三千大千世界及魔宮殿故名大勢至不休息者思益云若恒河沙劫為一日一夜以是三十日為一月十二月為一歲過百千萬億劫得值一佛如是於恒河沙等佛所行諸梵行修集功德然後授記心不休息無有疲倦故名不休息寶掌者普超經云被上德鎧乃至成佛無能沮壞令釋大乘若於夢中不志二乘常以慧心為人宣講於珍寶心無所貪惜故名寶掌藥王者悲華云願賢劫一千諸佛成道我皆供養諸佛入滅我皆起塔劫盡苦惱我皆救護刀兵疾疫我作醫王然後得佛寶藏佛言今當字汝為大淨藥王在後作佛名樓至如來寶月者思益云若諸菩薩常修童子梵行乃至不以心念五欲何況身受故名寶月䟦陀婆羅此翻善守思益云若眾生聞名畢定得三摩提彌勒此翻慈氏思益云若眾生見者即得慈心三昧悲華云發願於刀火劫中擁護眾生導師者思益云若菩薩於墮邪道眾生生大悲心令入正道不求恩報故名導師爾時釋提桓因與其眷屬二萬天子俱復有明月天子普香天子寶光天子四大天王與其眷屬萬天子俱自在天子大自在天子與其眷屬三萬天子俱娑婆世界主梵天王尸棄大梵等光明大梵等與其眷屬萬二千天子俱此敘八部眾也如來說法異類咸遵故八部龍天不謀而至不約而親譬如北辰不動而眾星皆拱也先天人眾梵語釋提桓因此翻能主撫育眾善能作天主故此天居須彌之頂總御四洲明月天子者月天子也月者缺也有虧缺故下面頗胝迦寶水精所成能冷能照故天以自在言子以慈愛言寶光天子者日天子也日者實也常充實故下面亦俱胝迦寶火珠所成能熱能照故普香天子者星天子也四大天王者東方名提頭賴吒此云持國謂護持國土安益眾生故居黃金山領二部鬼一乾闥婆此云尋香即帝釋樂神二毗舍闍此云噉精氣鬼謂噉有情及五穀精氣故護東弗於逮南方毗樓勒叉此云增長能令自他增長善根故居瑠璃山領二部鬼一鳩槃荼此云可畏二薜茘多此云魔魅鬼護南閻浮提西方毗樓博叉此云廣目居白銀山領二部鬼一龍二富單那此云熱病鬼護西瞿耶尼北方毗沙門此云多聞以福德名聞四方故居水精山領二部眾一夜叉此云犍疾鬼飛空速疾故二羅剎此云可畏護北單越由各領二部不令鬼神惱亂世間故名護世四王也明月天子等是帝釋內臣如卿如相四大天王是帝釋外臣如將帥自在者即他化自在天欲界頂天也大自在者即摩醯首羅居色界於大千界頂最自在故乘白牛執白拂一念之間能知大千雨滴故娑婆此云堪忍以諸眾生忍受三毒及諸煩惱故亦是五趣雜居故言梵者此翻離欲謂創離欲染得根本定故尸棄者此翻頂髻謂頂有肉髻如螺形故亦名螺髻亦名火頂以火災至此頂故又名樹提尸棄彼國以火名樹提故光明大梵即光音天以此天無尋伺無言語用光明為語言故言等者等取三禪四禪也不敘無色者以無形色故有八龍王難陀龍王䟦難陀龍王娑伽羅龍王和修吉龍王德义迦龍王阿那婆達多龍王摩那斯龍王優鉢羅龍王等各與若干百千眷屬俱難陀翻歡喜䟦翻善兄弟常擁護摩竭提國雨澤以時百姓皆喜故娑迦羅此翻海於大海中此最勝故和修吉此翻多頭德义迦此翻多舌以嗜語故又云能害謂瞋時噓氣人畜皆死故阿那婆達多此翻無熱從池得名閻浮諸龍皆有三患一熱風熱砂燒著皮肉骨髓以為苦惱二惡風暴起吹其宮殿失其寶餝衣服龍身自現以為苦惱三諸龍娛樂時金翅鳥王入宮搏撮始生龍子食之怖懼生惱此池無此三患名無熱惱摩那斯此云大身修羅排海淹善見城此龍縈身以遏海水優鉢此翻青蓮華從池得名以此池出此華故龍王亦食百味唯末後一口變為蝦蟆有四緊那羅王法緊那羅王妙法緊那羅王大法緊那羅王持法緊那羅王各與若干百千眷屬俱緊那羅此翻疑神似人頂有一角面極端正見者生疑畜生道攝此天帝奏法樂神也居七寶山身有異相即上奏樂佛說法時諸天絃歌般遮鼓瑟而頌法門有四乾闥婆王樂岳乾闥婆王樂音乾闥婆王美乾闥婆王美音乾闥婆王各與若干百千眷屬俱乾闥婆此云尋香以香為食故亦云香陰其身出香故此天帝奏俗樂之神也樂者幢倒伎也樂音者鼓節絃歌也美者幢倒中勝品者美音者樂音中勝品者有四阿修羅王婆稚阿修羅王佉羅騫駄阿修羅王毗摩質多羅阿修羅王羅睺阿修羅王各與若干百千眷屬俱阿修羅此云無酒往四天下採華釀海魚龍業力變為醎水瞋妬誓斷故名無酒又名非天多行諂媚無天行故今之修福懷勝負諂媚心者多生此類故云稜層可畏擁聳驚人並出三頭重安八臂跨山蹈海把日擎雲天上求餐海中釀酒是也婆稚者此云被縛五惡物繫頸不得脫故又常為帝釋所縛故佉羅騫駄此翻廣肩擁海水者毗摩質多羅者毗摩此云絲質多羅此云種種能以一絲幻作種種事故又云淨心能波海水使出聲故索乾闥婆女生舍脂帝釋業力令其父居七葉殿遂納為妻後讒其父遂交兵脚波海水手攻喜見帝釋以般若力不能為害羅睺羅此云障持障持日月故又云攝惱以能將手隱攝日月令天惱故身長八萬四千由旬口廣千由旬寶珠嚴身樂觀天女天園林故常與帝釋鬪戰若四天下人孝養父母供養沙門諸天有威力上空雨刀若不爾者諸天入宮不出又日放光照其眼不得見舉手掌障日世人咸言日蝕或作大聲世人咸言天獸吼修羅所食皆與天同唯末後一口變為青泥有四迦樓羅王大威德迦樓羅王大身迦樓羅王大滿迦樓羅王如意迦樓羅王各與若干百千眷屬俱迦樓羅此云金翅以翅有種種寶色莊嚴故居四天王大樹上兩翅相去三百三十六萬里若對敵翻此云大嗉嗉吭也以常著龍於嗉中故大滿者以龍為食常滿意故此鳥有神力雄化為天子雌化為天女住處有寶宮食亦有百味而報須食龍故如意者項有此珠故此迦樓羅一日山東噉一龍王五百小龍三方亦爾周而復始壽八千歲臨終失勢欲噉龍子龍母嗷嘇之不得食即瞋從金剛山透海穿地輪過不能過風輪風彈之從故孔涌到金剛山如是七反還山頂命終肉裂火起將燒寶山難陀雨雨滅之肉爛心衝風輪亦七反墮山上成如意珠龍得之為王韋提希子阿闍世王與若干百千眷屬俱各禮佛足退坐一面韋提希此云思惟瓶沙王之夫人阿闍世此云未生怨王舍城之王也大經云以不生佛性故煩惱怨生煩惱怨生故不見佛性不生煩惱即見佛性普超經云阿闍世從文殊懺悔得柔順忍命終入吒羅地獄即入即出生上方佛土得無生忍彌勒出世復來此界名不動菩薩後當作佛號淨界如來退坐一面者謂各退坐以面向佛也爾時世尊四眾圍繞供養恭敬尊重讚歎為諸菩薩說大乘經名無量義教菩薩法佛所護念供養者施其所好恭敬者盡其禮儀尊重者竭其誠悃讚歎者極其稱美四眾竭誠盡敬世尊無以相酬欲將菩提場中所得妙法授與大眾然恐不能擔荷故先說無量義經以發其機此無量二字有二義一無有限量故曰無量此屬實相門是平等法故二法門多種故曰無量此屬方便門謂以無限量法權開種種無量度生法門故世尊雖四十餘年淘汰四眾然四眾住在法界量裏守一解脫義不能捨有量心入無量義故世尊先說此經以搖撼之故經云爾時大莊嚴菩薩與八萬菩薩同白佛言菩薩摩訶薩欲速成菩提修行何等法門佛言有一法門名無量義菩薩欲學此法門者應當觀察一切諸法從本已來性相寂滅猶如虗空無有二法又復深入一切諸法法相如是生如是法法相如是乃至滅如是法法相如是性相寂滅猶如虛空無有二法四相皆如便是下文如是相如是性乃至如是本末究竟等即是諸佛智慧甚深無量也無量之量是如來自心現量境界所謂無心之心量也所謂法界一相即是如來平等法身也如是觀察四相本末悉徧知已次復觀察一切諸法念念不住新新生滅復觀即時生住異滅如是觀已而入眾生諸根性欲性欲無量故說法無量說法無量故義亦無量無量義者從一法生其一法者即是無相如是無相無相不相不相無相名為實相若能如是修一法門無量義者必得疾成菩提是觀察眾生性欲不同故以一法開無量義此無量義即多多之謂此便是隨眾生性欲以一乘道分別說三其實元是一相一味之法此便是其智慧門難解難入也前段是觀察實相門此段是觀察生滅門即以無限量門分別種種無量法門者無非欲其離念皈於實相也大莊嚴云世尊自從得道已來四十餘年常為眾生演說四相之義苦義空義無常無我無大無小無生無滅一相無相法性法相本來空寂若有聞者咸得暖法頂法忍法世第一法須陀洹果等及辟支佛道發菩提心登初地二地乃至十地往日所說諸法之義與今所說有何等異而言甚深無上大乘無量義經菩薩修行必成菩提佛告大莊嚴菩薩善哉善哉善男子自我道場菩提樹下端坐六年得成菩提以佛眼觀一切諸法不可宣說所以者何以諸眾生性欲不同性欲不同種種說法以方便力四十餘年未顯真實是故眾生得道差別不得疾成菩提可見授記作佛方是本懷善男子譬如水能洗垢穢若井若池若江河溪渠皆悉能洗諸有垢穢其法水者亦復如是能洗眾生諸煩惱垢善男子水性是一江河井池溪渠大海各各別異其法性者亦復如是洗除塵勞等無差別三果四果二道不一善男子水雖是一而井非池池非江河溪渠非海如來所說諸法亦復如是初中後說皆能洗除煩惱而初非中中非後初中後說文辭非一而義各異善男子我起樹王為阿若多等五人轉四諦法輪亦說諸法本來空寂代謝不住念念生滅中間為諸比丘并眾菩薩宣說十二因緣六波羅蜜亦說諸法本來空寂代謝不住念念生滅今復於此演說大乘無量義經亦如是說是故初說中說今說文辭是一而義各異義異故眾生解異解異故得道得果亦異善男子自我得道初起說法至於今日說無量義經無有二言能以一音普應眾生能以一身普應一切身善男子是則諸佛甚深不可思議境界非二乘所知亦非十住菩薩所及唯佛與佛乃能究了初中後說皆是本來空寂代謝不住念念生滅所謂如來無二語也所謂初善中善後亦善也眾生各隨自己性欲思量分別故所解所入各各有異故曰是法非思量分別之所能解唯有諸佛乃能知之此經與法華互相發明故引此一段智者觀此則於法華思過半矣無厭繁文教菩薩法者反顯非是教小乘法佛所護念者亦顯不是小乘所護念也譬如如意寶珠是摩竭龍王之所護念非蝦䗫蚯蚓之所好樂此經與法華同條共貫故亦名教菩薩法佛所護念也佛說此經已結跏趺坐入於無量義處三昧身心不動梵語三昧此翻正定亦云等持平等持心趨一境故既說無量義經便入無量義定可見世尊口到身到說底就是行底行底就是說底故纔說此經直下又將此一卷無量義經覿面呈出如銅山鐵壁頓向諸人面前要令大眾向空劫已前承當佛未出世薦取且道那箇是同參達磨魯祖是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大眾普佛世界六種震動世尊入定天驚地震故天雨四華地搖六震也曼陀羅此云柔輭曼殊沙此云適意散四華者翻破四大故六震者謂動起踊震吼擊也搖颺不安曰動自下升高曰起忽然騰舉曰踊隱隱有聲曰震雄聲抑揚曰吼呯嗑發響曰擊震即是聲動即是形聲兼吼擊動兼起踊地六震者翻破根結故爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人及諸小王轉輪聖王是諸大眾得未曾有歡喜合掌一心觀佛須菩提巖中打坐諸天雨華讚歎尊者善說般若世尊入無量義定驚天動地會中如許大眾總不知落處却無一人領會世尊無量義經亦無一人讚歎世尊善說無量義經箇箇瞠著眼睛一心觀佛不知觀是何人佛是何物古德云汝等諸人在大海裏坐汲頭浸却了更展手問人乞水喫是也爾時佛放眉間白毫相光照東方萬八千世界靡不周遍下至阿鼻地獄上至阿迦尼吒天於此世界盡見彼土六趣眾生又見彼土現在諸佛及聞諸佛所說經法并見彼諸比丘比丘尼優婆塞優婆夷諸修行得道者復見諸菩薩摩訶薩種種因緣種種信解種種相貌行菩薩道復見諸佛般涅槃者復見諸佛般涅槃後以佛舍利起七寶塔世尊見大眾眼鈍頭迷事不獲已只得略展神通放眉間光詮註無量義經無量義定令大眾向眉梢眼角邊討箇分曉所謂為憐三歲子不惜兩莖眉也然雖如是若是皮下有血性的人決不肯向人光影門頭作活計不見文喜禪師初往五臺求見文殊却被文殊當面熱瞞後參仰山得箇入處遂命充典座文殊常現於粥鍋上師以攪粥竹篦便打云文殊自文殊文喜自文喜文殊說謁讚云苦瓠連根苦甜瓜徹蒂甜脩行三大劫却被老僧嫌故古德云彩雲端裏僊人現手把紅羅扇遮面急須著眼看僊人莫看僊人手中扇問佛在眉間放光亦有說乎曰若論放光常例則放眉光是為授記若論其義別自有說眼耳鼻舌各具一能眉毛居上故口問鼻云飲食在我言語在我汝有何能反居吾上鼻曰五嶽之中中嶽居尊是以居上鼻又問眼汝何在上眼曰吾同日月寔有照鑒之功是以居上眼問眉曰汝何功能位居吾上眉曰我寔無功慚居上位倘吾在下眼若在上看你甚麼面孔故寶月上堂云古者道在眼曰見在耳曰聞且道在眉毛喚作甚麼良久曰憂則共戚樂則同歡人皆知有用之為用而不知無用之大用也宗師家將此例向上事眉間放光殆亦是乎問何故放光遍照東方萬八千界答若以理言小乘雖曰不動實在動中雖脫見思未離陰界如來欲令超出陰界證不動智故以光明遍照東方也古德云全成不動智只欠自承當若以事言震旦國中多大乘法器故佛光遍注至漢明而像法始入至梁武而達磨復來顯發此事自後燈燈相續焰焰無窮普天匝地皆此一光遍照之力也若佛光不照便與此土無緣故震旦一國佛法如是其餘東方萬八千土悉皆如是故知放光實非小緣也於此世界盡見彼土者此彼二字要看得分明要知萬八千土皆是本地風光從這裏流出故古德云盡大地是自己光明盡大地無一人不在自己光明裏是也世尊入無量定無量為一也一光照萬八千土一為無量也萬八千土靡不周遍橫遍也上極於天下極於地竪窮也光中所現六趣眾生者六凡也現在諸佛者佛乘也修行得道者聲聞乘辟支乘也行菩薩道者菩薩乘也此四聖也總之是十界圖樣現在平等光中也種種因緣種種信解種種相貌行菩薩道是一串事如人信得行布施是菩薩道則國城妻子頭目髓腦悉皆歡喜布施毫無悋惜則布施就是入道因緣內有如是歡喜心外必有如是歡喜相又如人信得持戒是菩薩道則持戒是入道因緣故於一切色香味觸心無所動內有如是不動心外有如是不動相若心存忍辱外有柔和謙謹相心行精進外有顧盻雄毅相內有禪定功夫外有濕灰槁木相內行智慧外有轉轆轆活潑相所謂有諸中形諸外也然則生佛始終三乘修證等事都不離如來一毛孔光明裏即三世諸佛無量劫來譚不盡者亦不出此毛孔光中所現之事然則如此光明不離眾生日用惟眾生日用昧而不知世尊與人作箇圖樣欲人按圖索駿耳故知如來放光如指井以示渴者告以水之所在也雖然如是恰似啞子作手勢却不如祖師親口道出昔古靈禪師行脚回受業師遣令執役一日因澡身命師去垢乃拊背云好所佛堂而佛不聖本師回首視之師曰佛雖不聖且能放光又古德云汝等諸人各自有無價寶珠從眼門放光照見山河大地耳門放光采領善惡音響如是六門晝夜常放光明亦名放光三昧說也說了註也註了却不勞別人在猜右問爾時彌勒菩薩作是念今者世尊現神變相以何因緣而有此瑞今佛世尊入於三昧是不可思議現希有事當以問誰誰能答者復作此念是文殊師利法王之子已曾親近供養過去無量諸佛必應見此希有之相我今當問爾時比丘比丘尼優婆塞優婆夷及諸天龍鬼神等咸作此念是佛光明神通之相今當問誰爾時彌勒菩薩欲自決疑又觀四眾比丘比丘尼優婆塞優婆夷及諸天龍鬼神等眾會之心而問文殊師利言以何因緣而有此瑞神通之相放大光明照於東方萬八千土悉見彼佛國界莊嚴此彌勒騰疑請問也初心識昧未解咨求菩薩慈悲騰疑啟請上文云以慈修身通達大智故須慈氏發問文殊領答也作念者私自忖量也神變者指光明也是如來神力所變現故以何因緣而有此瑞者正出疑情也凡夫小乘日日如此放光只為無此疑情放過一邊故不得大智不得受用所以彌勒起疑却是教人起疑也今佛下作念求人咨決也意謂佛不在定固當問佛佛今在定當問何人且此光明非是情識可能卜度又非言語可以形容必是眼曾親見方知端的若是思量卜度言語形容盡是鬼家活計隔靴搔痒決不能知今此會中不知誰是親眼見過的人覆自忖云文殊師利為七佛師已曾供養無量佛必曾見此無量光吾當問彼必知下落所謂要知山下路須問過來人也爾時比丘下四眾生疑所謂只在此山中雲深不知處也爾時彌勒下此正陳疑請決所謂自己不了殃及他人也上言神變此云神通者何也妙用不測之謂變觸處無礙之謂通所謂窮則變變則通神則生佛均等但眾生日用不知故不能窮由不窮故頭頭窒礙不得變通故在佛曰變曰通而眾生曰障曰礙耳於是彌勒菩薩欲重宣此義以偈問曰文殊師利導師何故眉間白毫大光普照雨曼陀羅曼殊沙華栴檀香風悅可眾心以是因緣地皆嚴淨而此世界六種震動時四部眾咸皆歡喜身意快然得未曾有偈文先敘所見後問其故此敘放光雨華動地大眾歡喜也悅可眾心一句極力描寫一時境象言華氣香風兼熏互拂令人心悅神怡即地界亦莊嚴清淨眉間光明照於東方萬八千土皆如金色從阿鼻獄上至有頂此敘見光之橫徧竪窮也諸世界中六道眾生生死所趣善惡業緣受報好醜於此悉見此敘見六凡始終也生死所趣者心所趣向也善惡業緣者造業也受報好醜者受報也又覩諸佛聖主師子演說經典微妙第一其聲清淨出柔軟音教諸菩薩無數億萬梵音深妙令人樂聞各於世界講說正法種種因緣以無量喻照明佛法開悟眾生若人遭苦厭老病死為說涅槃盡諸苦際若人有福曾供養佛志求勝法為說緣覺若有佛子修種種行求無上慧為說淨道文殊師利我住於此見聞若斯及千億事如是眾多今當略說此敘諸佛始終也聖中之主故曰聖主說法無畏故稱師子理愈入而愈細故曰微詞愈出而愈精故曰妙詞義所宣皆是一相一味故曰第一直聲名聲聲有宛曲名音聲清淨者以所說者是清白梵行之法故能說之聲亦清淨如鏗金戞玉也柔軟音者柔和輕軟巽語之言也以所說者是柔軟之法故能說之音亦柔軟也葢以不淨剛強苦切之言教人天小乘而以清淨柔軟之語教菩薩故且如來所出梵音深遠微妙故令人聽之歡喜踊躍而竟忘其疲也然諸聖主在萬八千世界中所說者皆非偏小之法悉是大乘平等正法又恐深遠微妙不能領悟復以種種因緣譬喻委曲引導務令佛法照明若揭日月而懸諸萬令諸眾生開通覺悟究竟歸於一切種智故欣厭生死而求涅槃者說四諦法令彼盡苦而得樂對植淨福而求勝法者說緣覺法令彼斷緣而得勝性言勝法者勝小乘故對修萬行而求佛慧者說一乘清淨道法令彼由覺以入妙文殊下言我所見生佛始終眾多無盡今略說其大概耳我見彼土恒沙菩薩種種因緣而求佛道或有行施金銀珊瑚珍珠摩尼硨磲碼碯金剛諸珍奴婢車乘寶餝輦輿歡喜布施迴向佛道願得是乘三界第一諸佛所歎或有菩薩駟馬寶車欄楯華葢軒飾布施復見菩薩身肉手足及妻子施求無上道又見菩薩頭目身體欣樂施與求佛智慧文殊師利我見諸王往詣佛所問無上道便捨樂土宮殿臣妾剃除鬚髮而被法服此敘見三乘得道行道之終始也種種因緣而求佛道二句是總敘或有行施下是別敘先敘在家菩薩以布施為入道因緣金銀等者七寶也奴婢者使令之人車乘者出入之具寶餝輦輿等者言以眾寶餝車乘之輦輿而歡喜布施也既施已而復修菩薩迴向法願捨寶乘而得佛乘當為諸佛稱歎不願乘金輿寶輦徒為世人羨慕而已也駟馬寶車者捨車而兼捨馬也詩云良馬四之故曰駟馬欄楯華葢者車之餝也軒高也即軒輊之軒言高廣嚴餝也此上皆外施也又有捨身肉手足等而求佛道者如割肉飼鷹投身飼虎之類又有捨頭目身體而求佛法者如雪山童子求半偈而捨全身之類此內施也又見諸王詣佛問道聞法而捨土出家者如妙莊嚴之類是也如上種種有捨世寶而求法寶捨世乘而求佛乘捨幻身而求法身捨樂土而求淨土此皆借布施為入道因緣者或見菩薩而作比丘獨處閑靜樂誦經典又見菩薩勇猛精進入於深山思惟佛道又見離欲常處空閑深修禪定得五神通又見菩薩安禪合掌以千萬偈讚諸法王復見菩薩智深志固能問諸佛聞悉受持又見佛子定慧具足以無量喻為眾講法欣樂說法化諸菩薩破魔兵眾而擊法鼓又見菩薩寂然宴默天龍恭敬不以為喜又見菩薩處林放光濟地獄苦令入佛道又見佛子未甞睡眠經行林中勤求佛道又見具戒威儀無缺淨如寶珠以求佛道又見佛子住忍辱力增上慢人惡罵捶打皆悉能忍以求佛道又見菩薩離諸戲笑及癡眷屬親近智者一心除亂攝念山林億千萬歲以求佛道或見菩薩肴膳飲食百種湯藥施佛及僧名衣上服價直千萬或無價衣施佛及僧千萬億眾栴檀寶舍眾妙臥具施佛及僧清淨園林華果茂盛流泉浴池施佛及僧如是等施種種微妙歡喜無厭求無上道或有菩薩說寂滅法種種教詔無數眾生或見菩薩觀諸法性無有二相猶如虗空又見佛子心無所著以此妙慧求無上道此敘出家菩薩入道因緣也獨處閑靜者有避人間喧囂而好幽閑寂絕之地假誦經為入道因緣者昔歐陽文忠公官洛中一日游嵩山却去僕吏放意而往至一山寺入門修竹滿軒霜清鳥啼風物鮮明文忠休於殿陛旁有老僧閱經自若與語不甚顧答文忠異之曰道人住山久如對曰甚久又問誦何經對曰法華經文忠曰古之高僧臨生死之際都皆談笑脫去何道致之耶對曰定慧力耳又問今乃寂寥無有何哉老僧笑曰古之人念念在定慧臨終安得散亂今之人念念在散亂臨終安得定文忠大驚不自知膝之在地也勇猛精進者直前無怯之謂勇勇而愈銳之謂猛一心不雜之謂精精而不怠之謂進古人單丁住山看話頭起疑情一心思惟更無二念所謂一條楖𣗖任縱橫直入千峯萬峯去者是也此借精進為入道因緣又見離欲下在家而能離下界欲染處空閑地修上界定若四禪八定之類得五神通者天眼天耳它心宿命神境也此借修九次第定為入道因緣者又見菩薩下安禪而以偈讚者所謂嘿時說說時嘿以禪那資妙慧以筆硯資真性此借作偈讚佛為入道因緣者智深志固者世智莫能知曰智深外誘莫能入曰志固二六時中唯以受持佛法為事更無它事能問者能審問也受持者能篤行也有疑必問既問即行得一句行一句所謂知行並進者也此借受持為入道因緣者定慧具足下此明九地已上菩薩死中發活定慧雙融以四無礙解說無量喻為眾講說然此菩薩雖欣樂說法非漫然無謂葢末世邪師如麻似粟類皆讚婬怒癡毀戒定慧若非定慧雙融辯才具足具正法眼作師子吼則如來正法悉成魔語故菩薩欣樂說法決非自為直欲化諸同類搗空魔壘坐致太平不使邪魔有所惑亂不得已而擊法鼓其真救世之心哉此借說法為入道因緣者寂然下坐破蒲團覷破鐵壁白醭流於嘴邊百鳥都無尋處即使佛來讚歎尚不加顧盻何況天龍恭敬而遂動其心乎如達摩魯祖懶瓚之類是也此借禪定為入道因緣者處林放光濟地獄苦而令入佛道者如華嚴菩薩放光令八難眾生觸此光者頓超十地之類是也此是菩薩借放光救苦為入道因緣者未甞睡眠等者意識昏熟曰唾五情暗冥曰眠此則晝三夜三孜孜矻矻討箇倒斷古德云惺惺着莫受人謾是也此借經行為入道因緣者又見具戒等者諸惡莫作眾善奉行幽㵎未足比其清飛雪無以方其素戒經曰戒如明日月亦如瓔珞珠是也如鵝珠草繫之類此借持戒為入道因緣者住忍辱力者惡罵捶打乃至節節支解悉能忍受如常不輕羼提僊人之類此借忍辱為入道因緣者離諸戲笑下佛不以七事笑不以欲不以嗔不以癡不以放逸不以私斂不以榮貴不以富饒唯授三乘人記別乃笑世人有一顰一笑尚不浪施者況乎佛子固當遠離宋光孝安禪師住清泰寺定中見二僧倚檻相語初有天神擁護傾聽久之散去俄而惡鬼唾罵仍掃脚跡詢其故乃二僧初論佛法次敘間闊末談資養自是安終身不言及世事且閒談世務鬼神已掃其跡況乎聚頭喧喧遊談無根謔浪笑傲者哉癡眷有損故當離智者有益故當近也攝念山林者疾雷不能驚震風不能動一念萬年萬年一念之人也此借攝念為入道因緣者如慧持之類是也飲食湯藥衣服臥具乃至園林浴池者此借四時供養為入道因緣者說寂滅法種種教詔者言教人不止一途也如當不輕以佛性徧記四眾德山臨濟以棒喝而為佛事乃至輥毬舞笏吹布毛竪拂子之類皆目擊道存不容有聲故云種種此借單提向上為入道因緣者觀諸法性者觀相元妄觀性元真性相無二猶如虗空此借觀心為入道因緣者心無所著者不著佛求不著法求不著僧求外不循緣內不住定心無所希是名求無上道此借妙慧為入道因緣者文殊師利又有菩薩佛滅度後供養舍利又見佛子造諸塔廟無數恒沙嚴飾國界寶塔高妙五千由旬縱廣正等二千由旬一一塔廟各千幢旛珠交露幔寶鈴和鳴諸天龍神人及非人香華伎樂常以供養文殊師利諸佛子等為供舍利嚴飾塔廟國界自然殊特妙好如天樹王其華開敷此頌佛滅度後供舍利起塔廟也各千幢旛者塔之嚴飾也珠交下言幢旛外有幔幔外復有鈴鳴也為供下言本為供養舍利故嚴飾塔廟由塔廟嚴飾故令國界亦自然殊特莊嚴妙好國界之有塔廟莊嚴喻如天樹王之有華莊嚴也天樹王者即帝釋員生樹也梵語波利質多樹高一百由旬枝葉覆五十由旬香又聞五十由旬諸天子夏月於樹下宴息佛放一光我及眾會見此國界種種殊妙諸佛神力智慧希有放一淨光照無量國我等見此得未曾有佛子文殊願決眾疑四眾欣仰瞻仁及我世尊何故放斯光明佛子時答決疑令喜何所饒益演斯光明佛坐道場所得妙法為欲說此為當授記示諸佛土眾寶嚴淨及見諸佛此非小緣文殊當知四眾龍神瞻察仁者為說何等此結光中所見以請決也言佛放眉光我及大眾承此光明見萬八千界種種殊妙我等亦知此光是諸佛神力及智慧力之所自出世所希有故能放一淨光照無量國然我等昔未曾見今得見此寧不慶幸但不知其所為因緣咸生疑惑仁者覲佛既久為佛之子必曾親見必知所為因緣故願仁者一決眾疑且四眾欣然仰望都覷著仁者及我二人即我亦不知世尊放光之故此時亦墮疑網亦看著仁者佛子此時必當裁答以決眾疑及決我疑令生歡喜又自猜自疑旁通一線云不知如來欲以何法饒益於人今日演斯光明或是世尊在菩提樹下覩明星時發明大事所得妙法迄今四十年中秘而不說曾未授人今日放光得非將菩提場中所得妙法秘而不說者今欲向人說乎抑亦欲將曾未授人者今欲授人令俾受持而不失乎不然何以光中示現萬八千界及見諸佛耶故知今日放光決非為小小因緣然我自己猜度理或如此但我不曾親見猶有所疑故四眾龍神皆不瞻我而瞻仁者惟願仁者為彼說破畢竟為何等事而放此光也爾時文殊師利語彌勒菩薩摩訶薩及諸大士善男子等如我惟忖今佛世尊欲說大法雨大法雨吹大法螺擊大法鼓演大法義此文殊領答也彌勒云佛坐道場所得妙法為欲說此為當授記却將世尊放光心事盡情說了今文殊復云如我惟忖當說大法等却又把光明註解一徧所謂正按旁提左敲右擊隔壁供狀雨大法雨者四十年前三草二木隨時灌溉今者欲以平等一味法雨充潤一切故下文云其雲所出一味之雨一時等澍其澤普洽是也吹大法螺者四十年前以種種譬喻因緣誘掖㢡勸今者欲以一音普告大眾故下文云我是如來應供等以一音聲演唱斯義是也擊大法鼓者四十年前擊方便鼓䇿進著欲眾生得二乘果今欲擊塗毒鼓䇿進懈怠小乘令至寶所故下文云今為汝等說最實事諸聲聞眾皆非滅度是也演大法義者四十年前秘而不說今欲向百萬人天眾前滿盤托出故下文云千二百羅漢悉亦當作佛若有聞法者無一不成佛是也諸善男子我於過去諸佛曾見此瑞放斯光已即說大法是故當知今佛現光亦復如是欲令眾生咸得聞知一切世間難信之法故現斯瑞此援古以證今也曾見此瑞者言我不是猜度也不是道聽塗說是我在過去佛邊曾親眼見放此光已即說大法故我忖量今亦必然四十年前所說乘是三乘性有五性人皆易信若說三乘是一乘五性是一性人所難信尋常但說唯佛一人獨得正覺今日小乘羅漢皆當作佛人所難信尋常但說修行三阿僧祇劫方始成佛今日即心是佛人所難信今欲向人天眾前說此難信之法欲令大眾知得即心即佛無二無三之旨故現斯瑞耳諸善男子如過去無量無邊不可思議阿僧祗劫爾時有佛號日月燈明如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊演說正法初善中善後善其義深遠其語巧妙純一無雜具足清白梵行之相為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩說應六波羅蜜令得阿耨多羅三藐三菩提成一切種智此引最初燈明先說三乘後說一乘之儀式也日月燈明別號也以此佛光明晝夜不斷如日如月如燈故以日月燈明表其德所謂通乎晝夜之道而知者是也如來下通號也從如實道來成正覺故應供者道成德備應受供養故正徧知者一塵不立萬德皆備故明行足者福慧兩嚴知行并極故善逝者隨流自在處處稱尊故世間解者三世間事無不知故無上士者超萬象而獨先軼羣聖而突出故調御丈夫者制諸外道降伏魔怨故天人師者模範人民儀刑釋梵故佛者自覺覺他覺行圓滿故世尊者圓收十號出世獨尊故演說正法者上言妙法又言大法此云正法名雖不同皆一法也即一切法故曰大離一切相故曰正不即不離是即非即故曰妙初善中善後善此三善字非善惡之善是至善之善指一乘也雖三時說法不同無非歸於至善之地譬如食蜜中邊皆甜但其義既深遠語亦巧妙人自不解耳所以深遠巧妙者以無量義皆歸一義無量音皆是一音純一無雜故由初中後悉皆具足本來無物純清絕點梵行之相故梵行品云為身是梵行耶乃至戒是梵行耶如是觀察於身無所取於修無所著於法無所住三世空寂無作業者無受報者此世不移動彼世不變改此中何法名為梵行梵行從何處來誰之所有體為是誰由誰而作如是觀察梵行不可得若諸菩薩能與如是觀行相應於一切法不生二解一切佛法疾得現前初發心時便成正覺所謂修證不無染汙不得者是名清白梵行亦名一行三昧故百丈云從來是個物不要知渠解渠是渠非渠雲巖云但形文彩即屬染汙是也次又釋云所言初者四諦法是中者因緣法是後者六度法是此三乘法皆是一期應機之語其實欲令皆得菩提成一切種智此其所以初善中善後亦善也次復有佛亦名日月燈明次復有佛亦名日月燈明如是二萬佛皆同一字號日月燈明又同一姓姓頗羅墮彌勒當知初佛後佛皆同一字名日月燈明十號具足所可說法初中後善此言二萬燈明相繼成佛名姓同乃至說法儀式皆同所謂一燈滅而一燈續燈燈無盡故有方者形彼非形者未嘗有南北有時者氣彼非氣者未嘗有晝夜故生於齊者心之所夢皆齊國也既而之宋之齊之梁心無方也夜之所夢或長於夜心無時也一光東照萬八千界者所謂心無方也過去無量無邊不可思議阿僧祇劫有佛出世號日月燈二萬佛皆同一姓相繼成佛者所謂心無時也故曰無邊剎海不隔毫端塵劫來事只在而今其最後佛未出家時有八王子一名有意二名善意三名無量意四名寶意五名增意六名除疑意七名響意八名法意是八王子威德自在各領四天下是諸王子聞父出家得阿耨多羅三藐三菩提悉捨王位亦隨出家發大乘意常修梵行皆為法師已於千萬佛所植諸善本此舉最後燈明說法儀式亦同也若以事言燈明在家生八子各有家業分管父出家而八子隨出家者父子同心有是父必有是子所謂象王行而象子隨也若以理言未出家時有八王子各領四天下者燈明未發心時八識所纏四大所障所謂一迷為心決定惑為四大色身之內迷則同迷時也燈明出家八子亦隨出家者初發心時便成正覺八識亦隨發大乘意所謂悟則同悟啐啄同時之機也八王子在家皆名意者八識皆名意故如云眼意耳意等眼識見色名有意耳識聰利名善意鼻識聞氣名無量意舌識善說法寶名寶意身識覺觸名增意意識知法名除疑意七識緣八如響隨聲名響意第八含藏諸法名法意若出家時八子皆名大乘意者成一圓融寶覺故常修梵行者妄識漸淨故皆為法師者並轉法輪故是時日月燈明佛說大乘經名無量義教菩薩法佛所護念說是經已即於大眾中結跏趺坐入於無量義處三昧身心不動是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大眾普佛世界六種震動爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩𬑟羅伽人非人及諸小王轉輪聖王等是諸大眾得未曾有歡喜合掌一心觀佛爾時如來放眉間白毫相光照東方萬八千佛土靡不周徧如今所見是諸佛土此明昔瑞皆同今日也彌勒當知爾時會中有二十億菩薩樂欲聽法是諸菩薩見此光明普照佛土得未曾有欲知此光所為因緣此言騰疑亦同今日也時有菩薩名曰妙光有八百弟子是時日月燈明佛從三昧起因妙光菩薩說大乘經名妙法蓮華教菩薩法佛所護念六十小劫不起於座時會聽者亦坐一處六十小劫身心不動聽佛所說謂如食頃是時眾中無有一人若身若心而生懈倦此明日月燈明放光之後為妙光說法華經以見今之必然也若以事言燈明因妙光而說法華不為八子者所謂路逢劒客方呈劒故下文云如我所說法唯汝能證知若以理言燈明是本覺體妙光是根本智若欲本覺成佛必因始覺智起不由情識故教菩薩法者以此經不入餘乘之手唯是過量人方堪傳受故佛所護念者小乘自謂無分亦不護念故六十小劫猶如食頃者若以事言菩薩精進心無二念如發憤時忘餐廢寢故六十小劫猶如食頃也若以理言十世古今不離當念念若不動時劫何有唯其身心不動故無懈倦也日月燈明佛於六十小劫說是經已即於梵魔沙門婆羅門及天人阿修羅眾中而宣此言如來於今日中夜當入無餘涅槃時有菩薩名曰德藏日月燈明佛即授其記告諸比丘是德藏菩薩次當作佛號曰淨身多陀阿伽度阿羅訶三藐三佛陀佛授記已便於中夜入佛餘涅槃此言燈明說經已後即唱滅唱滅已後即授記授記已後即入滅也先唱滅者警懈怠也次授記者交付家業法有所歸也次入滅者家業既付而告終也問燈明授記德藏而不授於內紹王子何也答若以事言堯授舜舜授禹唯有德者居之內紹王子雖植德本未及德藏故禪位德藏示天下之至公也尊法王位也若以理言內紹王子尚不肯居正位況受禪乎問日月燈明既因妙光而說法華何故不授記妙光答日月燈明相繼成佛因妙光也日月燈明說法華經亦因妙光也若妙光受禪即墮始終光不名妙既墮始終必不能續燈明而成始成終燈明亦不因妙光說法華經矣故能續燈明而成始成終者必因非始非終之妙光乎此燈明所以說法華亦必因無斷續之妙光也佛滅度後妙光菩薩持妙法蓮華經滿八十小劫為人演說日月燈明佛八子皆師妙光妙光教化令其堅固阿耨多羅三藐三菩提是諸王子供養無量百千萬億佛已皆成佛道其最後成佛者名曰燃燈此明妙光續燈明之光而為過去然燈師也過去諸佛若無妙光不得成佛故一切眾生皆證燈明之體不以妙光為師故終日圓覺而未甞圓覺也問八王子不以父為師而以妙光為師何也若以事言古人易子而教故羅云以舍利為師尊師位也若以理言八王子以燈明為父其本體也以妙光為師其本智也行人雖初得本其力未充必假本智四十二番煆煉之功塵消垢盡然後進而至乎妙轉八識而成智者妙光之力歟語云父以生之日月燈明有焉師以成之妙光有焉故知妙光非因非果而能因能果華嚴謂之普光明智楞伽謂之自覺聖智釋迦一光東照示此妙光也說無量經說法華經說此妙光也日月燈明相繼成佛傳此妙光也是妙光者是行人所當尅意者忽得泛作文字語言會也故燈明一燈分作兩燈一燈授與德藏為法王一燈授與妙光為法師妙光將此一燈轉授過去然燈然燈又授現在釋迦釋迦又轉授與未來彌勒三世諸佛皆藉日月燈明為燈王妙光為燈師至今燈燈不斷皆燈王燈師之力也此法王法師二位是如來道統之傳諸佛出世本懷正在乎此於此剖明則下文迎刃而解矣言法王者道無不成德無不備功無不圓行無不滿位無不極者稱法王法師者學法王之道修法王之德行法王之行轉法王之經遵法王之戒入法王之定得法王之慧如是經無量劫功圓行滿然後紹法王之位者稱法師故法師之位是入法王位之基址也曰若是則應先授聲聞法師位次授法王位方是次第何故直以法王位授之也曰先授法王位正欲其行法師事也未有紹法王位不由法師而入者故下文授舍利弗記云汝於來世過無量無邊不可思議劫供養若干百千萬億諸佛奉持正法具足菩薩所行之道此法師位也當得作佛號曰華光法王位也授迦葉記云汝於未來世當得奉覲三百萬億諸佛世尊供養恭敬尊重讚歎廣宣諸佛無量道法是法師位於最後身當得作佛是法王位是知法王之位必由法師而入也故下文五百羅漢及八千比丘發願於異國持經者是初發願行法師事也問君師二位世法也佛法平等安用之耶答若出世法中無王則佛法無主天龍八部無所歸投若出世法無師則如來道統斷而不續故權衡道法者名法王流通道法者稱法師也正如夫子有德無位稱聖師堯舜禹湯文武德位俱隆者稱聖王也問宗門只教人直下擔當自心作佛便了更有何佛可成何生可度乃欲經無量劫行法師事然然紹法王之位乎故思大云三世諸佛被我一口吞盡何處更有眾生可度雲門要將如來一棒打死餧狗子喫無著笊籬打文殊黃檗欲斫羅漢脛德山臨濟佛祖俱不禮丹霞不喜聞佛城東老母不喜見佛若是則祖位超於佛位遠矣何不紹祖位而紹佛位耶答云莫錯過祖師意不知祖師所言直下擔當四字正是將成佛度生一件大事因緣一肩擔在自己身上了也正如伊尹周公以天下為己任一般由彼根器大信根深無明輕煩惱薄故一聞大法直下承當便能興慈運悲入垂手接物利生行法師事不論時劫信步行去至於功成行滿方入妙覺所謂水到渠成若謂祖師悟了便休更無所事何異小乘是謗祖師矣不觀會中文殊普賢觀音彌勒藥王藥上諸大菩薩劫劫生生行菩薩道尚未休息祖師安得閉門束手而曰不求佛不度生乎然雲門黃檗諸大祖師作如是語直是要人向自己脚跟下做工夫莫靠別人故作此峻厲之語激發後人此萬不得已老婆心也豈遂謂佛不足成乎意謂佛為三界導師尚不許親近又況親近無明煩惱諸雜毒乎古德所謂不向密密處親近名真親近是也所以下文亦云一切不親近是名初親近處耳今人器量自不及祖師萬分之一抑且未曾闖入祖師門戶勉強教人擔當不知只擔得一堆無明骨董煩惱墼子何曾夢見祖師亦敢大言曰無生可度無佛可成耶昔皓月供奉問長沙云天下善知識證三德涅槃也未沙曰大德問果上涅槃因中涅槃曰果上涅槃沙曰天下善知識未證曰為甚麼未證沙曰功未齊於諸聖曰功未齊於諸聖何名善知識沙曰明見佛性亦得名為善知識曰如何是因中涅槃師曰大德是詳味長沙數語是鎮心丸可治千古顛狂之疾故在方便品中見如來出世之心譬喻品見如來方便之巧藥草品見如來法雨之等化城品見如來教化之久寶塔品見如來化身之多提婆品見如來求法之切常不輕品見如來持經之固壽量品見如來本跡之遠湧出品見如來度生之廣此等皆是如來從法師位中入法王位之牓樣故向人吐露亹亹不休耳八百弟子中有一人號曰求名貪著利養雖復讀誦眾經而不通利多所忘失故號求名是人亦以種諸善根因緣故得值無量百千萬億諸佛供養恭敬尊重讚歎彌勒當知爾時妙光菩薩豈異人乎我身是也求名菩薩汝身是也此明妙光為未來彌勒師也博而不精故曰求名不得其門故不通利一暴十寒故多所忘失雖不通經亦修雜善故曰種諸善根彌勒下點破言昔日之妙光即今日之文殊昔日之求名即今日之彌勒當時同在一會汝豈不知而反來問我乎彌勒云文殊當知文殊云彌勒當知此二老互相推重也問八王子師妙光求名亦師妙光然而成佛遲速若霄壤懸殊者何也其用心不同也八子初隨出家便發大乘意得即心即佛之旨不向外馳却從自己脚跟下著力精進故速求名菩薩却在語言文字上作活計心常懈怠故旋讀旋忘所謂分別名相不知休者故遲首楞嚴云若得圓根與不圓根日劫相倍信哉行人當以此為鑑今見此瑞與本無異是故惟忖今日如來當說大乘經名妙法蓮華教菩薩法佛所護念此結文殊領答也言我所以必知說法華經者由我今日見此光明與昔時所見無異昔日之光說法華經今日之瑞當知亦爾以古證今故知必當說妙法也問如來放光彌勒發問文殊領答畢竟何似答如來放光如伏羲畫卦象彌勒發問如文王作彖辭文殊領答如夫子作彖傳總是與混沌畫眉虗空安柄若是先天太極圖還須請問自己主人公三位聖人猶隔江在爾時文殊師利於大眾中欲重宣此義而說偈言我念過去世無量無數劫有佛人中尊號日月燈明世尊演說法度無量眾生無數億菩薩令入佛智慧此頌見最初燈明說法度生令得種智也佛未出家時所生八王子見大聖出家亦隨修梵行時佛說大乘經名無量義於諸大眾中而為廣分別佛說此經已即於法座上跏趺坐三昧名無量義處天雨曼陀華天鼓自然鳴諸天龍鬼神供養人中尊一切諸佛土即時大震動此頌見最後燈明出家說經入定雨華動地同今日也佛放眉間光現諸希有事此光照東方萬八千佛土示一切眾生生死業報處有見諸佛土以眾寶莊嚴瑠璃玻璃色斯由佛光照及見諸天人龍神夜叉眾乾闥緊那羅各供養其佛又見諸如來自然成佛道身色如金山端嚴甚微妙如淨瑠璃中內現真金像世尊在大眾敷演深法義一一諸佛土聲聞眾無數因佛光所照悉見彼大眾此頌見最後燈明放光現瑞同今日也示一切下見光中現六凡始終同也斯由佛光照應上見字最親切有味言今日能見佛土及見天人者不由於他皆由自己一點妙光照映所以能見即此光明便是成佛根本故在佛身名為佛光耳此點破八部供佛亦由此光也又見下見如來成道同也自然成佛道者但發此光自然成佛不假修治也佛光中見金色身端嚴微妙恰如淨瑠璃中現真金像也世尊下見如來說法亦同也因佛光所照悉見彼大眾者如來說法萬八千土無數聽眾悉來集會各各因此光明故得各各相見眼眼相覷此點破聲聞見色聞聲亦由此光也古人道你也見我也見為甚麼不會或有諸比丘在於山林中精進持淨戒猶如護明珠又見諸菩薩行施忍辱等其數如恒沙斯由佛光照又見諸菩薩深入諸禪定身心寂不動以求無上道又見諸菩薩知法寂滅相各於其國土說法求佛道此頌比丘菩薩行道始終亦同也斯由佛光照是點破菩薩行六度亦由此光也古德云譬如一片田地相似一任諸人耕種無有一人不承此恩力者爾時四部眾見日月燈佛現大神通力其心皆歡喜各各自相問是事何因緣此頌大眾騰疑亦同也各各自相問者言各人自己忖量自言自語也天人所奉尊適從三昧起讚妙光菩薩汝為世間眼一切所歸信能奉持法藏如我所說法唯汝能證知世尊既讚歎令妙光歡喜說是法華經滿六十小劫不起於此座所說上妙法是妙光法師悉皆能受持此頌放光之後說法華經以見今之必然也此經為發最上乘者說必是妙光堪聞妙法故學人欲聞妙法須得自己妙光開發然後出言吐語盡從自己胸中流出方始光𦦨照天照地以世間眼讚妙光者非眼不能見色非妙光不能奉持正法眼藏由我所說法唯汝妙光方能證知故我以正法眼藏涅槃妙心付囑汝也問何故世尊先讚妙光令妙光歡喜然後為彼說法華經答此佛事人情一齊拈出焉有人不生歡喜而能領荷大事者乎故雖有妙光若不令彼大喜遍身亦不能荷擔大法必令大喜遍身然後堪任此大事耳故釋迦末後在靈山會上拈華示眾時唯迦葉破顏微笑世尊云我有正法眼藏涅槃妙心付囑與汝也佛說是法華令眾歡喜已尋即於是日告於天人眾諸法實相義已為汝等說我今於中夜當入於涅槃汝一心精進當離於放逸諸佛甚難值億劫時一遇世尊諸子等聞佛入涅槃各各懷悲惱佛滅一何速聖主法之王安慰無量眾我若滅度時汝等忽憂怖是德藏菩薩於無漏實相心已得通達其次當作佛號曰為淨身亦度無量眾佛此夜滅度如薪盡火滅分布諸舍利而起無量塔比丘比丘尼其數如恒沙倍復加精進以求無上道此頌唱滅授記入滅也先頌唱滅既令妙光歡喜復令大眾歡喜法藏有歸心事已畢遂告眾云如來出世本意欲令大眾悟實相義今諸法實相為汝等說竟汝等又皆歡喜領荷出世本懷今已了結我於中夜當入滅矣復戒勉云我雖說破不過為汝等作箇指路頭人汝等雖歡喜領荷還須努力精進修持無得放逸且諸佛難遇如盲龜值木若佛在世尚有所依若佛入滅無可依者汝等當生難遭之想當信如來誠諦之語勿生懈怠世尊下頌授記也諸子者燈明八子也聖子聞唱滅而懷憂法王見懷憂而安慰亦是佛事人情佛此下頌入滅也如薪盡火滅者言薪盡故見火滅其實火傳不知其盡倍復加精進者受佛囑而加功也是妙光法師奉持佛法藏八十小劫中廣宣法華經是諸八王子妙光所開化堅固無上道當見無數佛供養諸佛已隨順行大道相繼得成佛轉次而授記最後天中天號曰然燈佛諸僊之導師度脫無量眾此頌妙光為過去然燈佛師也相繼成佛者然燈續明光光不盡也是妙光法師時有一弟子心常懷懈怠貪著於名利求名利無厭多游族姓家棄捨所習誦廢忘不通利以是因緣故號之為求名亦行眾善業得見無數佛供養於諸佛隨順行大道具六波羅蜜今見釋師子其後當作佛號名曰彌勒廣度諸眾生其數無有量彼佛滅度後懈怠者汝是妙光法師者今則我身是此頌妙光為未來彌勒師也多游族姓家者世緣不斷向外馳求也棄捨所習誦者道念輕微世情濃厚也廢忘不通利者心不專一道不深求也得見無數佛者言八王子志念堅固得則諸佛求名行諸善業亦見諸佛雖修福修慧不同同歸見佛既見佛已必欲供養諸佛隨順行道方得福慧兩嚴功圓行滿成報身佛也懈怠昔汝是昔言燈明滅後倍加精進者即八王子是也滅後而懈怠者即汝便是也無論彌勒與八王子同在一會而授記若此懸遠即釋迦在然燈時親得授記而彌勒在釋迦會中授記又若此懸遠葢釋迦常行精進彌勒常自懈怠故行人當以八王子釋迦為法勿效彌勒也我見燈明佛本光瑞如此以是知今佛欲說法華經今相如本瑞是諸佛方便今佛放光明助發實相義諸人今當知合掌一心待佛當雨法雨充足求道者諸求三乘人若有疑悔者佛當為除斷令盡無有餘前六句頌所見以明必說法華也本光二字要看得重是眾生本來有此光明故今日定說此經也故知彌勒騰疑慈燈也文殊領答智燈也德藏授記照世燈也八王子相繼成佛無盡燈也本燈元是日月燈明故曰本光瑞如此今相如本瑞者正謂今佛之光與古佛之光無異也今佛下明放光是方便助發二字不但將釋迦世尊放光心事盡情說出却將一切諸佛歷代祖師心事都說盡也釋迦不出世時無論凡聖但屬有情一一脚跟下各有一尊燈明古佛晝夜放光無有休歇謂之本光本瑞若地獄道中無此本光洋銅灌口熱火沸心刀山上行劒樹上走忍痛者誰餓鬼道中若無本光針咽𦦨口叫呼求食者誰畜生道中若無本光披毛帶角飛躍蹄嘷者誰修羅道中若無本光三頭六臂嗔鬪者誰天道中若無本光受欲樂修禪定者誰諸佛無此本光成正覺度眾生者誰菩薩若無本光修六度者誰聲聞若無本光受寂滅樂作神變者誰緣覺無此本光求勝法者誰天人中無此本光聞呼即應見物便知揚眉瞬目折旋俯仰者誰故知此光本來具有物物上彰法法上現把針時針鋒上顯舉筆時筆尖上露看經時經上現搬柴運水時柴水上現雖然無處不現無不承此恩力埋在五陰坑中拋在無事甲裏不生疑心不知推究有廣大威神而不能用故穿衣喫飯直作穿衣喫飯會茶話時便作茶話會所以頭頭顯露處處蹉過故勞世尊放此光明作箇圖樣欲人向自己脚跟下識取一點本有古佛光明正如一點火星埋左灰裏不能發𦦨今日世尊擔柴把草助令生光發燄故曰助發不但放光是助發說經授記無非助發不但釋迦是助發即歷代祖師無非助發昔德山侍立龍潭次潭曰更深夜靜何不下山去師珍重便出却回曰外面黑潭點紙燈度與師師擬接潭復吹滅山大悟便禮拜潭曰子見箇甚麼道理便禮拜山曰從今已後更不疑天下老和尚舌頭也龍潭度紙燈與德山當時吹滅且道悟箇甚麼不但歷代祖師是助發即蝦䗫蚯蚓墻壁瓦礫無非助汝發機故知香嚴悟處不在竹邊靈雲悟處不在華上俱胝悟處不在指頭侍者悟處不在布毛也今相如本瑞者言如者正謂今日釋迦光與古佛光相去不遠也僧問鹽官如何是本身盧舍那佛師曰與老僧過淨瓶來僧將淨瓶至師云却安舊處著僧送還舊處復來詰問師曰古佛過去久矣便是此義諸人下是方便品之張本言諸求三乘人心有疑悔而不自安者待佛從三昧起一齊為汝剗却與汝安心也妙法蓮華經大卷首
