body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明金庭比丘通潤箋妙音品第二十四頌云梵音深妙果難傳不動笙簫不撥絃背地輕輕一彈指萬山爭響月明前此品談妙音本事妙音往昔以十萬種伎樂并八萬四千七寶鉢供養雲雷音佛果上得此第一微妙之言併得現一切色身三昧故能以一身現種種身以一音說種種法然此菩薩雖居淨國意在娑婆故釋尊光召其來亦為地涌菩薩向在下方空中久住樂處寂靜不樂人天今始發願持經復恐不能持久故如來召至與此土菩薩相見以固持經之意耳爾時釋迦牟尼佛放大人相肉髻光明及放眉間白毫相光遍照東方百八萬億那由他恆河沙等諸佛世界過是數已有世界名淨光莊嚴其國有佛號淨華宿王智如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊為無量無邊菩薩大衆恭敬圍繞而為說法釋迦牟尼佛白毫光明遍照其國爾時一切淨光莊嚴國中有一菩薩名曰妙音久已值衆德本供養親近無量百千萬億諸佛而悉成就甚深智慧得妙幢相三昧法華三昧淨德三昧宿王戲三昧無緣三昧智印三昧解一切衆生語言三昧集一切功德三昧清淨三昧神通遊戲三昧慧炬三昧莊嚴王三昧淨光明三昧淨藏三昧不共三昧日旋三昧得如是等百千萬億恆河沙等諸大三昧釋迦牟尼佛光照其身放大人相肉髻光明者欲以菩薩所證大果示人也又放眉間白毫光者欲以菩薩所修大因示人也前一光遍照東方萬八千界是欲守寂聲聞破陰界也今此二光遍照東方百八萬億那由他恆河沙等諸佛國土是欲持經菩薩破盡塵沙無明也過是已後有世界名淨光莊嚴者言破盡塵沙無明方得世界純是淨光莊嚴成寂光土也佛號淨華宿王智者淨除法障方得行無所染智無所著成法身佛也釋迦牟尼光照其國者表極果同證也爾時下顯妙音德本供養諸佛福本也成就智慧慧本也無明窟中證不動智故曰妙幢心華開敷含褁萬法故曰法華入衆類中毫無染汙故曰淨德遊諸國土略無住著故曰宿王戲絶思絶慮故曰無緣隨感隨應故曰智印同類異類語言悉了故曰解一切語言大德小德皆悉積集故曰集一切功德入五濁而不染故曰清淨了諸相而無跡故曰遊戲諸暗皆破故曰慧炬萬德皆備故曰莊嚴王鏡智圓明故曰淨光明藏識清淨故曰淨藏得如來不共法故曰不共駕如來無盡輪故曰日旋由此菩薩轉十六心成就十六大三昧由此三昧更得百千萬億恆河沙三昧此釋迦光及其身者意有在也即白淨華宿王智佛言世尊我當往詣娑婆世界禮拜親近供養釋迦牟尼佛及見文殊師利法王子菩薩藥王菩薩勇施菩薩宿王華菩薩上行意菩薩莊嚴王菩薩藥上菩薩爾時淨華宿王智佛告妙音菩薩汝莫輕彼國生下劣想善男子彼娑婆世界高下不平土石諸山穢惡充滿佛身卑小諸菩薩衆其形亦小而汝身四萬二千由旬我身六百八十萬由旬汝身第一端正百千萬福光明殊妙是故汝往莫輕彼國若佛菩薩及國土生下劣想妙音菩薩白其佛言世尊我今詣娑婆世界皆是如來之力如來神通遊戲如來功德智慧莊嚴妙音氣味相投即知光及之意故興心供佛且要與此土菩薩相見故白佛告往爾時下至囑妙音淨土菩薩欲入穢土恐心存二相故戒勉之言汝詣娑婆勿以佛土穢而生下劣想佛身小而生輕忽想菩薩身四萬二千由旬佛身六百八十萬由旬皆所謂大人相也如來欲以浮國菩薩大人相示此土持經菩薩令其心生欣艷精勤修習故放大人光相及之妙音下歸功於師言我今日發足往詣娑婆皆藉如來神通遊戲之力即我身端正光明殊妙亦藉如來功德莊嚴非我所有寧敢生輕慢下劣之想乎於是妙音菩薩不起於座身不動搖而入三昧以三昧力於耆闍崛山去法座不遠化作八萬四千衆寶蓮華閻浮檀金為莖白銀為葉金剛為鬚甄真叔迦寶以為其臺爾時文殊師利法王子見是蓮華而白佛言世尊是何因緣先現此瑞有若干千萬蓮華閻浮檀金為莖白銀為葉金剛為鬚甄真叔迦寶以為其臺爾時釋迦牟尼佛告文殊師利是妙音菩薩摩訶薩欲從淨華宿王智佛國與八萬四千菩薩圍繞而來至此娑婆世界供養親近禮拜於我亦欲供養聽法華經文殊師利白佛言世尊是菩薩種何善本修何功德而能有是大神通力行何三昧願為我等說是三昧名字我等亦欲勤修行之行此三昧乃能見是菩薩色相大小威儀進止唯願世尊以神通力彼菩薩來令我得見爾時釋迦牟尼佛告文殊師利此久滅度多寶如來當為汝等而現其相時多寶佛告彼菩薩善男子來文殊師利法王子欲見汝身於時妙音菩薩於彼國沒與八萬四千菩薩俱共發來所經諸國六種震動皆悉雨於七寶蓮華百千天樂不鼓自鳴是菩薩目如廣大青蓮華葉正使和合百千萬月其面貌端正復過於此身真金色無量百千功德莊嚴威德熾盛光明照曜諸相具足如那羅延堅固之身入七寶臺上升虗空去地七多羅樹諸菩薩衆恭敬圍繞而來詣此娑婆世界耆闍崛山到已下七寶臺以價值百千瓔珞持至釋迦牟尼佛所頭面禮足奉上瓔珞而白佛言世尊淨華宿王智佛問訊世尊少病少惱起居輕利安樂行不四大調和不世事可忍不衆生易度不無多貪欲瞋恚愚癡嫉妬慳慢不無不孝父母不敬沙門邪見不善心不攝五情不世尊衆生能降伏諸魔怨不久滅度多寶如來在七寶塔中來聽法不又問訊多寶如來安隱少惱堪忍久住不世尊我今欲見多寶佛身唯願世尊示我令見爾時釋迦牟尼佛語多寶佛是妙音菩薩欲得相見時多寶佛告妙音言善哉善哉汝能為供養釋迦牟尼佛及聽法華經并見文殊師利等故來至此此妙音現座也在法座前化作八萬四千衆寶蓮華者亦是八萬四千功德之所成就故隨念化作是妙蓮華非世間蓮華也爾時下問瑞因緣爾時下答瑞因緣文殊下問通求見我等亦欲勤修行之者旁敲曲唱風動衆心也文殊求見妙音世尊不自召而令過去多寶召者釋尊光召彼已現座其不即來必有所待釋尊逆知其意故令多寶再召也善男子來者亦見多寶與妙音雖隔塵剎宛若對面妙音與八萬四千菩薩偕來者正顯八萬四千功德皆是菩薩眷屬也所經下顯此菩薩威德廣大舉足動步驚天動地故雨華奏樂是菩下出大人相也目如廣大青蓮華葉者狀其目也正使和合百千萬月者狀其目之精光也其面下總言其萬德莊嚴諸相具足也入七下明菩薩皆處法空之座也下七下修敬問安也先問如來起居次問衆生受化三問多寶聽法俱是佛事人情貪瞋癡慢鈍使之四嫉慳隨煩惱之二邪見利使之一五情即五識也諸魔即煩惱與陰魔也世尊下求釋尊為介紹而見多寶也佛告下以己來意讚妙音所謂溪山各異雲月是同也爾時華德菩薩白佛言世尊是妙音菩薩種何善根修何功德有是神力佛告華德菩薩過去有佛名雲雷音王多陀阿伽度阿羅訶三藐三佛陀國名現一切世間劫名喜見妙音菩薩於萬二千歲以十萬種伎樂供養雲雷音王佛并奉上八萬四千七寶鉢以是因緣果報今生淨華宿王智佛國有是神力華德於汝意云何爾時雲雷音王佛所妙音菩薩伎樂供養奉上寶器者豈異人乎今此妙音菩薩摩訶薩是華德是妙音菩薩已曾供養親近無量諸佛久植德本又值恆河沙等百千萬億那由他佛華德汝但見妙音菩薩其身在此而是菩薩現種種身處處為諸衆生說是經典或現梵王身或現帝釋身或現自在天身或現大自在天身或現天大將軍身或現毗沙門天王身或現轉輪聖王身或現諸小王身或現長者身或現居士身或現宰官身或現婆羅門身或現比丘比丘尼優婆塞優婆夷身或現長者居士婦女身或現宰官婦女身或現婆羅門婦女身或現童男童女身或現天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身而說是經諸有地獄餓鬼畜生及衆難處皆能救濟乃至於王後宮變為女身而說是經華德是妙音菩薩能救護娑婆世界諸衆生者是妙音菩薩如是種種變化現身在此娑婆國土為諸衆生說是經典於神通變化智慧無所損減是菩薩以若干智慧明照娑婆世界令一切衆生各得所知於十方恆河沙世界中亦復如是若應以聲聞形得度者現聲聞形而為說法應以辟支佛形得度者現辟支佛形而為說法應以菩薩形得度者現菩薩形而為說法應以佛形得度者即現佛形而為說法如是種種隨所應度而為現形乃至應以滅度而得度者示現滅度華德妙音菩薩摩訶薩成就大神通智慧之力其事如是先請問德本佛告下說其本事佛名雲雷音王者雲以蔭物雷以動物故國名現一切世間者謂三世間皆從此國流出故劫名喜見者一切衆生皆愛樂故藥王然身供養日月淨明千二百歲又然兩臂供塔七萬二千歲表空我法二執故菩薩名喜見三昧名現一切色身妙音以十萬種伎樂并八萬四千七寶鉢供養雲雷音王萬二千歲伎樂者娛樂具也寶鉢者應量器也亦是表空我法二執由捨此二執故菩薩名妙音而三昧亦名現一切色身也然則所捨未嘗同所得未嘗異以如是因感如是果所謂殊途同歸也華德下點明今昔以見事佛久而植德深也華德下現六凡身也是妙音能救護娑婆世界諸衆生者言此菩薩雖在淨光莊嚴國中實未嘗離娑婆界現種種身說一相法令諸衆生隨類各解也若應下現四聖身也華德下結顯妙音神通智慧廣大無際也爾時華德菩薩白佛言世尊是妙音菩薩深種善根世尊是菩薩住何三昧而能如是在所變現度脫衆生佛告華德菩薩善男子其三昧名現一切色身妙音菩薩住是三昧中能如是饒益無量衆生說是妙音菩薩品時與妙音菩薩俱來者八萬四千人皆得現一切色身三昧此娑婆世界無量菩薩亦得是三昧及陀羅尼爾時妙音菩薩摩訶薩供養釋迦牟尼佛及多寶佛塔已還歸本土所經諸國六種震動雨寶蓮華作百千萬億種種伎樂既到本國與八萬四千菩薩圍繞至淨華宿王智佛所白佛言世尊我到娑婆世界饒益衆生見釋迦牟尼佛及見多寶佛塔禮拜供養又見文殊師利法王子菩薩及見藥王菩薩得勤精進力菩薩勇施菩薩等亦令是八萬四千菩薩得現一切色身三昧說是妙音菩薩來往品時四萬二千天子得無生法忍華德菩薩得法華三昧初問三昧名佛告下答三昧名說是下同類得益八萬四千菩薩雖與妙音同在一處今日才與妙音相見所謂達者同遊涅槃路也此娑下又顯妙音一脉傳在娑婆也爾時下還土覲佛自陳利益與前文照應普門品第二十五頌云在在彰名處處身不知誰是本來親從頭認過重新認畢竟還尋這個人觀世音者是大悲菩薩圓證圓悟之名言世音者或是三世音聲或是三世間音聲此等音聲雖有無量種種差別無非皆是淨妙第一之音但衆生不解悉以耳聽隨聲所轉故有種種差別所謂世人之耳非不聰耳聰特向經中聾是也今此菩薩無論聖凡鬼畜有情無情種種音聲不以耳聽皆以眼聞無非皆是淨妙第一之聲故曰觀音古德云若將耳聽終難會眼處聞時方得知是也普門者由此菩薩將此一音應接群生廣作佛事則無塵不現無剎不周無類不遍無門不入故所謂大慈悲為室也然藥王妙音觀音名雖不同所證三昧平等無二故二品之後而繼之此品也爾時無盡意菩薩即從座起偏袒右肩合掌向佛而作是言世尊觀世音菩薩以何因緣名觀世音佛告無盡意菩薩善男子若有無量百千萬億衆生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫若有持是觀世音菩薩名者設入大火火不能燒由是菩薩威神力故若為大水所漂稱其名號即得淺處苦有百千萬億衆生為求金銀琉璃硨磲碼瑙珊瑚琥珀真珠等寶入於大海假使黑風吹其船舫訪漂墮羅剎鬼國其中若有乃至一人稱觀世音菩薩名者是諸人等皆得解脫羅剎之難以是因緣名觀世音若復有人臨當被害稱觀世音菩薩名者彼所執刀杖尋段段壞而得解脫若三千大千國土滿中夜叉羅剎欲來惱人聞其稱觀世音菩薩名者是諸惡鬼尚不能以惡眼視之況復加害設復有人若有罪若無罪杻丑械解枷鎖檢繫其身稱觀世音菩薩名者皆悉斷壞即得解脫若三千大千國土滿中冤賊有一商主將諸商人齎機持重寶經過險路其中一人作是唱言諸善男子勿得恐怖汝等應當一心稱觀世音菩薩名號是菩薩能以無畏施於衆生汝等若稱名者於此冤賊當得解脫衆商人聞俱發聲言南無觀世音菩薩稱其名故即得解脫無盡意觀世音菩薩摩訶薩威神之力巍巍如是若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲若多瞋恚常念恭敬觀世音菩薩便得離瞋若多愚癡常念恭敬觀世音菩薩便得離癡無盡意觀世音菩薩有如是等大威神力多所饒益是故衆生常應心念若有女人設欲求男禮拜供養觀世音菩薩便生福德智慧之男設欲求女便生端正有相之女宿植德本衆人愛敬無盡意觀世音菩薩有如是力若有衆生恭敬禮拜觀世音菩薩福不唐捐是故衆生皆應受持觀世音菩薩名號無盡意若有人受持六十二億恆河沙菩薩名字復盡形供養飲食衣服臥具醫藥於汝意云何是善男子善女人功德多不無盡意言甚多世尊佛言若復有人受持觀世音菩薩名號乃至一時禮拜供養是二人福正等無異於百千萬億劫不可窮盡無盡意受持觀世音菩薩名號得如是無量無邊福德之利初無盡發問謂此大悲菩薩通身是手遍身是眼慈悲無盡利益無窮自非有限量人所能發問故假無盡意問其因緣佛告下先明下與衆生同一悲仰故能一心稱名即得解脫一心二字是脫難之本正謂攝心一處便是觀音出現時也蓋觀音既與衆生同體則觀音身遍在一切衆生心想中而觀音之名又遍在一切衆生耳根裏但不肯一心注念循聲流轉却與觀音遠隔千里若肯一心稱名則觀音不離當處時時出現假使百千萬億受苦衆生同時一心注念則同時反聞自性親見觀音所有苦惱亦得同時解脫然亦有受持觀音而不驗者此非觀音不靈持觀音者不專耳若專心至志如猫捕鼠如雞捕卵未有不獲靈驗者若有下明菩薩現身水火由彼菩薩證入性火真空性空真火性水真空性空真水與水火渾同一體故水火不能燒溺也要知現前水火皆是觀音現身說法之地古德云火𦦨為三世諸佛轉法輪又云汝還聞偃溪聲麼故有人逢火難水難者一心稱名則大火變為蓮華藏海大水化為琉璃寶地矣漂墮羅剎鬼國即得解脫者由菩薩現身鬼國即鬼國亦有觀音故衆生有漂墮鬼國若一心稱名則觀音應念現前不但自得解脫即羅剎亦化為觀音矣臨當被害刀杖尋壞者即劊子心中亦有觀音由殺心現前觀音不現設有臨刑之際一心注念觀音名號即劊子化成菩薩刀杖盡生蓮華奚翅段壞故有放下屠刀立地成佛者即觀音現前之時也惡鬼不能加害者由菩薩遍在鬼心即鬼心中亦有菩薩但鬼心熾盛菩薩即隱故欲來惱人若一聞其人稱觀世音則鬼心觀音亦躍然而起鬼心亦當下寧帖不敢加視況加害乎枷鎖斷壞者由菩薩無羈絆無拘鎖故一心稱名伽鎖盡脫也冤賊解脫者正見劫賊心中亦有觀音也多淫多瞋多癡亦得解脫者正謂三毒心中亦是觀音現身說法處也設有多淫多瞋多癡之人但肯一心注念觀音即三毒化成三德矣求男得男求女得女者以男女形相各異觀音則同不逆人心故令彼所求無不如意易所謂乾道成男坤道成女者此之謂歟稱一名供一形而與受持供養六十二億恆河菩薩功德無異者以此菩薩得真圓通一即一切一切即一故其或不能受持全經即受持一品不能受持一品即持受一偈不能持一偈即持一名號亦得無量福德之利者譬如師子捉象捉兔皆用全力故一偈一句無非妙旨如是則觀音名號實該一卷大經其功德豈小之哉無盡意菩薩白佛言世尊觀世音菩薩云何遊此娑婆世界云何而為衆生說法方便之力其事云何佛告無盡意菩薩善男子若有國土衆生應以佛身得度者觀世音菩薩即現佛身而為說法應以辟支佛身得度者即現辟支佛身而為說法應以聲聞身得度者即現聲聞身而為說法應以梵王身得度者即現梵王身而為說法應以帝釋身得度者即現帝釋身而為說法應以自在天身得度者即現自在天身而為說法應以大自在天身得度者即現大自在天身而為說法應以天大將軍身得度者即現天大將車身而為說法應以毗沙門身得度者即現毗沙門身而為說法應以小王身得度者即現小王身而為說法應以長者身得度者即現長者身而為說法應以居士身得度者即現居士身而為說法應以宰官身得度者即現宰官身而為說法應以婆羅門身得度者即現婆羅門身而為說法應以比丘比丘尼優婆塞優婆夷身得度者即現比丘比丘尼優婆塞優婆夷身而為說法應以長者居士宰官婆羅門婦女身得度者即現婦女身而為說法應以童男童女身得度者即現童男童女身而為說法應以天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身得度者即皆現之而為說法應以執金剛神得度者即現執金剛神而為說法無盡意是觀世音菩薩成就如是功德以種種形遊諸國土度脫衆生是故汝等應當一心供養觀世音菩薩是觀世音菩薩摩訶薩於怖畏急難之中能施無畏是故此娑婆世界皆號之為施無畏者云何遊此者問其現何等身也天耶人耶聲聞耶辟支耶菩薩耶云何說法者問其說何等法也為說人天法耶三乘法耶云何方便者言在此作何等方便也善男下正答上與諸佛同一慈力故現三十二種應身也若諸菩薩入三摩地進修無漏勝解現圓即現佛身為說佛慧若諸有學寂靜妙明勝性現圓即現辟支說因緣法若諸有學得四諦空修道入滅勝解現圓即現聲聞說四諦法此言現三乘身說三乘法也欲心明悟不犯欲塵作大千主名曰梵王統領諸天為地居主名曰帝釋遊行十方所向無礙名自在天飛行虗空不勞心力名大自在愛統鬼神救獲國土掃清魔壘蔭覆群生名天大將軍愛統世界保護衆生不令鬼神侵犯擾亂名毗沙門此現天主天將身也作兆民君為一國主名曰小王寬仁厚德世間推讓名曰長者居家有道清自自守名曰居士秉公執法剖斷邑名曰宰官精修淨行攝衛自居名婆羅門精持禁戒不犯五篇名曰比丘五百律儀皎若氷雪名比丘尼堅持五戒名婆塞婆夷勤修婦道以事舅姑名曰婦女不壞男根不思婚配名童男童女已上現人主臣民身也天龍下現異類身也唯上上人能作下下事故執金剛神即露肩神臣於帝釋者若準次第當在毗沙門之下無盡下結答問辭言汝問作何方便今答云成就如是功德汝問云何遊此云何說法今答云以種種身遊諸國土說種種法度脫諸生正見亦是隨類現身亦是稱機說法悉與藥王妙音同一鼻孔亦由往昔持經之力故得如此圓悟圓證汝等應當一心供養也是觀世音以至施無畏一節是四無畏之結當在福德之利下無盡意菩薩白佛言世尊我今當供養觀世音菩薩即解頸衆寶珠瓔珞價值百千兩金而以與之作是言仁者受此法施珍寶瓔珞時觀世音菩薩不肯受之無盡意復白觀世音菩薩言仁者愍我等故受此瓔珞爾時佛告觀世音菩薩當愍此無盡意菩薩及四衆天龍夜叉闥乾婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等故受是瓔珞即時觀世音菩薩愍諸四衆及於天龍人非人等受其瓔珞分作二分一分奉釋迦牟尼佛一分奉多寶佛塔無盡意觀世音菩薩有如是自在神力遊於娑婆世界無盡下因聞佛說而興供也觀音不受者以圓通界中不立一塵不缺一法故亦見菩薩有功不居故昔耽源應真禪師一日携籃歸國師問籃裏甚麼物師曰青梅國師曰將來何用曰供養國師曰青在爭堪供養師曰以此表獻國師曰佛不受供養師曰和尚如何師曰我不供養師曰為甚麼不供養國師曰我無果子亦是此意因佛告而受者不違佛教故分奉二佛者轉作供養故無盡下結三十二應此節當在度脫衆生之下爾時無盡意菩薩以偈問曰世尊妙相具我今重問彼佛子何因緣名為觀世音具足妙相尊偈答無盡意汝聽觀音行善應諸方所弘誓深如海歷劫不思議侍多千億佛發大清淨願我為汝略說聞名及見身心念不空過能滅諸有苦假使興害意推落大火坑念彼觀音力火坑變成池或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒或在須彌峯為人所推墮念彼觀音力如日虗空住或被惡人逐墮落金剛山念彼觀音力不能損一毛或值冤賊繞各執刀加害念彼觀音力咸即起慈心或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞或囚禁枷鎖手足被杻械念彼觀音力釋然得解脫呪詛諸毒藥所欲害身者念彼觀音力還著於本人或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害若惡獸圍繞利牙爪可怖念彼觀音力疾走無邊方蚖完蛇及蝮伏蠍穴氣毒煙火然念彼觀音力尋聲自回去雲雷鼓掣徹電降雹注大雨念彼觀音力應時得消散衆生被困厄無量苦逼身觀音妙智力能救世間苦具足神通力廣修智方便十方諸國土無剎不現身種種諸惡趣地獄鬼畜生生老病死苦以漸悉令滅真觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰無垢清淨光慧日破諸暗能伏災風火普明照世間悲體戒雷震慈意妙大雲澍甘露法雨滅除煩惱焰諍訟經官處怖畏軍陳中念彼觀音力衆冤悉退散妙音觀世音梵音海潮音勝彼世間音是故須常念念念勿生疑觀世音淨聖於苦惱死厄能為作依怙具一切功德慈眼視衆生福聚海無量是故應頂禮爾時持地菩薩即從座起前白佛言世尊若有衆生聞是觀世音菩薩品自在之業普門示現神通力者當知是人功德不少佛說是普門品時衆中八萬四千衆生皆發無等等阿耨多羅三菩三菩提心初一偈重問菩薩得名具足下先總答善應諸方所者言其分身無量誓願弘深本不可思亦不可議我當為汝略陳梗槩耳或有聞其名而專心注念者或有見其形而專心注念者皆不空過悉能滅三有之苦也假使下頌十四無畏由菩薩法相皆空心無水火故有注念觀音設使推入火坑即火坑原是寶池必不能燒設使漂流大海即大海亦如寶地必不能沒或在下由菩薩遍在天堂地獄之內而天堂不能攝地獄不能收故專心注念者即使天報已盡五衰相現必不墮落故曰或在須彌為人推墮如日處空也設或墮落被牛頭獄卒驅入刀山劍樹爐炭鑊湯必不能壞故曰被惡人逐墮落金剛不能損其一毛也蓋須彌是帝釋所都金剛是鬼子之宅故長阿含云三千大千世界復有大金剛山繞大海水金剛山外復有第二大金剛山二山中間窈窈冥冥復有八大地獄日月威光所不能照是也或值下由彼菩薩冤親平等慈心無盡故注念者即有冤賊加害令彼意消反生慈念也或遭下由彼菩薩自無殺心現身屠劊故注念者延頸就戮無所措刃也或囚下由被菩薩我愛既除法愛亦淨無拘無繫故注念者即有枷鎖杻械不能禁錮自然得釋也呪詛下由彼菩薩常以法藥療身心病又以呪力護救衆生故注念者即有呪詛毒藥欲害其身皆無受處故還著本人也或遇下由彼菩薩惡毒消亡鬼心殄滅而現身毒龍惡鬼中故注念者即有毒龍惡鬼尚不敢視何況加害苦惡下由彼菩薩絶滅獸心而現身在獸故注念者令彼見影潛蹤尋聲回去即有爪牙無能攫噬即有毒氣無能蠚螫也雲雷下由彼菩薩覺心不動恐怖遠離故注念者即遇烈風雷雨應時消散決不能迷也衆生下總結十四無畏言衆生被困厄衆苦逼身之時但肯專心注念菩薩即以微妙智慧之力度諸苦厄也具足二四句頌三十二應由彼菩薩具足如來無量神通廣修如來智慧善巧故能於釋迦分身國土無有一剎不現身說法令彼六趣三途生死衆苦漸令消滅漸得入道故觀音一名便足當一卷大經也真觀下以五觀合一品之旨以真觀觀聲聞根以清淨觀觀緣覺根以廣大智慧觀觀菩薩根以悲觀下合衆生以慈觀上同諸佛由菩薩具此五觀觀此五根念念不離故當常常願得瞻仰不可須臾生怠忽也無垢下申明五觀之義以有真觀故得無垢光有清淨觀故得清淨光有智慧觀故得智慧日由具此三種光明故能破三種黑暗能伏世間三災而能普照三世間也悲體二句申明慈悲二觀也以有慈觀為體警覺群生正如戒雷之動萬物以有慈觀為體蔭覆羣生亦如大雲普覆一切由此二觀如雷如雲故能降平等一味甘露法雨令彼群萌受潤各滅煩惱各證道果也諍訟下由彼菩薩絶無鬪心故注念者雖有冤家悉皆退散也此一偈當在釋然得解脫之下由菩薩以此五觀觀此五根方能對機說法故對聲聞根說法名妙音欲令聲聞皆得妙音密圓故對緣覺根說法名觀世音欲令緣覺推審三世因緣故對菩薩根說法名梵音欲令菩薩具足清白梵行故由上合如來三十二應入國土身名海潮音應不失時故由下合衆生十四種無畏功德名勝彼世間音以超勝一切世間音聲故由菩薩以一觀分五觀以一音分五音所以現身如雲說法如雨令彼大小霑恩人天獲利也故行人當行住坐臥冥記不忘時時常念念念之間又當篤信勿得生疑也何以故由此菩薩住於衆生煩惱心中染汙不得喚作淨聖故能入生死苦惱能與生死苦惱衆生為依為怙故知菩薩德無不備慈無不等福無不具是故汝等應當時時頂禮勿得忘也爾時下持地讚德言持地者平持心地故由平持心地故能慈悲平等現身平等說法平等也自在之業者謂菩薩三十二應十四無畏皆是調而應偶而會曾無縛著遊戲自在故能隨機現身說法此菩薩所以亦名觀自在也佛說下大衆獲益陀羅尼品第二十六頌云長江天塹限不得鐵壘金城難護持泥履兜醯是何物百千神鬼盡低眉梵語陀羅尼此云總持以能護善遮惡故自地涌菩薩持經如來囑纍心事已畢復恐地涌菩薩久居下界常處空間初入塵寰利生接物難堪難忍故復將此界他方諸大菩薩所證法門一一拈出如藥王之忍辱妙音之法空觀音之慈悲與彼菩薩常受摸若忍辱而不得法空則心量不大若證法空而不行慈悲則教化不廣必須入此三種法門方得流通此經不斷持經典刑至此已極然而復有此品者正恐末世邪師熾盛魔事實多初心持經信力未固故諸菩薩說呪護持神力冥加不令侵毀此益見菩薩慈悲無盡也爾時藥王菩薩即從座起偏袒右肩合掌向佛而白佛言世尊若善男子善女人有能受持法華經者若讀誦通利若書寫經卷得幾所福佛告藥王若有善男子善女人供養八百萬億那由他恆河沙等諸佛於汝意云何其所得福寧為多不甚多世尊佛言若善男子善女人能於是經乃至受持一四句偈讀誦解義如說修行功德甚多爾時藥王菩薩白佛言世尊我今當與說法者陀羅尼呪以守護之即說呪曰安爾曼爾摩禰你摩摩禰你旨隸遮黎第賖奢咩米賖履多瑋尾羶山帝目帝目多履娑履阿瑋尾娑履桑履娑履叉裔異阿叉裔阿耆膩義羶山帝賖履陀羅尼阿盧伽婆娑蘇奈切簸播蔗毗叉膩禰毗剃阿便哆邏懦禰履剃阿亶哆墮波隸輸地歐究隸牟究𨽻阿羅𨽻首迦差恥阿三磨三履佛陀毗直吉利袠帝達磨波利差妻帝僧伽涅瞿沙禰婆舍婆舍輸地曼哆邏曼哆邏叉夜多郵尤樓哆郵尤樓哆憍舍略來如切惡義邏惡叉冶多冶阿婆盧阿摩若荏蔗切那多夜世尊是陀羅尼神呪六十二億恆河沙等諸佛所說若有侵毀此法師者則為侵毀是諸佛已時釋迦牟尼佛讚藥王菩薩言善哉善哉藥王汝愍念擁護此法師故說是陀羅尼於諸衆生多所饒益讀誦通利者言不能恆久受持即讀誦通利者其功德與供養八百萬億恆河沙諸佛等又不止於起塔供佛廣造僧坊供僧而已爾時下說呪護持呪者密語也藥王既以神力顯持又以神呪冥加則知捨身為法者是藥王說呪護人者亦是藥王若無藥王亡身為法則法藥不存若無藥王竭力為人則病根不去故知為法為人皆藉藥王之力也世尊下顯呪功德言此呪是諸佛所說若有法師說此經持此呪即為如來所遣行如來事者而有侵凌謗毀則為謗毀諸佛無異蓋有敬主以及其使愛人而及其甘棠者故侵毀法師即是侵毀諸佛矣時釋下發言讚歎言汝既於惡世不惜身命護持此經而又愍念持經法師說呪冥加令彼諸魔不敢侵凌謗毀安敢加之杖木瓦石乎此藥王所以能止衆病也爾時勇施菩薩白佛言世尊我亦為擁護讀誦受持法華經者說陀羅尼若此法師得是陀羅尼若夜叉若羅剎若富單那若吉蔗若鳩槃茶若餓鬼等伺求其短無能得便即於佛前而說呪曰痤生平聲𨽻摩訶痤𨽻郁枳目枳阿𨽻羅阿婆第涅𨽻第涅𨽻多婆第伊緻智抳你韋緻抳旨緻抳涅𨽻墀抳涅犂墀婆底世尊是陀羅尼神呪恆河沙等諸佛所說亦皆隨喜若有侵毀此法師者即為侵毀是諸佛已勇施等亦說呪冥加者一人唱而衆人和也夜叉此云捷疾鬼羅剎此云噉精氣鬼亦皆隨喜者言此呪是諸佛所說即諸佛亦順此呪而生歡喜也爾時毗沙門天王護世者白佛言世尊我亦為愍念衆生擁護此法師故說是陀羅尼即說呪曰阿黎那黎㝹婁那黎阿那盧那履拘那履世尊以是神呪擁護法師我亦自當擁護持是經者令百由旬內無諸衰患爾時持國天王在此會中與千萬億那由他乾闥婆衆恭敬圍繞前詣佛所合掌白佛言世尊我亦以陀羅尼神呪擁護持法華經者即說呪曰阿伽禰你伽禰瞿利乾陀利旃陀利摩蹬鄧耆常求利浮樓莎抳頞遏底世尊是陀羅尼神呪四十二億諸佛所說若有侵毀此法師者則為侵毀是諸佛已毗沙門即北方多聞天王也持國東方天王也楞嚴云心持呪印顧盻雄毅故惡世持經道力未充者必仗神呪冥資之力降伏魔冤得無恐畏此神呪所以不容己也爾時有羅剎女等一名藍婆二名毗藍婆三名曲齒四名華齒五名黑齒六名多髮七名無厭足八名持瓔珞九名臯帝十名奪一切衆生精氣是十羅剎女與鬼子母并其子及眷屬俱詣佛所同聲白佛言世尊我等亦欲擁護讀誦受持法華經者除其衰患若有伺求法師短者令不得便即於佛前而說呪曰伊提履伊提泯閔伊提履阿提履伊提履泥履泥履泥履泥履泥履樓醯樓醯樓醯樓醯多醯多醯多醯兜醯㝹樓醯寧上我頭上莫惱於法師若夜叉若羅剎若餓鬼若富單那若吉蔗若毗陀羅若犍馱若烏摩勒伽若阿跋摩羅若夜叉吉蔗若人吉蔗若熱病若一日若二日若三日若四日若至七日若常熱病若男形若女形若童男形若童女形乃至夢中亦復莫惱即於佛前而說偈言若不順我呪惱亂說法者頭破作七分如阿黎樹枝如殺示父母罪亦如壓油殃斗稱欺誑人調達破僧罪犯此法師者當獲如是殃諸羅剎女說此偈已白佛言世尊我等亦當身自擁護受持讀誦修行是經者令得安隱離諸衰患消衆毒藥佛告諸羅剎女善哉善哉汝等但能擁護受持法華名者福不可量何況擁護具足受持供養經卷華香瓔珞末香塗香燒香幡蓋伎樂然種種燈酥燈油燈諸香油香燈酥摩那華油燈薝蔔華油燈婆師迦華油燈優鉢羅華油燈如是等百千種供養者臯帝汝等及眷屬應當擁護如是法師說是陀羅尼品時六萬八千人得無生法忍說呪之義正為此等此等既已革心革面持經之人無復憂慮矣古德云昨夜夜叉心今朝菩薩面菩薩與夜叉不隔一條線故王道興而守在四夷佛道備而防在魔外也藍婆亦云結縛毗藍婆亦名離結縛寧上下是叮嚀衆鬼語也毗陀羅此云赤色鬼犍陀此云黃色鬼烏摩勒伽此云鳥聲鬼阿跋摩羅此云青色鬼熱病鬼者如瘟疫瘧鬼之類若男下鬼形也乃至夢中亦復莫惱者令彼法師覺安夢安也阿黎樹枝其樹墮地碎成七片殺父母五逆之二也壓油殃者西方壓油多取衆華腐爛然後取油華中之蟲極多故壓油之殃亦重斗稱欺誑者如小斗出而大斗入小稱出而大稱入由欺誑世人其罪亦重調達破僧亦五逆之一若諸鬼更犯持經法師所獲罪戾悉與此等故知受持此經者不但善神擁護即惡鬼亦能革心故末世持經者盡其在我即遇惡人勿須恐怖也我等下發願親護佛告下發言讚歎言汝等擁護受持此經名字者福已無量又況擁護受持全經乃至以種種供養此全經者其福德豈能量哉酥摩那華即須曼那華也婆師迦即波利師迦優鉢羅即青蓮華也言取此諸華為燈油以供佛也臯帝下又呼其名而囑之曰若能擁護受持供養是經典者不但令彼有益即汝等所獲福利亦不可量以彼此悉有利益是故汝等應當擁護如是法師說是下大衆獲益妙莊嚴王品第二十七頌曰疾病無根莫浪猜邪風觸著便生災只須一服牛黃散盡把頑涎釣出來藥王本事是顯藥王因中求法供佛之德本此品雖名妙莊嚴王本事實顯藥王藥上度生之善巧也妙莊嚴王往昔因中曾為比丘結伴修道一日見王出駕忽起欲心後為國王貪著五欲不敬三寶由彼往昔修道因緣二友現為二子轉其邪心要知化度衆生有難有易如不輕之化四衆反加罵辱太費精神若文殊之化龍女二子之轉妙莊嚴一時頓信又何容易蓋機有淺深故受化有難易非謂菩薩善巧有優劣也爾時佛告諸大衆乃往古世過無量無邊不可思議阿僧祇劫有佛名雲雷音宿王華智多陀阿伽度阿羅訶三藐三佛陀國名光明莊嚴劫名喜見彼佛法中有王名妙莊嚴其王夫人名曰淨德有二子一名淨藏二名淨眼是二子有大神力福德智慧久修菩薩所行之道所謂檀波羅蜜尸羅波羅蜜羼提波羅蜜毗離耶波羅蜜禪波羅蜜般若波羅蜜方便波羅蜜慈悲喜捨乃至三十七品助道法皆悉明了通達又得菩薩淨三昧日星宿三昧淨光三昧色淨三昧淨照明三昧長莊嚴三昧大威德藏三昧於此三昧亦悉通達佛名雲雷音宿王華智國名光明莊嚴劫名喜見王名妙莊嚴夫人名淨德藥王品中藥王名一切衆生喜見佛名日月淨明德生於淨德王家宿王華問藥王本事妙音品中世界名淨光莊嚴佛號淨華宿王智菩薩名妙音過去有佛名雲雷音王國名現一切世間劫名喜見皆是一貫事若以事言則妙莊嚴是王夫人是內助淨藏淨眼是克家之子若以理言妙莊嚴王是衆生本有佛性夫人名淨德即本性所具無量不思義功德藏識清淨曰淨藏法眼清淨曰淨眼謂本有佛性具足無量性功德故莊嚴妙好本來自在不假修成由彼忽生一念遂起妄執即墮邪見若不翻染成淨不得妙嚴藏識不淨不得妙嚴法眼不淨不得妙嚴必須轉藏識開法眼萬德清淨然後妙莊嚴王自在無礙此一經之結局故楞嚴名妙莊嚴華嚴名妙嚴也若欲紹法王位必如是而後可企及故於此發之是二下出二子之德權實皆具大小悉通又得七大三昧也由轉染汙意故得淨三昧轉貪著心故得日星宿三昧轉愚癡黑暗故得淨光三昧轉色法故得淨色三昧智慧無量故得淨照明三昧福德無際故得長莊嚴三昧威德無窮故得大威德藏三昧此皆轉前七識所得也爾時彼佛欲引導妙莊嚴王及愍念衆生故說是法華經時淨藏淨眼二子到其母所合十指爪掌白言願母往詣雲雷音宿王華智佛所我等亦當侍從親近供養禮拜所以者何此佛於一切天人衆中說法華經宜應聽受母告子言汝父信受外道深著婆羅門法汝等應往白父與共俱去淨藏淨眼合十指爪掌白母我等是法王子而生此邪見家母告子言汝等當憂念汝父為現神變若得見者心必清淨或聽我等往至佛所於是二子念其父故涌在虗空高七多羅樹現種種神變於虗空中行住坐臥身上出水身下出火身下出水身上出火或現大身滿虗空中而復現小小復現大於空中滅忽然在地入地如水履水如地現如是等種種神變令其父王心淨信解時父見子神力如是心大歡喜得未曾有合掌向子言汝等師為是誰誰之弟子二子白言大王彼雲雷音宿王華智佛今在七寶菩提樹下法座上坐於一切世間天人衆中廣說法華經是我等師我是弟子父語子言我今亦欲見汝等師可供俱往法王欲導引人王入大乘故說法華為發起所謂佛種從緣起是故說大乘也時淨下勸母聽法欲化父而先勸母詣佛者欲其母發端徐熏緩導之也母告下令子勸父言婆羅門我慢最高汝父既已信受此等著邪見法汝不勸彼詣佛而反勸我若汝欲我聽法須汝勸父同行蓋其母逆知其父深信外道不肯詣佛故激其子以導之也淨藏下二子懊惱言我等母子深信佛法皆是法王之子具正知見何為生此邪見之家母告下令子化父汝等當憂念汝父者言父之入邪二子之憂也當以此為念為現神變者示以化父之方邪見之人不知正法決不許我等詣佛亦不許我等出家非現神通決不能動心易慮故令二子現神變以轉其邪心然後導其聽法也於是下二子現通邪見之處即是現通之地若無邪見雖有神通亦無所施時父下見通歡喜宿世善根躍然興起故敬其子而遂問其師也二子下敬陳師法既以神變轉其心欲以法水洗其垢故陳其所師而誘令詣佛也父語下心樂覲佛所謂利根之人一撥便轉於是二子從空中下到其母所合掌白母父王今已信解堪任發阿耨多羅三藐三菩提心我等為父已作佛事願母見聽於彼佛所出家修道爾時二子欲重宣其意以偈白母願母放我等出家作沙門諸佛甚難值我等隨佛學如優雲鉢華值佛復難是脫諸難亦難願聽我出家母即告言聽汝出家所以者何佛難值故於是二子白父母言善哉父母願時往詣雲雷音宿王華智佛所親近供養所以者何佛難得值如優曇鉢羅華又如一眼之龜值浮木孔而我等宿福深厚生值佛法是故父母當聽我等令得出家所以者何諸佛難值時亦難遇彼時妙莊嚴王後宮八萬四千人皆悉堪任受持是法華經淨眼菩薩於法華三昧久已通達淨藏菩薩已於無量百千萬億劫通達離諸惡趣三昧欲令一切衆生離諸惡趣故其王夫人得諸佛集三昧能知諸佛祕密之藏二子如是以方便力善化其父令心信解好樂佛法於是莊妙嚴王與羣臣眷屬俱淨德夫人與後宮采女眷屬俱其王二子與四萬二千人俱一時共詣佛所到已頭面禮足繞佛三匝却住一面爾時彼佛為王說法示教利喜王大歡悅二子覆母從空下者現神變時身在虗空化父已畢然後白母故從空下也今已信解者言父昔日不信佛法今現神變而往昔之心隆隆復起矣堪任發菩提心者言父王正在深信堅固之際此時正堪詣佛聽法發明大事勿得蹉過我等既已轉父邪心心事已畢故願母詣佛出家也偈中放字作上聲讀猶效也謂效我等亦出家也先白母者知母之緣熟已久也母即下母子投機許子出家於是下勸駕速行因母聽許出家併勸其父聽法也言願時往詣者言此時雲雷音王正說法華當速詣佛所供養親近勿得羈留我等往劫植福深厚生逢佛法故當聽我等出家以諸佛難值時亦難遇故當及時覲佛勿得唐喪光陰也彼時下正顯昔緣成熟一門皆是菩提眷屬所謂大家團圞頭共說無生話也因開佛知見故得法華三昧因捨藏識故得遠離惡趣三昧因知如來祕密藏故得集福王三昧二子下說出方便言有二子為增上緣妙莊嚴王雖欲信邪不樂佛法不可得也故修行人雖有妙莊嚴為正因若不淨藏識不開法眼不具淨功德便埋沒了也既自有正因又有助緣彈指之頃便得入道於是下同時覲佛爾時下逗機說法爾時妙莊嚴王及其夫人解頸真珠瓔珞價值百千以散佛上於虗空中化成四柱寶臺臺中有大寶牀敷百千萬天衣其上有佛結加趺坐放大光明爾時妙莊嚴王作是念佛身希有端嚴殊特成就第一微妙之色時雲雷音宿王華智佛告四衆言汝等見是妙莊嚴王於我前合掌立不此王於我法中作比丘精勤修習助佛道法當得作佛號娑羅樹王國名大光劫名大高王其娑羅樹王佛有無量菩薩衆及無量聲聞其國平正功德如是其王即時以國付弟與夫人二子并諸眷屬於佛法中出家修道王出家已於八萬四千歲常勤精進修行妙法華經過是已後得一切淨功德莊嚴三昧即升虗空高七多羅樹而白佛言世尊此我二子已作佛事以神通變化轉我邪心令得安住於佛法中得見世尊此二子者是我善知識為欲發起宿世善根饒益我故來生我家爾時雲雷音宿王華智佛告妙莊嚴王言如是如是如汝所言若善男子善女人種善根故世世得善知識其善知識能作佛事示教利喜令入阿耨多羅三藐三菩提大王當知善知識者是大因緣所以化導令得見佛發阿耨多羅三藐三菩提心大王汝見此二子不此二子已曾供養六十五百千萬億那由他恆河沙諸佛親近恭敬於諸佛所受持法華經愍念邪見衆生令住正見爾時下割愛供佛於虗下現通增信以實二子所言也由彼好神通故化臺化佛以示之爾時下樂佛身相所謂珠玉在前覺我形穢時雲下告衆授記言此王若作比丘當得作佛者正欲其捨國出家也其王下付國出家出世大雄勇猛決烈類皆如此王出下出家得道而白下了悟前因讚揚二字所以醉中不覺醒後方知也至此妙莊嚴王始與二子相見爾時下如來印證言汝宿昔曾種善根故今得三昧入菩提皆善知識之力也大王下發明二子本事妙莊嚴王即從虗空中下而白佛言世尊如來甚希有以功德智慧故頂上肉髻光明顯照其眼長廣而紺青色眉間毫相白如珂月齒白齊密常有光明唇色赤好如頻婆果爾時妙莊嚴王讚歎佛如是等無量百千萬億功德已於如來前一心合掌復白佛言世尊未曾有也如來之法具足成就不可思議微妙功德教戒所行安隱快善我從今日不復自隨心行不生邪見憍慢瞋恚諸惡之心說是語時禮佛而出佛告大衆於意云何妙莊嚴王豈異人乎今華德菩薩是其淨德夫人今佛前光照莊嚴相菩薩是哀愍妙莊嚴王及諸眷屬故於彼中生其二子者今藥王菩薩藥上菩薩是是藥王藥上菩薩成就如此諸大功德已於無量百千萬億諸佛所植衆德本成就不可思議諸善功德若有人識是二菩薩名字者一切世間諸天人民亦應禮拜佛說是妙莊嚴王本事品時八萬四千人遠塵離垢於諸法中得法眼淨此讚佛也言我未入佛會未見法王時自謂尊勝無能過者見佛之後乃知如來成就無量功德復能教戒我等日用所行之事能令我等得安隱快善今日既聞如來正法不復更隨自己心行習邪見事行邪見法亦復不生種種矜憍傲慢瞋恚正人之心矣總是一妙莊嚴王始而不信佛既而欲見佛卒之愛佛親近佛讚歎佛始知一切衆生本無定性習惡則惡習善即善入邪則邪就正即正了無定相故知心迷法華轉心悟轉法華也佛告下點明今昔華德菩薩即是問妙音本事而轉法華三昧者佛說下大衆獲益普賢品第二十八頌云我亦潛心在此經願王何日到荒庭暗中若許來摩頂白象先教樹下停普賢有二行彌法界曰普鄰極亞聖曰賢此在等覺屬因稱真法界曰普彌綸萬化曰賢此在妙覺屬果以此普賢乃法界之全體毗盧之願身故授記弟子之後多寶如來及現在分身諸佛作證暨乎菩薩發願持經復廣說菩薩本事普賢願王現身作證勸人發心流通此法故有此品然此經非智無以立體非行無以成德要須智行並進德業俱隆大事因緣方得了當故以文殊發始普賢成終所以云契文殊之妙智宛是初心入普賢之行門曾無別體爾時普賢菩薩以自在神通力威德名聞與大菩薩無量無邊不可稱數從東方來所經諸國普皆震動雨寶蓮華作無量百千萬億種種伎樂又與無數諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等大衆圍繞各現威德神通之力到娑婆世界耆闍崛山中頭面禮釋迦牟尼佛右繞七匝白佛言世尊我於寶威德上王佛國遙聞此娑婆世界說法華經與無量無邊百千萬億諸菩薩衆共來聽受惟願世尊當為說之若善男子善女人於如來滅後云何能得是法華經佛告普賢菩薩若善男子善女人成就四法於如來滅後當得是法華經一者為諸佛護念二者植衆德本三者入正定聚四者發救一切衆生之心善男子善女人如是成就四法於如來滅後必得是經先普賢發足不速而疾不行而至故曰自在神力生人敬想發人信心故曰威德具此威德則立處皆賢故名稱普聞也從東方來者將說經時一光東照集分身時一光東照召菩薩時一光東照故菩薩亦從東方來以普賢萬行原不離日用動作施為故所經諸國皆震動者是惟不作作則萬類震驚故雨華奏樂者酬其宿因故八部各現神通者皆得普賢毛孔三昧故白佛下自陳來意佛號寶威德上王者是威德最尊極貴太上之王故曰寶而又曰上王也言從此國遙聞說法華經故來聽受也言遙聞者心聞洞十方也云何能得是法華經言得者正謂流離困苦造次顛沛皆不失此一卷大經也若善下告以得經之方諸佛護念者此經是諸佛護念故能護念此經者諸佛亦護念之也植衆德本者六度十力四無所畏等無不植也入正定聚者如妙華妙幢等三昧無不入也發救一切衆生之心者如十二類生無不度也若成就此四法必得是經者如藥王得此而然身妙音得此而化座觀音得此而普應妙莊得此而轉邪普賢得此而說呪等問此四法與四安樂是同是別答四安樂行是說經之法此四法是持經之方然總是自利利他之德故亦同亦別爾時普賢菩薩白佛言世尊於後五百歲濁惡世中其有受持是經典者我當守護除其表患令得安隱使無伺求得其便者若魔若魔子若魔女若魔民若為魔所著者若夜叉若羅剎若鳩槃茶若毗舍闍若吉蔗若富單那若韋陀羅等諸惱人者皆不得便是人若行若立讀誦此經我爾時乘六牙白象王與大菩薩衆俱詣其所而自現身供養守護安慰其心亦為供養法華經故是人若坐思惟此經爾時我復乘白象王現其人前其人若於法華經有所忘失一句一偈我當教之與共讀誦還令通利爾時受持讀誦法華經者得見我身甚大歡喜轉復精進以見我故即得三昧及陀羅尼名為旋陀羅尼百千萬億旋陀羅尼法音方便陀羅尼得如是等陀羅尼世尊若後世後五百歲濁惡世中比丘比丘尼優婆塞優婆夷求索者受持者讀誦者書寫者欲修習是法華經於三七日中應一心精進滿三七日已我當乘六牙白象與無量菩薩而自圍繞以一切衆生所喜見身現其人前而為說法示教利喜亦復與其陀羅尼呪得是陀羅尼故無有非人能破壞者亦不為女人之所惑亂我身亦自常護是人惟願世尊聽我說此陀羅尼呪即於佛前而說呪曰阿檀地檀陀婆地檀陀婆帝檀陀鳩舍隸檀陀修陀隸修陀隸修陀羅婆底佛陀波羶山禰你薩婆陀羅尼阿婆多尼薩婆婆沙阿婆多尼修阿婆多尼僧伽婆履叉尼僧伽涅伽陀尼阿僧祇僧伽婆伽地帝隸阿惰僧伽兜略六遮切阿羅帝波羅帝薩婆僧伽地三摩地伽蘭地薩婆達磨修波利剎帝薩婆薩埵樓䭾憍舍略阿㝹伽地辛阿毗吉利地帝受持者寸絲不掛守護者寸步不離韋陀羅此云厭禱鬼乘白象者乘大願力也白牛白象皆可負重致遠故思惟者凝神定志究其義趣也修習者行住坐臥精修熏習也古德云說得一丈不如行取一尺說得一尺不如行取一寸是也現身說法者覿面親呈也與陀羅尼者兩手授與也世尊因普眼欲見普賢不可得見而來白佛佛曰汝但於靜三昧中起一念便見普賢普眼才起一念便見普賢向空中乘六牙白象要知衆生起心動念處皆是普賢現身面時人自不識耳世尊若有菩薩得聞是陀羅尼者當知普賢神通之力若法華經行閻浮提有受持者應作此念皆是普賢威神之力若有受持讀誦正憶念解其義趣如說修行當知是人行普賢行於無量無邊諸佛所深種善根為諸如來手摩其頭若但書寫是人命終當生忉利天上是時八萬四千天女作衆技樂而來迎之其人即著七寶冠於采女中娛樂快樂何況受持讀誦正憶念解其義趣如說修行若有人受持讀誦解其義趣是人命終為千佛授手令不恐怖不隨惡趣即往兜率天上彌勒菩薩所彌勒菩薩有三十二相大菩薩衆所共圍繞有百千萬億天女眷屬而於中生有如是等功德利益是故智者應當一心自書若使人書受持讀誦正憶念如說修行世尊我今以神通力故守護是經於如來滅後閻浮提內廣令流布使不斷絶下明五種法師即是行普賢行者若但下以淺況深言不行餘四但作書寫一種法師亦生忉利受快樂何況五種俱作者乎千佛授手者謂以手親援之也由具有此大威德法門故不恐怖不墮惡趣而生彌勒內院與諸菩薩常為眷屬是故下結勸當持閻浮提內廣令流布者要知南閻浮提凡有受持讀誦解說書寫供養法華經處皆是普賢神力普賢道場勿得作輕易想爾時釋迦牟尼佛讚言善哉善哉普賢汝能護助是經令多所衆生安樂利益汝已成就不可思議功德深大慈悲從久遠來發阿耨多羅三藐三菩提意而能作是神通之願守護是經我當以神通力守護能受持普賢菩薩名者普賢若有受持讀誦正憶念修習書寫是法華經者當知是人則見釋迦牟尼佛如從佛口聞此經典當知是人供養釋迦牟尼佛當知是人佛讚善哉當知是人為釋迦牟尼佛手摩其頭當知是人為釋迦牟尼佛衣之所覆如是之人不復貪著世樂不好外道經書手筆亦復不喜親近其人及諸惡者若屠兒若畜猪羊雞狗若獵師若衒現賣女色是人心意質直有正憶念有福德力是人不為三毒所惱亦不為嫉妬我慢邪慢增上慢所惱是人少欲知足能修普賢之行普賢若如來滅後後五百歲若有人見受持讀誦法華經者應作是念此人不久當詣道場破諸魔衆得阿耨多羅三藐三菩提轉法輪擊法鼓吹法螺雨法雨當坐天人大衆中師子法座上普賢若於後世受持讀誦是經典者是人不復貪著衣服臥具飲食資生之物所願不虗亦於現世得其福報若有人輕毀之言汝狂人耳空作是行終無所獲如是罪報當世世無眼若有供養讚歎之者當於今世得現果報若復見受持是經者出其過惡若實若不實此人現世得白癩病若輕笑之者當世世牙齒疏缺醜唇平鼻手腳繚戾眼目角睞賴身體臭穢惡瘡膿血水腹短氣諸惡重病是故普賢若見受持是經典者當起遠迎當如敬佛說是普賢勸發品時恆河沙等無量無邊菩薩得百千萬億施陀羅尼三千大千世界微塵等諸菩薩具普賢道佛說是經時普賢等諸菩薩舍利弗等諸聲聞及諸天龍人非人等一切大會皆大歡喜受持佛語作禮而去先讚德言汝是過去已成之佛而能在此會中發神通願守護是經我亦以神通力守護受持普賢名者雖是互相讚揚其實普賢名字又該一部全經故持普賢名者即與持法華經功德等無差別普賢下廣讚持經之益則見釋迦者持此經者即持佛身故供養釋迦者持此經者即是藥王故佛讚善哉者持此經者諸佛所喜故手摩其頭者持此經者得頂法故衣之所覆者持此經者皆如來所遣故不貪世樂者持此經者已得法喜故不好外書者持此經者已得無上法寶故不親近其人者諸佛菩薩是其伴侶故及諸惡者捨惡律儀故心意質直者無諂曲心故有正憶念者無邪思量故不為三毒所惱等者無根隨故少欲者世味淡薄故知足者不外馳求故不久詣道場者成佛不遠故所願不虗者隨心滿願故若有下廣顯謗經獲罪汝狂二句出輕毀之語如是下出輕毀之報世世無眼者壞正法眼故得白癩病者無功德莊嚴故繚戾者卷曲之狀角睞者瞳子不正也臭穢者無法身香故水腹者空腹高心故短氣者浩氣不充故是故下結勸受持說是下大衆獲益佛說下歡喜流通
